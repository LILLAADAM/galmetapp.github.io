<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet - Create Party Room</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f3f7fb", "surface-container-low": "#ecf1f6",
            "surface-container-lowest": "#ffffff", "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60", "primary": "#006571",
            "primary-container": "#00e3fd", "primary-dim": "#005863",
            "secondary": "#755700", "tertiary": "#b60051",
            "outline": "#73777b", "outline-variant": "#a9aeb1"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen pb-32">

<!-- Top Navigation -->
<header class="flex justify-between items-center px-6 h-16 w-full sticky top-0 z-50 bg-white/40 backdrop-blur-md">
  <button onclick="history.back()" class="flex items-center justify-center w-10 h-10 rounded-full hover:opacity-80 transition-opacity">
    <span class="material-symbols-outlined text-primary">arrow_back</span>
  </button>
  <h1 class="font-headline font-bold text-lg text-primary">Create Party</h1>
  <button class="flex items-center justify-center w-10 h-10 rounded-full hover:opacity-80 transition-opacity">
    <span class="material-symbols-outlined text-primary">settings</span>
  </button>
</header>

<main class="max-w-md mx-auto px-6 space-y-6 mt-4">
  <!-- Banner Upload Section -->
  <section class="relative group">
    <div class="w-full h-48 rounded-lg overflow-hidden bg-surface-container-highest relative">
      <img id="bannerPreview" class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-500" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBi2ACL0grtYoDrnJiuKS3p3ohbJsYeYhiXsdA14U7Oi23ELmWQnwo4RgXHfZ8Mf2iMCYTrpYmAeIxgyUE-USbvckIDrk5VygS8vP-sw3B5mEtapI0bn9IvAjFsrHJty0ckFAm0zN-ERarS6FsDyiGakn3XaMT7rTW1Tt0tZGFc6gBtEowsBAWMdorKiaBGpDCpeWttPzYz43GNpRxD2aj4xd4wbmySC5TuY2-x8-tIWLADUoRSCyHTHt4PFi_teIIurRyZQGU3I0f8">
      <div class="absolute inset-0 flex flex-col items-center justify-center bg-black/10 cursor-pointer" onclick="document.getElementById('bannerInput').click()">
        <div class="w-14 h-14 rounded-full bg-white/90 shadow-lg flex items-center justify-center mb-2">
          <span class="material-symbols-outlined text-primary text-3xl">add_a_photo</span>
        </div>
        <span class="font-label text-xs font-bold text-white uppercase tracking-wider drop-shadow-md">Upload Party Banner</span>
      </div>
      <input type="file" id="bannerInput" accept="image/*" class="hidden">
    </div>
  </section>

  <!-- Room Details Form -->
  <section class="space-y-5">
    <div>
      <label class="font-label text-xs font-bold text-on-surface-variant ml-2">Room Title</label>
      <input id="roomTitle" class="w-full px-6 py-4 rounded-lg bg-surface-container-lowest border-none shadow-sm focus:ring-2 focus:ring-primary text-on-surface font-semibold" type="text" placeholder="My Awesome Party">
    </div>
    <div>
      <label class="font-label text-xs font-bold text-on-surface-variant ml-2">Room Privacy</label>
      <div class="flex gap-3">
        <button id="privacyPublic" class="flex-1 py-3 rounded-full bg-primary text-white font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
          <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL'1">public</span> Public
        </button>
        <button id="privacyPrivate" class="flex-1 py-3 rounded-full bg-surface-container-highest text-on-surface-variant font-bold text-sm flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-sm">lock</span> Private
        </button>
      </div>
    </div>
    <div>
      <label class="font-label text-xs font-bold text-on-surface-variant ml-2">Announcement</label>
      <textarea id="announcement" class="w-full px-6 py-4 rounded-lg bg-surface-container-lowest border-none shadow-sm focus:ring-2 focus:ring-primary text-on-surface min-h-[80px]" placeholder="Welcome to the best party on Galmet! Let's have fun!"></textarea>
    </div>
  </section>

  <!-- Seat Limit (ONLY 8 seats – functional) -->
  <section class="space-y-4">
    <div class="flex items-center justify-between px-2">
      <label class="font-label text-xs font-bold text-on-surface-variant">Seat Limit</label>
      <span class="text-xs font-bold text-primary px-3 py-1 bg-primary-container/20 rounded-full">8 Seats</span>
    </div>
    <div class="bg-surface-container-low p-2 rounded-full flex justify-center">
      <div class="px-5 py-2 rounded-full bg-primary text-white shadow-md text-sm font-bold">8</div>
    </div>
  </section>

  <!-- Layout Preview (8 Seats) – static display -->
  <section class="space-y-4">
    <label class="font-label text-xs font-bold text-on-surface-variant ml-2">Layout Preview</label>
    <div class="bg-surface-container p-6 rounded-lg space-y-6">
      <div class="flex justify-center gap-4">
        <div class="w-16 h-16 bg-white rounded-md flex items-center justify-center relative shadow-sm border-b-2 border-primary">
          <span class="material-symbols-outlined text-primary-dim text-xl">videocam</span>
          <div class="absolute -top-1 -right-1 w-4 h-4 bg-primary rounded-full border-2 border-white"></div>
        </div>
        <div class="w-16 h-16 bg-white rounded-md flex items-center justify-center relative shadow-sm border-b-2 border-primary">
          <span class="material-symbols-outlined text-primary-dim text-xl">videocam</span>
          <div class="absolute -top-1 -right-1 w-4 h-4 bg-primary rounded-full border-2 border-white"></div>
        </div>
        <div class="w-16 h-16 bg-white rounded-md flex items-center justify-center relative shadow-sm border-b-2 border-primary">
          <span class="material-symbols-outlined text-primary-dim text-xl">videocam</span>
          <div class="absolute -top-1 -right-1 w-4 h-4 bg-primary rounded-full border-2 border-white"></div>
        </div>
      </div>
      <div class="flex flex-wrap justify-center gap-3">
        <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm"><span class="material-symbols-outlined text-on-surface-variant text-lg">mic</span></div>
        <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm"><span class="material-symbols-outlined text-on-surface-variant text-lg">mic</span></div>
        <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm"><span class="material-symbols-outlined text-on-surface-variant text-lg">mic</span></div>
        <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm"><span class="material-symbols-outlined text-on-surface-variant text-lg">mic</span></div>
        <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm"><span class="material-symbols-outlined text-on-surface-variant text-lg">mic</span></div>
      </div>
    </div>
  </section>

  <!-- Category -->
  <section class="space-y-4">
    <label class="font-label text-xs font-bold text-on-surface-variant ml-2">Category</label>
    <div class="flex flex-wrap gap-2">
      <button id="catGame" class="px-5 py-2.5 rounded-full bg-secondary-container text-on-secondary-fixed font-bold text-sm flex items-center gap-2 shadow-sm">
        <span class="material-symbols-outlined text-sm">sports_esports</span> Game Room
      </button>
      <button id="catChat" class="px-5 py-2.5 rounded-full bg-white text-on-surface-variant font-bold text-sm flex items-center gap-2 border-outline-variant/10 border">
        <span class="material-symbols-outlined text-sm">forum</span> Chat Room
      </button>
      <button id="catSpin" class="px-5 py-2.5 rounded-full bg-white text-on-surface-variant font-bold text-sm flex items-center gap-2 border-outline-variant/10 border">
        <span class="material-symbols-outlined text-sm">poker_chip</span> Lucky Spin
      </button>
    </div>
  </section>

  <!-- Video Filter (coming soon) -->
  <section>
    <button class="w-full flex items-center justify-between p-4 rounded-lg bg-surface-container-low hover:bg-surface-container-highest transition-colors" onclick="alert('Video filters coming soon')">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center">
          <span class="material-symbols-outlined text-on-tertiary-container">magic_button</span>
        </div>
        <div>
          <p class="font-bold text-sm">Video Filter</p>
          <p class="text-[10px] text-on-surface-variant">Apply live beauty effects & AR</p>
        </div>
      </div>
      <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
    </button>
  </section>
</main>

<!-- Fixed Action Button (Create Party) -->
<div class="fixed bottom-0 left-0 right-0 p-6 glass-card bg-white/60">
  <div class="max-w-md mx-auto">
    <button id="createPartyBtn" class="w-full h-14 rounded-full bg-gradient-to-r from-primary to-primary-fixed-dim text-white font-headline font-extrabold text-lg flex items-center justify-center gap-3 shadow-[0_12px_24px_-8px_rgba(0,101,113,0.4)] active:scale-95 transition-all duration-200">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL'1">celebration</span> Let's Party
    </button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);
  const storage = getStorage(app);

  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) {
    window.location.replace("login.html");
  }
  const userId = currentUser.userId.toString();
  const username = currentUser.username || "User";
  const photoURL = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=006571&color=fff`;

  // DOM elements
  const roomTitle = document.getElementById("roomTitle");
  const announcement = document.getElementById("announcement");
  const privacyPublic = document.getElementById("privacyPublic");
  const privacyPrivate = document.getElementById("privacyPrivate");
  const catGame = document.getElementById("catGame");
  const catChat = document.getElementById("catChat");
  const catSpin = document.getElementById("catSpin");
  const bannerInput = document.getElementById("bannerInput");
  const bannerPreview = document.getElementById("bannerPreview");
  const createBtn = document.getElementById("createPartyBtn");

  let selectedPrivacy = "public";
  let selectedCategory = "game";
  let selectedBannerFile = null;

  // Privacy selection
  privacyPublic.onclick = () => {
    privacyPublic.classList.add("bg-primary", "text-white", "shadow-lg");
    privacyPrivate.classList.remove("bg-primary", "text-white", "shadow-lg");
    privacyPrivate.classList.add("bg-surface-container-highest", "text-on-surface-variant");
    selectedPrivacy = "public";
  };
  privacyPrivate.onclick = () => {
    privacyPrivate.classList.add("bg-primary", "text-white", "shadow-lg");
    privacyPublic.classList.remove("bg-primary", "text-white", "shadow-lg");
    privacyPublic.classList.add("bg-surface-container-highest", "text-on-surface-variant");
    selectedPrivacy = "private";
  };

  // Category selection (simple)
  const resetCategories = () => {
    [catGame, catChat, catSpin].forEach(btn => {
      btn.classList.remove("bg-secondary-container", "text-on-secondary-fixed");
      btn.classList.add("bg-white", "text-on-surface-variant");
    });
  };
  catGame.onclick = () => { resetCategories(); catGame.classList.add("bg-secondary-container", "text-on-secondary-fixed"); selectedCategory = "game"; };
  catChat.onclick = () => { resetCategories(); catChat.classList.add("bg-secondary-container", "text-on-secondary-fixed"); selectedCategory = "chat"; };
  catSpin.onclick = () => { resetCategories(); catSpin.classList.add("bg-secondary-container", "text-on-secondary-fixed"); selectedCategory = "spin"; };
  // default: game selected
  catGame.classList.add("bg-secondary-container", "text-on-secondary-fixed");

  // Banner upload
  bannerInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (file) {
      selectedBannerFile = file;
      const reader = new FileReader();
      reader.onload = (ev) => bannerPreview.src = ev.target.result;
      reader.readAsDataURL(file);
    }
  };

  // Compress image helper
  async function compressImage(file) {
    return new Promise((resolve) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = (e) => img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let width = img.width, height = img.height;
        const maxDim = 1024;
        if (width > maxDim || height > maxDim) {
          if (width > height) {
            height = (height / width) * maxDim;
            width = maxDim;
          } else {
            width = (width / height) * maxDim;
            height = maxDim;
          }
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.85);
      };
      reader.readAsDataURL(file);
    });
  }

  // Create room
  createBtn.onclick = async () => {
    if (!roomTitle.value.trim()) {
      alert("Please enter a room title");
      return;
    }
    // Disable button to prevent double creation
    createBtn.disabled = true;
    createBtn.innerText = "Creating...";

    try {
      let coverPhotoUrl = null;
      if (selectedBannerFile) {
        const compressed = await compressImage(selectedBannerFile);
        const fileName = `room_banners/${Date.now()}_${Math.random()}.jpg`;
        const storageRef = ref(storage, fileName);
        await uploadBytes(storageRef, compressed);
        coverPhotoUrl = await getDownloadURL(storageRef);
      } else {
        // default: use user avatar or a default party image
        coverPhotoUrl = photoURL;
      }

      const roomRef = await addDoc(collection(db, "rooms"), {
        name: roomTitle.value.trim(),
        hostId: userId,
        hostName: username,
        hostPhoto: photoURL,
        coverPhoto: coverPhotoUrl,
        privacy: selectedPrivacy,
        announcement: announcement.value.trim(),
        seatLimit: 8,  // fixed 8 seats
        category: selectedCategory,
        users: 1,
        rewards: 0,
        createdAt: serverTimestamp()
      });

      // Add host as member
      await setDoc(doc(db, "rooms", roomRef.id, "members", userId), {
        uid: userId,
        role: "host",
        joinedAt: serverTimestamp()
      });

      // Redirect to room.html
      window.location.href = `room.html?id=${roomRef.id}`;
    } catch (err) {
      console.error(err);
      alert("Failed to create room. Please try again.");
      createBtn.disabled = false;
      createBtn.innerText = "Let's Party";
    }
  };
</script>
</body>
</html>
