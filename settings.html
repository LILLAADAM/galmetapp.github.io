<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

.top {
  background:#4CAF50;
  color:white;
  padding:15px;
  font-size:18px;
  display:flex;
  align-items:center;
}

.back {
  margin-right:10px;
  cursor:pointer;
}

.box {
  background:white;
  margin:10px;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.sub {
  font-size:12px;
  color:gray;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="top">
  <span class="back" onclick="history.back()">⬅️</span>
  Settings
</div>

<!-- ACCOUNT -->
<div class="box" onclick="openAccount()">
  <div>
    <div>Account</div>
    <div class="sub" id="accountInfo">Loading...</div>
  </div>
  <div>›</div>
</div>

<!-- PRIVACY -->
<div class="box" onclick="openPrivacy()">
  <div>
    <div>Privacy</div>
    <div class="sub">Control who can see your data</div>
  </div>
  <div>›</div>
</div>

<!-- BLOCKED USERS -->
<div class="box" onclick="openBlocked()">
  <div>
    <div>Blocked Users</div>
    <div class="sub">Manage blocked users</div>
  </div>
  <div>›</div>
</div>

<!-- LOGOUT -->
<div class="box" onclick="logout()" style="color:red;">
  Logout
</div>

<script type="module">

import { auth } from "./firebase.js";
import { signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

/* USER */
const user = JSON.parse(localStorage.getItem("user"));

/* 🔥 MASK EMAIL (PRO STYLE) */
function maskEmail(email) {
  if (!email) return "Unknown";

  const [name, domain] = email.split("@");

  let visible = name.substring(0, 3);
  return `Email: ${visible}***@${domain}`;
}

/* SHOW EMAIL */
if (user?.email) {
  document.getElementById("accountInfo").innerText = maskEmail(user.email);
} else {
  document.getElementById("accountInfo").innerText = "No email found";
}

/* NAV */
window.openAccount = () => {
  alert("Next: Account details page");
};

window.openPrivacy = () => {
  location.href = "privacy.html";
};

window.openBlocked = () => {
  location.href = "blocked.html";
};

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  localStorage.removeItem("user");
  location.href = "index.html";
};

</script>

</body>
</html>
