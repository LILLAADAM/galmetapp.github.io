<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f5f5f5;
}

.top {
  background:#4CAF50;
  color:white;
  padding:15px;
  font-size:18px;
  display:flex;
  align-items:center;
}

.back {
  margin-right:10px;
  cursor:pointer;
}

.box {
  background:white;
  margin:10px;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.sub {
  font-size:12px;
  color:gray;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="top">
  <span class="back" onclick="history.back()">⬅️</span>
  Settings
</div>

<!-- ACCOUNT -->
<div class="box" onclick="openAccount()">
  <div>
    <div>Account</div>
    <div class="sub" id="accountInfo">Loading...</div>
  </div>
  <div>›</div>
</div>

<!-- PRIVACY -->
<div class="box" onclick="openPrivacy()">
  <div>
    <div>Privacy</div>
    <div class="sub">Control who can see your data</div>
  </div>
  <div>›</div>
</div>

<!-- BLOCKED USERS -->
<div class="box" onclick="openBlocked()">
  <div>
    <div>Blocked Users</div>
    <div class="sub">Manage blocked users</div>
  </div>
  <div>›</div>
</div>

<!-- LOGOUT -->
<div class="box" onclick="logout()" style="color:red;">
  Logout
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* SAME CONFIG AS DASHBOARD */
const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 MASK EMAIL */
function maskEmail(email) {
  if (!email) return "Unknown";

  const [name, domain] = email.split("@");
  return `Email: ${name.substring(0,3)}***@${domain}`;
}

/* LOAD USER */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    location = "index.html";
    return;
  }

  const snap = await getDoc(doc(db, "users", user.uid));

  if (!snap.exists()) {
    document.getElementById("accountInfo").innerText = "No data";
    return;
  }

  const data = snap.data();

  // ✅ USE SAME EMAIL AS DASHBOARD
  document.getElementById("accountInfo").innerText =
    maskEmail(data.email || user.email);
});

/* NAVIGATION */
window.openAccount = () => {
  alert("Next: Account page");
};

window.openPrivacy = () => {
  location.href = "privacy.html";
};

window.openBlocked = () => {
  location.href = "blocked.html";
};

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  localStorage.removeItem("user");
  location.href = "index.html";
};

</script>

</body>
</html>
