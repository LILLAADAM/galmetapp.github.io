<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Messages</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

.top {
  background:#4CAF50;
  color:white;
  padding:15px;
  font-size:18px;
}

/* CARD */
.msg {
  background:white;
  margin:10px;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* IMAGE */
.msg img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.time {
  font-size:12px;
  color:gray;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="top">📢 Platform Messages</div>
<div id="list"></div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  query,
  orderBy,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const user = JSON.parse(localStorage.getItem("user"));
if (!user?.uid) location = "index.html";

const list = document.getElementById("list");

/* LOAD */
const q = query(
  collection(db, "platformMessages"),
  orderBy("createdAt", "desc")
);

onSnapshot(q, (snapshot) => {

  list.innerHTML = "";

  snapshot.forEach(docSnap => {
    const m = docSnap.data();

    const div = document.createElement("div");
    div.className = "msg";

    let imgHtml = "";

    if (m.image) {
      imgHtml = `
        <img src="${m.image}" onclick="openLink('${m.link || ''}')">
      `;
    }

    div.innerHTML = `
      <div>${m.text || ""}</div>
      ${imgHtml}
      <div class="time">
        ${m.createdAt?.toDate?.().toLocaleString() || ""}
      </div>
    `;

    list.appendChild(div);
  });

});

/* CLICK IMAGE → OPEN LINK */
window.openLink = (url) => {
  if (url) window.open(url, "_blank");
};

/* MARK READ */
await setDoc(doc(db, "platformReads", user.uid), {
  lastSeen: serverTimestamp()
}, { merge:true });

</script>

</body>
</html>
