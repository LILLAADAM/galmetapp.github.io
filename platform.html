<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Messages</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

.top {
  background:#4CAF50;
  color:white;
  padding:15px;
  font-size:18px;
}

.msg {
  background:white;
  margin:10px;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.time {
  font-size:12px;
  color:gray;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="top">📢 Platform Messages</div>
<div id="list"></div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const user = JSON.parse(localStorage.getItem("user"));
if (!user?.uid) location = "index.html";

const list = document.getElementById("list");

/* LOAD MESSAGES */
const q = query(
  collection(db, "platformMessages"),
  orderBy("createdAt", "desc")
);

onSnapshot(q, (snapshot) => {

  list.innerHTML = "";

  snapshot.forEach(docSnap => {
    const m = docSnap.data();

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <div>${m.text}</div>
      <div class="time">${m.createdAt?.toDate?.().toLocaleString() || ""}</div>
    `;

    list.appendChild(div);
  });

});

/* MARK AS READ */
await setDoc(doc(db, "platformReads", user.uid), {
  lastSeen: serverTimestamp()
}, { merge:true });

</script>

</body>
</html>
