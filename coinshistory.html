<!DOCTYPE html>
<html>
<head>
  <title>Coins History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6fa;
    }

    .header {
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .list {
      padding: 10px;
    }

    .item {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .left {
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
    }

    .time {
      font-size: 12px;
      color: gray;
      margin-top: 3px;
    }

    .amount {
      font-weight: bold;
      font-size: 16px;
    }

    .plus {
      color: green;
    }

    .minus {
      color: red;
    }
  </style>
</head>

<body>

<div class="header">💰 Coins History</div>
<div id="coinsHistory" class="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG (same as chat.html) */
const firebaseConfig = {
  apiKey: "AIzaSyAxNlQ9g2kcDcaiTwPsSZFgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app",
  messagingSenderId: "900590512024",
  appId: "1:900590512024:web:16a36a085809a728c92ded"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 👤 GET USER */
const user = JSON.parse(localStorage.getItem("user"));
const userId = user.userId.toString();

/* 🔥 QUERY TRANSACTIONS */
const q = query(
  collection(db, "transactions"),
  orderBy("createdAt", "desc")
);

/* 🔥 REALTIME LISTENER */
onSnapshot(q, (snap) => {

  const div = document.getElementById("coinsHistory");
  div.innerHTML = "";

  snap.forEach(doc => {

    const d = doc.data();

    // ❌ Skip if no coins
    if (!d.coins) return;

    let isSender = d.senderId === userId;
    let isReceiver = d.receiverId === userId;

    if (!isSender && !isReceiver) return;

    let sign = isSender ? "-" : "+";
    let color = isSender ? "minus" : "plus";

    let title = "Transaction";

    if (d.type === "gift") {
      title = isSender ? "Sent Gift 🎁" : "Received Gift 🎁";
    }

    if (d.type === "topup") {
      title = "Top-up 💳";
    }

    if (d.type === "withdraw") {
      title = "Withdraw 💸";
    }

    let time = "Just now";

    if (d.createdAt?.seconds) {
      const date = new Date(d.createdAt.seconds * 1000);
      time = date.toLocaleString();
    }

    div.innerHTML += `
      <div class="item">
        <div class="left">
          <div class="title">${title}</div>
          <div class="time">${time}</div>
        </div>
        <div class="amount ${color}">
          ${sign}${d.coins}
        </div>
      </div>
    `;

  });

});

</script>

</body>
</html>
