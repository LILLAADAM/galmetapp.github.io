<!DOCTYPE html>
<html>
<head>
  <title>Coins History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f6fa;
    }

    .header {
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .list {
      padding: 10px;
    }

    .item {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
    }

    .time {
      font-size: 12px;
      color: gray;
    }

    .amount {
      font-weight: bold;
      font-size: 16px;
    }

    .plus { color: green; }
    .minus { color: red; }
  </style>
</head>

<body>

<div class="header">💰 Coins History</div>
<div id="coinsHistory" class="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxNlQ9g2kcDcaiTwPsSZFgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app",
  messagingSenderId: "900590512024",
  appId: "1:900590512024:web:16a36a085809a728c92ded"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));
const userId = user.userId.toString();

const q = query(
  collection(db, "transactions"),
  orderBy("createdAt", "desc")
);

onSnapshot(q, (snap) => {

  const div = document.getElementById("coinsHistory");
  div.innerHTML = "";

  snap.forEach(doc => {

    const d = doc.data();

    const isSender = d.senderId === userId;
    const isReceiver = d.receiverId === userId;
    const isTopup = d.type === "topup" && d.userId === userId;
    const isWithdraw = d.type === "withdraw" && d.userId === userId;

    // ❌ Skip unrelated
    if (!isSender && !isReceiver && !isTopup && !isWithdraw) return;

    // ❌ Skip received gifts (only show sent)
    if (d.type === "gift" && isReceiver) return;

    let sign = "-";
    let color = "minus";
    let title = "Transaction";
    let amount = d.coins || 0;

    // 🎁 Gift
    if (d.type === "gift") {
      title = "Sent Gift 🎁";
    }

    // 💳 Topup
    if (d.type === "topup") {
      sign = "+";
      color = "plus";
      title = "Top-up 💳";
    }

    // 💸 Withdraw
    if (d.type === "withdraw") {
      title = "Withdraw 💸";
    }

    let time = "Now";

    if (d.createdAt?.seconds) {
      const date = new Date(d.createdAt.seconds * 1000);
      time = date.toLocaleString();
    }

    div.innerHTML += `
      <div class="item">
        <div>
          <div class="title">${title}</div>
          <div class="time">${time}</div>
        </div>
        <div class="amount ${color}">
          ${sign}${amount}
        </div>
      </div>
    `;

  });

});

</script>

</body>
</html>
