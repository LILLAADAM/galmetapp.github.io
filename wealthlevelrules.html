<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Royal Frame Preview</title>
    <style>
        body {
            /* Using a dark gradient background to make the glow and sparkles visible */
            background: radial-gradient(circle, #2c2c2c 0%, #0a0a0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevent scrollbars from sparkles */
        }

        .frame-wrapper {
            position: relative;
            /* Adjust size here; the art is high-res and will scale perfectly */
            width: 400px; 
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. The Main Frame Image (Encoded as Base64 in CSS) */
        .frame-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* Sits over the glow, under the sparkles */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            /* This is the Base64 representation of the original PNG */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUserif/4AAQSkZJRgABAQAAAQABAAD/2wBDAAMCAgICAgMCAgIDAwMDBAYEBAQEBAgGBgUGCQgKCgkICQkKDA8MCgsOCwkJDRENDg8QEBEQCgwSExIQEw8QEBD/2wBDAQMDAwQDBAgEBAgQCwkLEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBD/wAARCAEBAEADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4X3p5f36goO88PB09pf119KX19M19bp5fX56vp6ft7v7+7v79vf39v8AAEQgBAAEAAwEiAAIRAQMRAf/EAB8AAAEFAQEBAQEBAAAAAAAAAAABAgMEBQgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1FVWV1hZWmNkZWZnaGlqc3R1dnd4X3p5f36goO88PB09pf119KX19M19bp5fX56vp6ft7v7+7v79vf39v/ Paying Attention To This Part */
        }

        /* 2. The Dynamic Blue Glow Layer (Underneath) */
        .glow-aura {
            position: absolute;
            top: 15%; /* Center the glow under the frame ring */
            left: 15%;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            /* Creating the specific light-blue cyan aura */
            background: radial-gradient(circle, rgba(100, 240, 255, 0.4) 0%, rgba(62, 222, 255, 0.1) 40%, rgba(62, 222, 255, 0) 70%);
            filter: blur(15px);
            opacity: 0.8;
            animation: pulse-aura 3s infinite ease-in-out;
            z-index: 1; /* Layer under the frame */
        }

        /* 3. The Sparkling Particles Overlay (On top) */
        .particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows click-through */
            z-index: 3;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #ffffff;
            border-radius: 50%;
            /* White core with cyan glow */
            box-shadow: 0 0 6px 2px rgba(62, 222, 255, 0.9);
            animation: sparkle-behavior 4s infinite ease-out;
            opacity: 0;
        }

        /* Random positioning and delays of particles to mimic the original image scatter */
        .s1 { top: 25%; left: 15%; animation-delay: 0s; }
        .s2 { top: 35%; left: 80%; animation-delay: 1.2s; }
        .s3 { top: 70%; left: 12%; animation-delay: 2.4s; }
        .s4 { top: 65%; left: 88%; animation-delay: 0.6s; }
        .s5 { top: 85%; left: 45%; animation-delay: 3.1s; }
        .s6 { top: 40%; left: 30%; animation-delay: 1.8s; width: 3px; height: 3px; }
        .s7 { top: 55%; left: 70%; animation-delay: 0.9s; width: 3px; height: 3px; }

        /* --- Keyframes for Animations --- */

        /* Pulsing Blue Glow Aura */
        @keyframes pulse-aura {
            0%, 100% {
                transform: scale(1);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.15); /* Expand the glow softly */
                opacity: 1; /* Make it more intense */
            }
        }

        /* Sparkling, Floating, and Fading behavior */
        @keyframes sparkle-behavior {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 1;
                transform: translate(5px, -5px) scale(1); /* Appear and begin float */
            }
            80% {
                opacity: 0.9;
                transform: translate(15px, -25px) scale(1.2); /* Floating up and scaling */
            }
            100% {
                transform: translate(20px, -40px) scale(0); /* Fade and disappear */
                opacity: 0;
            }
        }

    </style>
</head>
<body>

    <div class="frame-wrapper">
        
        <div class="glow-aura"></div>

        <div class="frame-image"></div>

        <div class="particle-container">
            <div class="sparkle s1"></div>
            <div class="sparkle s2"></div>
            <div class="sparkle s3"></div>
            <div class="sparkle s4"></div>
            <div class="sparkle s5"></div>
            <div class="sparkle s6"></div>
            <div class="sparkle s7"></div>
        </div>
    </div>

</body>
</html>
