<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galmet · Avatar Glowing Frame</title>
  <style>
    /* LEVEL FRAME – 512x512 base, glowing border with level intensity */
    .avatar-frame {
      position: relative;
      width: 128px;       /* you can scale this with CSS, original design is 512x512 */
      height: 128px;
      border-radius: 30% 20% 30% 20% / 20% 30% 20% 30%; /* organic shape, but you can use circle */
      overflow: hidden;
      display: inline-block;
      transition: box-shadow 0.3s ease;
    }

    /* Glow animation – intensity scales with data-level */
    .avatar-frame[data-level="1"] { box-shadow: 0 0 8px #00e3fd, 0 0 12px #006571; }
    .avatar-frame[data-level="2"] { box-shadow: 0 0 12px #00e3fd, 0 0 18px #006571; }
    .avatar-frame[data-level="3"] { box-shadow: 0 0 16px #00e3fd, 0 0 24px #006571; }
    .avatar-frame[data-level="4"] { box-shadow: 0 0 20px #00e3fd, 0 0 30px #ffca4d; }
    .avatar-frame[data-level="5"] { box-shadow: 0 0 24px #00e3fd, 0 0 36px #ffca4d; }
    .avatar-frame[data-level="6"] { box-shadow: 0 0 28px #00e3fd, 0 0 42px #b60051; }
    .avatar-frame[data-level="7"] { box-shadow: 0 0 32px #ffca4d, 0 0 48px #b60051, 0 0 60px #00e3fd; animation: pulseGlow 2s infinite; }
    .avatar-frame[data-level="8"] { box-shadow: 0 0 36px #ffca4d, 0 0 54px #b60051, 0 0 70px #00e3fd; animation: pulseGlow 1.8s infinite; }
    .avatar-frame[data-level="9"] { box-shadow: 0 0 40px #ffca4d, 0 0 60px #b60051, 0 0 80px gold; animation: pulseGlow 1.5s infinite; }
    .avatar-frame[data-level="10"] { box-shadow: 0 0 50px gold, 0 0 70px #ffca4d, 0 0 100px #b60051; animation: pulseGlow 1s infinite; }

    @keyframes pulseGlow {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.2); box-shadow: 0 0 60px gold, 0 0 90px #ffca4d; }
      100% { filter: brightness(1); }
    }

    /* inner image fills the frame */
    .avatar-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* decorative overlay border (optional) */
    .avatar-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 0 20px rgba(0,227,253,0.3);
    }

    /* level badge on top-right */
    .level-tag {
      position: absolute;
      bottom: 5px;
      right: 5px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: white;
      font-weight: bold;
      font-size: 14px;
      padding: 2px 8px;
      border-radius: 40px;
      border: 1px solid #00e3fd;
      box-shadow: 0 0 10px #00e3fd;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* demo container */
    body {
      background: #0b1721;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, sans-serif;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
      padding: 20px;
    }
    .frame-demo {
      text-align: center;
    }
    .frame-demo p {
      color: white;
      margin-top: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="gallery">
  <!-- Level 4 example -->
  <div class="frame-demo">
    <div class="avatar-frame" data-level="4">
      <img src="https://ui-avatars.com/api/?name=Galmet&size=512&background=006571&color=fff" alt="avatar">
      <span class="level-tag">Lv.4</span>
    </div>
    <p>Wealth · Lv4</p>
  </div>
  <!-- Level 7 example (intense glow) -->
  <div class="frame-demo">
    <div class="avatar-frame" data-level="7">
      <img src="https://ui-avatars.com/api/?name=Luna&size=512&background=755700&color=fff" alt="avatar">
      <span class="level-tag">Lv.7</span>
    </div>
    <p>Charm · Lv7</p>
  </div>
  <!-- Level 10 MAX glow -->
  <div class="frame-demo">
    <div class="avatar-frame" data-level="10">
      <img src="https://ui-avatars.com/api/?name=Orion&size=512&background=b60051&color=fff" alt="avatar">
      <span class="level-tag">Lv.10 ✦</span>
    </div>
    <p>MAX Glow</p>
  </div>
</div>
</body>
</html>
