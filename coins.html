<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Coins Store - Galmet</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f3f7fb",
            "surface-container-low": "#ecf1f6",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60",
            "primary": "#006571",
            "primary-container": "#00e3fd",
            "primary-dim": "#005863",
            "secondary": "#755700",
            "tertiary": "#b60051",
            "outline": "#73777b",
            "outline-variant": "#a9aeb1",
            "error": "#b31b25"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen pb-8">

<!-- Top App Bar (unchanged) -->
<header class="sticky top-0 w-full bg-surface/80 backdrop-blur-xl z-50 border-b border-outline-variant/20">
  <div class="flex justify-between items-center px-4 h-12 max-w-md mx-auto">
    <button id="backBtn" class="p-1.5 rounded-full hover:bg-primary-container/30 transition-colors active:scale-95">
      <span class="material-symbols-outlined text-primary text-xl">arrow_back</span>
    </button>
    <h1 class="font-headline font-semibold text-base text-primary">Coins</h1>
    <button id="historyBtn" class="p-1.5 rounded-full hover:bg-primary-container/30 transition-colors active:scale-95">
      <span class="material-symbols-outlined text-primary text-xl">history</span>
    </button>
  </div>
</header>

<main class="max-w-md mx-auto px-4 pt-4 pb-6 space-y-4">
  <!-- Balance Card (smaller) -->
  <div class="bg-surface-container-lowest rounded-xl p-3 flex items-center gap-3 shadow-sm">
    <div class="w-10 h-10 bg-secondary-container rounded-full flex items-center justify-center shadow-sm">
      <span class="material-symbols-outlined text-on-secondary-fixed text-2xl" style="font-variation-settings:'FILL'1">monetization_on</span>
    </div>
    <div>
      <p class="font-label text-[9px] uppercase tracking-wider text-outline">Current Balance</p>
      <p id="coinsBalance" class="font-headline font-bold text-2xl text-on-surface">0</p>
    </div>
  </div>

  <!-- User Info Card (smaller) -->
  <div class="bg-surface-container-low rounded-lg p-2 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <img id="userAvatar" class="w-8 h-8 rounded-full object-cover" src="https://ui-avatars.com/api/?name=User">
      <div>
        <p id="userName" class="font-headline font-semibold text-xs text-on-surface">Loading...</p>
        <p id="userLevel" class="font-label text-[9px] text-outline">Lv. --</p>
      </div>
    </div>
    <button id="changeBtn" class="bg-surface-container-highest text-primary text-[10px] px-2 py-1 rounded-full font-bold active:scale-95 transition">Change</button>
  </div>


  <!-- Tabs (smaller) -->
  <div class="flex p-0.5 bg-surface-container-high/50 backdrop-blur-md rounded-full w-fit mx-auto">
    <button id="googleTab" class="px-3 py-1.5 rounded-full text-primary font-headline font-bold text-xs flex items-center gap-1 bg-white shadow-sm">
      <span class="material-symbols-outlined text-sm">account_balance_wallet</span> Google
    </button>
    <button id="recommendedTab" class="px-3 py-1.5 rounded-full text-on-surface-variant font-headline font-semibold text-xs flex items-center gap-1">
      <span class="material-symbols-outlined text-sm">star</span> Recommended
    </button>
  </div>

  <!-- Packages Grid (compact, consistent coin icon) -->
  <div id="packagesGrid" class="grid grid-cols-2 gap-2">
    <!-- Packs injected via JS -->
  </div>

  <!-- Google Section (hidden) -->
  <div id="googleSection" class="hidden text-center py-6">
    <span class="material-symbols-outlined text-4xl text-outline">construction</span>
    <p class="text-outline text-xs mt-1">Google Pay coming soon</p>
  </div>

  <p class="text-center text-[9px] text-outline uppercase tracking-wider pt-2">Secure checkout • Instant delivery</p>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);

  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) {
    window.location.replace("login.html");
  }
  const userId = currentUser.userId.toString();
  const userRef = doc(db, "users", userId);

  let userCoins = 0;
  let userLevel = 1;

  // Packs with consistent coin icon (yellow coin)
  const packs = [
    { usdt: 1, price: "$1.00", coinsBonus: 5000, hot: false, wide: false },
    { usdt: 10, price: "$10.00", coinsBonus: 55000, hot: true, wide: false },
    { usdt: 50, price: "$50.00", coinsBonus: 300000, hot: false, wide: false },
    { usdt: 100, price: "$100.00", coinsBonus: 620000, hot: false, wide: false },
    { usdt: 500, price: "$500.00", coinsBonus: 3250000, hot: false, wide: true }
  ];

  function getLevelFromCoins(coins) {
    if (coins >= 10000) return 5;
    if (coins >= 5000) return 4;
    if (coins >= 2000) return 3;
    if (coins >= 500) return 2;
    return 1;
  }

  function renderPacks() {
    const container = document.getElementById("packagesGrid");
    container.innerHTML = "";
    for (const p of packs) {
      const card = document.createElement("div");
      card.className = `bg-surface-container-lowest p-3 flex flex-col items-center rounded-lg shadow-sm ${p.wide ? 'col-span-2 flex-row justify-between items-center' : ''}`;
      if (p.wide) {
        card.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary-fixed-dim text-3xl" style="font-variation-settings:'FILL'1">monetization_on</span>
            <div>
              <span class="block font-headline font-extrabold text-xl text-on-surface">${p.coinsBonus.toLocaleString()}</span>
              <span class="block font-label text-[8px] text-outline uppercase">Coins</span>
            </div>
          </div>
          <button class="px-3 py-1.5 bg-primary text-white rounded-full font-bold text-xs active:scale-95 transition pack-btn" data-usdt="${p.usdt}">${p.price}</button>
        `;
      } else {
        card.innerHTML = `
          <span class="material-symbols-outlined text-secondary-fixed-dim text-3xl mb-1" style="font-variation-settings:'FILL'1">monetization_on</span>
          <span class="font-headline font-extrabold text-xl text-on-surface">${p.coinsBonus.toLocaleString()}</span>
          <span class="font-label text-[8px] text-outline uppercase mb-2">Coins</span>
          <button class="w-full py-1.5 bg-primary text-white rounded-full font-bold text-xs active:scale-95 transition pack-btn" data-usdt="${p.usdt}">${p.price}</button>
        `;
        if (p.hot) {
          const badge = document.createElement("div");
          badge.className = "absolute -top-1 -right-1 bg-tertiary text-white text-[7px] font-bold px-1.5 py-0.5 rounded-full uppercase";
          badge.innerText = "Hot";
          card.classList.add("relative");
          card.appendChild(badge);
        }
      }
      container.appendChild(card);
    }

    document.querySelectorAll(".pack-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const usdt = parseInt(btn.dataset.usdt);
        }
        window.location.href = `topup.html?amount=${usdt}`;
      });
    });
  }

  // Real‑time user data
  onSnapshot(userRef, (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      userCoins = data.coins || 0;
      userLevel = getLevelFromCoins(userCoins);
      document.getElementById("coinsBalance").innerText = userCoins.toLocaleString();
      document.getElementById("userLevel").innerText = `Lv. ${userLevel}`;
      document.getElementById("userName").innerText = data.username || "User";
      const avatar = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username || "User")}&background=006571&color=fff`;
      document.getElementById("userAvatar").src = avatar;

      const restrictionMsg = document.getElementById("restrictionMsg");
      if (userLevel < 3) {
        restrictionMsg.classList.remove("hidden");
      } else {
        restrictionMsg.classList.add("hidden");
      }
    }
  });

  // Tab switching
  const googleTab = document.getElementById("googleTab");
  const recommendedTab = document.getElementById("recommendedTab");
  const packagesGrid = document.getElementById("packagesGrid");
  const googleSection = document.getElementById("googleSection");

  googleTab.addEventListener("click", () => {
    googleTab.classList.add("bg-white", "shadow-sm", "text-primary");
    googleTab.classList.remove("text-on-surface-variant");
    recommendedTab.classList.remove("bg-white", "shadow-sm", "text-primary");
    recommendedTab.classList.add("text-on-surface-variant");
    packagesGrid.classList.add("hidden");
    googleSection.classList.remove("hidden");
  });
  recommendedTab.addEventListener("click", () => {
    recommendedTab.classList.add("bg-white", "shadow-sm", "text-primary");
    recommendedTab.classList.remove("text-on-surface-variant");
    googleTab.classList.remove("bg-white", "shadow-sm", "text-primary");
    googleTab.classList.add("text-on-surface-variant");
    googleSection.classList.add("hidden");
    packagesGrid.classList.remove("hidden");
  });
  recommendedTab.click();

  // Navigation
  document.getElementById("backBtn").addEventListener("click", () => window.history.back());
  document.getElementById("historyBtn").addEventListener("click", () => window.location.href = "coinshistory.html");
  document.getElementById("changeBtn").addEventListener("click", () => alert("Change profile coming soon"));

  renderPacks();
</script>
</body>
</html>
