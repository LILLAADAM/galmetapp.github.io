<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Galmet – Professional Live</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; background: #000; color: #fff; }
        
        #video-container { position: absolute; inset: 0; width: 100vw; height: 100vh; background: #111; z-index: 0; }
        #video-container > div { width: 100%; height: 100%; object-fit: cover; }
        /* Target the internal Agora video element for filters */
        #local-player video { transition: filter 0.3s ease; }

        /* Modern Glassmorphism */
        .glass-panel {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        /* Clean Transparent Chat */
        .chat-scroll {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
        }
        .chat-scroll::-webkit-scrollbar { display: none; } /* Chrome */
        
        .chat-message {
            animation: slideInLeft 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            padding: 4px 0;
            margin-bottom: 6px;
            font-size: 14px;
            line-height: 1.4;
            /* Transparent background, relying on strong text shadows for visibility */
            background: transparent;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8), 0px 0px 4px rgba(0,0,0,0.6);
        }
        .chat-message .sender {
            font-weight: 600;
            color: #fcd34d; /* Golden amber for names */
            cursor: pointer;
            margin-right: 6px;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Bottom Sheet Animations for Popups */
        .bottom-sheet {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bottom-sheet.open {
            transform: translateY(0);
        }

        .level-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: none;
        }

        /* Gift Animation */
        .gift-animation {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            animation: popAndFloat 2.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes popAndFloat {
            0% { opacity: 0; transform: translate(-50%, 20px) scale(0.5); }
            15% { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
            30% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -60px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100px) scale(0.8); }
        }
    </style>
</head>
<body>

<div id="video-container"></div>

<div id="loadingOverlay" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
    <div class="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin mb-4"></div>
    <p class="text-white/80 font-medium tracking-wide">Connecting...</p>
</div>

<div class="fixed inset-0 z-10 pointer-events-none flex flex-col justify-between">
    
    <div class="p-4 pt-12 flex justify-between items-start">
        <div class="glass-panel rounded-full flex items-center gap-2 pr-4 pl-1 py-1 pointer-events-auto cursor-pointer" id="hostProfileCapsule">
            <img id="hostAvatar" class="w-10 h-10 rounded-full border border-white/40 object-cover" src="">
            <div class="flex flex-col">
                <span id="hostName" class="font-bold text-sm leading-tight text-white shadow-sm">Loading...</span>
                <div class="flex items-center gap-2 text-[10px] font-medium text-white/90">
                    <span class="flex items-center gap-1 text-red-400">
                        <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>LIVE
                    </span>
                    <span>💎 <span id="liveGems">0</span></span>
                </div>
            </div>
            <button class="ml-2 bg-gradient-to-r from-pink-500 to-rose-500 rounded-full w-8 h-8 flex items-center justify-center shadow-lg">
                <span class="material-symbols-outlined text-sm">add</span>
            </button>
        </div>

        <div class="flex flex-col items-end gap-3 pointer-events-auto">
            <button id="exitBtn" class="glass-panel rounded-full w-10 h-10 flex items-center justify-center hover:bg-white/10 transition">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div class="glass-panel rounded-full px-3 py-1.5 flex items-center gap-1.5 text-xs font-semibold">
                <span class="material-symbols-outlined text-[14px]">visibility</span>
                <span id="viewerCount">0</span>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col justify-end p-4 pb-2">
        <div id="chatMessages" class="w-[85%] h-[250px] overflow-y-auto flex flex-col-reverse gap-1 chat-scroll pointer-events-auto mask-image-top"></div>
    </div>

    <div class="p-4 pt-2 pointer-events-auto pb-8">
        
        <div id="viewerControls" class="hidden flex items-center gap-3">
            <div class="glass-panel rounded-full flex-1 flex items-center px-4 py-2">
                <input id="chatInput" type="text" class="w-full bg-transparent border-none text-white text-sm placeholder-white/60 focus:outline-none focus:ring-0 p-0" placeholder="Add a comment...">
            </div>
            <button id="sendChatBtn" class="glass-panel rounded-full w-11 h-11 flex items-center justify-center text-white/90 hover:text-white">
                <span class="material-symbols-outlined">send</span>
            </button>
            <button id="callBtn" class="glass-panel rounded-full w-11 h-11 flex items-center justify-center text-blue-400 hover:text-blue-300">
                <span class="material-symbols-outlined">video_call</span>
            </button>
            <button id="giftPanelBtn" class="bg-gradient-to-r from-amber-400 to-orange-500 rounded-full w-11 h-11 flex items-center justify-center shadow-[0_0_15px_rgba(245,158,11,0.4)]">
                <span class="material-symbols-outlined">featured_seasonal_and_gifts</span>
            </button>
        </div>

        <div id="hostControls" class="hidden flex justify-between items-center w-full">
            <div class="flex gap-3">
                <button id="micBtn" class="glass-panel rounded-full w-11 h-11 flex items-center justify-center">
                    <span class="material-symbols-outlined">mic</span>
                </button>
                <button id="cameraBtn" class="glass-panel rounded-full w-11 h-11 flex items-center justify-center">
                    <span class="material-symbols-outlined">videocam</span>
                </button>
                <button id="mirrorBtn" class="glass-panel rounded-full w-11 h-11 flex items-center justify-center">
                    <span class="material-symbols-outlined">flip_camera_ios</span>
                </button>
                <button id="filterBtn" class="glass-panel rounded-full w-11 h-11 flex items-center justify-center text-pink-400">
                    <span class="material-symbols-outlined">auto_fix_high</span>
                </button>
            </div>
            <button id="endLiveBtn" class="bg-red-500/90 rounded-full px-5 py-2.5 font-bold text-sm shadow-lg flex items-center gap-1">
                <span class="material-symbols-outlined text-[18px]">power_settings_new</span> End
            </button>
        </div>

    </div>
</div>

<div id="giftPanel" class="fixed inset-x-0 bottom-0 z-50 bg-[#1a1a1a] rounded-t-3xl bottom-sheet pointer-events-auto border-t border-white/10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
    <div class="p-5">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg">Send Gift</h3>
            <div class="flex items-center gap-2 bg-black/30 px-3 py-1 rounded-full">
                <span class="text-amber-400 text-sm font-bold">🪙 <span id="myCoinsBal">0</span></span>
            </div>
        </div>
        <div id="giftGrid" class="grid grid-cols-4 gap-4 max-h-[40vh] overflow-y-auto pb-6 chat-scroll"></div>
    </div>
</div>

<div id="filterPanel" class="fixed inset-x-0 bottom-0 z-50 bg-[#1a1a1a] rounded-t-3xl bottom-sheet pointer-events-auto border-t border-white/10">
    <div class="p-5">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-lg">Beauty & Filters</h3>
            <button id="closeFilterBtn" class="text-white/50 hover:text-white"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="flex gap-4 overflow-x-auto chat-scroll pb-4">
            <button class="filter-opt flex flex-col items-center gap-2 min-w-[70px]" data-filter="none">
                <div class="w-14 h-14 rounded-full bg-white/10 border-2 border-primary flex justify-center items-center"><span class="material-symbols-outlined">block</span></div>
                <span class="text-xs">Normal</span>
            </button>
            <button class="filter-opt flex flex-col items-center gap-2 min-w-[70px]" data-filter="brightness(1.2) contrast(1.1)">
                <div class="w-14 h-14 rounded-full bg-white/10 flex justify-center items-center"><span class="material-symbols-outlined">light_mode</span></div>
                <span class="text-xs">Bright</span>
            </button>
            <button class="filter-opt flex flex-col items-center gap-2 min-w-[70px]" data-filter="sepia(0.3) saturate(1.2)">
                <div class="w-14 h-14 rounded-full bg-white/10 flex justify-center items-center"><span class="material-symbols-outlined">wb_sunny</span></div>
                <span class="text-xs">Warm</span>
            </button>
            <button class="filter-opt flex flex-col items-center gap-2 min-w-[70px]" data-filter="contrast(1.2) saturate(1.5)">
                <div class="w-14 h-14 rounded-full bg-white/10 flex justify-center items-center"><span class="material-symbols-outlined">movie</span></div>
                <span class="text-xs">Vivid</span>
            </button>
        </div>
    </div>
</div>

<div id="profilePreview" class="fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm hidden items-center justify-center opacity-0 transition-opacity duration-200">
    <div class="bg-[#1e1e24] rounded-2xl w-72 overflow-hidden shadow-2xl transform scale-95 transition-transform duration-200" id="profileCard">
        <div class="h-24 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 relative">
            <button id="closeProfilePreview" class="absolute top-2 right-2 w-8 h-8 bg-black/20 rounded-full flex justify-center items-center"><span class="material-symbols-outlined text-sm">close</span></button>
        </div>
        <div class="px-5 pb-6 text-center relative -mt-12">
            <img id="previewAvatar" class="w-24 h-24 rounded-full object-cover border-4 border-[#1e1e24] mx-auto mb-2 bg-gray-800">
            <h2 id="previewName" class="font-bold text-lg text-white"></h2>
            <p id="previewDetails" class="text-white/60 text-sm mb-4">Level 1 • 20 yrs • USA</p>
            <button id="viewProfileBtn" class="w-full py-2.5 bg-white/10 hover:bg-white/20 rounded-xl font-semibold transition text-sm">View Full Profile</button>
        </div>
    </div>
</div>

<div id="exitConfirmModal" class="fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm hidden items-center justify-center">
    <div class="bg-[#1a1a1a] border border-white/10 rounded-2xl p-6 w-72 text-center shadow-2xl">
        <h3 class="text-lg font-bold mb-2" id="exitTitle">Leave Stream?</h3>
        <p class="text-white/60 text-sm mb-6" id="exitDesc">Are you sure you want to exit?</p>
        <div class="flex gap-3 justify-center">
            <button id="cancelExit" class="flex-1 bg-white/10 hover:bg-white/20 py-2.5 rounded-xl font-semibold text-sm">Stay</button>
            <button id="confirmExit" class="flex-1 bg-red-500 hover:bg-red-600 py-2.5 rounded-xl font-semibold text-sm">Exit</button>
        </div>
    </div>
</div>

<div id="incomingCallModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-[#1a1a1a] rounded-3xl p-6 w-72 text-center shadow-2xl border border-white/10">
        <div class="relative w-20 h-20 mx-auto mb-4">
            <img id="callerAvatar" class="w-20 h-20 rounded-full object-cover border-2 border-blue-500 animate-pulse">
            <div class="absolute -bottom-1 -right-1 bg-blue-500 w-6 h-6 rounded-full flex justify-center items-center"><span class="material-symbols-outlined text-[14px]">videocam</span></div>
        </div>
        <h3 id="callerName" class="text-xl font-bold mb-1">Name</h3>
        <p class="text-white/50 text-xs mb-6">Requesting a video call</p>
        <div class="flex gap-3 justify-center">
            <button id="declineCallBtn" class="flex-1 bg-red-500/20 text-red-500 py-3 rounded-2xl font-bold text-sm">Decline</button>
            <button id="acceptCallBtn" class="flex-1 bg-green-500 py-3 rounded-2xl font-bold text-sm">Accept</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, limit, increment, updateDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // Firebase Init
    const firebaseConfig = {
        apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
        authDomain: "galmet-app.firebaseapp.com",
        projectId: "galmet-app",
        storageBucket: "galmet-app.firebasestorage.app"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Context
    const currentUser = JSON.parse(localStorage.getItem("user"));
    if (!currentUser?.userId) window.location.replace("login.html");
    
    const myUserId = currentUser.userId.toString();
    const myUsername = currentUser.username || "User";
    const myAvatar = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(myUsername)}&background=006571&color=fff`;
    
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get("room");
    const isHost = urlParams.get("host") === "true";
    if (!roomId) window.location.href = "dashboard.html";

    // Track when user joined for Ephemeral Chat
    const joinTimestampMillis = Date.now(); 

    // Agora Settings
    const APP_ID = "873172a9b2064b1ca97b4f45ee6ed9b5";
    const TOKEN = "007eJxTYLhY+e9/xCXvlDiXjK68XT+fffPzeFq3eObdpND3cVkiHs8UGCzMjQ3NjRItk4wMzEySDJMTLc2TTNJMTFNTzVJTLJNML3DdzGwIZGTwNnFmYIRCEJ+XoSg/Pzfe1MzE0sDc3IKBAQBvhCPa";
    let client, localAudioTrack, localVideoTrack;
    let cameraFront = true, isMuted = false, cameraEnabled = true;

    // DOM Links
    const hostControls = document.getElementById('hostControls');
    const viewerControls = document.getElementById('viewerControls');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const giftPanel = document.getElementById('giftPanel');
    const filterPanel = document.getElementById('filterPanel');
    const profilePreview = document.getElementById('profilePreview');
    const exitConfirmModal = document.getElementById('exitConfirmModal');
    
    // UI Setup based on Role
    if (isHost) {
        hostControls.classList.remove('hidden');
    } else {
        viewerControls.classList.remove('hidden');
    }

    // Helper: Close all sheets
    function closeAllSheets() {
        giftPanel.classList.remove('open');
        filterPanel.classList.remove('open');
        setTimeout(() => {
            profilePreview.classList.add('hidden');
            profilePreview.classList.remove('opacity-100');
        }, 200);
    }
    
    document.addEventListener('click', (e) => {
        if(e.target.id === 'video-container' || e.target.id === 'chatMessages') closeAllSheets();
    });

    // 1. Host Info Loading
    let hostUserId = null;
    async function loadHostData() {
        const livesSnap = await getDocs(collection(db, "lives"));
        livesSnap.forEach(snap => { if(snap.data().roomId === roomId) hostUserId = snap.id; });
        if(!hostUserId && isHost) hostUserId = myUserId;
        
        if (hostUserId) {
            const userSnap = await getDoc(doc(db, "users", hostUserId));
            if (userSnap.exists()) {
                const data = userSnap.data();
                document.getElementById('hostName').innerText = data.username || "Host";
                document.getElementById('hostAvatar').src = data.photoURL || myAvatar;
            }
        }
    }

    // 2. Chat Implementation (Ephemeral)
    function listenChat() {
        // Query recent messages. We filter out old ones in JS to avoid needing complex Firestore indexes.
        const q = query(collection(db, "liveChat", roomId, "messages"), orderBy("timestamp", "desc"), limit(50));
        
        onSnapshot(q, (snap) => {
            chatMessagesDiv.innerHTML = "";
            const messages = [];
            snap.forEach(docSnap => {
                const data = docSnap.data();
                // Ephemeral Check: Only show messages generated AFTER the user joined this session
                const msgTime = data.timestamp ? data.timestamp.toMillis() : Date.now();
                if (msgTime >= joinTimestampMillis) {
                    messages.push({ id: docSnap.id, ...data });
                }
            });

            messages.forEach(msg => {
                const div = document.createElement("div");
                div.className = "chat-message";
                if (msg.type === 'join') {
                    div.innerHTML = `<span class="text-white/80 italic text-xs">👋 ${msg.senderName} joined the room</span>`;
                } else if (msg.type === 'gift') {
                    div.innerHTML = `<span class="text-amber-400 font-bold">🎁 ${msg.senderName} sent ${msg.giftName}</span>`;
                } else {
                    div.innerHTML = `<span class="sender" data-id="${msg.senderId}">${msg.senderName}:</span><span class="text-white">${msg.text}</span>`;
                }
                chatMessagesDiv.appendChild(div);
            });
            
            // Profile Clicks in Chat
            document.querySelectorAll('.sender').forEach(el => {
                el.onclick = async (e) => {
                    e.stopPropagation();
                    const uSnap = await getDoc(doc(db, "users", el.dataset.id));
                    if(uSnap.exists()) showProfile(el.dataset.id, uSnap.data());
                };
            });
        });
    }

    async function sendMsg() {
        const text = document.getElementById('chatInput').value.trim();
        if(!text) return;
        document.getElementById('chatInput').value = "";
        await addDoc(collection(db, "liveChat", roomId, "messages"), {
            type: "text", senderId: myUserId, senderName: myUsername, text: text, timestamp: serverTimestamp()
        });
    }
    document.getElementById('sendChatBtn').onclick = sendMsg;
    document.getElementById('chatInput').addEventListener('keypress', e => e.key === 'Enter' && sendMsg());

    // 3. Profile Viewing
    function showProfile(id, data) {
        document.getElementById('previewAvatar').src = data.photoURL || '';
        document.getElementById('previewName').innerText = data.username || 'User';
        document.getElementById('previewDetails').innerText = `Lv ${data.charmLevel || 1} • ${data.age||'N/A'} yrs • ${data.country?.name||'Unknown'}`;
        document.getElementById('viewProfileBtn').onclick = () => window.location.href = `view.html?id=${id}`;
        
        profilePreview.classList.remove('hidden');
        setTimeout(() => profilePreview.classList.add('opacity-100'), 10);
    }
    document.getElementById('closeProfilePreview').onclick = closeAllSheets;

    // 4. Video & Agora Logic
    async function initAgora() {
        client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
        await client.setClientRole(isHost ? "host" : "audience");
        await client.join(APP_ID, roomId, TOKEN, null);

        if (isHost) {
            [localAudioTrack, localVideoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks(
                { cameraId: "user" }, { encoderConfig: "720p" }
            );
            const player = document.createElement("div");
            player.id = "local-player";
            player.style.width = "100%"; player.style.height = "100%";
            document.getElementById("video-container").appendChild(player);
            localVideoTrack.play("local-player");
            await client.publish([localAudioTrack, localVideoTrack]);
            document.getElementById('local-player').style.transform = "scaleX(-1)"; // Default mirror
        }

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") {
                const player = document.createElement("div");
                player.id = user.uid;
                player.style.width = "100%"; player.style.height = "100%";
                document.getElementById("video-container").appendChild(player);
                user.videoTrack.play(player);
            }
            if (mediaType === "audio") user.audioTrack.play();
        });

        document.getElementById('loadingOverlay').style.display = 'none';
        
        // Notify entry
        if (!isHost) {
            await setDoc(doc(db, "liveViewers", roomId, "viewers", myUserId), { joined: serverTimestamp() });
            await addDoc(collection(db, "liveChat", roomId, "messages"), { type: "join", senderName: myUsername, timestamp: serverTimestamp() });
        }
    }

    // 5. Host Controls (Mic, Cam, Filter, Exit)
    if(isHost) {
        document.getElementById('micBtn').onclick = async function() {
            isMuted = !isMuted;
            await localAudioTrack.setEnabled(!isMuted);
            this.innerHTML = isMuted ? `<span class="material-symbols-outlined text-red-400">mic_off</span>` : `<span class="material-symbols-outlined">mic</span>`;
        };
        
        document.getElementById('mirrorBtn').onclick = async () => {
            cameraFront = !cameraFront;
            const newTrack = await AgoraRTC.createCameraVideoTrack({ cameraId: cameraFront ? "user" : "environment" });
            await client.unpublish(localVideoTrack);
            localVideoTrack.close();
            localVideoTrack = newTrack;
            await client.publish(localVideoTrack);
            localVideoTrack.play("local-player");
            document.getElementById('local-player').style.transform = cameraFront ? "scaleX(-1)" : "scaleX(1)";
        };

        // Filters Array setup
        document.getElementById('filterBtn').onclick = () => filterPanel.classList.add('open');
        document.getElementById('closeFilterBtn').onclick = closeAllSheets;
        
        document.querySelectorAll('.filter-opt').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-opt div').forEach(d => d.classList.remove('border-2', 'border-primary'));
                btn.querySelector('div').classList.add('border-2', 'border-primary');
                const filterVal = btn.dataset.filter;
                const videoEl = document.querySelector('#local-player video');
                if(videoEl) videoEl.style.filter = filterVal === "none" ? "" : filterVal;
            };
        });
    }

    // 6. Exiting
    document.getElementById('exitBtn').onclick = document.getElementById('endLiveBtn')?.onclick = () => {
        document.getElementById('exitTitle').innerText = isHost ? "End Live Stream?" : "Leave Stream?";
        exitConfirmModal.classList.remove('hidden');
        exitConfirmModal.style.display = 'flex';
    };
    document.getElementById('cancelExit').onclick = () => {
        exitConfirmModal.classList.add('hidden');
        exitConfirmModal.style.display = 'none';
    };
    document.getElementById('confirmExit').onclick = async () => {
        if(!isHost) await deleteDoc(doc(db, "liveViewers", roomId, "viewers", myUserId));
        else await deleteDoc(doc(db, "lives", myUserId));
        if(client) await client.leave();
        window.location.href = "dashboard.html";
    };

    // 7. Gifts Implementation (UI only for Viewer)
    if (!isHost) {
        document.getElementById('giftPanelBtn').onclick = async () => {
            giftPanel.classList.add('open');
            const uSnap = await getDoc(doc(db, "users", myUserId));
            document.getElementById('myCoinsBal').innerText = uSnap.data()?.coins || 0;
            
            // Render basic mockup gifts for visual completion
            const gifts = [
                {id:1, name:'Rose', price:10, img:'https://cdn-icons-png.flaticon.com/512/3257/3257919.png'},
                {id:2, name:'Heart', price:50, img:'https://cdn-icons-png.flaticon.com/512/833/833472.png'},
                {id:3, name:'Crown', price:500, img:'https://cdn-icons-png.flaticon.com/512/3135/3135804.png'},
                {id:4, name:'Rocket', price:1000, img:'https://cdn-icons-png.flaticon.com/512/1356/1356479.png'}
            ];
            
            const gGrid = document.getElementById('giftGrid');
            gGrid.innerHTML = "";
            gifts.forEach(g => {
                gGrid.innerHTML += `
                    <div class="bg-white/5 hover:bg-white/10 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer transition" onclick="sendMockGift('${g.name}', '${g.img}')">
                        <img src="${g.img}" class="w-12 h-12 mb-2 drop-shadow-md">
                        <span class="text-xs text-white/80 font-medium">${g.name}</span>
                        <span class="text-[10px] text-amber-400 font-bold">${g.price}</span>
                    </div>`;
            });
        };
        
        window.sendMockGift = async (name, img) => {
            closeAllSheets();
            await addDoc(collection(db, "liveChat", roomId, "messages"), {
                type: "gift", senderId: myUserId, senderName: myUsername, giftName: name, timestamp: serverTimestamp()
            });
            // Show local animation overlay
            const anim = document.createElement("div");
            anim.className = "gift-animation";
            anim.innerHTML = `<img src="${img}" class="w-24 h-24 drop-shadow-[0_0_20px_rgba(255,255,255,0.5)]">`;
            document.body.appendChild(anim);
            setTimeout(() => anim.remove(), 2500);
        };
    }

    // Initialize Viewers Counter
    onSnapshot(collection(db, "liveViewers", roomId, "viewers"), (snap) => {
        document.getElementById('viewerCount').innerText = snap.size;
    });

    // Run Startup
    await loadHostData();
    initAgora();
    listenChat();

    // Clean up on un-graceful exit
    window.addEventListener("beforeunload", () => {
        if (!isHost) deleteDoc(doc(db, "liveViewers", roomId, "viewers", myUserId));
    });
</script>
</body>
</html>
