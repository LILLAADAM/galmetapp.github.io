<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet – Live</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; }
    #video-container { position: relative; width: 100vw; height: 100vh; background: black; }
    .agora-video-player { width: 100% !important; height: 100% !important; object-fit: cover; }
    /* Overlay UI */
    .live-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 20;
    }
    .live-overlay button, .live-overlay .interactive {
      pointer-events: auto;
    }
    .top-bar {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .host-info {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .host-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
    }
    .host-name {
      color: white;
      font-weight: bold;
      font-size: 14px;
    }
    .viewer-count {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
      font-size: 12px;
    }
    .live-badge {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }
    .live-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.3; transform: scale(1.2); }
    }
    .control-buttons {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      z-index: 30;
    }
    .ctrl-btn {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn.end {
      background: #ef4444;
      width: auto;
      padding: 0 20px;
      border-radius: 40px;
      gap: 8px;
    }
    /* Chat Panel */
    .chat-panel {
      position: absolute;
      bottom: 100px;
      right: 16px;
      width: 280px;
      max-height: 400px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .chat-messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      max-height: 300px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-message {
      color: white;
      font-size: 12px;
      word-break: break-word;
    }
    .chat-message .sender {
      font-weight: bold;
      color: #00e3fd;
    }
    .chat-input-area {
      display: flex;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding: 8px;
      gap: 8px;
    }
    .chat-input {
      flex: 1;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 20px;
      padding: 8px 12px;
      color: white;
      font-size: 12px;
      outline: none;
    }
    .chat-input::placeholder { color: rgba(255,255,255,0.6); }
    .chat-send {
      background: #006571;
      border: none;
      border-radius: 20px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .gift-btn {
      background: #f59e0b;
    }
    /* Gift panel (reuse style from chat.html) */
    .gift-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      border-radius: 20px 20px 0 0;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 50;
      pointer-events: auto;
      max-height: 60%;
      overflow-y: auto;
    }
    .gift-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .gift-item {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .gift-item:active { transform: scale(0.95); }
    .gift-item img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 4px; }
    .gift-name { font-size: 10px; color: white; }
    .gift-price { font-size: 9px; color: #f59e0b; }
    .close-gift {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 8px;
      border-radius: 30px;
      color: white;
    }
  </style>
</head>
<body>

<div id="video-container"></div>

<!-- Overlay UI -->
<div class="live-overlay">
  <div class="top-bar">
    <div class="host-info">
      <img id="hostAvatar" class="host-avatar" src="https://ui-avatars.com/api/?name=Host">
      <span id="hostName" class="host-name">Loading...</span>
    </div>
    <div class="flex gap-2">
      <div class="viewer-count">
        <span class="material-symbols-outlined text-sm">visibility</span>
        <span id="viewerCount">0</span>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span>LIVE</span>
      </div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="chat-panel">
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" class="chat-input" placeholder="Say something...">
      <button id="sendChatBtn" class="chat-send">
        <span class="material-symbols-outlined text-sm">send</span>
      </button>
      <button id="giftPanelBtn" class="chat-send gift-btn">
        <span class="material-symbols-outlined text-sm">redeem</span>
      </button>
    </div>
  </div>

  <!-- Control Buttons -->
  <div class="control-buttons">
    <button id="micBtn" class="ctrl-btn">
      <span class="material-symbols-outlined">mic</span>
    </button>
    <button id="cameraBtn" class="ctrl-btn">
      <span class="material-symbols-outlined">cameraswitch</span>
    </button>
    <button id="fullscreenBtn" class="ctrl-btn">
      <span class="material-symbols-outlined">fullscreen</span>
    </button>
    <button id="endLiveBtn" class="ctrl-btn end">
      <span class="material-symbols-outlined">call_end</span>
      <span>End Live</span>
    </button>
  </div>

  <!-- Gift Panel (hidden initially) -->
  <div id="giftPanel" class="gift-panel">
    <div class="flex justify-between items-center mb-2">
      <h3 class="text-white font-bold">Send a Gift</h3>
      <button id="closeGiftPanel" class="close-gift">✕</button>
    </div>
    <div id="giftGrid" class="gift-grid">
      <!-- gifts will be loaded here -->
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, getDoc, getDocs, setDoc, deleteDoc, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, limit, increment, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // Firebase config
  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);

  // Get user
  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) {
    window.location.replace("login.html");
  }
  const myUserId = currentUser.userId.toString();
  const myUsername = currentUser.username || "User";

  // URL params
  const urlParams = new URLSearchParams(window.location.search);
  const roomId = urlParams.get("room");
  const isHost = urlParams.get("host") === "true";

  if (!roomId) {
    alert("Invalid room");
    window.location.href = "dashboard.html";
  }

  // Agora
  const APP_ID = "873172a9b2064b1ca97b4f45ee6ed9b5";
  const TOKEN = "007eJxTYNBZOltE3KbDv+GwmZzfwXnCs1Y/3BXGfPfEqYDHO+VqY9YrMFiYGxuaGyVaJhkZmJkkGSYnWponmaSZmKammqWmWCaZWvhez2wIZGSYyfeGlZEBAkF8Xoai/PzceFMzE0sDc3MLBgYAMJ4hIQ==";

  let client = null;
  let localAudioTrack = null;
  let localVideoTrack = null;
  let isMuted = false;
  let cameraFront = true;

  // DOM elements
  const hostAvatarImg = document.getElementById("hostAvatar");
  const hostNameSpan = document.getElementById("hostName");
  const viewerCountSpan = document.getElementById("viewerCount");
  const chatMessagesDiv = document.getElementById("chatMessages");
  const chatInput = document.getElementById("chatInput");
  const sendChatBtn = document.getElementById("sendChatBtn");
  const micBtn = document.getElementById("micBtn");
  const cameraBtn = document.getElementById("cameraBtn");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const endLiveBtn = document.getElementById("endLiveBtn");
  const giftPanelBtn = document.getElementById("giftPanelBtn");
  const giftPanel = document.getElementById("giftPanel");
  const closeGiftPanel = document.getElementById("closeGiftPanel");
  const giftGrid = document.getElementById("giftGrid");

  let hostUserId = null;
  let hostData = null;

  // ---------- 1. Load host info ----------
  async function loadHostInfo() {
    // For viewers, we need to get host userId from the 'lives' document.
    // The lives document uses userId as document ID.
    // We can query lives collection where roomId == roomId.
    const livesSnap = await getDocs(collection(db, "lives"));
    let hostId = null;
    livesSnap.forEach(docSnap => {
      if (docSnap.data().roomId === roomId) {
        hostId = docSnap.id;
      }
    });
    if (hostId) {
      hostUserId = hostId;
      const userSnap = await getDoc(doc(db, "users", hostId));
      if (userSnap.exists()) {
        hostData = userSnap.data();
        hostNameSpan.innerText = hostData.username || "Host";
        hostAvatarImg.src = hostData.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(hostData.username || "Host")}&background=006571&color=fff`;
      }
    } else if (isHost) {
      hostUserId = myUserId;
      hostNameSpan.innerText = myUsername;
      hostAvatarImg.src = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(myUsername)}&background=006571&color=fff`;
    }
  }
  loadHostInfo();

  // ---------- 2. Viewer count (track using liveViewers subcollection) ----------
  // Each viewer adds a document under `liveViewers/{roomId}/viewers/{userId}` when they join, removes on leave.
  async function addViewer() {
    if (isHost) return; // host is not counted as viewer
    await setDoc(doc(db, "liveViewers", roomId, "viewers", myUserId), {
      userId: myUserId,
      username: myUsername,
      joinedAt: serverTimestamp()
    });
  }
  async function removeViewer() {
    if (isHost) return;
    await deleteDoc(doc(db, "liveViewers", roomId, "viewers", myUserId));
  }
  // Listen to viewer count
  function listenViewerCount() {
    onSnapshot(collection(db, "liveViewers", roomId, "viewers"), (snap) => {
      viewerCountSpan.innerText = snap.size;
    });
  }

  // ---------- 3. Live Chat ----------
  async function sendChatMessage(text) {
    if (!text.trim()) return;
    await addDoc(collection(db, "liveChat", roomId, "messages"), {
      senderId: myUserId,
      senderName: myUsername,
      text: text,
      timestamp: serverTimestamp(),
      isGift: false
    });
    chatInput.value = "";
  }

  function listenChat() {
    const q = query(collection(db, "liveChat", roomId, "messages"), orderBy("timestamp", "asc"));
    onSnapshot(q, (snap) => {
      chatMessagesDiv.innerHTML = "";
      snap.forEach(docSnap => {
        const msg = docSnap.data();
        const div = document.createElement("div");
        div.className = "chat-message";
        div.innerHTML = `<span class="sender">${escapeHtml(msg.senderName)}:</span> ${escapeHtml(msg.text)}`;
        if (msg.isGift) {
          div.classList.add("bg-yellow-500/20", "p-1", "rounded");
        }
        chatMessagesDiv.appendChild(div);
      });
      chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    });
  }

  // ---------- 4. Gift System ----------
  async function loadGifts() {
    const snapshot = await getDocs(collection(db, "gifts"));
    giftGrid.innerHTML = "";
    snapshot.forEach(docSnap => {
      const g = docSnap.data();
      const giftDiv = document.createElement("div");
      giftDiv.className = "gift-item";
      giftDiv.onclick = () => sendGift(docSnap.id, g.name, g.image, g.coinPrice);
      giftDiv.innerHTML = `
        <img src="${g.image}">
        <div class="gift-name">${g.name}</div>
        <div class="gift-price">${g.coinPrice} coins</div>
      `;
      giftGrid.appendChild(giftDiv);
    });
  }

  async function sendGift(giftId, giftName, giftImage, price) {
    // Check user coins
    const userSnap = await getDoc(doc(db, "users", myUserId));
    const userCoins = userSnap.data()?.coins || 0;
    if (userCoins < price) {
      alert("Not enough coins!");
      return;
    }
    // Deduct coins from sender
    await updateDoc(doc(db, "users", myUserId), { coins: increment(-price) });
    // Add gems to host (if host exists)
    if (hostUserId) {
      const hostRef = doc(db, "users", hostUserId);
      const hostSnap = await getDoc(hostRef);
      const currentGems = hostSnap.data()?.gems || 0;
      await updateDoc(hostRef, { gems: currentGems + price }); // 1 coin = 1 gem? Adjust as needed
    }
    // Send gift message in chat
    await addDoc(collection(db, "liveChat", roomId, "messages"), {
      senderId: myUserId,
      senderName: myUsername,
      text: `🎁 sent ${giftName} gift!`,
      timestamp: serverTimestamp(),
      isGift: true,
      giftName: giftName,
      giftImage: giftImage
    });
    // Optionally show a floating animation (simplified)
    showGiftAnimation(giftImage);
  }

  function showGiftAnimation(imageUrl) {
    const div = document.createElement("div");
    div.className = "fixed bottom-40 right-10 z-50 animate-bounce";
    div.innerHTML = `<img src="${imageUrl}" class="w-16 h-16 drop-shadow-xl">`;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2000);
  }

  // ---------- 5. Agora Live ----------
  async function startAgora() {
    client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
    if (isHost) {
      await client.setClientRole("host");
    } else {
      await client.setClientRole("audience");
    }
    await client.join(APP_ID, roomId, TOKEN, null);

    if (isHost) {
      // Create local tracks
      [localAudioTrack, localVideoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
      // Play local video
      const localPlayer = document.createElement("div");
      localPlayer.id = "local-player";
      localPlayer.style.width = "100%";
      localPlayer.style.height = "100%";
      document.getElementById("video-container").appendChild(localPlayer);
      localVideoTrack.play("local-player");
      await client.publish([localAudioTrack, localVideoTrack]);
    }

    // Handle remote users
    client.on("user-published", async (user, mediaType) => {
      await client.subscribe(user, mediaType);
      if (mediaType === "video") {
        const playerDiv = document.createElement("div");
        playerDiv.id = user.uid;
        playerDiv.style.width = "100%";
        playerDiv.style.height = "100%";
        document.getElementById("video-container").appendChild(playerDiv);
        user.videoTrack.play(playerDiv);
      }
      if (mediaType === "audio") {
        user.audioTrack.play();
      }
    });

    client.on("user-unpublished", (user) => {
      const playerDiv = document.getElementById(user.uid);
      if (playerDiv) playerDiv.remove();
    });
  }

  // ---------- 6. Control functions ----------
  async function toggleMic() {
    if (!localAudioTrack) return;
    if (isMuted) {
      await localAudioTrack.setEnabled(true);
      micBtn.innerHTML = '<span class="material-symbols-outlined">mic</span>';
      isMuted = false;
    } else {
      await localAudioTrack.setEnabled(false);
      micBtn.innerHTML = '<span class="material-symbols-outlined">mic_off</span>';
      isMuted = true;
    }
  }

  async function switchCamera() {
    if (!localVideoTrack) return;
    cameraFront = !cameraFront;
    const newTrack = await AgoraRTC.createCameraVideoTrack({ 
      cameraId: cameraFront ? "environment" : "user",
      encoderConfig: "720p"
    });
    await client.unpublish(localVideoTrack);
    localVideoTrack.close();
    localVideoTrack = newTrack;
    await client.publish(localVideoTrack);
    localVideoTrack.play("local-player");
  }

  function toggleFullscreen() {
    const elem = document.documentElement;
    if (!document.fullscreenElement) {
      elem.requestFullscreen().catch(err => console.log(err));
    } else {
      document.exitFullscreen();
    }
  }

  async function endLive() {
    if (isHost) {
      // Delete live document from Firestore
      await deleteDoc(doc(db, "lives", myUserId));
    }
    // Remove viewer
    await removeViewer();
    // Leave Agora
    if (client) {
      if (localAudioTrack) localAudioTrack.close();
      if (localVideoTrack) localVideoTrack.close();
      await client.leave();
    }
    window.location.href = "dashboard.html";
  }

  // ---------- 7. Gift panel UI ----------
  function openGiftPanel() {
    giftPanel.style.display = "flex";
    loadGifts();
  }
  function closeGiftPanelFn() {
    giftPanel.style.display = "none";
  }

  // ---------- 8. Helper ----------
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  // ---------- 9. Initialize ----------
  async function init() {
    await startAgora();
    if (!isHost) {
      await addViewer();
    }
    listenViewerCount();
    listenChat();
    // Attach event listeners
    sendChatBtn.onclick = () => sendChatMessage(chatInput.value);
    chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendChatMessage(chatInput.value); });
    micBtn.onclick = toggleMic;
    cameraBtn.onclick = switchCamera;
    fullscreenBtn.onclick = toggleFullscreen;
    endLiveBtn.onclick = endLive;
    giftPanelBtn.onclick = openGiftPanel;
    closeGiftPanel.onclick = closeGiftPanelFn;
  }

  init();

  // Clean up on page unload
  window.addEventListener("beforeunload", () => {
    if (!isHost) {
      removeViewer();
    }
  });
</script>
</body>
</html>
