<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet – Live</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; background: #0a0a0a; }
    #video-container { position: relative; width: 100vw; height: 100vh; background: black; }
    #video-container > div { width: 100%; height: 100%; object-fit: cover; }
    .glass-panel {
      background: rgba(20, 20, 30, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .chat-message {
      animation: fadeInUp 0.2s ease;
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      margin-bottom: 4px;
      color: white;
      font-size: 13px;
      line-height: 1.4;
    }
    .chat-message .sender {
      font-weight: 600;
      color: #a5f3fc;
      cursor: pointer;
      margin-right: 4px;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .level-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 700;
      margin-left: 6px;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    /* Level colors (0-10) */
    .level-0 { background: #6b7280; } .level-1 { background: #84cc16; } .level-2 { background: #14b8a6; }
    .level-3 { background: #3b82f6; } .level-4 { background: #6366f1; } .level-5 { background: #8b5cf6; }
    .level-6 { background: #ec4899; } .level-7 { background: #f43f5e; } .level-8 { background: #f97316; }
    .level-9 { background: #f59e0b; } .level-10 { background: #eab308; }
    .gift-animation {
      position: fixed;
      bottom: 30%;
      right: 20px;
      z-index: 200;
      animation: floatUp 2s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(20px) scale(0.8); }
      20% { opacity: 1; transform: translateY(0) scale(1.2); }
      80% { opacity: 1; transform: translateY(-40px) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(0.5); }
    }
    .incoming-call-modal {
      background: rgba(20,20,40,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body class="text-white">

<!-- Video container -->
<div id="video-container"></div>

<!-- Loading overlay -->
<div id="loadingOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center">
  <div class="text-center">
    <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
    <p class="text-white/80">Joining live...</p>
  </div>
</div>

<!-- Incoming Call Modal (host only) -->
<div id="incomingCallModal" class="fixed inset-0 z-[100] hidden items-center justify-center">
  <div class="incoming-call-modal rounded-3xl p-6 w-80 text-center shadow-2xl">
    <img id="callerAvatar" class="w-20 h-20 rounded-full mx-auto border-2 border-primary mb-3" src="">
    <h3 id="callerName" class="text-xl font-bold mb-1">Caller Name</h3>
    <p class="text-white/60 text-sm mb-4">wants to video call</p>
    <div class="flex gap-3 justify-center">
      <button id="declineCallBtn" class="bg-gray-600 hover:bg-gray-700 px-6 py-3 rounded-full font-semibold transition">Decline</button>
      <button id="acceptCallBtn" class="bg-green-500 hover:bg-green-600 px-6 py-3 rounded-full font-semibold transition">Accept</button>
    </div>
  </div>
</div>

<!-- Calling status overlay (caller) -->
<div id="callingOverlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/70 backdrop-blur-sm">
  <div class="text-center">
    <div class="w-16 h-16 border-4 border-white border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
    <p class="text-white text-lg font-medium">Calling host...</p>
    <button id="cancelCallBtn" class="mt-6 bg-red-500/80 hover:bg-red-600 px-6 py-2 rounded-full text-sm font-semibold">Cancel</button>
  </div>
</div>

<!-- Top bar -->
<div class="fixed top-0 left-0 right-0 z-20 p-4 flex justify-between items-start pointer-events-none">
  <div class="glass-panel rounded-full flex items-center gap-3 pr-4 pl-2 py-1.5 pointer-events-auto">
    <img id="hostAvatar" class="w-10 h-10 rounded-full border-2 border-primary object-cover cursor-pointer" src="https://ui-avatars.com/api/?name=Host&background=006571&color=fff">
    <div>
      <div class="flex items-center gap-2">
        <p id="hostName" class="font-headline font-bold text-sm cursor-pointer">Loading...</p>
        <span id="hostLevelBadge" class="level-badge level-0">Lv1</span>
      </div>
      <div class="flex items-center gap-3 text-[11px]">
        <div class="flex items-center gap-1">
          <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
          <span class="text-white/80 font-medium">LIVE</span>
        </div>
        <span class="text-white/80">💎 <span id="liveGems">0</span></span>
        <span class="text-white/80 flex items-center gap-0.5"><span class="material-symbols-outlined text-sm">visibility</span> <span id="viewerCount">0</span></span>
      </div>
    </div>
  </div>
  <button id="exitBtn" class="glass-panel rounded-full w-10 h-10 flex items-center justify-center pointer-events-auto">
    <span class="material-symbols-outlined">close</span>
  </button>
</div>

<!-- Chat panel -->
<div class="fixed bottom-24 left-4 w-80 max-w-[calc(100%-2rem)] pointer-events-none z-30">
  <div id="chatMessages" class="h-72 overflow-y-auto flex flex-col-reverse gap-1 chat-scroll pr-1 pointer-events-auto"></div>
  <div class="glass-panel rounded-full mt-2 flex items-center gap-2 p-1.5 pl-5 pointer-events-auto">
    <input id="chatInput" type="text" class="flex-1 bg-transparent border-none text-white text-sm placeholder-white/40 focus:outline-none" placeholder="Say something...">
    <button id="sendChatBtn" class="bg-primary/80 hover:bg-primary rounded-full w-9 h-9 flex items-center justify-center transition">
      <span class="material-symbols-outlined text-xl">send</span>
    </button>
    <button id="giftPanelBtn" class="bg-amber-500/80 hover:bg-amber-500 rounded-full w-9 h-9 flex items-center justify-center transition">
      <span class="material-symbols-outlined">redeem</span>
    </button>
  </div>
</div>

<!-- Host controls (bottom center) -->
<div id="hostControls" class="fixed bottom-6 left-0 right-0 flex justify-center gap-3 z-40 pointer-events-none">
  <div class="flex gap-3 pointer-events-auto">
    <button id="micBtn" class="glass-panel rounded-full w-12 h-12 flex items-center justify-center transition hover:bg-white/10">
      <span class="material-symbols-outlined">mic</span>
    </button>
    <button id="cameraBtn" class="glass-panel rounded-full w-12 h-12 flex items-center justify-center transition hover:bg-white/10">
      <span class="material-symbols-outlined">videocam</span>
    </button>
    <button id="mirrorBtn" class="glass-panel rounded-full w-12 h-12 flex items-center justify-center transition hover:bg-white/10">
      <span class="material-symbols-outlined">flip</span>
    </button>
    <button id="fullscreenBtn" class="glass-panel rounded-full w-12 h-12 flex items-center justify-center transition hover:bg-white/10">
      <span class="material-symbols-outlined">fullscreen</span>
    </button>
    <button id="endLiveBtn" class="bg-red-500/90 hover:bg-red-600 rounded-full px-6 py-2 font-semibold flex items-center gap-2 transition shadow-lg">
      <span class="material-symbols-outlined">call_end</span>
      <span>End Live</span>
    </button>
  </div>
</div>

<!-- Viewer call button (bottom right) -->
<div id="viewerCallBtn" class="fixed bottom-6 right-6 z-40 pointer-events-none hidden">
  <button id="callBtn" class="glass-panel rounded-full w-14 h-14 flex items-center justify-center pointer-events-auto transition hover:scale-105 shadow-lg">
    <span class="material-symbols-outlined text-2xl">video_call</span>
  </button>
</div>

<!-- Gift panel (slide-up) -->
<div id="giftPanel" class="fixed inset-x-0 bottom-0 z-50 bg-black/90 backdrop-blur-xl rounded-t-3xl p-4 transform transition-transform duration-300 translate-y-full pointer-events-auto" style="max-height: 70%; overflow-y: auto;">
  <div class="flex justify-between items-center mb-4">
    <h3 class="text-white font-headline font-bold text-lg">Send Gift</h3>
    <button id="closeGiftPanel" class="text-white/70 hover:text-white"><span class="material-symbols-outlined">close</span></button>
  </div>
  <!-- Gift categories -->
  <div class="flex gap-2 mb-4">
    <button class="gift-cat-btn active bg-white/20 text-white px-4 py-1.5 rounded-full text-sm font-medium" data-cat="all">All</button>
    <button class="gift-cat-btn text-white/70 hover:bg-white/10 px-4 py-1.5 rounded-full text-sm" data-cat="popular">Popular</button>
    <button class="gift-cat-btn text-white/70 hover:bg-white/10 px-4 py-1.5 rounded-full text-sm" data-cat="new">New</button>
  </div>
  <div id="giftGrid" class="grid grid-cols-4 gap-3"></div>
</div>

<!-- Profile preview popup -->
<div id="profilePreview" class="fixed bottom-28 left-4 z-[60] glass-panel rounded-2xl p-3 hidden items-center gap-3 cursor-pointer transition hover:bg-white/10" style="min-width: 200px;">
  <img id="previewAvatar" class="w-12 h-12 rounded-full object-cover border border-white/30">
  <div>
    <p id="previewName" class="text-white font-semibold text-sm"></p>
    <div class="flex gap-2 text-xs text-white/70">
      <span id="previewAge"></span>
      <span id="previewCountry"></span>
    </div>
  </div>
</div>

<!-- Exit confirm modal -->
<div id="exitConfirmModal" class="fixed inset-0 z-[200] bg-black/70 backdrop-blur-sm hidden items-center justify-center">
  <div class="bg-gray-900 rounded-3xl p-6 w-80 text-center">
    <p class="text-white text-lg mb-6">Exit live stream?</p>
    <div class="flex gap-3 justify-center">
      <button id="confirmExit" class="bg-red-500 hover:bg-red-600 px-6 py-2.5 rounded-full font-semibold">Exit</button>
      <button id="cancelExit" class="bg-gray-600 hover:bg-gray-700 px-6 py-2.5 rounded-full font-semibold">Stay</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, limit, increment, updateDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Current user
  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser?.userId) window.location.replace("login.html");
  const myUserId = currentUser.userId.toString();
  const myUsername = currentUser.username || "User";
  const myCharmLevel = currentUser.charmLevel ?? currentUser.wealthLevel ?? 1;
  const myAvatar = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(myUsername)}&background=006571&color=fff`;

  // URL params
  const urlParams = new URLSearchParams(window.location.search);
  const roomId = urlParams.get("room");
  const isHost = urlParams.get("host") === "true";
  if (!roomId) { alert("Invalid room"); window.location.href = "dashboard.html"; }

  // Agora
  const APP_ID = "873172a9b2064b1ca97b4f45ee6ed9b5";
  const TOKEN = "007eJxTYNBZOltE3KbDv+GwmZzfwXnCs1Y/3BXGfPfEqYDHO+VqY9YrMFiYGxuaGyVaJhkZmJkkGSYnWponmaSZmKammqWmWCaZWvhez2wIZGSYyfeGlZEBAkF8Xoai/PzceFMzE0sDc3MLBgYAMJ4hIQ==";
  let client = null;
  let localAudioTrack = null;
  let localVideoTrack = null;
  let isMuted = false;
  let cameraEnabled = true;
  let cameraFront = true; // true = user facing (front), false = environment (back)
  const savedCam = localStorage.getItem("camEnabled");
  if (savedCam !== null) cameraEnabled = savedCam === "true";

  // DOM elements
  const hostAvatar = document.getElementById("hostAvatar");
  const hostNameSpan = document.getElementById("hostName");
  const hostLevelBadge = document.getElementById("hostLevelBadge");
  const liveGemsSpan = document.getElementById("liveGems");
  const viewerCountSpan = document.getElementById("viewerCount");
  const chatMessagesDiv = document.getElementById("chatMessages");
  const chatInput = document.getElementById("chatInput");
  const sendChatBtn = document.getElementById("sendChatBtn");
  const micBtn = document.getElementById("micBtn");
  const cameraBtn = document.getElementById("cameraBtn");
  const mirrorBtn = document.getElementById("mirrorBtn");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const callBtn = document.getElementById("callBtn");
  const endLiveBtn = document.getElementById("endLiveBtn");
  const exitBtn = document.getElementById("exitBtn");
  const giftPanelBtn = document.getElementById("giftPanelBtn");
  const giftPanel = document.getElementById("giftPanel");
  const closeGiftPanel = document.getElementById("closeGiftPanel");
  const giftGrid = document.getElementById("giftGrid");
  const profilePreview = document.getElementById("profilePreview");
  const hostControlsDiv = document.getElementById("hostControls");
  const viewerCallDiv = document.getElementById("viewerCallBtn");
  const exitConfirmModal = document.getElementById("exitConfirmModal");
  const confirmExitBtn = document.getElementById("confirmExit");
  const cancelExitBtn = document.getElementById("cancelExit");
  const incomingCallModal = document.getElementById("incomingCallModal");
  const acceptCallBtn = document.getElementById("acceptCallBtn");
  const declineCallBtn = document.getElementById("declineCallBtn");
  const callerAvatar = document.getElementById("callerAvatar");
  const callerNameSpan = document.getElementById("callerName");
  const callingOverlay = document.getElementById("callingOverlay");
  const cancelCallBtn = document.getElementById("cancelCallBtn");
  const loadingOverlay = document.getElementById("loadingOverlay");

  let hostUserId = null;
  let hostData = null;
  let liveStartTime = Date.now();
  let totalLiveGems = 0;
  let currentViewerCount = 0;
  let profileTimeout = null;
  let currentCallDoc = null;
  let callListenerUnsub = null;

  // Helper functions
  function getLevelClass(level) {
    const lvl = Math.min(Math.max(level, 0), 10);
    return `level-${lvl}`;
  }
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }
  function showProfilePreview(userId, userName, avatar, age, country, level) {
    previewAvatar.src = avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=006571&color=fff`;
    previewName.innerText = userName;
    previewAge.innerText = age ? `${age} yrs` : "";
    previewCountry.innerText = country ? country : "";
    profilePreview.classList.remove("hidden");
    profilePreview.onclick = () => window.location.href = `view.html?id=${userId}`;
    if (profileTimeout) clearTimeout(profileTimeout);
    profileTimeout = setTimeout(() => profilePreview.classList.add("hidden"), 3000);
  }

  // Load host info
  async function loadHostInfo() {
    const livesSnap = await getDocs(collection(db, "lives"));
    let hostId = null;
    livesSnap.forEach(docSnap => {
      if (docSnap.data().roomId === roomId) hostId = docSnap.id;
    });
    if (hostId) {
      hostUserId = hostId;
      const userSnap = await getDoc(doc(db, "users", hostId));
      if (userSnap.exists()) {
        hostData = userSnap.data();
        hostNameSpan.innerText = hostData.username || "Host";
        hostAvatar.src = hostData.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(hostData.username)}&background=006571&color=fff`;
        const hostLevel = hostData.charmLevel ?? hostData.wealthLevel ?? 1;
        hostLevelBadge.className = `level-badge ${getLevelClass(hostLevel)}`;
        hostLevelBadge.innerText = `Lv${hostLevel}`;
      }
    } else if (isHost) {
      hostUserId = myUserId;
      hostNameSpan.innerText = myUsername;
      hostAvatar.src = myAvatar;
      const hostLevel = myCharmLevel;
      hostLevelBadge.className = `level-badge ${getLevelClass(hostLevel)}`;
      hostLevelBadge.innerText = `Lv${hostLevel}`;
    }
  }
  await loadHostInfo();

  // Viewer management
  async function addViewer() {
    if (isHost) return;
    await setDoc(doc(db, "liveViewers", roomId, "viewers", myUserId), {
      userId: myUserId, username: myUsername, photoURL: myAvatar, joinedAt: serverTimestamp()
    });
    await addDoc(collection(db, "liveChat", roomId, "messages"), {
      type: "join", senderId: myUserId, senderName: myUsername,
      text: `${myUsername} joined`, timestamp: serverTimestamp(), level: myCharmLevel
    });
  }
  async function removeViewer() {
    if (isHost) return;
    await deleteDoc(doc(db, "liveViewers", roomId, "viewers", myUserId));
  }
  function listenViewerCount() {
    onSnapshot(collection(db, "liveViewers", roomId, "viewers"), (snap) => {
      currentViewerCount = snap.size;
      viewerCountSpan.innerText = currentViewerCount;
    });
  }

  // Chat
  function listenChat() {
    const q = query(collection(db, "liveChat", roomId, "messages"), orderBy("timestamp", "desc"), limit(50));
    onSnapshot(q, (snap) => {
      const messages = [];
      snap.forEach(docSnap => messages.push({ id: docSnap.id, ...docSnap.data() }));
      chatMessagesDiv.innerHTML = "";
      messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = "chat-message";
        if (msg.type === 'join') {
          div.innerHTML = `<span class="text-primary-fixed text-xs">✨ ${escapeHtml(msg.senderName)} joined</span>`;
        } else if (msg.type === 'gift') {
          div.innerHTML = `<span class="text-amber-300 text-xs">🎁 ${escapeHtml(msg.senderName)} sent ${escapeHtml(msg.giftName)}</span>`;
        } else {
          div.innerHTML = `<span class="sender" data-userid="${msg.senderId}">${escapeHtml(msg.senderName)}:</span> <span>${escapeHtml(msg.text)}</span>`;
        }
        chatMessagesDiv.appendChild(div);
      });
      document.querySelectorAll('.sender').forEach(el => {
        el.addEventListener('click', async (e) => {
          e.stopPropagation();
          const userId = el.dataset.userid;
          const userSnap = await getDoc(doc(db, "users", userId));
          if (userSnap.exists()) {
            const u = userSnap.data();
            showProfilePreview(userId, u.username || "User", u.photoURL, u.age, u.country?.name, u.charmLevel);
          }
        });
      });
      chatMessagesDiv.scrollTop = 0;
    });
  }

  async function sendChatMessage(text) {
    if (!text.trim()) return;
    await addDoc(collection(db, "liveChat", roomId, "messages"), {
      type: "text", senderId: myUserId, senderName: myUsername, text: text, timestamp: serverTimestamp()
    });
    chatInput.value = "";
  }

  // Gifts
  async function loadGifts(category = "all") {
    const snapshot = await getDocs(collection(db, "gifts"));
    giftGrid.innerHTML = "";
    snapshot.forEach(docSnap => {
      const g = docSnap.data();
      // Simple category filter (you can add a 'category' field to gifts)
      if (category !== "all" && g.category !== category) return;
      const div = document.createElement("div");
      div.className = "bg-white/5 hover:bg-white/10 rounded-xl p-2 text-center cursor-pointer transition";
      div.onclick = () => sendGift(docSnap.id, g.name, g.image, g.coinPrice);
      div.innerHTML = `
        <img src="${g.image}" class="w-14 h-14 mx-auto mb-1 object-contain">
        <div class="text-white text-xs font-medium">${g.name}</div>
        <div class="text-amber-400 text-[10px]">${g.coinPrice} 🪙</div>
      `;
      giftGrid.appendChild(div);
    });
  }

  async function sendGift(giftId, giftName, giftImage, price) {
    if (myUserId === hostUserId) { alert("You cannot send a gift to yourself"); return; }
    const userSnap = await getDoc(doc(db, "users", myUserId));
    const userCoins = userSnap.data()?.coins || 0;
    if (userCoins < price) { alert("Not enough coins!"); return; }
    await updateDoc(doc(db, "users", myUserId), { coins: increment(-price) });
    if (hostUserId) {
      await updateDoc(doc(db, "users", hostUserId), { gems: increment(price), totalGemsEarned: increment(price) });
      totalLiveGems += price;
      liveGemsSpan.innerText = totalLiveGems;
    }
    await addDoc(collection(db, "liveChat", roomId, "messages"), {
      type: "gift", senderId: myUserId, senderName: myUsername,
      giftName: giftName, giftImage: giftImage, quantity: 1, timestamp: serverTimestamp()
    });
    // Animate gift
    const anim = document.createElement("div");
    anim.className = "gift-animation";
    anim.innerHTML = `<img src="${giftImage}" class="w-20 h-20 drop-shadow-2xl">`;
    document.body.appendChild(anim);
    setTimeout(() => anim.remove(), 2000);
  }

  // Agora
  async function startAgora() {
    try {
      client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
      await client.setClientRole(isHost ? "host" : "audience");
      await client.join(APP_ID, roomId, TOKEN, null);
      if (isHost) {
        [localAudioTrack, localVideoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks(
          { cameraId: cameraFront ? "user" : "environment" },
          { encoderConfig: "720p" }
        );
        if (!cameraEnabled) await localVideoTrack.setEnabled(false);
        const localPlayer = document.createElement("div");
        localPlayer.id = "local-player";
        localPlayer.style.width = "100%";
        localPlayer.style.height = "100%";
        document.getElementById("video-container").appendChild(localPlayer);
        localVideoTrack.play("local-player");
        await client.publish([localAudioTrack, localVideoTrack]);
        applyMirror();
      }
      client.on("user-published", async (user, mediaType) => {
        await client.subscribe(user, mediaType);
        if (mediaType === "video") {
          const playerDiv = document.createElement("div");
          playerDiv.id = user.uid;
          playerDiv.style.width = "100%";
          playerDiv.style.height = "100%";
          document.getElementById("video-container").appendChild(playerDiv);
          user.videoTrack.play(playerDiv);
        }
        if (mediaType === "audio") user.audioTrack.play();
      });
      client.on("user-unpublished", (user) => {
        const player = document.getElementById(user.uid);
        if (player) player.remove();
      });
      loadingOverlay.style.display = "none";
    } catch (e) {
      alert("Failed to join stream: " + e.message);
      window.location.href = "dashboard.html";
    }
  }

  async function toggleMic() {
    if (!localAudioTrack) return;
    isMuted = !isMuted;
    await localAudioTrack.setEnabled(!isMuted);
    micBtn.innerHTML = isMuted ? '<span class="material-symbols-outlined">mic_off</span>' : '<span class="material-symbols-outlined">mic</span>';
  }

  async function toggleCamera() {
    if (!localVideoTrack) return;
    cameraEnabled = !cameraEnabled;
    await localVideoTrack.setEnabled(cameraEnabled);
    localStorage.setItem("camEnabled", cameraEnabled);
    cameraBtn.innerHTML = cameraEnabled ? '<span class="material-symbols-outlined">videocam</span>' : '<span class="material-symbols-outlined">videocam_off</span>';
  }

  async function switchCamera() {
    if (!localVideoTrack) return;
    cameraFront = !cameraFront;
    const newTrack = await AgoraRTC.createCameraVideoTrack({
      cameraId: cameraFront ? "user" : "environment",
      encoderConfig: "720p"
    });
    await client.unpublish(localVideoTrack);
    localVideoTrack.close();
    localVideoTrack = newTrack;
    await client.publish(localVideoTrack);
    localVideoTrack.play("local-player");
    applyMirror();
  }

  function applyMirror() {
    const player = document.getElementById("local-player");
    if (!player) return;
    player.style.transform = cameraFront ? "scaleX(-1)" : "scaleX(1)";
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }

  // Call handling
  async function requestCall() {
    if (myUserId === hostUserId) return;
    // Check camera permission
    try { await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); }
    catch { alert("Camera & microphone permission required"); return; }
    // Check coins
    const userSnap = await getDoc(doc(db, "users", myUserId));
    if ((userSnap.data()?.coins || 0) < 1000) { alert("Need at least 1000 coins for a call"); return; }
    // Create call document
    const callRef = doc(db, "calls", roomId);
    await setDoc(callRef, {
      callerId: myUserId, callerName: myUsername, callerAvatar: myAvatar,
      hostId: hostUserId, hostName: hostData?.username, hostAvatar: hostData?.photoURL,
      status: "waiting", createdAt: serverTimestamp()
    });
    callingOverlay.classList.remove("hidden");
    callingOverlay.style.display = "flex";
    // Listen for status change
    callListenerUnsub = onSnapshot(callRef, (snap) => {
      if (!snap.exists()) {
        callingOverlay.classList.add("hidden");
        if (callListenerUnsub) callListenerUnsub();
        return;
      }
      const data = snap.data();
      if (data.status === "accepted") {
        window.location.href = `call.html?room=${roomId}&callerId=${myUserId}&hostId=${hostUserId}`;
      } else if (data.status === "rejected") {
        alert("Host declined the call");
        callingOverlay.classList.add("hidden");
        deleteDoc(callRef);
      }
    });
  }

  function listenIncomingCalls() {
    if (!isHost) return;
    const callRef = doc(db, "calls", roomId);
    onSnapshot(callRef, (snap) => {
      if (snap.exists()) {
        const call = snap.data();
        if (call.status === "waiting") {
          currentCallDoc = call;
          callerAvatar.src = call.callerAvatar;
          callerNameSpan.innerText = call.callerName;
          incomingCallModal.classList.remove("hidden");
          incomingCallModal.style.display = "flex";
        }
      } else {
        incomingCallModal.classList.add("hidden");
      }
    });
  }

  async function acceptCall() {
    if (!currentCallDoc) return;
    await updateDoc(doc(db, "calls", roomId), { status: "accepted", acceptedAt: serverTimestamp() });
    window.location.href = `call.html?room=${roomId}&callerId=${currentCallDoc.callerId}&hostId=${myUserId}`;
  }
  async function declineCall() {
    await updateDoc(doc(db, "calls", roomId), { status: "rejected" });
    incomingCallModal.classList.add("hidden");
  }

  // End live
  async function endLive() {
    if (isHost) {
      const duration = Date.now() - liveStartTime;
      const summaryDiv = document.createElement("div");
      summaryDiv.className = "fixed inset-0 bg-black/90 backdrop-blur-xl z-[300] flex items-center justify-center";
      summaryDiv.innerHTML = `
        <div class="bg-gray-900 rounded-3xl p-6 text-center max-w-sm mx-4">
          <span class="material-symbols-outlined text-5xl text-primary">celebration</span>
          <h2 class="text-white font-headline text-xl mt-2">Live Ended</h2>
          <p class="text-white/70 text-sm mt-1">${Math.floor(duration/60000)}m ${Math.floor((duration%60000)/1000)}s</p>
          <p class="text-amber-400 font-bold text-lg mt-2">💎 ${totalLiveGems} gems earned</p>
          <p class="text-white/70 text-xs">👥 ${currentViewerCount} viewers</p>
          <button id="closeSummary" class="mt-6 bg-primary hover:bg-primary/80 px-6 py-2 rounded-full text-white">Close</button>
        </div>
      `;
      document.body.appendChild(summaryDiv);
      document.getElementById("closeSummary").onclick = () => window.location.href = "dashboard.html";
      await deleteDoc(doc(db, "lives", myUserId));
    }
    await removeViewer();
    if (client) {
      if (localAudioTrack) localAudioTrack.close();
      if (localVideoTrack) localVideoTrack.close();
      await client.leave();
    }
    if (!isHost) window.location.href = "dashboard.html";
  }

  function showExitConfirm() { exitConfirmModal.classList.remove("hidden"); exitConfirmModal.style.display = "flex"; }
  function hideExitConfirm() { exitConfirmModal.classList.add("hidden"); }
  async function exitLive() {
    await removeViewer();
    if (client) await client.leave();
    window.location.href = "dashboard.html";
  }

  // Gift panel
  function openGiftPanel() { giftPanel.style.transform = "translateY(0)"; loadGifts(); }
  function closeGiftPanelFn() { giftPanel.style.transform = "translateY(100%)"; }

  // Initialize
  async function init() {
    await startAgora();
    if (!isHost) await addViewer();
    listenViewerCount();
    listenChat();
    listenIncomingCalls();

    // Event listeners
    sendChatBtn.onclick = () => sendChatMessage(chatInput.value);
    chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendChatMessage(chatInput.value); });
    micBtn.onclick = toggleMic;
    cameraBtn.onclick = toggleCamera;
    mirrorBtn.onclick = switchCamera;
    fullscreenBtn.onclick = toggleFullscreen;
    giftPanelBtn.onclick = openGiftPanel;
    closeGiftPanel.onclick = closeGiftPanelFn;
    exitBtn.onclick = showExitConfirm;
    confirmExitBtn.onclick = () => { hideExitConfirm(); exitLive(); };
    cancelExitBtn.onclick = hideExitConfirm;
    acceptCallBtn.onclick = acceptCall;
    declineCallBtn.onclick = declineCall;
    cancelCallBtn.onclick = async () => {
      callingOverlay.classList.add("hidden");
      await deleteDoc(doc(db, "calls", roomId));
      if (callListenerUnsub) callListenerUnsub();
    };

    if (isHost) {
      endLiveBtn.onclick = endLive;
      hostControlsDiv.style.display = "flex";
      viewerCallDiv.classList.add("hidden");
    } else {
      hostControlsDiv.style.display = "none";
      viewerCallDiv.classList.remove("hidden");
      callBtn.onclick = requestCall;
    }

    // Profile click
    hostNameSpan.onclick = hostAvatar.onclick = () => {
      if (hostUserId) showProfilePreview(hostUserId, hostData?.username || "Host", hostData?.photoURL, hostData?.age, hostData?.country?.name, hostData?.charmLevel);
    };

    // Gift category buttons
    document.querySelectorAll(".gift-cat-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".gift-cat-btn").forEach(b => b.classList.remove("active", "bg-white/20"));
        btn.classList.add("active", "bg-white/20");
        loadGifts(btn.dataset.cat);
      });
    });

    cameraBtn.innerHTML = cameraEnabled ? '<span class="material-symbols-outlined">videocam</span>' : '<span class="material-symbols-outlined">videocam_off</span>';
  }
  init();

  window.addEventListener("beforeunload", () => {
    if (!isHost) removeViewer();
  });
</script>
</body>
</html>
