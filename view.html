<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:Segoe UI; background:#fff; }

/* TOP */
.top {
  position:relative;
  width:100%;
  height:320px;
  background:#ddd;
  overflow:hidden;
}

.top img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BACK */
.back {
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* ONLINE */
.online {
  position:absolute;
  top:10px;
  right:10px;
  background:#4cd964;
  color:white;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* INFO */
.info { padding:15px; }

button {
  width:90%;
  margin:10px;
  padding:14px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

/* BUTTON STATES */
.follow { background:#4cd964; color:white; }
.following { background:#999; color:white; }
.friend { background:#007aff; color:white; }
</style>
</head>

<body>

<div class="top">
  <div class="back" onclick="history.back()">← Back</div>
  <div id="onlineBox"></div>
  <img id="photo">
</div>

<div class="info">
  <h2 id="name"></h2>
  <p id="id"></p>
  <p id="bio"></p>

  <button id="followBtn" class="follow" onclick="toggleFollow()">Follow</button>
  <button onclick="startChat()">Chat</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
});

const db = getFirestore(app);

/* USERS */
const currentUser = JSON.parse(localStorage.getItem("user"));
const myUid = currentUser?.uid;

const uid = new URLSearchParams(location.search).get("id");

/* LOAD PROFILE */
const snap = await getDoc(doc(db, "users", uid));

if (!snap.exists()) {
  document.body.innerHTML = "User not found";
} else {

  const u = snap.data();

  document.getElementById("photo").src = u.photoURL || "";
  document.getElementById("name").innerText = u.username || "User";
  document.getElementById("id").innerText = "ID: " + (u.userId || "");
  document.getElementById("bio").innerText = u.bio || "";

  if (u.online === true) {
    document.getElementById("onlineBox").innerHTML =
      `<div class="online">🟢 Online</div>`;
  }

}

/* CHECK STATUS */
async function checkFollow() {

  const followerRef = doc(db, "followers", uid, "list", myUid);
  const followingRef = doc(db, "followers", myUid, "list", uid);

  const isFollowing = await getDoc(followerRef);
  const isFriend = await getDoc(followingRef);

  const btn = document.getElementById("followBtn");

  if (isFollowing.exists() && isFriend.exists()) {
    btn.innerText = "Friends";
    btn.className = "friend";
  }
  else if (isFollowing.exists()) {
    btn.innerText = "Following";
    btn.className = "following";
  }
  else {
    btn.innerText = "Follow";
    btn.className = "follow";
  }
}

checkFollow();

/* TOGGLE FOLLOW */
window.toggleFollow = async () => {

  const followerRef = doc(db, "followers", uid, "list", myUid);
  const followingRef = doc(db, "following", myUid, "list", uid);

  const snap = await getDoc(followerRef);

  const btn = document.getElementById("followBtn");

  if (snap.exists()) {

    // ❌ UNFOLLOW
    await deleteDoc(followerRef);
    await deleteDoc(followingRef);

    btn.innerText = "Follow";
    btn.className = "follow";

  } else {

    // ✅ FOLLOW
    await setDoc(followerRef, { uid: myUid });
    await setDoc(followingRef, { uid: uid });

    btn.innerText = "Following";
    btn.className = "following";
  }

  // 🔥 CHECK FRIEND AFTER ACTION
  setTimeout(checkFollow, 300);
};

/* CHAT */
window.startChat = () => {
  location.href = "chat.html?id=" + uid;
};

</script>

</body>
</html>
