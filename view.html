<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {margin:0;font-family:Segoe UI;}

.top img {
    width:100%;
    height:300px;
    object-fit:cover;
}

.info {
    padding:15px;
}

button {
    width:90%;
    margin:10px;
    padding:12px;
    border:none;
    background:#4cd964;
    color:white;
}
</style>
</head>

<body>

<div class="top">
    <img id="photo">
</div>

<div class="info">
    <h2 id="name"></h2>
    <p id="id"></p>
    <p id="bio"></p>

    <button onclick="startChat()">Chat</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app"
});

const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

const q = query(collection(db,"users"), where("userId","==",Number(id)));
const snap = await getDocs(q);

let u = null;
snap.forEach(d => u = d.data());

if (!u) {
    document.body.innerHTML = "User not found";
} else {

document.body.innerHTML = `
<div style="text-align:center;padding:20px">
<img src="${u.photoURL}" style="width:200px;border-radius:20px">
<h2>${u.username}</h2>
<p>ID: ${u.userId}</p>
<p>${u.bio || ""}</p>
<button onclick="chat()">Chat</button>
</div>
`;

}

window.chat = () => location.href = "chat.html?id="+id;

</script
    
</body>
</html>
