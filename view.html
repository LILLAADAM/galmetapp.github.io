<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:Segoe UI; background:#fff; }

/* TOP */
.top { position:relative; height:320px; }
.top img { width:100%; height:100%; object-fit:cover; }

/* BACK */
.back {
  position:absolute; top:10px; left:10px;
  background:rgba(0,0,0,0.5);
  color:white; padding:6px 10px;
  border-radius:8px;
}

/* MENU */
.menu {
  position:absolute; top:10px; right:10px;
  color:white; font-size:22px;
  cursor:pointer;
}

/* ONLINE BADGE (NEXT TO NAME) */
.nameRow {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.onlineTag {
  background:#4cd964;
  color:white;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* INFO */
.info {
  padding:15px;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  background:#fff;
  margin-top:-20px;
}

/* STATS */
.stats {
  display:flex;
  justify-content:space-around;
  margin:15px 0;
}

/* BUTTON */
button {
  width:90%;
  margin:10px;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
}

.follow { background:#4cd964; color:white; }
.following { background:#999; color:white; }
.friend { background:#007aff; color:white; }
.blocked { background:red; color:white; }

/* MENU POPUP */
.popup {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  border-radius:15px 15px 0 0;
  display:none;
}

.popup div {
  padding:15px;
  text-align:center;
  border-bottom:1px solid #eee;
}

/* TOAST */
.toast {
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}

/* COPY */
.copyBtn {
  margin-left:10px;
  cursor:pointer;
  font-size:14px;
}
</style>
</head>

<body>

<div class="top">
  <div class="back" onclick="history.back()">←</div>
  <div class="menu" onclick="openMenu()">⋯</div>
  <img id="photo">
</div>

<div class="info">

  <div class="nameRow">
    <h2 id="name"></h2>
    <div id="onlineTag"></div>
  </div>

  <p id="id"></p>
  <p id="bio"></p>

  <div class="stats">
    <div><b id="fans">0</b><br>Fans</div>
    <div><b id="following">0</b><br>Following</div>
    <div><b id="friends">0</b><br>Friends</div>
  </div>

  <button id="followBtn" onclick="toggleFollow()">Follow</button>
  <button id="chatBtn" onclick="startChat()">Chat</button>

</div>

<!-- MENU -->
<div class="popup" id="menuBox">
  <div onclick="toggleFollow()">Unfollow</div>
  <div onclick="toggleBlock()">Block</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, deleteDoc,
  collection, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
});

const db = getFirestore(app);

const me = JSON.parse(localStorage.getItem("user"));
const myUid = me?.uid;
const uid = new URLSearchParams(location.search).get("id");

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=> t.style.display="none",2000);
}

/* PROFILE */
const snap = await getDoc(doc(db,"users",uid));
const u = snap.data();

photo.src = u.photoURL || "";
name.innerText = u.username || "User";

id.innerHTML = "ID: " + (u.userId || "") + 
  `<span class="copyBtn" onclick="copyId()">📑</span>`;

bio.innerText = u.bio || "";

/* ONLINE */
if(u.online){
  document.getElementById("onlineTag").innerHTML = "Online";
}

/* COPY */
window.copyId = ()=>{
  navigator.clipboard.writeText(u.userId);
  showToast("Copied ID");
};

/* COUNTS REALTIME */
onSnapshot(collection(db,"followers",uid,"list"), s=> fans.innerText = s.size);
onSnapshot(collection(db,"following",uid,"list"), s=> following.innerText = s.size);
onSnapshot(collection(db,"friends",uid,"list"), s=> friends.innerText = s.size);

/* STATE */
onSnapshot(doc(db,"followers",uid,"list",myUid), checkState);
onSnapshot(doc(db,"followers",myUid,"list",uid), checkState);
onSnapshot(doc(db,"blocked",uid,"list",myUid), checkState);

async function checkState(){

  const f1 = await getDoc(doc(db,"followers",uid,"list",myUid));
  const f2 = await getDoc(doc(db,"followers",myUid,"list",uid));
  const block = await getDoc(doc(db,"blocked",uid,"list",myUid));

  if(block.exists()){
    followBtn.innerText="Blocked";
    followBtn.className="blocked";
    chatBtn.style.display="none";
    return;
  }

  chatBtn.style.display="block";

  if(f1.exists() && f2.exists()){
    followBtn.innerText="Friends";
    followBtn.className="friend";
  }
  else if(f1.exists()){
    followBtn.innerText="Following";
    followBtn.className="following";
  }
  else{
    followBtn.innerText="Follow";
    followBtn.className="follow";
  }
}

/* FOLLOW */
window.toggleFollow = async()=>{

  const a = doc(db,"followers",uid,"list",myUid);
  const b = doc(db,"following",myUid,"list",uid);

  const snap = await getDoc(a);

  if(snap.exists()){
    await deleteDoc(a);
    await deleteDoc(b);

    await deleteDoc(doc(db,"friends",uid,"list",myUid));
    await deleteDoc(doc(db,"friends",myUid,"list",uid));

    showToast("Unfollowed");
  }else{
    await setDoc(a,{uid:myUid});
    await setDoc(b,{uid:uid});

    const other = await getDoc(doc(db,"followers",myUid,"list",uid));
    if(other.exists()){
      await setDoc(doc(db,"friends",uid,"list",myUid),{uid:myUid});
      await setDoc(doc(db,"friends",myUid,"list",uid),{uid:uid});
    }

    showToast("Followed");
  }

  menuBox.style.display="none";
};

/* BLOCK */
window.toggleBlock = async()=>{

  const ref = doc(db,"blocked",uid,"list",myUid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    await deleteDoc(ref);
    showToast("Unblocked");
  }else{
    await setDoc(ref,{uid:myUid});

    await deleteDoc(doc(db,"followers",uid,"list",myUid));
    await deleteDoc(doc(db,"following",myUid,"list",uid));
    await deleteDoc(doc(db,"friends",uid,"list",myUid));
    await deleteDoc(doc(db,"friends",myUid,"list",uid));

    showToast("Blocked");
  }

  menuBox.style.display="none";
};

/* MENU */
window.openMenu = ()=>{
  menuBox.style.display="block";
};

/* CHAT */
window.startChat = ()=>{
  location="chat.html?id="+uid;
};

</script>

</body>
</html>
