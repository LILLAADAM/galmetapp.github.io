<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet – Profile</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f3f7fb", "surface-container-low": "#ecf1f6",
            "surface-container-lowest": "#ffffff", "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60", "primary": "#006571",
            "primary-container": "#00e3fd", "primary-dim": "#005863",
            "secondary": "#755700", "tertiary": "#b60051",
            "outline": "#73777b", "outline-variant": "#a9aeb1"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
    }
    .dark .glass-card {
      background: rgba(17, 24, 39, 0.6);
    }
    .popup-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-radius: 1.5rem 1.5rem 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      z-index: 200;
      display: none;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .popup-menu.show {
      display: block;
      transform: translateY(0);
    }
    .dark .popup-menu {
      background: #1f2937;
    }
    .popup-item {
      padding: 1rem;
      text-align: center;
      border-bottom: 1px solid #e2e8f0;
      cursor: pointer;
      font-weight: 500;
    }
    .dark .popup-item {
      border-bottom-color: #374151;
    }
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      color: white;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 14px;
      z-index: 300;
      display: none;
      white-space: nowrap;
    }
    /* Wealth & Charm level gradients */
    .wealth-level-0 { background: linear-gradient(135deg, #9ca3af, #6b7280); }
    .wealth-level-1 { background: linear-gradient(135deg, #84cc16, #65a30d); }
    .wealth-level-2 { background: linear-gradient(135deg, #14b8a6, #0d9488); }
    .wealth-level-3 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .wealth-level-4 { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    .wealth-level-5 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
    .wealth-level-6 { background: linear-gradient(135deg, #ec4899, #db2777); }
    .wealth-level-7 { background: linear-gradient(135deg, #f43f5e, #e11d48); }
    .wealth-level-8 { background: linear-gradient(135deg, #f97316, #ea580c); }
    .wealth-level-9 { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .wealth-level-10 { background: linear-gradient(135deg, #eab308, #ca8a04); }

    .charm-level-0 { background: linear-gradient(135deg, #9ca3af, #6b7280); }
    .charm-level-1 { background: linear-gradient(135deg, #a7f3d0, #34d399); }
    .charm-level-2 { background: linear-gradient(135deg, #99f6e4, #2dd4bf); }
    .charm-level-3 { background: linear-gradient(135deg, #93c5fd, #3b82f6); }
    .charm-level-4 { background: linear-gradient(135deg, #c4b5fd, #8b5cf6); }
    .charm-level-5 { background: linear-gradient(135deg, #f0abfc, #d946ef); }
    .charm-level-6 { background: linear-gradient(135deg, #fbcfe8, #f472b6); }
    .charm-level-7 { background: linear-gradient(135deg, #fecaca, #ef4444); }
    .charm-level-8 { background: linear-gradient(135deg, #fed7aa, #f97316); }
    .charm-level-9 { background: linear-gradient(135deg, #fde68a, #f59e0b); }
    .charm-level-10 { background: linear-gradient(135deg, #fef08a, #eab308); }

    /* Gender chip colours */
    .gender-chip-male { background: #3b82f6; color: white; }
    .gender-chip-female { background: #ec4899; color: white; }
    .gender-chip-other { background: #9ca3af; color: white; }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen pb-32">

<!-- Top App Bar – only back + menu (for others) -->
<nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4">
  <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low active:scale-95 transition">
    <span class="material-symbols-outlined text-primary">arrow_back</span>
  </button>
  <button id="menuButton" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low active:scale-95 transition hidden">
    <span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
  </button>
</nav>

<main class="relative w-full overflow-x-hidden pt-16">
  <section class="px-6">
    <!-- Profile header: avatar + name inline -->
    <div class="flex items-center gap-4 mb-6">
      <div class="relative">
        <div class="w-20 h-20 rounded-full p-1 bg-gradient-to-tr from-primary-container to-primary-fixed-dim shadow-lg">
          <img id="avatarImg" class="w-full h-full rounded-full object-cover border-2 border-white" src="" alt="avatar">
        </div>
        <div id="onlineIndicator" class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full hidden"></div>
      </div>
      <div class="flex-1">
        <div class="flex items-center flex-wrap gap-2">
          <h1 id="displayName" class="font-headline font-extrabold text-xl tracking-tight">Loading...</h1>
          <span id="countryFlag" class="text-lg">🌍</span>
          <span id="levelBadge" class="px-2 py-0.5 rounded-full text-[10px] font-bold text-white shadow-sm"></span>
        </div>
        <div class="flex items-center gap-2 mt-1">
          <span id="genderAge" class="px-2 py-0.5 rounded-full text-[9px] font-bold flex items-center gap-0.5 gender-chip-other">
            <span class="material-symbols-outlined text-[10px]">transgender</span> <span id="ageValue">?</span>
          </span>
          <div id="onlineText" class="hidden items-center gap-1">
            <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
            <span id="onlineStatusLabel" class="text-[9px] font-bold text-green-600 uppercase tracking-wider">Online</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="glass-card rounded-2xl p-3 flex justify-around items-center gap-3 mb-6">
      <div class="text-center">
        <p id="fansCount" class="font-headline font-bold text-lg">0</p>
        <p class="font-label text-[9px] text-on-surface-variant uppercase tracking-wider">Fans</p>
      </div>
      <div class="w-px h-6 bg-outline-variant/20"></div>
      <div class="text-center">
        <p id="followingCount" class="font-headline font-bold text-lg">0</p>
        <p class="font-label text-[9px] text-on-surface-variant uppercase tracking-wider">Following</p>
      </div>
      <div class="w-px h-6 bg-outline-variant/20"></div>
      <div class="text-center">
        <p id="friendsCount" class="font-headline font-bold text-lg">0</p>
        <p class="font-label text-[9px] text-on-surface-variant uppercase tracking-wider">Friends</p>
      </div>
    </div>

    <!-- Info Chips (smaller) -->
    <div class="flex flex-wrap items-center gap-2 mb-6">
      <div class="px-2 py-1 bg-surface-container-lowest rounded-full flex items-center gap-1 shadow-sm border border-outline-variant/10">
        <span class="font-label text-[10px] font-bold text-on-surface-variant">ID: <span id="userIdSpan">---</span></span>
        <span onclick="copyUserId()" class="material-symbols-outlined text-primary text-xs cursor-pointer">content_copy</span>
      </div>
      <div class="px-2 py-1 bg-surface-container-lowest rounded-full flex items-center gap-1 shadow-sm border border-outline-variant/10">
        <span class="material-symbols-outlined text-primary text-xs">language</span>
        <span id="languageSpan" class="font-label text-[10px] font-bold text-on-surface-variant">English</span>
      </div>
      <div class="px-2 py-1 bg-surface-container-lowest rounded-full flex items-center gap-1 shadow-sm border border-outline-variant/10">
        <span class="material-symbols-outlined text-primary text-xs">location_on</span>
        <span id="locationSpan" class="font-label text-[10px] font-bold text-on-surface-variant">Unknown</span>
      </div>
    </div>

    <!-- Level Cards (clickable) -->
    <div class="grid grid-cols-2 gap-3 mb-8">
      <div id="wealthCard" class="p-3 rounded-2xl text-white shadow-md wealth-level-0 cursor-pointer transition hover:scale-105">
        <div class="flex justify-between items-start mb-1">
          <span class="material-symbols-outlined text-xl">military_tech</span>
          <span id="wealthLevel" class="font-headline font-bold text-sm">Lv.0</span>
        </div>
        <p class="font-label text-[9px] font-bold uppercase">Wealth Level</p>
      </div>
      <div id="charmCard" class="p-3 rounded-2xl text-white shadow-md charm-level-0 cursor-pointer transition hover:scale-105">
        <div class="flex justify-between items-start mb-1">
          <span class="material-symbols-outlined text-xl">auto_awesome</span>
          <span id="charmLevel" class="font-headline font-bold text-sm">Lv.0</span>
        </div>
        <p class="font-label text-[9px] font-bold uppercase">Charm Level</p>
      </div>
    </div>

    <!-- Gifts Section – dynamic from Firestore gifts collection -->
    <div class="mb-8">
      <div class="flex justify-between items-center mb-2">
        <h2 class="font-headline font-semibold text-base">Gifts</h2>
        <span id="totalGiftsSpan" class="px-2 py-0.5 bg-surface-container text-on-surface-variant rounded text-[9px] font-bold">0 Total</span>
      </div>
      <!-- Dynamic gift icons (from gifts collection) -->
      <div id="giftIconsGrid" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar mb-3">
        <!-- Will be populated from Firestore -->
      </div>
      <!-- Real gift history (with images) -->
      <div>
        <h3 class="font-label text-[9px] font-bold text-outline uppercase tracking-wider mb-1">Recent Gifts</h3>
        <div id="giftHistoryList" class="space-y-1 max-h-32 overflow-y-auto">
          <p class="text-[10px] text-outline text-center">Loading gifts...</p>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- Bottom Action Bar (for others) -->
<div id="bottomActions" class="fixed bottom-0 left-0 w-full z-50 p-3 hidden">
  <div class="glass-card rounded-full p-1.5 flex items-center gap-2 shadow-2xl">
    <button id="giftBtn" class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-primary active:scale-95 transition">
      <span class="material-symbols-outlined text-xl">card_giftcard</span>
    </button>
    <button id="videoCallBtn" class="flex-1 h-10 rounded-full bg-gradient-to-r from-primary to-primary-fixed-dim text-white flex items-center justify-center gap-1.5 active:scale-95 transition text-xs">
      <span class="material-symbols-outlined text-base">videocam</span>
      <div class="flex flex-col items-start leading-tight">
        <span class="font-label font-bold text-[10px]">Video Call</span>
        <span class="text-[8px] opacity-80">5,000 coins/min</span>
      </div>
    </button>
    <button id="chatBtn" class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-primary active:scale-95 transition">
      <span class="material-symbols-outlined text-xl">chat_bubble</span>
    </button>
  </div>
</div>

<!-- Floating Action Button (Edit for own / Follow for others) -->
<div id="floatingAction" class="fixed bottom-24 right-6 z-20">
  <button id="actionBtn" class="w-10 h-10 bg-primary-fixed rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
    <span id="actionIcon" class="material-symbols-outlined text-on-primary-fixed text-xl">edit</span>
  </button>
</div>

<!-- Popup Menu -->
<div id="popupMenu" class="popup-menu">
  <div id="popupFollow" class="popup-item">Follow</div>
  <div id="popupBlock" class="popup-item">Block</div>
  <div class="popup-item" onclick="closePopup()">Cancel</div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

  function getFlagFromCountryName(countryName) {
    if (!countryName) return "🌍";
    const match = COUNTRIES.find(c => c.name.toLowerCase() === countryName.toLowerCase());
    return match ? match.flag : "🌍";
  }

  // DOM elements
  const avatarImg = document.getElementById("avatarImg");
  const displayName = document.getElementById("displayName");
  const countryFlagSpan = document.getElementById("countryFlag");
  const genderAgeSpan = document.getElementById("genderAge");
  const ageValueSpan = document.getElementById("ageValue");
  const onlineIndicator = document.getElementById("onlineIndicator");
  const onlineText = document.getElementById("onlineText");
  const onlineStatusLabel = document.getElementById("onlineStatusLabel");
  const fansCountSpan = document.getElementById("fansCount");
  const followingCountSpan = document.getElementById("followingCount");
  const friendsCountSpan = document.getElementById("friendsCount");
  const userIdSpan = document.getElementById("userIdSpan");
  const locationSpan = document.getElementById("locationSpan");
  const languageSpan = document.getElementById("languageSpan");
  const wealthLevelSpan = document.getElementById("wealthLevel");
  const charmLevelSpan = document.getElementById("charmLevel");
  const wealthCard = document.getElementById("wealthCard");
  const charmCard = document.getElementById("charmCard");
  const totalGiftsSpan = document.getElementById("totalGiftsSpan");
  const giftHistoryList = document.getElementById("giftHistoryList");
  const giftIconsGrid = document.getElementById("giftIconsGrid");
  const levelBadge = document.getElementById("levelBadge");
  const floatingAction = document.getElementById("floatingAction");
  const bottomActions = document.getElementById("bottomActions");
  const actionBtn = document.getElementById("actionBtn");
  const actionIcon = document.getElementById("actionIcon");
  const giftBtn = document.getElementById("giftBtn");
  const videoCallBtn = document.getElementById("videoCallBtn");
  const chatBtn = document.getElementById("chatBtn");
  const popupMenu = document.getElementById("popupMenu");
  const popupFollow = document.getElementById("popupFollow");
  const popupBlock = document.getElementById("popupBlock");
  const toast = document.getElementById("toast");
  const menuButton = document.getElementById("menuButton");

  let targetUserData = null;
  let isFollowing = false;
  let isBlocked = false;

  function showToast(msg) {
    toast.innerText = msg;
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 2000);
  }

  function copyUserId() {
    navigator.clipboard.writeText(targetUserId);
    showToast("Copied!");
  }

  // Apply level gradient classes
  function getLevelGradientClass(level, type) {
    const levelMap = {
      0: type === 'wealth' ? 'wealth-level-0' : 'charm-level-0',
      1: type === 'wealth' ? 'wealth-level-1' : 'charm-level-1',
      2: type === 'wealth' ? 'wealth-level-2' : 'charm-level-2',
      3: type === 'wealth' ? 'wealth-level-3' : 'charm-level-3',
      4: type === 'wealth' ? 'wealth-level-4' : 'charm-level-4',
      5: type === 'wealth' ? 'wealth-level-5' : 'charm-level-5',
      6: type === 'wealth' ? 'wealth-level-6' : 'charm-level-6',
      7: type === 'wealth' ? 'wealth-level-7' : 'charm-level-7',
      8: type === 'wealth' ? 'wealth-level-8' : 'charm-level-8',
      9: type === 'wealth' ? 'wealth-level-9' : 'charm-level-9',
      10: type === 'wealth' ? 'wealth-level-10' : 'charm-level-10'
    };
    return levelMap[Math.min(level, 10)] || (type === 'wealth' ? 'wealth-level-0' : 'charm-level-0');
  }

  function setLevelCard(card, level, type) {
    const classes = type === 'wealth' 
      ? ['wealth-level-0','wealth-level-1','wealth-level-2','wealth-level-3','wealth-level-4','wealth-level-5','wealth-level-6','wealth-level-7','wealth-level-8','wealth-level-9','wealth-level-10']
      : ['charm-level-0','charm-level-1','charm-level-2','charm-level-3','charm-level-4','charm-level-5','charm-level-6','charm-level-7','charm-level-8','charm-level-9','charm-level-10'];
    for (let i = 0; i <= 10; i++) {
      card.classList.remove(classes[i]);
    }
    const idx = Math.min(level, 10);
    card.classList.add(classes[idx]);
  }

  // Load user data
  async function loadUserData() {
    const userDoc = await getDoc(doc(db, "users", targetUserId));
    if (!userDoc.exists()) {
      alert("User not found");
      window.location.href = "dashboard.html";
      return;
    }
    targetUserData = userDoc.data();
    const photo = targetUserData.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(targetUserData.username || "User")}&background=006571&color=fff`;
    avatarImg.src = photo;
    displayName.innerText = targetUserData.username || targetUserData.email || "User";
    userIdSpan.innerText = targetUserData.userId || targetUserId;
    
    // Flag from country name
    let countryName = "Unknown";
    if (targetUserData.country) {
      if (typeof targetUserData.country === "object") {
        countryName = targetUserData.country.name || "Unknown";
      } else {
        countryName = targetUserData.country;
      }
    }
    const flagEmoji = getFlagFromCountryName(countryName);
    countryFlagSpan.innerText = flagEmoji;
    locationSpan.innerHTML = `${countryName} ${flagEmoji}`;
    
    // Gender & Age with coloured chip
    const gender = targetUserData.gender;
    const age = targetUserData.age || "?";
    const genderIcon = gender === "male" ? "male" : (gender === "female" ? "female" : "transgender");
    genderAgeSpan.innerHTML = `<span class="material-symbols-outlined text-[10px]">${genderIcon}</span> ${age}`;
    ageValueSpan.innerText = age;
    // Apply gender colour class
    genderAgeSpan.classList.remove("gender-chip-male", "gender-chip-female", "gender-chip-other");
    if (gender === "male") genderAgeSpan.classList.add("gender-chip-male");
    else if (gender === "female") genderAgeSpan.classList.add("gender-chip-female");
    else genderAgeSpan.classList.add("gender-chip-other");
    
    languageSpan.innerText = targetUserData.language || "English";
    
    // Online status
    if (targetUserData.online) {
      onlineIndicator.classList.remove("hidden");
      onlineText.classList.remove("hidden");
      onlineStatusLabel.innerText = "Online";
    } else {
      onlineIndicator.classList.add("hidden");
      onlineText.classList.add("hidden");
    }
    
    // Wealth Level (0-10)
    const wealthLvl = targetUserData.wealthLevel ?? 0;
    wealthLevelSpan.innerText = `Lv.${wealthLvl}`;
    setLevelCard(wealthCard, wealthLvl, 'wealth');
    
    // Charm Level (0-10)
    const charmLvl = targetUserData.charmLevel ?? 0;
    charmLevelSpan.innerText = `Lv.${charmLvl}`;
    setLevelCard(charmCard, charmLvl, 'charm');
    
    // Level badge: higher of wealth/charm
    const higherLevel = Math.max(wealthLvl, charmLvl);
    const higherType = wealthLvl >= charmLvl ? 'wealth' : 'charm';
    const badgeClass = getLevelGradientClass(higherLevel, higherType);
    levelBadge.className = `px-2 py-0.5 rounded-full text-[10px] font-bold text-white shadow-sm ${badgeClass}`;
    levelBadge.innerText = `Lv.${higherLevel}`;
    
    const totalGifts = targetUserData.totalGifts || 0;
    totalGiftsSpan.innerText = `${totalGifts} Total`;
  }

  // Load gifts from Firestore collection (for the icon grid)
  async function loadGiftIcons() {
    const snapshot = await getDocs(collection(db, "gifts"));
    giftIconsGrid.innerHTML = "";
    snapshot.forEach(docSnap => {
      const g = docSnap.data();
      const div = document.createElement("div");
      div.className = "flex-shrink-0 flex flex-col items-center gap-0.5";
      div.innerHTML = `
        <div class="w-12 h-12 bg-white rounded-none p-1 shadow-sm flex items-center justify-center border border-outline-variant/10">
          <img src="${g.image}" class="w-full h-full object-contain rounded-none">
        </div>
        <span class="font-label text-[8px] font-bold text-on-surface-variant">${g.name}</span>
      `;
      giftIconsGrid.appendChild(div);
    });
  }

  // Load gift history (with square images)
  async function loadGiftHistory() {
    const q = query(collection(db, "transactions"), orderBy("createdAt", "desc"), limit(30));
    const snapshot = await getDocs(q);
    const gifts = [];
    snapshot.forEach(docSnap => {
      const tx = docSnap.data();
      if (tx.type === "gift" && (tx.senderId === targetUserId || tx.receiverId === targetUserId)) {
        gifts.push(tx);
      }
    });
    const recentGifts = gifts.slice(0, 5);
    if (recentGifts.length === 0) {
      giftHistoryList.innerHTML = '<p class="text-[10px] text-outline text-center">No gifts yet</p>';
      return;
    }
    giftHistoryList.innerHTML = "";
    for (const g of recentGifts) {
      const isSent = g.senderId === targetUserId;
      const otherUserId = isSent ? g.receiverId : g.senderId;
      let otherName = "User";
      try {
        const otherSnap = await getDoc(doc(db, "users", otherUserId));
        if (otherSnap.exists()) otherName = otherSnap.data().username || "User";
      } catch(e) {}
      const div = document.createElement("div");
      div.className = "bg-surface-container-lowest p-1.5 rounded-none text-[10px] flex items-center gap-2";
      div.innerHTML = `
        <img src="${g.giftImage || 'https://via.placeholder.com/24'}" class="w-6 h-6 rounded-none object-cover">
        <span class="font-medium">${otherName}</span>
        <span class="text-outline">${isSent ? '→' : '←'}</span>
        <span>${g.giftName || 'a gift'}</span>
      `;
      giftHistoryList.appendChild(div);
    }
  }

  // Real-time stats
  function listenStats() {
    onSnapshot(collection(db, "followers", targetUserId, "list"), snap => {
      fansCountSpan.innerText = snap.size;
    });
    onSnapshot(collection(db, "following", targetUserId, "list"), snap => {
      followingCountSpan.innerText = snap.size;
    });
    onSnapshot(collection(db, "friends", targetUserId, "list"), snap => {
      friendsCountSpan.innerText = snap.size;
    });
  }

  // Real-time follow/block state
  function listenRelationship() {
    if (isOwnProfile) return;
    const followRef = doc(db, "followers", targetUserId, "list", myUserId);
    const blockRef = doc(db, "blocked", targetUserId, "list", myUserId);
    onSnapshot(followRef, (snap) => {
      isFollowing = snap.exists();
      updateUIForFollowState();
      updatePopupMenu();
    });
    onSnapshot(blockRef, (snap) => {
      isBlocked = snap.exists();
      updateUIForFollowState();
      updatePopupMenu();
    });
  }

  function updateUIForFollowState() {
    if (isOwnProfile) return;
    if (isBlocked) {
      floatingAction.classList.add("hidden");
      bottomActions.classList.add("hidden");
    } else {
      if (!isFollowing) {
        floatingAction.classList.remove("hidden");
        actionIcon.innerText = "add";
      } else {
        floatingAction.classList.add("hidden");
      }
      bottomActions.classList.remove("hidden");
    }
  }

  function updatePopupMenu() {
    if (isBlocked) {
      popupFollow.innerText = "Unblock";
      popupBlock.innerText = "Blocked";
    } else {
      popupFollow.innerText = isFollowing ? "Unfollow" : "Follow";
      popupBlock.innerText = "Block";
    }
  }

  // Actions
  async function toggleFollow() {
    if (isBlocked) {
      await unblockUser();
      return;
    }
    const followRef = doc(db, "followers", targetUserId, "list", myUserId);
    const followingRef = doc(db, "following", myUserId, "list", targetUserId);
    if (isFollowing) {
      await deleteDoc(followRef);
      await deleteDoc(followingRef);
      await deleteDoc(doc(db, "friends", targetUserId, "list", myUserId));
      await deleteDoc(doc(db, "friends", myUserId, "list", targetUserId));
      showToast("Unfollowed");
    } else {
      await setDoc(followRef, { uid: myUserId });
      await setDoc(followingRef, { uid: targetUserId });
      const mutual = await getDoc(doc(db, "followers", myUserId, "list", targetUserId));
      if (mutual.exists()) {
        await setDoc(doc(db, "friends", targetUserId, "list", myUserId), { uid: myUserId });
        await setDoc(doc(db, "friends", myUserId, "list", targetUserId), { uid: targetUserId });
      }
      showToast("Followed");
    }
    closePopup();
  }

  async function toggleBlock() {
    if (isBlocked) {
      await unblockUser();
      return;
    }
    const blockRef = doc(db, "blocked", targetUserId, "list", myUserId);
    await setDoc(blockRef, { uid: myUserId });
    await deleteDoc(doc(db, "followers", targetUserId, "list", myUserId));
    await deleteDoc(doc(db, "following", myUserId, "list", targetUserId));
    await deleteDoc(doc(db, "friends", targetUserId, "list", myUserId));
    await deleteDoc(doc(db, "friends", myUserId, "list", targetUserId));
    showToast("Blocked");
    closePopup();
  }

  async function unblockUser() {
    const blockRef = doc(db, "blocked", targetUserId, "list", myUserId);
    await deleteDoc(blockRef);
    showToast("Unblocked");
    closePopup();
  }

  function editProfile() {
    window.location.href = "profile.html";
  }

  async function actionButtonClick() {
    if (isOwnProfile) {
      editProfile();
    } else {
      await toggleFollow();
    }
  }

  function startChat() {
    window.location.href = `chat.html?id=${targetUserId}`;
  }

  function sendGift() {
    window.location.href = `gifts.html?uid=${targetUserId}`;
  }
  function startVideoCall() {
    showToast("Video call costs 5,000 coins/min (coming soon)");
  }

  function openPopup() {
    popupMenu.classList.add("show");
  }
  window.closePopup = function() {
    popupMenu.classList.remove("show");
  };
  window.addEventListener("click", (e) => {
    if (!popupMenu.contains(e.target) && e.target !== menuButton && !menuButton?.contains(e.target)) {
      closePopup();
    }
  });

  function setupUI() {
    if (isOwnProfile) {
      menuButton.classList.add("hidden");
      floatingAction.classList.remove("hidden");
      actionIcon.innerText = "edit";
      bottomActions.classList.add("hidden");
    } else {
      menuButton.classList.remove("hidden");
      menuButton.onclick = openPopup;
      popupFollow.onclick = toggleFollow;
      popupBlock.onclick = toggleBlock;
      listenRelationship();
    }
    actionBtn.onclick = actionButtonClick;
    chatBtn.onclick = startChat;
    giftBtn.onclick = sendGift;
    videoCallBtn.onclick = startVideoCall;

    wealthCard.onclick = () => window.location.href = "wealthlevelrules.html";
    charmCard.onclick = () => window.location.href = "charmlevelrules.html";
  }

  // Init
  await loadUserData();
  listenStats();
  await loadGiftIcons();
  await loadGiftHistory();
  setupUI();
</script>
