<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:Segoe UI; background:#fff; }

.top {
  position:relative;
  height:320px;
}
.top img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.back {
  position:absolute;
  top:10px; left:10px;
  background:rgba(0,0,0,0.5);
  color:white; padding:6px 10px;
  border-radius:6px;
}

.menu {
  position:absolute;
  top:10px; right:10px;
  color:white;
  font-size:20px;
  cursor:pointer;
}

.popup {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  border-top-left-radius:15px;
  border-top-right-radius:15px;
  display:none;
}

.popup div {
  padding:15px;
  text-align:center;
  border-bottom:1px solid #eee;
}

.info { padding:15px; }

.stats {
  display:flex;
  justify-content:space-around;
  margin:10px 0;
}

button {
  width:90%;
  margin:10px;
  padding:14px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

.follow { background:#4cd964; color:white; }
.following { background:#999; color:white; }
.friend { background:#007aff; color:white; }
.blocked { background:red; color:white; }

.online {
  position:absolute;
  right:10px; top:10px;
  background:#4cd964;
  padding:5px 10px;
  border-radius:20px;
  color:white;
}
</style>
</head>

<body>

<div class="top">
  <div class="back" onclick="history.back()">←</div>
  <div class="menu" onclick="openMenu()">⋯</div>
  <div id="onlineBox"></div>
  <img id="photo">
</div>

<div class="info">
  <h2 id="name"></h2>
  <p id="id"></p>
  <p id="bio"></p>

  <div class="stats">
    <div><b id="fans">0</b><br>Fans</div>
    <div><b id="following">0</b><br>Following</div>
    <div><b id="friends">0</b><br>Friends</div>
  </div>

  <button id="followBtn" onclick="toggleFollow()">Follow</button>
  <button id="chatBtn" onclick="startChat()">Chat</button>
</div>

<!-- MENU -->
<div class="popup" id="menuBox">
  <div onclick="toggleFollow()">Unfollow</div>
  <div onclick="toggleBlock()">Block</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, deleteDoc,
  collection, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
});

const db = getFirestore(app);

const me = JSON.parse(localStorage.getItem("user"));
const myUid = me?.uid;

const uid = new URLSearchParams(location.search).get("id");

/* LOAD PROFILE */
const snap = await getDoc(doc(db, "users", uid));
const u = snap.data();

photo.src = u.photoURL || "";
name.innerText = u.username;
id.innerText = "ID: " + u.userId;
bio.innerText = u.bio || "";

if(u.online){
  onlineBox.innerHTML = `<div class="online">Online</div>`;
}

/* REALTIME COUNTS */
onSnapshot(collection(db,"followers",uid,"list"), s=>{
  fans.innerText = s.size;
});
onSnapshot(collection(db,"following",uid,"list"), s=>{
  following.innerText = s.size;
});
onSnapshot(collection(db,"friends",uid,"list"), s=>{
  friends.innerText = s.size;
});

/* CHECK STATES */
async function checkState(){

  const f1 = await getDoc(doc(db,"followers",uid,"list",myUid));
  const f2 = await getDoc(doc(db,"followers",myUid,"list",uid));
  const block = await getDoc(doc(db,"blocked",uid,"list",myUid));

  const btn = followBtn;

  if(block.exists()){
    btn.innerText="Blocked";
    btn.className="blocked";
    chatBtn.style.display="none";
    return;
  }

  if(f1.exists() && f2.exists()){
    btn.innerText="Friends";
    btn.className="friend";
  }
  else if(f1.exists()){
    btn.innerText="Following";
    btn.className="following";
  }
  else{
    btn.innerText="Follow";
    btn.className="follow";
  }
}

checkState();

/* FOLLOW */
window.toggleFollow = async()=>{

  const a = doc(db,"followers",uid,"list",myUid);
  const b = doc(db,"following",myUid,"list",uid);

  const snap = await getDoc(a);

  if(snap.exists()){
    await deleteDoc(a);
    await deleteDoc(b);

    // remove friend both sides
    await deleteDoc(doc(db,"friends",uid,"list",myUid));
    await deleteDoc(doc(db,"friends",myUid,"list",uid));
  }
  else{
    await setDoc(a,{uid:myUid});
    await setDoc(b,{uid:uid});

    // check mutual
    const other = await getDoc(doc(db,"followers",myUid,"list",uid));
    if(other.exists()){
      await setDoc(doc(db,"friends",uid,"list",myUid),{uid:myUid});
      await setDoc(doc(db,"friends",myUid,"list",uid),{uid:uid});
    }
  }

  checkState();
};

/* BLOCK */
window.toggleBlock = async()=>{

  const ref = doc(db,"blocked",uid,"list",myUid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    await deleteDoc(ref);
  }else{

    await setDoc(ref,{uid:myUid});

    // remove follow + friend
    await deleteDoc(doc(db,"followers",uid,"list",myUid));
    await deleteDoc(doc(db,"following",myUid,"list",uid));
    await deleteDoc(doc(db,"friends",uid,"list",myUid));
    await deleteDoc(doc(db,"friends",myUid,"list",uid));
  }

  checkState();
};

/* MENU */
window.openMenu=()=>{
  menuBox.style.display="block";
};

/* CHAT */
window.startChat=()=>{
  location="chat.html?id="+uid;
};

</script>

</body>
</html>
