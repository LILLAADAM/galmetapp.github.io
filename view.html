<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#fff;
}

/* TOP IMAGE SECTION */
.top {
  position:relative;
  width:100%;
  height:320px;
  background:#ddd;
  overflow:hidden;
}

/* IMAGE FIX (NO JUMP ISSUE) */
.top img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* BACK BUTTON */
.back {
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.5);
  color:white;
  padding:6px 10px;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}

/* ONLINE DOT */
.online {
  position:absolute;
  top:10px;
  right:10px;
  background:#4cd964;
  color:white;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* INFO */
.info {
  padding:15px;
}

h2 {
  margin:5px 0;
}

p {
  color:#555;
}

/* BUTTON */
button {
  width:90%;
  margin:15px;
  padding:14px;
  border:none;
  background:#4cd964;
  color:white;
  font-size:16px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="top">

  <!-- BACK -->
  <div class="back" onclick="goBack()">← Back</div>

  <!-- ONLINE -->
  <div id="onlineBox"></div>

  <!-- IMAGE -->
  <img id="photo" src="https://via.placeholder.com/600x400">

</div>

<div class="info">
  <h2 id="name"></h2>
  <p id="id"></p>
  <p id="bio"></p>

  <button onclick="startChat()">Chat</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, 
  doc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app"
});

const db = getFirestore(app);

/* GET UID */
const uid = new URLSearchParams(location.search).get("id");

if (!uid) {
  document.body.innerHTML = "Invalid user";
} else {

  const snap = await getDoc(doc(db, "users", uid));

  if (!snap.exists()) {
    document.body.innerHTML = "User not found";
  } else {

    const u = snap.data();

    /* IMAGE FIX (LOAD PROPERLY) */
    const img = document.getElementById("photo");
    img.src = u.photoURL || "https://via.placeholder.com/600x400";

    /* TEXT */
    document.getElementById("name").innerText = u.username || "User";
    document.getElementById("id").innerText = "ID: " + (u.userId || "");
    document.getElementById("bio").innerText = u.bio || "";

    /* 🟢 ONLINE STATUS */
    if (u.online === true) {
      document.getElementById("onlineBox").innerHTML = 
        `<div class="online">🟢 Online</div>`;
    }

  }
}

/* CHAT BUTTON */
window.startChat = () => {
  location.href = "chat.html?id=" + uid;
};

/* BACK */
window.goBack = () => {
  history.back();
};

</script>

</body>
</html>
