<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galmet</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#050510;
color:white;
text-align:center;
overflow-x:hidden;
}

/* Hero /

.hero{
padding:60px 20px;
}

.hero h1{
font-size:36px;
margin-bottom:8px;
}

.hero p{
opacity:0.7;
font-size:16px;
}

/ Phone image /

.phone{
margin-top:30px;
}

.phone img{
width:220px;
max-width:80%;
border-radius:30px;
box-shadow:0 30px 80px rgba(130,80,255,0.6);
}

/ Sections /

.section{
padding:60px 20px;
}

.section h2{
font-size:24px;
}

.section p{
font-size:14px;
opacity:0.8;
}

/ Screens /

.screens img{
width:160px;
margin:10px;
border-radius:20px;
box-shadow:0 20px 60px rgba(120,80,255,0.3);
}

/ Contact /

.contact{
background:#0f0f1f;
padding:60px 20px;
}

input,textarea{
width:90%;
max-width:300px;
padding:10px;
margin:8px;
border:none;
border-radius:8px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#6c4cff,#ff5ec4);
color:white;
}

/ Footer */

footer{
padding:30px;
opacity:0.5;
font-size:13px;
}

</style>

</head>

<body>

<section class="hero">

<h1>Galmet</h1>

<p>Connect. Talk. Belong.</p>

<div class="phone">

<img src="splash.webp">

</div>

</section>

<section class="section">

<h2>Live Voice Rooms</h2>

<p>Join conversations with people around the world.</p>

</section>

<section class="section screens">

<h2>App Experience</h2>

<img src="login.webp">
<img src="otp.webp">
<img src="rooms.webp">
<img src="voice.webp">
<img src="wallet.webp">
<img src="profile.webp">

</section>

<section class="contact">

<h2>Join Early Access</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="7adbde9a-5a04-43e7-9fac-b912fa8ad21a">

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message"></textarea>

<br>

<button type="submit">Submit</button>

</form>

</section>

<footer>

Galmet © 2026

</footer>

</body>

</html>
