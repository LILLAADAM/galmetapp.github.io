<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galmet</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#050510;
color:white;
text-align:center;
overflow-x:hidden;
}

/* Background Glow /

body::before{
content:"";
position:fixed;
width:600px;
height:600px;
background:radial-gradient(circle,#6c4cff,#ff5ec4);
filter:blur(200px);
top:-200px;
left:-200px;
opacity:0.5;
z-index:-1;
}

/ Hero /

.hero{
padding:120px 20px;
}

.hero h1{
font-size:64px;
margin-bottom:10px;
}

.hero p{
opacity:0.7;
font-size:20px;
}

/ Floating phone /

.phone{
margin-top:60px;
animation:float 4s ease-in-out infinite;
}

.phone img{
width:320px;
border-radius:40px;
box-shadow:0 40px 120px rgba(130,80,255,0.6);
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

/ Buttons /

.buttons{
margin-top:30px;
}

button{
padding:14px 28px;
margin:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#6c4cff,#ff5ec4);
color:white;
font-size:16px;
cursor:pointer;
}

/ Screens /

.section{
padding:100px 20px;
}

.screens img{
width:260px;
margin:20px;
border-radius:30px;
box-shadow:0 20px 80px rgba(120,80,255,0.4);
transition:0.3s;
}

.screens img:hover{
transform:scale(1.05);
}

/ Contact */

.contact{
background:#0f0f1f;
padding:80px 20px;
}

input,textarea{
width:300px;
padding:12px;
margin:8px;
border:none;
border-radius:8px;
}

footer{
padding:40px;
opacity:0.5;
}

</style>

</head>

<body>

<section class="hero">

<h1>Galmet</h1>

<p>Connect. Talk. Belong.</p>

<div class="buttons">

<button>Download App</button>
<button>Join Waitlist</button>

</div>

<div class="phone">

<img src="splash.webp">

</div>

</section>

<section class="section">

<h2>Live Voice Rooms</h2>

<p>Join conversations with people around the world.</p>

</section>

<section class="section screens">

<h2>App Experience</h2>

<img src="login.webp">
<img src="otp.webp">
<img src="rooms.webp">
<img src="voice.webp">
<img src="wallet.webp">
<img src="profile.webp">

</section>

<section class="contact">

<h2>Join Early Access</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="7adbde9a-5a04-43e7-9fac-b912fa8ad21a">

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message"></textarea>

<br>

<button type="submit">Submit</button>

</form>

</section>

<footer>

Galmet © 2026

</footer>

</body>

</html>
