<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet</title>

<style>
/* KEEP YOUR SAME DESIGN */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f1b5c, #1f2f9c);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
    color: white;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    outline: none;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.login-btn {
    background: #5fbf5f;
    color: white;
}

.register-btn {
    background: #f39c12;
    color: white;
}

#error {
    color: red;
    font-size: 13px;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">
    <h1>Galmet</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="referral" placeholder="Referral Code (optional)">

    <button class="login-btn" onclick="login()">Login</button>
    <button class="register-btn" onclick="register()">Register</button>

    <div id="error"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, setDoc, collection, query, where, getDocs, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 YOUR CONFIG (KEEP SAME)
const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app",
  messagingSenderId: "900590512024",
  appId: "1:900590512024:web:16a36a085809a728c92ded"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// AUTO LOGIN CHECK ✅
onAuthStateChanged(auth, (user) => {
    if(user){
        window.location.href = "dashboard.html";
    }
});

// ERROR
function showError(msg){
    document.getElementById("error").innerText = msg;
}

// REGISTER ✅ FIXED
window.register = async function(){

    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();
    let referral = document.getElementById("referral").value.trim();

    if(!email || !pass){
        showError("Please fill all fields");
        return;
    }

    try{

        // 1. CREATE USER
        let userCred = await createUserWithEmailAndPassword(auth, email, pass);
        let user = userCred.user;

        // 2. UNIQUE INVITE CODE (FIXED)
        let inviteCode = user.uid.slice(0,6).toUpperCase();

        // 3. CHECK REFERRAL (FIXED)
        let referredBy = "";

        if(referral){
            const q = query(collection(db, "users"), where("inviteCode", "==", referral));
            const snap = await getDocs(q);

            if(!snap.empty){
                referredBy = snap.docs[0].id;
            }else{
                showError("Invalid referral code");
                return;
            }
        }

        // 4. SAVE USER
        await setDoc(doc(db, "users", user.uid), {
            coins: 500,
            email: email,
            inviteCode: inviteCode,
            referredBy: referredBy,
            firstTopup: false,
            createdAt: serverTimestamp()
        });

        alert("Account Created Successfully");
        window.location.href = "dashboard.html";

    }catch(e){
        showError(e.message);
    }
}

// LOGIN ✅
window.login = async function(){

    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();

    if(!email || !pass){
        showError("Enter email & password");
        return;
    }

    try{
        await signInWithEmailAndPassword(auth, email, pass);

        alert("Login Success");
        window.location.href = "dashboard.html";

    }catch(e){
        showError(e.message);
    }
}

</script>

</body>
</html>
