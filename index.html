<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f1f7a,#1a237e);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 90%;
  max-width: 380px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

h1 {
  color: #fff;
  text-align: center;
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 12px;
  font-size: 16px;
  cursor: pointer;
}

.login {
  background: #66bb6a;
  color: white;
}

.register {
  background: #f39c34;
  color: white;
}

#error {
  color: red;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h1>Galmet</h1>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="login" onclick="login()">Login</button>
  <button class="register" onclick="register()">Register</button>

  <p id="error"></p>
</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.1.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.1.1/firebase-firestore.js";

/* 🔥 PASTE YOUR CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ERROR */
function showError(msg){
  document.getElementById("error").innerText = msg;
}

/* REGISTER */
window.register = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    showError("Fill all fields");
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
    const user = userCredential.user;

    let inviteCode = Math.random().toString(36).substring(2,8).toUpperCase();

    await setDoc(doc(db, "users", user.uid), {
      coins: 500,
      email: email,
      inviteCode: inviteCode,
      referredBy: null,
      firstTopup: false
    });

    alert("Account Created ✅");
    window.location.href = "dashboard.html";

  } catch(e){
    showError(e.message);
    console.log(e);
  }
};

/* LOGIN */
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    showError("Fill all fields");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, pass);

    alert("Login Successful ✅");
    window.location.href = "dashboard.html";

  } catch(e){
    showError(e.message);
    console.log(e);
  }
};

</script>

</body>
</html>
