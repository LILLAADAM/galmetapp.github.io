<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f1b5c, #1f2f9c);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255,255,255,0.08);
    padding: 35px 25px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

h1 {
    color: white;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    font-size: 15px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

.login-btn { background: #5fbf5f; color: white; }
.register-btn { background: #f39c12; color: white; }

#error {
    color: red;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Galmet</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button class="login-btn" id="loginBtn">Login</button>
    <button class="register-btn" id="registerBtn">Register</button>

    <div id="error"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app",
  messagingSenderId: "900590512024",
  appId: "1:900590512024:web:16a36a085809a728c92ded"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const errorDiv = document.getElementById("error");

// REGISTER
document.getElementById("registerBtn").addEventListener("click", async () => {
    errorDiv.innerText = "";

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();

    if(!email || !pass){
        errorDiv.innerText = "Fill all fields";
        return;
    }

    try {
        console.log("Register start");

        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const user = userCredential.user;

        const inviteCode = Math.random().toString(36).substring(2,8).toUpperCase();

        await setDoc(doc(db, "users", user.uid), {
            coins: 500,
            email: email,
            inviteCode: inviteCode,
            referredBy: "",
            firstTopup: false,
            createdAt: new Date()
        });

        alert("Account Created ✅");
        window.location.href = "dashboard.html";

    } catch (e) {
        console.error(e);
        errorDiv.innerText = e.message;
    }
});

// LOGIN
document.getElementById("loginBtn").addEventListener("click", async () => {
    errorDiv.innerText = "";

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();

    if(!email || !pass){
        errorDiv.innerText = "Fill all fields";
        return;
    }

    try {
        console.log("Login start");

        await signInWithEmailAndPassword(auth, email, pass);

        alert("Login Success ✅");
        window.location.href = "dashboard.html";

    } catch (e) {
        console.error(e);
        errorDiv.innerText = e.message;
    }
});

</script>

</body>
</html>
