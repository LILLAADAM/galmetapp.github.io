<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f1b5c, #1f2f9c);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card /
.container {
    background: rgba(255,255,255,0.08);
    padding: 25px 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/ Title /
h1 {
    color: white;
    margin-bottom: 20px;
    font-size: 26px;
}

/ Inputs /
input {
    width: 100%;
    padding: 13px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    background: #f1f1f1;
}

/ Buttons /
button {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn {
    background: #5fbf5f;
    color: white;
}

.register-btn {
    background: #f39c12;
    color: white;
}

button:hover {
    transform: scale(1.02);
}

/ Error /
#error {
    color: #ff4d4d;
    font-size: 13px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Galmet</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="referral" placeholder="Referral Code (Optional)">

    <button class="login-btn" id="loginBtn">Login</button>
    <button class="register-btn" id="registerBtn">Register</button>

    <div id="error"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app",
  messagingSenderId: "900590512024",
  appId: "1:900590512024:web:16a36a085809a728c92ded"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const errorDiv = document.getElementById("error");

/ REGISTER /
document.getElementById("registerBtn").addEventListener("click", async () => {
    errorDiv.innerText = "";

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();
    const referral = document.getElementById("referral").value.trim();

    if(!email || !pass){
        errorDiv.innerText = "Fill all fields";
        return;
    }

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const user = userCredential.user;

        const inviteCode = Math.random().toString(36).substring(2,8).toUpperCase();

        await setDoc(doc(db, "users", user.uid), {
            coins: 500,
            email: email,
            inviteCode: inviteCode,
            referredBy: referral || "",
            firstTopup: false,
            createdAt: new Date()
        });

        alert("Account Created ✅");
        window.location.href = "dashboard.html";

    } catch (e) {
        console.error(e);
        errorDiv.innerText = e.message;
    }
});

/ LOGIN */
document.getElementById("loginBtn").addEventListener("click", async () => {
    errorDiv.innerText = "";

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();

    if(!email || !pass){
        errorDiv.innerText = "Fill all fields";
        return;
    }

    try {
        await signInWithEmailAndPassword(auth, email, pass);

        alert("Login Success ✅");
        window.location.href = "dashboard.html";

    } catch (e) {
        console.error(e);
        errorDiv.innerText = e.message;
    }
});

</script>

</body>
</html>
