<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <title>Galmet · Secure Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #eef2ff;
            --card-bg: rgba(255, 255, 255, 0.98);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --input-focus-ring: rgba(79, 70, 229, 0.25);
            --input-text: #0f172a;
            --placeholder-color: #94a3b8;
            --error-bg: #fee2e2;
            --error-text: #b91c1c;
            --btn-login-bg: #10b981;
            --btn-login-hover: #059669;
            --btn-register-bg: #f59e0b;
            --btn-register-hover: #d97706;
            --btn-text: white;
            --separator-color: #e2e8f0;
            --link-color: #3b82f6;
            --icon-btn-bg: #f1f5f9;
            --icon-btn-hover: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient-start: #0b1120;
                --bg-gradient-end: #111827;
                --card-bg: rgba(18, 25, 45, 0.94);
                --card-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.4), 0 1px 1px rgba(255, 255, 255, 0.03);
                --text-primary: #f1f5f9;
                --text-secondary: #cbd5e1;
                --input-bg: #1e293b;
                --input-border: #334155;
                --input-focus-ring: rgba(99, 102, 241, 0.5);
                --input-text: #f8fafc;
                --placeholder-color: #64748b;
                --error-bg: rgba(153, 27, 27, 0.2);
                --error-text: #f87171;
                --btn-login-bg: #10b981;
                --btn-login-hover: #34d399;
                --btn-register-bg: #f59e0b;
                --btn-register-hover: #fbbf24;
                --btn-text: #ffffff;
                --separator-color: #334155;
                --link-color: #60a5fa;
                --icon-btn-bg: #334155;
                --icon-btn-hover: #475569;
            }
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: background 0.2s ease;
        }

        .auth-card {
            max-width: 440px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: var(--card-shadow);
            padding: 2rem 1.75rem;
            transition: background 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary), #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .brand p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.4rem;
            font-weight: 450;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input {
            padding-right: 3rem;
        }
        .toggle-password {
            position: absolute;
            right: 1rem;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-secondary);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: var(--link-color);
        }
        input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 1.25rem;
            font-size: 1rem;
            font-weight: 500;
            color: var(--input-text);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            outline: none;
            font-family: inherit;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px var(--input-focus-ring);
        }
        input::placeholder {
            color: var(--placeholder-color);
            font-weight: 450;
        }

        .action-btn {
            width: 100%;
            padding: 0.9rem 1rem;
            border: none;
            border-radius: 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s;
            margin-top: 0.5rem;
            color: var(--btn-text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .login-btn {
            background: var(--btn-login-bg);
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
        }
        .login-btn:hover:not(:disabled) {
            background: var(--btn-login-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.25);
        }
        .register-btn {
            background: var(--btn-register-bg);
            box-shadow: 0 2px 4px rgba(245, 158, 11, 0.2);
        }
        .register-btn:hover:not(:disabled) {
            background: var(--btn-register-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(245, 158, 11, 0.25);
        }
        .action-btn:active {
            transform: translateY(1px);
        }
        .action-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 0.75rem 1rem;
            border-radius: 1.25rem;
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 1rem;
            text-align: center;
            word-break: break-word;
            transition: all 0.2s;
        }
        .error-message:empty {
            display: none;
        }

        .optional-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: rgba(100, 116, 139, 0.15);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-left: 0.5rem;
        }
        .input-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .row-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .checkbox-label input {
            width: 1rem;
            height: 1rem;
            margin: 0;
            accent-color: var(--link-color);
        }
        .forgot-link {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .forgot-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 1.5rem;
            border-top: 1px solid var(--separator-color);
            padding-top: 1.2rem;
        }
        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem 1.25rem;
                border-radius: 1.75rem;
            }
            input, .action-btn {
                padding: 0.8rem 1rem;
                font-size: 0.95rem;
            }
            .brand h1 {
                font-size: 1.9rem;
            }
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand">
        <h1>Galmet</h1>
        <p>Your Gaming Platform • secure & seamless</p>
    </div>

    <div class="input-group">
        <div class="input-label">Email address</div>
        <input type="email" id="email" placeholder="hello@galmet.com" autocomplete="email">
    </div>

    <div class="input-group">
        <div class="input-label">Password</div>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">👁️</button>
        </div>
    </div>

    <div class="input-group">
        <div class="input-label">
            <span>Referral code</span>
            <span class="optional-badge">Optional</span>
        </div>
        <input type="text" id="referral" placeholder="Enter invite code (if any)" autocomplete="off">
    </div>

    <div class="row-flex">
        <label class="checkbox-label">
            <input type="checkbox" id="rememberMe"> Remember me
        </label>
        <a href="#" id="forgotPassword" class="forgot-link">Forgot password?</a>
    </div>

    <button class="action-btn login-btn" id="loginBtn">
        <span>Sign in</span>
    </button>
    <button class="action-btn register-btn" id="registerBtn">
        <span>Create account</span>
    </button>

    <div id="error" class="error-message"></div>
    <div class="footer-note">
        🔐 Secure authentication • 500 welcome coins
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { 
        getAuth, 
        createUserWithEmailAndPassword, 
        signInWithEmailAndPassword,
        setPersistence,
        browserLocalPersistence,
        browserSessionPersistence,
        sendPasswordResetEmail,
        onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { 
    getFirestore, 
    doc, 
    setDoc, 
    getDoc,   // ✅ ADD THIS LINE
    collection, 
    query, 
    where, 
    getDocs,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
        authDomain: "galmet-app.firebaseapp.com",
        projectId: "galmet-app",
        storageBucket: "galmet-app.firebasestorage.app",
        messagingSenderId: "900590512024",
        appId: "1:900590512024:web:16a36a085809a728c92ded"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM elements
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const referralInput = document.getElementById("referral");
    const errorDiv = document.getElementById("error");
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");
    const rememberCheckbox = document.getElementById("rememberMe");
    const forgotLink = document.getElementById("forgotPassword");
    const togglePasswordBtn = document.getElementById("togglePassword");

    // Toggle password visibility
    togglePasswordBtn.addEventListener("click", () => {
        const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
        passwordInput.setAttribute("type", type);
        togglePasswordBtn.textContent = type === "password" ? "👁️" : "🙈";
    });

    // Helper: set error message with auto-clear
    function setErrorMsg(msg) {
        errorDiv.innerText = msg || "";
        if (msg) {
            setTimeout(() => {
                if (errorDiv.innerText === msg) errorDiv.innerText = "";
            }, 5000);
        }
    }

    // Helper: set loading state for buttons
    function setButtonLoading(button, isLoading, originalText = null) {
        if (isLoading) {
            button._originalText = button.innerHTML;
            button.disabled = true;
            button.innerHTML = `<span class="spinner"></span><span> ${originalText || button.innerText.trim()}</span>`;
        } else {
            button.disabled = false;
            if (button._originalText) {
                button.innerHTML = button._originalText;
                delete button._originalText;
            } else {
                button.innerHTML = originalText || (button.id === "loginBtn" ? "Sign in" : "Create account");
            }
        }
    }

    function setGlobalLoading(isLoading, activeBtn = null) {
        [loginBtn, registerBtn].forEach(btn => {
            if (btn !== activeBtn) btn.disabled = isLoading;
        });
    }

    function getTrimmedValues() {
        return {
            email: emailInput.value.trim(),
            password: passwordInput.value.trim(),
            referral: referralInput.value.trim()
        };
    }

    // Set persistence based on "Remember me" checkbox
    async function applyPersistence() {
        const persistence = rememberCheckbox.checked ? browserLocalPersistence : browserSessionPersistence;
        await setPersistence(auth, persistence);
    }

    // Generate a unique 8-digit userId (with collision check)
    async function generateUniqueUserId() {
        let attempts = 0;
        const maxAttempts = 5;
        while (attempts < maxAttempts) {
            const userId = Math.floor(10000000 + Math.random() * 90000000); // 8-digit number
            const q = query(collection(db, "users"), where("userId", "==", userId));
            const snapshot = await getDocs(q);
            if (snapshot.empty) {
                return userId;
            }
            attempts++;
        }
        throw new Error("Failed to generate unique user ID. Please try again.");
    }

    // Generate invite code: 2 random uppercase letters + last 4 digits of userId
    function generateInviteCode(userId) {
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const randomLetter = () => letters.charAt(Math.floor(Math.random() * letters.length));
        const twoLetters = randomLetter() + randomLetter();
        const userIdStr = userId.toString();
        const lastFour = userIdStr.slice(-4); // take last 4 digits
        return twoLetters + lastFour; // e.g., "AB1234"
    }

    // ---------- REGISTER with new userId and inviteCode ----------
    async function handleRegister() {
        setErrorMsg("");
        const { email, password, referral } = getTrimmedValues();
        
        if (!email || !password) {
            setErrorMsg("❌ Email and password are required");
            return;
        }
        if (password.length < 6) {
            setErrorMsg("🔒 Password must be at least 6 characters");
            return;
        }

        setButtonLoading(registerBtn, true, "Creating account...");
        setGlobalLoading(true, registerBtn);
        
        try {
            await applyPersistence();

            // 1. Create user in Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 🔥 SIMPLE + FAST (NO FIRESTORE QUERY = NO DELAY)
            const userId = Date.now();
            const inviteCode = Math.random().toString(36).substring(2,8).toUpperCase();
            
            // 4. Self-referral protection
            if (referral && referral === inviteCode) {
                throw new Error("You cannot use your own referral code");
            }

            // 5. Validate referral code if provided
            let referredByUID = "";
            if (referral) {
                const q = query(collection(db, "users"), where("inviteCode", "==", referral));
                const snapshot = await getDocs(q);
                if (!snapshot.empty) {
                    referredByUID = snapshot.docs[0].id;
                } else {
                    throw new Error("Invalid referral code");
                }
            }

            // 6. Store user data in Firestore
            try {
    await setDoc(userRef, {
        email: email,
        coins: 500,
        userId: userId,
        inviteCode: inviteCode,
        referredBy: referredByUID,
        firstTopup: false,
        createdAt: serverTimestamp()
    });

    console.log("✅ FIRESTORE WRITE SUCCESS");

} catch (err) {
    console.error("❌ FIRESTORE ERROR:", err);
}

// 🔥 VERIFY DATA SAVED (VERY IMPORTANT)
let check = null;
for (let i = 0; i < 5; i++) {
    const snap = await getDoc(userRef);
    if (snap.exists()) {
        check = snap.data();
        break;
    }
    await new Promise(r => setTimeout(r, 300));
}

if (!check) {
    throw new Error("Failed to save user data properly");
}

console.log("✅ Data confirmed saved:", check);

// 🚀 NOW SAFE TO REDIRECT
window.location.href = "dashboard.html";
            
        } catch (error) {
            console.error("Registration error:", error);
            let friendlyError = "Registration failed. ";
            if (error.code === "auth/email-already-in-use") {
                friendlyError = "📧 This email is already registered. Try logging in.";
            } else if (error.code === "auth/weak-password") {
                friendlyError = "🔐 Password should be at least 6 characters.";
            } else if (error.code === "auth/invalid-email") {
                friendlyError = "📧 Please enter a valid email address.";
            } else if (error.message === "Invalid referral code") {
                friendlyError = "🔑 Invalid referral code. Please check and try again.";
            } else if (error.message === "You cannot use your own referral code") {
                friendlyError = "⚠️ You cannot refer yourself. Please use someone else's code or leave blank.";
            } else if (error.message.includes("unique user ID")) {
                friendlyError = "⚠️ " + error.message;
            } else {
                friendlyError += error.message;
            }
            setErrorMsg(friendlyError);
        } finally {
            setButtonLoading(registerBtn, false);
            setGlobalLoading(false);
        }
    }

    // ---------- LOGIN ----------
    async function handleLogin() {
        setErrorMsg("");
        const { email, password } = getTrimmedValues();
        
        if (!email || !password) {
            setErrorMsg("❌ Email and password required");
            return;
        }
        
        setButtonLoading(loginBtn, true, "Signing in...");
        setGlobalLoading(true, loginBtn);
        
        try {
            await applyPersistence();
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "dashboard.html";
        } catch (error) {
            console.error("Login error:", error);
            let friendlyError = "Login failed. ";
            if (error.code === "auth/user-not-found") {
                friendlyError = "🔍 No account found with this email. Please register first.";
            } else if (error.code === "auth/wrong-password") {
                friendlyError = "🔑 Incorrect password. Please try again.";
            } else if (error.code === "auth/invalid-email") {
                friendlyError = "📧 Invalid email format.";
            } else if (error.code === "auth/too-many-requests") {
                friendlyError = "⏳ Too many failed attempts. Try again later.";
            } else {
                friendlyError += error.message;
            }
            setErrorMsg(friendlyError);
        } finally {
            setButtonLoading(loginBtn, false);
            setGlobalLoading(false);
        }
    }

    // ---------- Forgot Password ----------
    async function handleForgotPassword() {
        const email = emailInput.value.trim();
        if (!email) {
            setErrorMsg("📧 Please enter your email address first.");
            return;
        }
        try {
            await sendPasswordResetEmail(auth, email);
            setErrorMsg("📨 Reset email sent! Check your inbox.");
            setTimeout(() => {
                if (errorDiv.innerText === "📨 Reset email sent! Check your inbox.") errorDiv.innerText = "";
            }, 4000);
        } catch (error) {
            console.error("Reset error:", error);
            let msg = "Failed to send reset email. ";
            if (error.code === "auth/user-not-found") msg += "No account with this email.";
            else msg += error.message;
            setErrorMsg(msg);
        }
    }

    // ---------- Auth State Redirect ----------
    onAuthStateChanged(auth, (user) => {
    if (user && window.location.pathname.includes("index.html")) {
        window.location.href = "dashboard.html";
    }
});

    // ---------- Event Listeners ----------
    loginBtn.addEventListener("click", (e) => {
        e.preventDefault();
        if (loginBtn.disabled) return;
        handleLogin();
    });
    
    registerBtn.addEventListener("click", (e) => {
        e.preventDefault();
        if (registerBtn.disabled) return;
        handleRegister();
    });
    
    forgotLink.addEventListener("click", (e) => {
        e.preventDefault();
        handleForgotPassword();
    });
    
    // Enter key submission
    const inputs = [emailInput, passwordInput, referralInput];
    inputs.forEach(input => {
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                if (!loginBtn.disabled && emailInput.value.trim() && passwordInput.value.trim()) {
                    handleLogin();
                } else if (!registerBtn.disabled && emailInput.value.trim() && passwordInput.value.trim()) {
                    handleRegister();
                }
            }
        });
    });
    
    // Clear error on focus
    inputs.forEach(inp => {
        inp.addEventListener("focus", () => setErrorMsg(""));
    });
</script>
</body>
</html>
