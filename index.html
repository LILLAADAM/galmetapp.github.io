<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galmet</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b18;
color:white;
text-align:center;
}

.hero{
padding:120px 20px;
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

.hero p{
opacity:0.8;
}

.phone img{
width:300px;
margin-top:40px;
border-radius:30px;
box-shadow:0 0 50px rgba(120,80,255,0.6);
}

.section{
padding:100px 20px;
}

.screens img{
width:250px;
margin:20px;
border-radius:25px;
box-shadow:0 0 40px rgba(130,80,255,0.4);
}

.form-section{
background:#12122a;
padding:80px 20px;
}

input, textarea{
width:300px;
padding:12px;
margin:8px;
border:none;
border-radius:6px;
}

button{
background:linear-gradient(90deg,#6c4cff,#ff5ec4);
color:white;
padding:12px 25px;
border:none;
border-radius:6px;
cursor:pointer;
}

footer{
padding:40px;
opacity:0.6;
}

</style>

</head>

<body>

<section class="hero">

<h1>Galmet</h1>

<p>Connect. Talk. Belong.</p>

<div class="phone">
<img src="splash.png">
</div>

</section>

<section class="section">

<h2>Live Voice Rooms</h2>

<p>Join conversations with people around the world.</p>

</section>

<section class="section screens">

<h2>App Experience</h2>

<img src="login.png">
<img src="otp.png">
<img src="rooms.png">
<img src="voice.png">
<img src="wallet.png">
<img src="profile.png">

</section>

<section class="form-section">

<h2>Join Early Access</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="7adbde9a-5a04-43e7-9fac-b912fa8ad21a">

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message"></textarea>

<br>

<button type="submit">Join Waitlist</button>

</form>

</section>

<footer>

Galmet Application is Under Development

</footer>

</body>
</html>
