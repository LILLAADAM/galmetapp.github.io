<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0d1b6f, #1a237e);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.container {
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* Title */
h1 {
  text-align: center;
  color: white;
  margin-bottom: 25px;
}

/* Inputs */
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

/* Buttons */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  margin-bottom: 12px;
  cursor: pointer;
}

.login {
  background: #66bb6a;
  color: white;
}

.register {
  background: #f39c34;
  color: white;
}

.error {
  color: red;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h1>Galmet</h1>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button class="btn login" onclick="login()">Login</button>
  <button class="btn register" onclick="register()">Register</button>

  <p id="error" class="error"></p>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.1.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.1.1/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
};

/* Init */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* Show error */
function showError(msg){
  document.getElementById("error").innerText = msg;
}

/* REGISTER */
window.register = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    showError("Please fill all fields");
    return;
  }

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);

    const user = userCredential.user; // ✅ FIXED

    let inviteCode = Math.random().toString(36).substring(2,8).toUpperCase();

    await setDoc(doc(db, "users", user.uid), {
      coins: 500,
      email: email,
      inviteCode: inviteCode,
      referredBy: null,
      firstTopup: false
    });

    alert("Account Created!");
    window.location.href = "dashboard.html";

  }catch(e){
    showError(e.message);
  }
}

/* LOGIN */
window.login = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    showError("Please fill all fields");
    return;
  }

  try{
    await signInWithEmailAndPassword(auth, email, pass);

    window.location.href = "dashboard.html";

  }catch(e){
    showError(e.message);
  }
}
</script>

</body>
</html>
