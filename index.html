<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet Login</title>

<style>
body {

input {
    width: 100%;
    padding: 12px;

}

button {

.login-btn {
