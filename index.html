<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galmet Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0a0f3c,#1c2fa3);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
width:300px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:15px;
color:white;
cursor:pointer;
}

.login{background:#4caf50;}
.register{background:#ff9800;}

</style>
</head>

<body>

<div class="box">

<h1>Galmet</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="login" onclick="login()">Login</button>
<button class="register" onclick="register()">Register</button>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
authDomain: "galmet-app.firebaseapp.com",
projectId: "galmet-app",
storageBucket: "galmet-app.firebasestorage.app",
messagingSenderId: "900590512024",
appId: "1:900590512024:web:16a36a085809a728c92ded"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// REGISTER
window.register = async function(){

let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

let user = await createUserWithEmailAndPassword(auth, email, pass);

await setDoc(doc(db, "users", user.user.uid), {
coins: 500
});

alert("Account created!");
}

// LOGIN
window.login = async function(){

let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

await signInWithEmailAndPassword(auth, email, pass);

window.location.href = "dashboard.html";

}

</script>

</body>
</html>
