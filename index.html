<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galmet</title>

<style>

{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#050510,#0b0b25);
color:white;
text-align:center;
}

/ HERO /

.hero{
padding:50px 20px;
}

.hero h1{
font-size:34px;
margin-bottom:8px;
}

.hero p{
opacity:0.8;
font-size:15px;
}

/ FLOATING PHONE /

.phone{
margin-top:30px;
animation:float 4s ease-in-out infinite;
}

.phone img{
width:230px;
max-width:90%;
border-radius:32px;
box-shadow:0 30px 90px rgba(120,80,255,0.5);
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0px)}
}

/ SECTION /

.section{
padding:50px 20px;
}

.section h2{
font-size:22px;
margin-bottom:10px;
}

.section p{
font-size:14px;
opacity:0.75;
}

/ SCREEN CAROUSEL /

.carousel{
display:flex;
overflow-x:auto;
gap:14px;
padding:20px;
scroll-snap-type:x mandatory;
}

.carousel img{
width:180px;
border-radius:20px;
scroll-snap-align:center;
box-shadow:0 20px 60px rgba(120,80,255,0.3);
}

/ CONTACT /

.contact{
background:#0f0f22;
padding:40px 20px;
}

.contact h2{
margin-bottom:15px;
}

input, textarea{
width:100%;
max-width:320px;
padding:10px;
margin:8px auto;
display:block;
border:none;
border-radius:8px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#6c4cff,#ff5ec4);
color:white;
font-size:14px;
cursor:pointer;
}

/ FOOTER /

footer{
padding:25px;
opacity:0.6;
font-size:13px;
}

/ DESKTOP */

@media(min-width:768px){

.hero h1{
font-size:52px;
}

.hero p{
font-size:18px;
}

.phone img{
width:320px;
}

.carousel img{
width:260px;
}

}

</style>

</head>

<body>

<section class="hero">

<h1>Galmet</h1>
<p>Connect. Talk. Belong.</p>

<div class="phone">
<img src="splash.webp">
</div>

</section>

<section class="section">

<h2>Live Voice Rooms</h2>
<p>Join conversations with people around the world.</p>

</section>

<section class="section">

<h2>App Experience</h2>

<div class="carousel">

<img src="login.webp">
<img src="otp.webp">
<img src="rooms.webp">
<img src="voice.webp">
<img src="wallet.webp">
<img src="profile.webp">

</div>

</section>

<section class="contact">

<h2>Join Early Access</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="7adbde9a-5a04-43e7-9fac-b912fa8ad21a">

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" rows="4" placeholder="Your Message"></textarea>

<button type="submit">Send</button>

</form>

</section>

<footer>

Galmet © 2026

</footer>

</body>

</html>
