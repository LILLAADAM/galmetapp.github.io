<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Galmet</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
:root{
  --bg:#f3f7fb;--surf:#fff;--surf2:#ecf1f6;
  --primary:#006571;--tertiary:#b60051;--secondary:#755700;
  --text:#2a2f32;--muted:#575c60;--outline:#73777b;
  --border:#e2e8f0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);overflow-x:hidden;}
.ms{font-family:'Material Symbols Rounded';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none;display:inline-flex;align-items:center;justify-content:center;line-height:1;font-style:normal;}
.ms.f{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
.hide-scroll{scrollbar-width:none;-ms-overflow-style:none;}
.hide-scroll::-webkit-scrollbar{display:none;}

/* TOP BAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:10px 16px;padding-top:max(env(safe-area-inset-top),10px);}
#balance-pill{display:flex;align-items:center;gap:5px;background:var(--surf2);border:1px solid var(--border);border-radius:99px;padding:5px 12px;}
#balance-pill .ms{font-size:16px;color:var(--primary);}
#balance-val{font-size:11px;font-weight:800;color:var(--text);}
#balance-lbl{font-size:11px;font-weight:700;color:var(--muted);}
.tb-right{display:flex;gap:6px;align-items:center;}
.tb-btn{width:32px;height:32px;border-radius:50%;background:rgba(0,101,113,.08);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.tb-btn .ms{font-size:18px;color:var(--primary);}

/* MAIN */
#main{padding-top:60px;padding-bottom:calc(72px + max(env(safe-area-inset-bottom),0px) + 60px);}

/* FILTER TABS */
.filter-tabs{display:flex;gap:20px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:54px;z-index:40;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{font-size:13px;font-weight:700;color:var(--muted);padding-bottom:6px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;}
.ftab.act{color:var(--primary);border-bottom-color:var(--primary);}

/* BANNER */
.banner-wrap{overflow-x:auto;display:flex;scroll-snap-type:x mandatory;margin-bottom:16px;}
.banner-wrap::-webkit-scrollbar{display:none;}
.banner-slide{min-width:100%;height:96px;position:relative;scroll-snap-align:start;flex-shrink:0;overflow:hidden;}
.banner-slide img{width:100%;height:100%;object-fit:cover;}
.banner-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.72) 0%,rgba(0,0,0,.25) 60%,transparent 100%);}
.banner-txt{position:absolute;left:16px;top:50%;transform:translateY(-50%);}
.banner-txt h3{color:#fff;font-size:13px;font-weight:900;line-height:1.3;}
.banner-btn{display:inline-block;margin-top:6px;background:var(--secondary);color:#fff;font-size:8px;font-weight:900;padding:3px 8px;text-transform:uppercase;letter-spacing:.08em;border:none;cursor:pointer;font-family:inherit;}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;}
.sec-title{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;display:flex;align-items:center;gap:6px;}
.sec-count{font-size:9px;color:var(--outline);}

/* RISING STARS */
#rising-scroll{display:flex;gap:14px;overflow-x:auto;padding:0 16px 8px;}
#rising-scroll::-webkit-scrollbar{display:none;}
.rs-card{flex-shrink:0;width:56px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;}
.rs-ring{width:56px;height:56px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--primary),var(--tertiary));position:relative;}
.rs-ring .rs-img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid #fff;}
.rs-live-dot{position:absolute;top:-2px;right:-2px;width:12px;height:12px;background:#ef4444;border:2px solid #fff;border-radius:50%;animation:pulse .9s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5);}50%{box-shadow:0 0 0 5px rgba(239,68,68,0);}}
.rs-name{font-size:9.5px;font-weight:700;color:var(--text);text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* REGION FILTER */
.region-row{display:flex;gap:6px;overflow-x:auto;padding:0 16px 8px;}
.region-row::-webkit-scrollbar{display:none;}
.rgn-btn{padding:5px 14px;font-size:10px;font-weight:800;letter-spacing:.08em;border:none;cursor:pointer;font-family:inherit;border-radius:0;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.rgn-btn.act{background:var(--primary);color:#fff;}
.rgn-btn:not(.act){background:#f0f4f8;color:var(--muted);}

/* LIVES GRID */
#lives-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#d1d5db;}
.live-card{position:relative;aspect-ratio:3/4;overflow:hidden;cursor:pointer;background:#e5e7eb;}
.live-card img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.live-card:active img{transform:scale(1.03);}
.live-grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,transparent 35%,transparent 55%,rgba(0,0,0,.85) 100%);}
.live-top{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;}
.live-badge-red{background:#ef4444;color:#fff;font-size:7px;font-weight:900;padding:2px 5px;display:flex;align-items:center;gap:3px;width:fit-content;}
.live-badge-red span.dot{width:4px;height:4px;background:#fff;border-radius:50%;animation:pulse .9s infinite;}
.live-lvl-badge{font-size:7.5px;font-weight:900;padding:2px 6px;border-radius:99px;color:#fff;width:fit-content;}
/* Level colours from backend */
.lvl-0{background:linear-gradient(135deg,#9ca3af,#6b7280);}
.lvl-1{background:linear-gradient(135deg,#a7f3d0,#34d399);color:#065f46!important;}
.lvl-2{background:linear-gradient(135deg,#99f6e4,#2dd4bf);color:#134e4a!important;}
.lvl-3{background:linear-gradient(135deg,#93c5fd,#3b82f6);}
.lvl-4{background:linear-gradient(135deg,#c4b5fd,#8b5cf6);}
.lvl-5{background:linear-gradient(135deg,#f0abfc,#d946ef);}
.lvl-6{background:linear-gradient(135deg,#fbcfe8,#f472b6);color:#831843!important;}
.lvl-7{background:linear-gradient(135deg,#fecaca,#ef4444);}
.lvl-8{background:linear-gradient(135deg,#fed7aa,#f97316);}
.lvl-9{background:linear-gradient(135deg,#fde68a,#f59e0b);color:#78350f!important;}
.lvl-10{background:linear-gradient(135deg,#fef08a,#eab308);color:#713f12!important;}
.live-flag{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.38);padding:2px 5px;font-size:10px;}
.live-btm{position:absolute;bottom:8px;left:8px;right:36px;}
.live-uname{color:#fff;font-size:11.5px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.live-title{color:rgba(255,255,255,.7);font-size:9px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.live-vcall-btn{position:absolute;bottom:8px;right:8px;width:28px;height:28px;background:var(--primary);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:2px;}
.live-vcall-btn .ms{font-size:16px;color:#fff;}
.live-empty{grid-column:1/-1;padding:48px;text-align:center;background:#fff;}
.live-empty p{font-size:13px;color:var(--outline);}

/* GO LIVE BUTTON */
#go-live-wrap{position:fixed;bottom:calc(72px + max(env(safe-area-inset-bottom),0px));left:50%;transform:translateX(-50%);z-index:48;}
#go-live-btn{background:linear-gradient(135deg,#ef4444,#ec4899);color:#fff;border:none;border-radius:99px;padding:12px 28px;font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:7px;cursor:pointer;font-family:inherit;box-shadow:0 6px 20px rgba(239,68,68,.35),0 2px 8px rgba(0,0,0,.15);transition:transform .13s;}
#go-live-btn:active{transform:scale(.95);}
#go-live-btn .ms{font-size:18px;}

/* BOTTOM NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:max(env(safe-area-inset-bottom),8px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0;}
.nav-item .ms{font-size:24px;color:var(--muted);}
.nav-item.act .ms{color:var(--primary);}
.nav-item span.nl{font-size:9.5px;font-weight:700;color:var(--muted);}
.nav-item.act span.nl{color:var(--primary);}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="balance-pill">
    <span class="ms f" id="balance-icon">monetization_on</span>
    <span id="balance-val">0</span>
    <span id="balance-lbl">Coins</span>
  </div>
  <div class="tb-right">
    <button class="tb-btn" onclick="location.href='invitesrank.html'"><span class="ms">trophy</span></button>
    <button class="tb-btn" onclick="location.href='chats.html'"><span class="ms">chat_bubble</span></button>
  </div>
</div>

<div id="main">
  <!-- FILTER TABS -->
  <div class="filter-tabs">
    <div class="ftab act">Popular</div>
    <div class="ftab">New</div>
    <div class="ftab">For You</div>
  </div>

  <!-- BANNER -->
  <div class="banner-wrap">
    <div class="banner-slide">
      <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGQy2tG8boynppF4-SdmUIA6Jbd5zPAxfMopCDz0A67AZmZC6LXfZh7iXVnmk6YuvYzmoF2pM96uKY9IquY62hJzzoc8692ayS1qEkw0OW9NUJRYBVoTd2uNL6kEI0zXIj3RUaRnVxuDVuC61qYCgY8PIYm1CFDf_h3lqCUDLik-hjT6FpDwZlrlxuNiBAHJeVAjUlVsXRih6qfEsRKPtTGROVrFChcE-eSv8fw1ORRHmYGWI8IpyASfrGvJgupjhfpOTcgBWEPraZ" alt="">
      <div class="banner-grad"></div>
      <div class="banner-txt">
        <h3>To be Agent<br>To be Millionaire</h3>
        <button class="banner-btn" onclick="location.href='invitesrank.html'">Join Now</button>
      </div>
    </div>
    <div class="banner-slide" style="background:linear-gradient(135deg,#006571,#00b4c5);">
      <div class="banner-grad" style="background:none;"></div>
      <div class="banner-txt">
        <h3 style="color:#fff;">Summer Carnival<br>Gifts &amp; Rewards</h3>
        <button class="banner-btn" style="background:#fff;color:var(--primary);" onclick="alert('Coming soon')">View Rules</button>
      </div>
    </div>
  </div>

  <!-- RISING STARS -->
  <div class="sec-hdr">
    <div class="sec-title"><span class="ms f" style="font-size:16px;color:var(--tertiary);">stars</span> Rising Stars</div>
    <span class="sec-count" id="rising-count">0 live</span>
  </div>
  <div id="rising-scroll"><p style="font-size:12px;color:var(--outline);padding:4px 0;">No live users</p></div>

  <!-- REGION FILTER -->
  <div class="region-row" style="margin-top:8px;">
    <button class="rgn-btn act" onclick="filterRegion(null,this)">ALL</button>
    <button class="rgn-btn" onclick="filterRegion('AE',this)">🇦🇪 UAE</button>
    <button class="rgn-btn" onclick="filterRegion('IN',this)">🇮🇳 India</button>
    <button class="rgn-btn" onclick="filterRegion('SA',this)">🇸🇦 KSA</button>
    <button class="rgn-btn" onclick="filterRegion('PK',this)">🇵🇰 PK</button>
    <button class="rgn-btn" onclick="filterRegion('TR',this)">🇹🇷 Turkey</button>
    <button class="rgn-btn" onclick="filterRegion('EG',this)">🇪🇬 Egypt</button>
  </div>

  <!-- LIVE GRID -->
  <div id="lives-grid">
    <div class="live-empty"><p>Loading lives…</p></div>
  </div>
</div>

<!-- GO LIVE -->
<div id="go-live-wrap">
  <button id="go-live-btn" onclick="goLive()">
    <span class="ms f">fiber_manual_record</span> GO LIVE
  </button>
</div>

<!-- BOTTOM NAV -->
<nav id="nav">
  <div class="nav-item act">
    <span class="ms f">home</span><span class="nl">Home</span>
  </div>
  <div class="nav-item" onclick="location.href='party.html'">
    <span class="ms">sports_esports</span><span class="nl">Party</span>
  </div>
  <div class="nav-item" onclick="location.href='chats.html'">
    <span class="ms">chat_bubble</span><span class="nl">Chats</span>
  </div>
  <div class="nav-item" onclick="location.href='ownprofile.html'">
    <span class="ms">person</span><span class="nl">Me</span>
  </div>
</nav>

<script>
var FBC={apiKey:"AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",authDomain:"galmet-app.firebaseapp.com",projectId:"galmet-app",storageBucket:"galmet-app.firebasestorage.app"};
if(!firebase.apps.length)firebase.initializeApp(FBC);
var db=firebase.firestore();

var CU=JSON.parse(localStorage.getItem("user")||"null");
if(!CU||!CU.userId){location.replace("login.html");}
var ME=String(CU.userId);

var allLives=[], regionFilter=null;

// Level helpers — matches backend exactly
function getCharmLevel(g){if(g<10000)return 0;if(g<30000)return 1;if(g<100000)return 2;if(g<300000)return 3;if(g<1000000)return 4;if(g<3000000)return 5;if(g<10000000)return 6;if(g<30000000)return 7;if(g<100000000)return 8;if(g<300000000)return 9;return 10;}
function getWealthLevel(t){if(t<4000)return 0;if(t<30000)return 1;if(t<100000)return 2;if(t<300000)return 3;if(t<1000000)return 4;if(t<3000000)return 5;if(t<10000000)return 6;if(t<30000000)return 7;if(t<100000000)return 8;if(t<300000000)return 9;return 10;}
function getHighestLevel(data){
  var cl=data.charmLevel||getCharmLevel(Math.max(data.monthlyGems||0,data.lastMonthGems||0));
  var wl=data.wealthLevel||getWealthLevel(data.totalTopup||0);
  return Math.max(cl,wl);
}
function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}

// Country code → flag emoji
function codeToFlag(code){
  if(!code)return '';
  try{return code.toUpperCase().split('').map(c=>String.fromCodePoint(c.charCodeAt(0)+127397)).join('');}catch(e){return '';}
}
// Get flag from user data
function getUserFlag(userData){
  if(!userData)return '';
  if(userData.countryCode)return codeToFlag(userData.countryCode);
  if(userData.country&&typeof userData.country==='object'&&userData.country.flag)return userData.country.flag;
  if(userData.country&&typeof userData.country==='object'&&userData.country.code)return codeToFlag(userData.country.code);
  return '';
}
// Get country code from user data
function getUserCountryCode(userData){
  if(!userData)return '';
  if(userData.countryCode)return userData.countryCode;
  if(userData.country&&typeof userData.country==='object'&&userData.country.code)return userData.country.code;
  return '';
}

// BALANCE real-time
db.doc('users/'+ME).onSnapshot(function(snap){
  if(!snap.exists)return;
  var d=snap.data();
  var coins=d.coins||0, gems=d.gems||0;
  var icon=document.getElementById('balance-icon');
  var val=document.getElementById('balance-val');
  var lbl=document.getElementById('balance-lbl');
  if(d.gender==='female'){
    icon.textContent='diamond';icon.style.color='#ec4899';
    val.textContent=gems.toLocaleString();lbl.textContent='Gems';
  } else {
    icon.textContent='monetization_on';icon.style.color='';
    val.textContent=coins.toLocaleString();lbl.textContent='Coins';
  }
});

// LIVE STREAMS real-time
db.collection('lives').onSnapshot(function(snap){
  allLives=[];
  snap.forEach(function(d){
    var dd=d.data();
    if(dd.status==='live')allLives.push({id:d.id,...dd});
  });
  renderGrid();
  renderRising();
});

// Fetch user live level from users collection
var userLevelCache={};
function getUserLevelData(userId,cb){
  if(userLevelCache[userId]){cb(userLevelCache[userId]);return;}
  db.doc('users/'+userId).get().then(function(snap){
    var d=snap.exists?snap.data():{};
    userLevelCache[userId]=d;
    cb(d);
  }).catch(function(){cb({});});
}

function renderGrid(){
  var grid=document.getElementById('lives-grid');
  var lives=regionFilter?allLives.filter(function(l){return getUserCountryCode(l)===regionFilter;}):allLives;
  if(lives.length===0){grid.innerHTML='<div class="live-empty"><p>No live streams right now 📡</p></div>';return;}
  grid.innerHTML='';
  lives.forEach(function(live){
    var uid=live.userId||live.id;
    var card=document.createElement('div');
    card.className='live-card';
    card.onclick=function(){joinLive(live.roomId);};
    var ava=live.photoURL||('https://ui-avatars.com/api/?name='+encodeURIComponent(live.username||'L')+'&background=006571&color=fff&size=400');
    var bg=live.posterURL||ava;
    var flag=getUserFlag(live)||'';
    var lv=Math.max(live.charmLevel||0,live.wealthLevel||0);
    var isBusy=live.onCall===true;
    card.innerHTML=
      '<img src="'+esc(bg)+'" onerror="this.src=\''+esc(ava)+'\'" loading="lazy">'+
      '<div class="live-grad"></div>'+
      '<div class="live-top">'+
        '<div class="live-badge-red" style="background:'+(isBusy?'#f97316':'#ef4444')+'"><span class="dot"></span>'+(isBusy?'BUSY':'LIVE')+'</div>'+
        '<div class="live-lvl-badge lvl-'+Math.min(lv,10)+'">Lv '+lv+'</div>'+
      '</div>'+
      (flag?'<div class="live-flag">'+flag+'</div>':'')+
      '<div class="live-btm">'+
        '<div class="live-uname">'+esc(live.username||'Live')+'</div>'+
        (live.title?'<div class="live-title">'+esc(live.title)+'</div>':'')+
      '</div>'+
      '<button class="live-vcall-btn" title="Video Call"><span class="ms f">video_call</span></button>';
    // Wire call button
    card.querySelector('.live-vcall-btn').onclick=function(e){
      e.stopPropagation();
      startVideoCall(uid, live.roomId);
    };
    // Fetch real level from users collection and update badge
    getUserLevelData(uid,function(userData){
      var realLv=getHighestLevel(userData);
      var badge=card.querySelector('.live-lvl-badge');
      if(badge){badge.className='live-lvl-badge lvl-'+Math.min(realLv,10);badge.textContent='Lv '+realLv;}
    });
    grid.appendChild(card);
  });
}

function renderRising(){
  var container=document.getElementById('rising-scroll');
  var count=document.getElementById('rising-count');
  count.textContent=allLives.length+' live';
  if(allLives.length===0){container.innerHTML='<p style="font-size:12px;color:var(--outline);padding:4px 0;">No live users right now</p>';return;}
  container.innerHTML='';
  var shuffled=allLives.slice().sort(function(){return Math.random()-.5;}).slice(0,12);
  shuffled.forEach(function(live){
    var uid=live.userId||live.id;
    var ava=live.photoURL||('https://ui-avatars.com/api/?name='+encodeURIComponent(live.username||'L')+'&background=006571&color=fff');
    var flag=getUserFlag(live)||'';
    var div=document.createElement('div');
    div.className='rs-card';
    div.onclick=function(){joinLive(live.roomId);};
    div.innerHTML=
      '<div class="rs-ring"><img class="rs-img" src="'+esc(ava)+'" loading="lazy"><div class="rs-live-dot"></div></div>'+
      '<div class="rs-name">'+(flag?flag+' ':'')+esc(live.username||'Live')+'</div>';
    container.appendChild(div);
  });
}

window.filterRegion=function(code,btn){
  regionFilter=code;
  document.querySelectorAll('.rgn-btn').forEach(function(b){b.classList.remove('act');});
  btn.classList.add('act');
  renderGrid();
};

window.joinLive=function(roomId){
  location.href='live.html?room='+roomId;
};

// Video call from dashboard → go to live room and auto-request call
window.startVideoCall=function(hostUserId, roomId){
  // Check if host is in a live session
  db.doc('users/'+hostUserId).get().then(function(snap){
    if(!snap.exists){alert('User not found');return;}
    var d=snap.data();
    // Go to live room and auto-start call
    location.href='live.html?room='+roomId+'&startcall=1&hostId='+hostUserId;
  });
};

window.goLive=async function(){
  try{
    await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    location.href='createlive.html';
  }catch(e){
    alert('Camera/Microphone permission required to go live');
  }
};

// Online presence
db.doc('users/'+ME).update({online:true}).catch(function(){});
window.addEventListener('beforeunload',function(){
  db.doc('users/'+ME).update({online:false}).catch(function(){});
});
</script>
</body>
</html>
