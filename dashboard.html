<!-- Withdraw Panel (hidden) -->
<div id="withdrawPanel" class="fixed bottom-28 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-surface-container-lowest rounded-2xl p-5 border border-outline-variant/30 shadow-xl z-50 hidden">
  <h3 class="font-headline font-bold text-on-surface">Withdraw Coins</h3>
  <p class="text-xs text-on-surface-variant mt-1">Minimum 65,000 coins (10 USDT) • TRC20 only</p>
  <input id="withdrawAmount" type="number" placeholder="Amount (coins)" class="w-full mt-3 bg-surface-container-high rounded-xl px-4 py-3 text-on-surface border-none focus:ring-2 focus:ring-primary">
  <input id="withdrawWallet" placeholder="TRC20 USDT Wallet Address" class="w-full mt-3 bg-surface-container-high rounded-xl px-4 py-3 text-on-surface border-none focus:ring-2 focus:ring-primary">
  <button onclick="submitWithdraw()" class="w-full bg-primary text-on-primary font-bold py-3 rounded-full mt-4 active:scale-95 transition">Submit Withdraw</button>
  <button onclick="loadWithdrawHistory()" class="w-full text-primary font-bold text-sm mt-3 underline">View Withdraw History</button>
  <div id="withdrawHistory" class="mt-3 text-sm text-on-surface-variant"></div>
  <button onclick="toggleWithdraw()" class="w-full mt-2 text-error text-sm font-bold">Close</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, updateDoc, collection, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app"
  });
  const db = getFirestore(app);

  const localUser = JSON.parse(localStorage.getItem("user"));
  if (!localUser || !localUser.userId) window.location.replace("login.html");
  const userIdStr = localUser.userId.toString();
  const userRef = doc(db, "users", userIdStr);
  let unsubscribeSnapshot = null;

  // ==================== BALANCE & GENDER ====================
  function startRealtimeDashboard() {
    updateDoc(userRef, { online: true }).catch(() => {});
    unsubscribeSnapshot = onSnapshot(userRef, (snap) => {
      if (!snap.exists()) return;
      const d = snap.data();
      const gender = d.gender;
      const coins = d.coins ?? 0;
      const gems = d.gems ?? 0;
      const balanceIcon = document.getElementById("balanceIcon");
      const balanceValue = document.getElementById("balanceValue");
      const balanceLabel = document.getElementById("balanceLabel");

      if (gender === 'male') {
        balanceIcon.innerText = "monetization_on";
        balanceIcon.classList.remove("text-red-400");
        balanceValue.innerText = coins.toLocaleString();
        balanceLabel.innerText = "Coins";
      } else if (gender === 'female') {
        balanceIcon.innerText = "diamond";
        balanceIcon.classList.add("text-red-400");
        balanceValue.innerText = gems.toLocaleString();
        balanceLabel.innerText = "Gems";
      } else {
        balanceIcon.innerText = "monetization_on";
        balanceIcon.classList.remove("text-red-400");
        balanceValue.innerText = coins.toLocaleString();
        balanceLabel.innerText = "Coins";
      }
    });
  }
  startRealtimeDashboard();

  // ==================== LIVE STREAMS (REAL TIME) ====================
  const livesRef = collection(db, "lives");
  onSnapshot(livesRef, (snapshot) => {
    const container = document.getElementById("liveStreamsContainer");
    const liveCountSpan = document.getElementById("liveCount");
    const liveStreams = [];
    snapshot.forEach(docSnap => {
      const live = docSnap.data();
      if (live.status === "live") {
        liveStreams.push(live);
      }
    });
    liveCountSpan.innerText = `${liveStreams.length} active`;
    if (liveStreams.length === 0) {
      container.innerHTML = '<p class="text-xs text-outline">No live streams at the moment</p>';
      return;
    }
    container.innerHTML = "";
    liveStreams.forEach(live => {
      const card = document.createElement("div");
      card.className = "flex flex-col items-center gap-1 min-w-[70px] cursor-pointer";
      card.onclick = () => joinLive(live.roomId);
      card.innerHTML = `
        <div class="relative w-14 h-14">
          <div class="absolute -top-1 left-0 z-10 w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
          <div class="w-full h-full rounded-full p-[2px] bg-gradient-to-tr from-red-500 to-pink-500">
            <div class="w-full h-full rounded-full border border-background overflow-hidden bg-surface-container">
              <img class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=${encodeURIComponent(live.username)}&background=006571&color=fff">
            </div>
          </div>
        </div>
        <span class="text-[10px] font-bold text-on-surface truncate w-full text-center">${live.username}</span>
      `;
      container.appendChild(card);
    });
  });

  // ==================== CREATE LIVE (Go Live) ====================
  window.createLive = async () => {
    const user = JSON.parse(localStorage.getItem("user"));
    const userId = user.userId.toString();
    const username = user.username || "User";

    // Ask camera + microphone permission first
    try {
      await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    } catch (e) {
      alert("Camera / Microphone permission denied ❌");
      return;
    }

    const roomId = "room_" + userId;

    // Save live to Firestore
    await setDoc(doc(db, "lives", userId), {
      userId: userId,
      username: username,
      roomId: roomId,
      status: "live",
      createdAt: new Date()
    });

    // Redirect to live page as host
    window.location.href = `live.html?room=${roomId}&host=true`;
  };

  // ==================== JOIN LIVE ====================
  window.joinLive = (roomId) => {
    window.location.href = `live.html?room=${roomId}`;
  };

  // ==================== OTHER FUNCTIONS ====================
  window.addEventListener("beforeunload", () => {
    if (unsubscribeSnapshot) unsubscribeSnapshot();
    updateDoc(userRef, { online: false }).catch(() => {});
  });

  window.toggleWithdraw = () => {
    document.getElementById("withdrawPanel").classList.toggle("hidden");
  };
  window.submitWithdraw = () => {
    const amount = document.getElementById("withdrawAmount").value;
    const wallet = document.getElementById("withdrawWallet").value;
    if (!amount || amount < 65000) { alert("Minimum 65,000 coins"); return; }
    if (!wallet.startsWith("T") || wallet.length < 30) { alert("Invalid TRC20 wallet"); return; }
    alert(`Withdraw request for ${amount} coins sent`);
  };
  window.loadWithdrawHistory = () => {
    document.getElementById("withdrawHistory").innerHTML = "📜 Coming soon...";
  };
</script>
</body>
