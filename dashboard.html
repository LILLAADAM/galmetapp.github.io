<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f1b5c,#1f2f9c);
    color: white;
}

.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.3);
}

.container {
    padding:20px;
}

.card {
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
}

.coins {
    font-size:32px;
    color:#00ffcc;
}

.uid {
    font-size:12px;
    color:#ccc;
}

.btn {
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

.logout { background:red; color:white; }

.game {
    background:#222;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

.invite {
    background:#16a085;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="header">
    <div>Galmet</div>
    <button class="btn logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">
    <h3>User</h3>
    <div id="email"></div>
    <div class="uid">UID: <span id="uid"></span></div>
</div>

<div class="card">
    <h3>Coins</h3>
    <div class="coins" id="coins">0</div>
</div>

<div class="card">
    <h3>Invite & Earn</h3>
    <div>Your Code: <b id="inviteCode"></b></div>
    <div class="invite">Invite users → get 100 coins after first top-up</div>
</div>

<div class="card">
    <h3>Games</h3>

    <div class="game">🎯 Spin Wheel (Coming next)</div>
    <div class="game">🎮 Scratch Card (Coming next)</div>
    <div class="game">🎲 Dice Game (Coming next)</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app",
  messagingSenderId: "900590512024",
  appId: "1:900590512024:web:16a36a085809a728c92ded"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

    if(!user){
        window.location.href="index.html";
        return;
    }

    document.getElementById("email").innerText = user.email;
    document.getElementById("uid").innerText = user.uid;

    const userRef = doc(db, "users", user.uid);

    // REAL-TIME COINS UPDATE 🔥
    onSnapshot(userRef, (docSnap) => {
        if(docSnap.exists()){
            let data = docSnap.data();
            document.getElementById("coins").innerText = data.coins || 0;
            document.getElementById("inviteCode").innerText = data.inviteCode || "N/A";
        }
    });

});

window.logout = function(){
    signOut(auth);
    window.location.href="index.html";
}

</script>

</body>
</html>
