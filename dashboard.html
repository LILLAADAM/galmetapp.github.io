<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f1b5c,#1f2f9c);
    color: white;
}

.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.3);
    font-weight:600;
}

.container {
    padding:15px;
}

/* cards /
.card {
    background: rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

/ coins /
.coins {
    font-size:28px;
    color:#00ffcc;
}

/ invite /
.invite-box {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.copy-btn {
    background:#f39c12;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    color:white;
}

/ games /
.games {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.game {
    background:#222;
    padding:15px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
}

.game:hover {
    transform:scale(1.05);
}

.coming {
    opacity:0.6;
}

/ logout */
.logout {
    background:red;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div>Galmet</div>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- USER -->
<div class="card">
    <div><b>Email:</b> <span id="email"></span></div>
    <div style="font-size:12px;opacity:0.7;">UID: <span id="uid"></span></div>
</div>

<!-- COINS -->
<div class="card">
    <div>Your Coins</div>
    <div class="coins" id="coins">0</div>
</div>

<!-- INVITE -->
<div class="card">
    <div><b>Invite & Earn</b></div>
    <div class="invite-box">
        <span id="inviteCode">---</span>
        <button class="copy-btn" onclick="copyCode()">Copy</button>
    </div>
    <div style="font-size:12px;margin-top:5px;">
        Invite users & earn rewards
    </div>
</div>

<!-- GAMES -->
<div class="card">
    <div><b>Games</b></div>

    <div class="games">
        <div class="game" onclick="goGame('spin.html')">
            🎯 Spin Wheel
        </div>

        <div class="game" onclick="goGame('lucky.html')">
            🍀 Lucky Game
        </div>

        <div class="game coming">
            🏁 Race (Coming Soon)
        </div>

        <div class="game coming">
            🎮 More Games
        </div>
    </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// CHECK LOGIN
onAuthStateChanged(auth, (user) => {

    if(!user){
        window.location.href = "index.html";
        return;
    }

    document.getElementById("email").innerText = user.email;
    document.getElementById("uid").innerText = user.uid;

    // REAL TIME 🔥
    const ref = doc(db, "users", user.uid);

    onSnapshot(ref, (docSnap) => {
        if(docSnap.exists()){
            const data = docSnap.data();

            document.getElementById("coins").innerText = data.coins || 0;
            document.getElementById("inviteCode").innerText = data.inviteCode || "---";
        }
    });

});

// LOGOUT
window.logout = function(){
    signOut(auth);
    window.location.href = "index.html";
}

// COPY CODE
window.copyCode = function(){
    const code = document.getElementById("inviteCode").innerText;
    navigator.clipboard.writeText(code);
    alert("Copied: " + code);
}

// OPEN GAME
window.goGame = function(page){
    window.location.href = page;
}

</script>

</body>
</html>
