<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet Dashboard</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f1b5c,#1f2f9c);
    color:white;
}

.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.3);
    font-size:18px;
    font-weight:bold;
}

.logout {
    background:red;
    border:none;
    padding:6px 12px;
    border-radius:8px;
    color:white;
}

.container {
    padding:15px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.user-id {
    color:#00ffcc;
    font-size:18px;
    font-weight:bold;
}

.email {
    font-size:16px;
    font-weight:600;
}

.coins {
    font-size:32px;
    font-weight:bold;
    color:#00ffcc;
}

.invite-box {
    display:flex;
    justify-content:space-between;
    background:#111;
    padding:10px;
    border-radius:10px;
}

.copy-btn {
    background:#f39c12;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    color:white;
}

.games {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.game {
    background:#1a1a1a;
    padding:15px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

.game:hover {
    background:#333;
}

.coming {
    opacity:0.5;
}

.title {
    font-size:18px;
    margin-bottom:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    Galmet Dashboard
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">
    <div class="title">Welcome Back 👋</div>
    <div class="email" id="email"></div>
    <div class="user-id">User ID: <span id="userId">Loading...</span></div>
</div>

<div class="card">
    <div class="title">Your Balance 💰</div>
    <div class="coins" id="coins">0</div>
</div>

<div class="card">
    <div class="title">Invite & Earn 🎁</div>
    <div class="invite-box">
        <span id="inviteCode">---</span>
        <button class="copy-btn" onclick="copyCode()">Copy</button>
    </div>
    <div style="margin-top:8px;font-size:13px;">
        Invite friends & earn rewards instantly 🚀
    </div>
</div>

<div class="card">
    <div class="title">Play Games 🎮</div>

    <div class="games">
        <div class="game" onclick="goGame('spin.html')">🎯 Spin Wheel</div>
        <div class="game" onclick="goGame('lucky.html')">🍀 Lucky Game</div>

        <div class="game coming">🏁 Race<br>Coming Soon</div>
        <div class="game coming">🎮 More<br>Coming Soon</div>
    </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app",
  messagingSenderId: "900590512024",
  appId: "1:900590512024:web:16a36a085809a728c92ded"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ LOAD USER DATA
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        setTimeout(() => {
            window.location.href = "index.html";
        }, 500);
        return;
    }

    const ref = doc(db, "users", user.uid);

    try {

        // ✅ RETRY SYSTEM (FIXED)
        let snap;
        let attempts = 0;

        while (attempts < 5) {
            snap = await getDoc(ref);

            if (snap.exists()) break;

            console.log("⏳ Waiting for Firestore...");
            await new Promise(r => setTimeout(r, 400));
            attempts++;
        }

        if (!snap.exists()) {
            console.error("❌ Data not ready yet");
            return;
        }

        const data = snap.data();

        document.getElementById("email").innerText = data.email || "-";
        document.getElementById("coins").innerText = data.coins ?? 0;
        document.getElementById("inviteCode").innerText = data.inviteCode || "-";
        document.getElementById("userId").innerText = data.userId || "Not Assigned";

    } catch (err) {
        console.error("Error:", err);
    }

});
    // OPEN BOX
window.openWithdraw = function(){
    document.getElementById("withdrawBox").style.display = "block";
};

// SUBMIT WITHDRAW
window.submitWithdraw = async function(){

    const amount = document.getElementById("withdrawAmount").value;
    const wallet = document.getElementById("withdrawWallet").value;

    if(!amount || !wallet){
        alert("Enter all fields");
        return;
    }

    try{

        const userData = await fetchUserData();

        const res = await fetch("https://createwithdraw-k3vzdssfra-uc.a.run.app",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                userId: userData.userId,
                amount: amount,
                wallet: wallet
            })
        });

        const data = await res.json();

        if(data.success){
            alert("Withdraw request submitted ✅");
            document.getElementById("withdrawBox").style.display = "none";
        }else{
            alert(data.error || "Error");
        }

    }catch(e){
        alert("Request failed");
    }
};

// LOGOUT
window.logout = function(){
    signOut(auth).then(()=>{
        window.location.href = "index.html";
    });
}

// COPY
window.copyCode = function(){
    const code = document.getElementById("inviteCode").innerText;
    navigator.clipboard.writeText(code);
    alert("Copied: " + code);
}

// GAME
window.goGame = function(page){
    window.location.href = page;
}
    
</script>

    <button onclick="window.location.href='topup.html'">
💳 Top Up
</button>

    <button onclick="openWithdraw()" style="
  background:#ff3b30;
  padding:12px;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
  width:100%;
  margin-top:10px;
">
💸 Withdraw Coins
</button>

    <div id="withdrawBox" style="
  display:none;
  background:#111;
  padding:20px;
  border-radius:10px;
  margin-top:15px;
">

  <h3>Withdraw</h3>

  <input id="withdrawAmount" placeholder="Amount (coins)" style="
    width:100%;
    padding:10px;
    margin-bottom:10px;
  ">

  <input id="withdrawWallet" placeholder="Your Wallet Address" style="
    width:100%;
    padding:10px;
    margin-bottom:10px;
  ">

  <button onclick="submitWithdraw()" style="
    background:#4cd964;
    padding:12px;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    width:100%;
  ">
    Submit Withdraw
  </button>

</div>
