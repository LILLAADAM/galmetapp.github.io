<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet Dashboard</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f1b5c,#1f2f9c);
    color:white;
}

.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.3);
    font-size:18px;
    font-weight:bold;
}

.logout {
    background:red;
    border:none;
    padding:6px 12px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.container {
    padding:15px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.user-id {
    color:#00ffcc;
    font-size:18px;
    font-weight:bold;
}

.email {
    font-size:16px;
    font-weight:600;
}

.coins {
    font-size:32px;
    font-weight:bold;
    color:#00ffcc;
}

.invite-box {
    display:flex;
    justify-content:space-between;
    background:#111;
    padding:10px;
    border-radius:10px;
    align-items:center;
}

.copy-btn {
    background:#f39c12;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.games {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.game {
    background:#1a1a1a;
    padding:15px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

.game:hover {
    background:#333;
}

.coming {
    opacity:0.5;
}

.title {
    font-size:18px;
    margin-bottom:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    Galmet Dashboard
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">
    <div class="title">Welcome Back 👋</div>
    <div class="email" id="email">Loading...</div>
    <div class="user-id">User ID: <span id="userId">Loading...</span></div>
</div>

<div class="card">
    <div class="title">Your Balance 💰</div>
    <div class="coins" id="coins">0</div>
</div>

<div class="card">
    <div class="title">Invite & Earn 🎁</div>
    <div class="invite-box">
        <span id="inviteCode">---</span>
        <button class="copy-btn" onclick="copyCode()">Copy</button>
    </div>
    <div style="margin-top:8px;font-size:13px;">
        Invite friends & earn rewards instantly 🚀
    </div>
</div>

<div class="card">
    <div class="title">Play Games 🎮</div>

    <div class="games">
        <div class="game" onclick="goGame('spin.html')">🎯 Spin Wheel</div>
        <div class="game" onclick="goGame('lucky.html')">🍀 Lucky Game</div>

        <div class="game coming">🏁 Race<br>Coming Soon</div>
        <div class="game coming">🎮 More<br>Coming Soon</div>
    </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


// ⚠️ MUST MATCH index.html EXACTLY
const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app",
  messagingSenderId: "900590512024",
  appId: "1:900590512024:web:16a36a085809a728c92ded"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// ✅ AUTH CHECK
onAuthStateChanged(auth, (user)=>{

    if(!user){
        window.location.href = "index.html";
        return;
    }

    const ref = doc(db, "users", user.uid);

    // ✅ REALTIME FIX (NO MORE LOADING ISSUE)
    onSnapshot(ref, (snap)=>{

        if(!snap.exists()){
            console.log("Waiting for user data...");
            return;
        }

        const data = snap.data();

        document.getElementById("email").innerText = data.email || "-";
        document.getElementById("coins").innerText = data.coins ?? 0;
        document.getElementById("inviteCode").innerText = data.inviteCode || "-";

        document.getElementById("userId").innerText =
            data.userId ? data.userId : "Not Assigned";

    });

});


// LOGOUT
window.logout = function(){
    signOut(auth).then(()=>{
        window.location.href = "index.html";
    });
}

// COPY
window.copyCode = function(){
    const code = document.getElementById("inviteCode").innerText;
    navigator.clipboard.writeText(code);
    alert("Copied: " + code);
}

// GAME
window.goGame = function(page){
    window.location.href = page;
}

</script>

</body>
</html>
