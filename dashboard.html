<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <title>Galmet · Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #eef2ff;
            --card-bg: #ffffff;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --btn-primary: #10b981;
            --btn-primary-hover: #059669;
            --btn-secondary: #f59e0b;
            --btn-secondary-hover: #d97706;
            --btn-text: white;
            --copy-bg: #f1f5f9;
            --copy-hover: #e2e8f0;
            --game-card: #ffffff;
            --game-shadow: 0 1px 3px rgba(0,0,0,0.05);
            --coming-bg: #f1f5f9;
            --coming-text: #475569;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient-start: #0b1120;
                --bg-gradient-end: #111827;
                --card-bg: #1e293b;
                --card-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.4);
                --text-primary: #f1f5f9;
                --text-secondary: #cbd5e1;
                --text-muted: #94a3b8;
                --border-color: #334155;
                --btn-primary: #10b981;
                --btn-primary-hover: #34d399;
                --btn-secondary: #f59e0b;
                --btn-secondary-hover: #fbbf24;
                --copy-bg: #334155;
                --copy-hover: #475569;
                --game-card: #1e293b;
                --game-shadow: 0 1px 3px rgba(0,0,0,0.3);
                --coming-bg: #334155;
                --coming-text: #cbd5e1;
            }
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            padding: 1.5rem;
            transition: background 0.2s ease;
        }

        .dashboard {
            max-width: 560px;
            margin: 0 auto;
        }

        /* Header Card */
        .header-card {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
        }

        .welcome {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .welcome h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .user-badge {
            background: var(--copy-bg);
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: monospace;
        }
        .user-id {
            background: var(--copy-bg);
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            word-break: break-all;
        }
        .balance {
            background: linear-gradient(135deg, #10b98120, #3b82f620);
            border-radius: 1.5rem;
            padding: 1rem;
            text-align: center;
            margin-top: 1rem;
        }
        .balance-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .balance-amount {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
            margin-top: 0.25rem;
        }

        /* Invite Card */
        .invite-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1rem;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
        }
        .invite-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.75rem;
        }
        .invite-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .invite-code {
            background: var(--copy-bg);
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .copy-area {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .invite-link {
            flex: 1;
            background: var(--copy-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 0.7rem 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            overflow-x: auto;
            white-space: nowrap;
        }
        .copy-btn {
            background: var(--btn-primary);
            border: none;
            padding: 0 1.2rem;
            border-radius: 1rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: var(--btn-primary-hover);
            transform: scale(0.98);
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .game-card {
            background: var(--game-card);
            border-radius: 1.25rem;
            padding: 1rem;
            text-align: center;
            box-shadow: var(--game-shadow);
            border: 1px solid var(--border-color);
            transition: transform 0.1s ease;
            cursor: pointer;
        }
        .game-card:active {
            transform: scale(0.97);
        }
        .game-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .game-name {
            font-weight: 600;
            color: var(--text-primary);
        }
        .coming-soon {
            background: var(--coming-bg);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            color: var(--coming-text);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .logout-btn {
            width: 100%;
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 0.8rem;
            margin-top: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: var(--copy-bg);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header-card">
        <div class="welcome">
            <h2>Welcome Back 👋</h2>
            <div class="user-badge" id="userIdBadge">ID: --</div>
        </div>
        <div class="user-id" id="userEmailDisplay">Loading profile...</div>
        <div class="balance">
            <div class="balance-label">Your Balance</div>
            <div class="balance-amount" id="coinsDisplay">0</div>
            <div style="font-size: 0.7rem; color: var(--text-muted);">Galmet Coins</div>
        </div>
    </div>

    <div class="invite-card">
        <div class="invite-header">
            <h3>Invite & Earn 🎁</h3>
            <span class="invite-code" id="inviteCodeDisplay">----</span>
        </div>
        <div class="copy-area">
            <div class="invite-link" id="inviteLink">https://galmet.com/join/----</div>
            <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.8rem;">
            Invite friends & earn rewards instantly 💰💲
        </p>
    </div>

    <div class="games-grid">
        <div class="game-card" id="spinWheelBtn">
            <div class="game-icon">🎡</div>
            <div class="game-name">Spin Wheel</div>
        </div>
        <div class="game-card" id="luckyGameBtn">
            <div class="game-icon">🎲</div>
            <div class="game-name">Lucky Game</div>
        </div>
    </div>

    <div class="coming-soon">
        🏁 Race Coming Soon &nbsp;|&nbsp; 🎮 More Coming Soon
    </div>

    <button class="logout-btn" id="logoutBtn">Sign Out</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // Firebase configuration (same as in index.html)
    const firebaseConfig = {
        apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
        authDomain: "galmet-app.firebaseapp.com",
        projectId: "galmet-app",
        storageBucket: "galmet-app.firebasestorage.app",
        messagingSenderId: "900590512024",
        appId: "1:900590512024:web:16a36a085809a728c92ded"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM elements
    const userIdBadge = document.getElementById("userIdBadge");
    const userEmailDisplay = document.getElementById("userEmailDisplay");
    const coinsDisplay = document.getElementById("coinsDisplay");
    const inviteCodeDisplay = document.getElementById("inviteCodeDisplay");
    const inviteLinkSpan = document.getElementById("inviteLink");
    const copyBtn = document.getElementById("copyBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const spinWheelBtn = document.getElementById("spinWheelBtn");
    const luckyGameBtn = document.getElementById("luckyGameBtn");

    // Show loading state initially
    userEmailDisplay.innerText = "Loading profile...";
    coinsDisplay.innerText = "0";
    inviteCodeDisplay.innerText = "----";
    inviteLinkSpan.innerText = "https://galmet.com/join/----";
    userIdBadge.innerText = "ID: --";

    // Listen for auth state
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            // Not logged in → redirect to login page
            window.location.href = "index.html";
            return;
        }

        // Set up real-time listener for the user's Firestore document
        const userDocRef = doc(db, "users", user.uid);
        const unsubscribe = onSnapshot(userDocRef, (snap) => {
            if (!snap.exists()) {
                console.warn("No user data yet. Waiting...");
                userEmailDisplay.innerText = "Profile not ready...";
                return;
            }

            const data = snap.data();
            console.log("Dashboard data received:", data);

            // Update UI
            const userId = data.userId || "Not Assigned";
            userIdBadge.innerText = `ID: ${userId}`;

            userEmailDisplay.innerText = data.email || user.email || "No email";

            const coins = data.coins ?? 0;
            coinsDisplay.innerText = coins;

            const inviteCode = data.inviteCode || "N/A";
            inviteCodeDisplay.innerText = inviteCode;

            const inviteLink = `https://galmet.com/join/${inviteCode}`;
            inviteLinkSpan.innerText = inviteLink;
        }, (error) => {
            console.error("Snapshot error:", error);
            userEmailDisplay.innerText = "Error loading data. Refresh?";
        });

        // Store unsubscribe function for cleanup (optional)
        window.__unsubscribeDashboard = unsubscribe;
    });

    // Copy invite link to clipboard
    copyBtn.addEventListener("click", async () => {
        const link = inviteLinkSpan.innerText;
        if (link && link !== "https://galmet.com/join/----") {
            try {
                await navigator.clipboard.writeText(link);
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                setTimeout(() => copyBtn.innerText = originalText, 1500);
            } catch (err) {
                console.error("Copy failed:", err);
                alert("Could not copy. Select manually.");
            }
        } else {
            alert("Invite code not ready yet. Try again in a moment.");
        }
    });

    // Logout
    logoutBtn.addEventListener("click", async () => {
        try {
            await signOut(auth);
            window.location.href = "index.html";
        } catch (err) {
            console.error("Logout error:", err);
            alert("Logout failed. Try again.");
        }
    });

    // Game buttons (placeholders)
    spinWheelBtn.addEventListener("click", () => {
        alert("Spin Wheel feature coming soon! 🎡");
    });
    luckyGameBtn.addEventListener("click", () => {
        alert("Lucky Game coming soon! 🎲");
    });
</script>
</body>
</html>
