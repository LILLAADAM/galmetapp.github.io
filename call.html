<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Galmet - Video Call</title>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
:root{--bg:#06080f;--surf:#0d1017;--surf2:#131720;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--blue:#4f7cff;--pink:#ff3d6e;--gold:#ffc531;--text:#eef0ff;--muted:rgba(238,240,255,0.42);--glass:rgba(10,13,22,0.82);--blur:blur(20px);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);}
.ms{font-family:'Material Symbols Rounded';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
.ms.f{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
#remote-wrap{position:fixed;inset:0;z-index:0;background:#0a0a12;}
#remote-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
#local-wrap{position:fixed;bottom:108px;right:16px;width:120px;height:168px;z-index:20;border-radius:18px;overflow:hidden;border:2px solid rgba(79,124,255,.5);box-shadow:0 8px 30px rgba(0,0,0,.6);cursor:move;background:#1a2030;transition:none;}
#local-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
#vg{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(6,8,15,.7) 0%,transparent 22%,transparent 58%,rgba(6,8,15,.92) 100%);}
/* CONNECTING SCREEN */
#connect-ov{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s;}
#connect-ov.gone{opacity:0;pointer-events:none;}
.conn-ava-ring{width:88px;height:88px;border-radius:50%;border:3px solid var(--blue);overflow:hidden;animation:ring-pulse 1.8s ease-in-out infinite;}
@keyframes ring-pulse{0%,100%{box-shadow:0 0 0 0 rgba(79,124,255,.5);}50%{box-shadow:0 0 0 14px rgba(79,124,255,0);}}
.conn-ava-ring img{width:100%;height:100%;object-fit:cover;display:block;}
#conn-name{font-size:17px;font-weight:900;}
#conn-status{font-size:12px;color:var(--muted);font-weight:600;}
.spin{width:32px;height:32px;border:3px solid rgba(79,124,255,.18);border-top-color:var(--blue);border-radius:50%;animation:sp .75s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
/* BACK TO LIVE POPUP */
#back-live-popup{position:fixed;inset:0;z-index:200;background:rgba(6,8,15,.9);backdrop-filter:blur(16px);display:none;flex-direction:column;align-items:center;justify-content:center;}
#back-live-popup.on{display:flex;}
.blp-card{background:var(--surf);border:1px solid var(--border2);border-radius:24px;padding:32px 28px;text-align:center;width:300px;max-width:90vw;}
.blp-icon{font-size:48px;margin-bottom:10px;}
.blp-title{font-size:18px;font-weight:900;margin-bottom:6px;}
.blp-sub{font-size:12.5px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.blp-stats{display:flex;gap:10px;margin-bottom:18px;}
.blp-stat{flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:13px;padding:11px 8px;text-align:center;}
.blp-stat .sv{font-size:20px;font-weight:900;color:var(--gold);}
.blp-stat .sl{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:2px;}
#back-live-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;}
/* TOP BAR */
#top-bar{position:fixed;top:0;left:0;right:0;z-index:30;padding:max(env(safe-area-inset-top),14px) 14px 0;display:flex;justify-content:space-between;align-items:flex-start;}
.peer-chip{display:flex;align-items:center;gap:8px;background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:99px;padding:5px 12px 5px 5px;}
.peer-chip img{width:34px;height:34px;border-radius:50%;border:2px solid var(--blue);object-fit:cover;}
.peer-name{font-size:12px;font-weight:900;}
.peer-role{font-size:9.5px;color:var(--muted);font-weight:700;}
.timer-chip{background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:99px;padding:6px 14px;font-size:16px;font-weight:900;font-variant-numeric:tabular-nums;}
.cost-chip{display:flex;align-items:center;gap:4px;background:rgba(255,197,49,.12);border:1px solid rgba(255,197,49,.22);border-radius:99px;padding:5px 10px;}
.cost-chip span{font-size:10px;font-weight:900;color:var(--gold);}
/* TOAST */
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(10px);z-index:300;background:var(--surf2);border:1px solid var(--border2);border-radius:99px;padding:8px 18px;font-size:12.5px;font-weight:700;opacity:0;transition:all .26s;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
/* SCROLLING IMAGES */
#img-scroll-overlay{position:fixed;inset:0;z-index:22;pointer-events:none;background:rgba(6,8,15,.4);display:none;}
#img-scroll-overlay.on{display:block;}
#img-scroll-wrap{position:fixed;top:50%;left:0;right:0;z-index:23;transform:translateY(-50%);pointer-events:none;overflow:hidden;height:210px;display:none;}
#img-scroll-wrap.on{display:block;}
#img-scroll-track{display:flex;gap:14px;animation:imgScroll 20s linear infinite;}
@keyframes imgScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.scroll-img{width:188px;height:200px;object-fit:cover;border-radius:16px;border:2px solid rgba(255,255,255,.18);flex-shrink:0;}
/* CHAT PANEL */
#chat-panel{position:fixed;right:0;bottom:80px;top:0;z-index:25;width:0;background:var(--glass);backdrop-filter:var(--blur);border-left:1px solid var(--border);transition:width .3s cubic-bezier(.32,1,.46,1);overflow:hidden;display:flex;flex-direction:column;}
#chat-panel.open{width:min(280px,85vw);}
#chat-panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 12px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
#chat-panel-hdr span{font-size:13px;font-weight:900;}
.cp-close{background:none;border:none;cursor:pointer;color:var(--muted);display:flex;}
#lang-row{display:flex;align-items:center;gap:5px;padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
#lang-row label{font-size:9px;color:var(--muted);font-weight:700;white-space:nowrap;}
#lang-sel{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;padding:4px 6px;color:var(--text);font-size:10px;font-family:inherit;outline:none;}
#chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px;}
#chat-msgs::-webkit-scrollbar{display:none;}
.chat-msg-item{padding:6px 10px;border-radius:10px;font-size:11.5px;line-height:1.4;max-width:96%;}
.chat-msg-item.mine{background:rgba(79,124,255,.18);border:1px solid rgba(79,124,255,.22);align-self:flex-end;}
.chat-msg-item.theirs{background:rgba(255,255,255,.07);border:1px solid var(--border);align-self:flex-start;}
.chat-msg-item .sender{font-size:9.5px;font-weight:900;color:var(--muted);margin-bottom:2px;}
.chat-msg-item .msgtext{color:var(--text);}
.chat-msg-item .translated{font-size:9px;color:var(--gold);margin-top:3px;display:none;font-style:italic;}
.trans-btn{font-size:9px;color:var(--blue);cursor:pointer;margin-top:3px;background:none;border:none;font-family:inherit;display:block;padding:0;}
#chat-input-wrap{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;}
#call-chat-input{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--border2);border-radius:10px;padding:8px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
#call-chat-input::placeholder{color:var(--muted);}
#call-send-btn{background:var(--blue);border:none;border-radius:9px;width:32px;height:32px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* CONTROLS */
#controls{position:fixed;bottom:0;left:0;right:0;z-index:30;padding:12px 16px;padding-bottom:max(env(safe-area-inset-bottom,12px),12px);display:flex;align-items:center;justify-content:center;gap:10px;}
.ctrl-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;flex-shrink:0;}
.ctrl-btn:active{transform:scale(.92);}
.cb-default{background:rgba(255,255,255,.1);border:1px solid var(--border2);color:var(--text);}
.cb-active{background:rgba(79,124,255,.2);border:1px solid rgba(79,124,255,.4);color:var(--blue);}
.cb-muted{background:rgba(255,61,110,.15);border:1px solid rgba(255,61,110,.3);color:var(--pink);}
#end-call-btn{background:var(--pink);color:#fff;border:none;border-radius:99px;padding:0 22px;height:52px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;box-shadow:0 6px 20px rgba(255,61,110,.3);}
/* IMAGE SHEET */
#img-sheet{position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--surf);border:1px solid var(--border2);border-radius:20px 20px 0 0;transform:translateY(102%);transition:transform .34s cubic-bezier(.32,1,.46,1);padding-bottom:max(env(safe-area-inset-bottom),16px);}
#img-sheet.on{transform:translateY(0);}
.sh-handle{width:32px;height:4px;background:rgba(255,255,255,.13);border-radius:99px;margin:10px auto 0;}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px;}
.sh-title{font-size:14px;font-weight:900;}
.sh-close{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;}
#img-preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:4px 13px 10px;max-height:200px;overflow-y:auto;}
#img-preview-grid::-webkit-scrollbar{display:none;}
.prev-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--border);}
.img-sheet-row{padding:10px 13px;display:flex;gap:8px;}
.isa-upload{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--border2);border-radius:12px;padding:12px;text-align:center;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--text);}
.isa-start{flex:1;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:12px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;}
#stop-scroll-btn{width:calc(100% - 26px);margin:0 13px 10px;background:rgba(255,61,110,.12);color:var(--pink);border:1px solid rgba(255,61,110,.3);border-radius:12px;padding:10px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;display:none;}
#stop-scroll-btn.on{display:block;}
#bd{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:100;opacity:0;pointer-events:none;transition:opacity .26s;}
#bd.on{opacity:1;pointer-events:auto;}
</style>
</head>
<body>
<div id="remote-wrap"></div>
<div id="local-wrap"></div>
<div id="vg"></div>
<div id="img-scroll-overlay"></div>
<div id="img-scroll-wrap"><div id="img-scroll-track"></div></div>

<!-- CONNECTING OVERLAY -->
<div id="connect-ov">
  <div class="spin"></div>
  <div class="conn-ava-ring"><img id="conn-ava" src="" alt=""></div>
  <div id="conn-name">Connecting...</div>
  <div id="conn-status">Waiting for peer...</div>
</div>

<!-- BACK TO LIVE POPUP (host only) -->
<div id="back-live-popup">
  <div class="blp-card">
    <div class="blp-icon">&#128250;</div>
    <div class="blp-title">Call Ended</div>
    <div class="blp-sub">Your viewers are waiting. Return to your live stream.</div>
    <div class="blp-stats">
      <div class="blp-stat"><div class="sv" id="blp-dur">0:00</div><div class="sl">Duration</div></div>
      <div class="blp-stat"><div class="sv" id="blp-gems">0</div><div class="sl">Gems Earned</div></div>
    </div>
    <button id="back-live-btn">&#127916; Back to Live</button>
  </div>
</div>

<div id="toast"></div>

<!-- TOP BAR -->
<div id="top-bar">
  <div class="peer-chip">
    <img id="peer-ava" src="" alt="">
    <div>
      <div class="peer-name" id="peer-name">Connecting...</div>
      <div class="peer-role" id="peer-role">Host</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <div class="timer-chip" id="timer">00:00</div>
    <div class="cost-chip"><span class="ms f" style="font-size:11px;color:var(--gold);">monetization_on</span><span id="cost-per-min">... /min</span></div>
  </div>
</div>

<!-- CHAT PANEL -->
<div id="chat-panel">
  <div id="chat-panel-hdr"><span>&#128172; Call Chat</span><button class="cp-close" id="close-chat-btn"><span class="ms" style="font-size:16px;">close</span></button></div>
  <div id="lang-row">
    <label>Translate:</label>
    <select id="lang-sel">
      <option value="">Off</option><option value="en">English</option><option value="ur">Urdu</option>
      <option value="hi">Hindi</option><option value="ar">Arabic</option><option value="zh">Chinese</option>
      <option value="es">Spanish</option><option value="fr">French</option><option value="de">German</option>
      <option value="ru">Russian</option><option value="tr">Turkish</option><option value="pt">Portuguese</option>
      <option value="ja">Japanese</option><option value="ko">Korean</option>
    </select>
  </div>
  <div id="chat-msgs"></div>
  <div id="chat-input-wrap">
    <input id="call-chat-input" type="text" placeholder="Message..." autocomplete="off" maxlength="200">
    <button id="call-send-btn"><span class="ms" style="font-size:15px;">send</span></button>
  </div>
</div>

<!-- IMAGE SHEET (host only) -->
<div id="img-sheet">
  <div class="sh-handle"></div>
  <div class="sh-hdr"><span class="sh-title">&#128247; Scroll Images</span><button class="sh-close" id="img-sh-close"><span class="ms" style="font-size:14px;">close</span></button></div>
  <div id="img-preview-grid"></div>
  <div class="img-sheet-row">
    <label class="isa-upload" for="img-file-input"><span class="ms f" style="font-size:16px;">add_photo_alternate</span> Add Photos</label>
    <input type="file" id="img-file-input" accept="image/*" multiple style="display:none;">
    <button class="isa-start" id="do-scroll-btn">&#9654; Start</button>
  </div>
  <button id="stop-scroll-btn">&#9632; Stop Scrolling</button>
</div>
<div id="bd"></div>

<!-- CONTROLS -->
<div id="controls">
  <button class="ctrl-btn cb-default" id="mic-btn"><span class="ms" style="font-size:22px;">mic</span></button>
  <button class="ctrl-btn cb-default" id="cam-btn"><span class="ms" style="font-size:22px;">videocam</span></button>
  <button id="end-call-btn"><span class="ms" style="font-size:20px;">call_end</span>End</button>
  <button class="ctrl-btn cb-default" id="chat-toggle-btn"><span class="ms" style="font-size:22px;">chat</span></button>
  <button class="ctrl-btn cb-default" id="img-upload-btn" style="display:none;"><span class="ms f" style="font-size:22px;">photo_library</span></button>
</div>

<script>
var FBC = { apiKey:"AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY", authDomain:"galmet-app.firebaseapp.com", projectId:"galmet-app", storageBucket:"galmet-app.firebasestorage.app" };
if (!firebase.apps.length) firebase.initializeApp(FBC);
var db = firebase.firestore();

var CU = JSON.parse(localStorage.getItem("user") || "null");
if (!CU || !CU.userId) { location.replace("login.html"); }
var ME = String(CU.userId);
var MY_NAME = CU.username || "User";
var MY_AVA = CU.photoURL || ("https://ui-avatars.com/api/?name=" + encodeURIComponent(MY_NAME) + "&background=1a2e6e&color=fff");
var sp = new URLSearchParams(location.search);
var roomId = sp.get("room");
var callerId = sp.get("callerId");
var hostId = sp.get("hostId");
if (!roomId || !callerId || !hostId) { alert("Invalid call"); location.href = "dashboard.html"; }
var IS_HOST = ME === hostId;
var IS_CALLER = ME === callerId;
var peerId = IS_HOST ? callerId : hostId;

var APP_ID = "873172a9b2064b1ca97b4f45ee6ed9b5";
// Use SAME token as live.html - same app, different mode (rtc vs live)
var TOKEN = "007eJxTYHC/KnpO5rpCFs8c7" + "+nLQ26yuWXEWpnmB9xS" + "+agWbMxiUa/AYGFubGhulGiZZGRgZpJkmJxoaZ5kkmZimppqlppimWT6" + "+fDtzIZARoackF1MjAwQCOLzMhTl5" + "+fGm1oYG5kYWpgyMAAAgbgfZA==";

var agora = null, locAudio = null, locVideo = null;
var isMuted = false, camEnabled = true;
var callActive = false, startTime = null;
var timerInterval = null, deductInterval = null;
var callPrice = 1000, gemsEarned = 0;
var peerData = null;
var chatUnsub = null;
var localImgURLs = [], scrollRunning = false;
var callRoomId = 'callchat_' + roomId;
var peerJoined = false;

var connectOv = document.getElementById('connect-ov');
var backPopup = document.getElementById('back-live-popup');
var timerEl = document.getElementById('timer');
var chatMsgs = document.getElementById('chat-msgs');
var chatPanel = document.getElementById('chat-panel');

function esc(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; });
}
var toastTimer = null;
function toast(msg, dur) {
  dur = dur || 2500;
  var el = document.getElementById('toast'); el.textContent = msg; el.classList.add('on');
  clearTimeout(toastTimer); toastTimer = setTimeout(function() { el.classList.remove('on'); }, dur);
}
function fmtTime(ms) {
  var s = Math.floor(ms / 1000);
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

// Load peer info
function loadPeer() {
  return db.doc('users/' + peerId).get().then(function(snap) {
    if (snap.exists) {
      peerData = snap.data();
      document.getElementById('peer-ava').src = peerData.photoURL || ('https://ui-avatars.com/api/?name=' + encodeURIComponent(peerData.username || 'User') + '&background=1a2e6e&color=fff');
      document.getElementById('peer-name').textContent = peerData.username || 'User';
      document.getElementById('conn-ava').src = peerData.photoURL || '';
      document.getElementById('conn-name').textContent = peerData.username || 'User';
    }
    document.getElementById('peer-role').textContent = IS_HOST ? 'Caller' : 'Host';
    return db.doc('calls/' + roomId).get();
  }).then(function(callSnap) {
    if (callSnap.exists && callSnap.data().callPrice) callPrice = callSnap.data().callPrice;
    document.getElementById('cost-per-min').textContent = callPrice + ' /min';
  }).catch(function() {});
}

// Timer
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(function() {
    if (callActive) timerEl.textContent = fmtTime(Date.now() - startTime);
  }, 1000);
}

// Coin deduction - caller pays host per minute
function startDeduction() {
  if (!IS_CALLER) return;
  deductInterval = setInterval(function() {
    if (!callActive) return;
    db.doc('users/' + ME).get().then(function(snap) {
      var coins = snap.exists ? (snap.data().coins || 0) : 0;
      if (coins < callPrice) {
        toast('Insufficient coins - call ending');
        setTimeout(function() { endCall(true); }, 2000);
        return;
      }
      db.doc('users/' + ME).update({ coins: firebase.firestore.FieldValue.increment(-callPrice) });
      db.doc('users/' + hostId).update({
        gems: firebase.firestore.FieldValue.increment(callPrice),
        totalGemsEarned: firebase.firestore.FieldValue.increment(callPrice),
        callGemsEarned: firebase.firestore.FieldValue.increment(callPrice)
      }).catch(function() {});
      gemsEarned += callPrice;
      document.getElementById('blp-gems').textContent = gemsEarned;
    });
  }, 60000);
}

// AGORA - use RTC mode for private call
function startCall() {
  agora = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
  // Join with null UID so Agora assigns one
  return agora.join(APP_ID, roomId, TOKEN, null).then(function() {
    return AgoraRTC.createMicrophoneAndCameraTracks();
  }).then(function(tracks) {
    locAudio = tracks[0]; locVideo = tracks[1];
    locVideo.play('local-wrap');
    return agora.publish([locAudio, locVideo]);
  }).then(function() {
    // Listen for remote peer
    agora.on('user-published', function(user, mt) {
      agora.subscribe(user, mt).then(function() {
        if (mt === 'video') {
          var d = document.createElement('div');
          d.id = 'rv-' + user.uid; d.style.cssText = 'width:100%;height:100%;';
          document.getElementById('remote-wrap').appendChild(d);
          user.videoTrack.play('rv-' + user.uid);
          if (!callActive) {
            callActive = true; peerJoined = true;
            // Fade out connect overlay smoothly
            connectOv.style.opacity = '0';
            setTimeout(function() { connectOv.style.display = 'none'; }, 600);
            startTimer();
            if (IS_CALLER) startDeduction();
          }
        }
        if (mt === 'audio') user.audioTrack.play();
      });
    });
    agora.on('user-unpublished', function(user, mt) {
      if (mt === 'video') { var el = document.getElementById('rv-' + user.uid); if (el) el.remove(); }
    });
    agora.on('user-left', function() {
      if (callActive) endCall(false, true);
    });
    // If no peer joins in 35 seconds, end
    setTimeout(function() {
      if (!callActive) { toast('Could not connect - no answer'); endCall(); }
    }, 35000);
  }).catch(function(e) {
    toast('Camera/mic error: ' + e.message);
    connectOv.style.display = 'none';
  });
}

// Drag local video
(function() {
  var el = document.getElementById('local-wrap');
  var dragging = false, ox = 0, oy = 0, startX = 0, startY = 0;
  function startDrag(cx, cy) {
    dragging = true; startX = cx; startY = cy;
    var rect = el.getBoundingClientRect();
    ox = rect.left; oy = rect.top;
    el.style.right = 'auto'; el.style.bottom = 'auto';
    el.style.left = ox + 'px'; el.style.top = oy + 'px';
  }
  function doDrag(cx, cy) {
    if (!dragging) return;
    el.style.left = (ox + (cx - startX)) + 'px';
    el.style.top = (oy + (cy - startY)) + 'px';
  }
  el.addEventListener('touchstart', function(e) { startDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
  el.addEventListener('touchmove', function(e) { doDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive:false});
  el.addEventListener('touchend', function() { dragging = false; });
  el.addEventListener('mousedown', function(e) { startDrag(e.clientX, e.clientY); });
  document.addEventListener('mousemove', function(e) { doDrag(e.clientX, e.clientY); });
  document.addEventListener('mouseup', function() { dragging = false; });
})();

// MIC - independent from camera
document.getElementById('mic-btn').onclick = function() {
  if (!locAudio) return;
  isMuted = !isMuted;
  locAudio.setEnabled(!isMuted).then(function() {
    var btn = document.getElementById('mic-btn');
    btn.querySelector('.ms').textContent = isMuted ? 'mic_off' : 'mic';
    btn.className = 'ctrl-btn ' + (isMuted ? 'cb-muted' : 'cb-default');
  });
};
// CAMERA - independent from mic
document.getElementById('cam-btn').onclick = function() {
  if (!locVideo) return;
  camEnabled = !camEnabled;
  locVideo.setEnabled(camEnabled).then(function() {
    var btn = document.getElementById('cam-btn');
    btn.querySelector('.ms').textContent = camEnabled ? 'videocam' : 'videocam_off';
    btn.className = 'ctrl-btn ' + (camEnabled ? 'cb-default' : 'cb-muted');
  });
};

// END CALL
function endCall(insufficientCoins, peerLeft) {
  if (!callActive && peerJoined) { /* already ended */ }
  callActive = false;
  clearInterval(timerInterval); clearInterval(deductInterval);
  stopScrollImages();
  var duration = startTime ? Date.now() - startTime : 0;
  // Clean up Firestore
  db.doc('calls/' + roomId).update({
    status: 'ended', duration: Math.floor(duration / 1000),
    endedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function() {});
  setTimeout(function() { db.doc('calls/' + roomId).delete().catch(function() {}); }, 2000);
  db.doc('lives/' + hostId).update({ onCall: false, callStarted: null }).catch(function() {});
  // Leave Agora
  if (agora) {
    if (locAudio) locAudio.close();
    if (locVideo) locVideo.close();
    agora.leave().catch(function() {});
  }
  if (chatUnsub) chatUnsub();
  if (insufficientCoins) toast('Call ended: insufficient coins');
  if (peerLeft) toast('The other person ended the call');
  document.getElementById('blp-dur').textContent = fmtTime(duration);
  document.getElementById('blp-gems').textContent = gemsEarned;
  if (IS_HOST) {
    backPopup.classList.add('on');
  } else {
    // Caller goes back to live room as viewer
    location.href = 'live.html?room=' + roomId;
  }
}
document.getElementById('end-call-btn').onclick = function() { endCall(); };
document.getElementById('back-live-btn').onclick = function() {
  location.href = 'live.html?room=' + roomId + '&host=true';
};

// CALL CHAT - stored in separate 'callchat' collection, not liveChat
// These messages are ephemeral and not linked to the live chat
function listenCallChat() {
  chatUnsub = db.collection('callchat/' + callRoomId + '/messages')
    .orderBy('ts', 'asc')
    .onSnapshot(function(snap) {
      snap.docChanges().forEach(function(ch) {
        if (ch.type === 'added') renderCallMsg(ch.doc.id, ch.doc.data());
      });
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
    });
}
function renderCallMsg(id, d) {
  var mine = d.uid === ME;
  var div = document.createElement('div');
  div.id = 'cmsg-' + id;
  div.className = 'chat-msg-item ' + (mine ? 'mine' : 'theirs');
  var langTarget = document.getElementById('lang-sel').value;
  var transHtml = (!mine && langTarget) ?
    '<button class="trans-btn" data-id="' + id + '" data-text="' + esc(d.text) + '">&#127760; Translate</button><div class="translated" id="tr-' + id + '"></div>' : '';
  div.innerHTML = '<div class="sender">' + esc(d.name) + '</div><div class="msgtext">' + esc(d.text) + '</div>' + transHtml;
  chatMsgs.appendChild(div);
  // Attach translate click
  var btn = div.querySelector('.trans-btn');
  if (btn) btn.onclick = function() { doTranslate(id, d.text); };
}
function sendCallChat(text) {
  if (!text.trim()) return;
  db.collection('callchat/' + callRoomId + '/messages').add({
    uid: ME, name: MY_NAME, ava: MY_AVA,
    text: text.trim(), ts: firebase.firestore.FieldValue.serverTimestamp()
  });
}
document.getElementById('call-send-btn').onclick = function() {
  var inp = document.getElementById('call-chat-input');
  sendCallChat(inp.value); inp.value = '';
};
document.getElementById('call-chat-input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') { sendCallChat(e.target.value); e.target.value = ''; }
});

// TRANSLATE using Google Translate public endpoint
function doTranslate(msgId, text) {
  var langTarget = document.getElementById('lang-sel').value;
  if (!langTarget) { toast('Select a language first'); return; }
  var el = document.getElementById('tr-' + msgId);
  if (!el) return;
  el.textContent = 'Translating...'; el.style.display = 'block';
  fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=' + langTarget + '&dt=t&q=' + encodeURIComponent(text))
    .then(function(r) { return r.json(); })
    .then(function(j) {
      var out = j[0] ? j[0].map(function(x) { return x[0] || ''; }).join('') : '';
      el.textContent = out ? ('-> ' + out) : 'Translation unavailable';
    })
    .catch(function() { el.textContent = 'Translation failed'; });
}

// CHAT TOGGLE
document.getElementById('chat-toggle-btn').onclick = function() {
  chatPanel.classList.toggle('open');
  document.getElementById('chat-toggle-btn').className = 'ctrl-btn ' + (chatPanel.classList.contains('open') ? 'cb-active' : 'cb-default');
};
document.getElementById('close-chat-btn').onclick = function() {
  chatPanel.classList.remove('open');
  document.getElementById('chat-toggle-btn').className = 'ctrl-btn cb-default';
};

// IMAGE SCROLLING (host only)
function openImgSheet() {
  document.getElementById('img-sheet').classList.add('on');
  document.getElementById('bd').classList.add('on');
}
function closeImgSheet() {
  document.getElementById('img-sheet').classList.remove('on');
  document.getElementById('bd').classList.remove('on');
}
document.getElementById('img-sh-close').onclick = closeImgSheet;
document.getElementById('bd').onclick = closeImgSheet;
document.getElementById('img-file-input').onchange = function(e) {
  var files = Array.from(e.target.files);
  var grid = document.getElementById('img-preview-grid');
  files.forEach(function(f) {
    var url = URL.createObjectURL(f); localImgURLs.push(url);
    var img = document.createElement('img'); img.src = url; img.className = 'prev-img';
    grid.appendChild(img);
  });
};
document.getElementById('do-scroll-btn').onclick = function() {
  if (!localImgURLs.length) { toast('Add images first'); return; }
  startScrollImages(); closeImgSheet();
};
document.getElementById('stop-scroll-btn').onclick = stopScrollImages;

function startScrollImages() {
  if (scrollRunning) return; scrollRunning = true;
  var track = document.getElementById('img-scroll-track'); track.innerHTML = '';
  function buildSet() {
    localImgURLs.forEach(function(u) {
      var img = document.createElement('img'); img.src = u; img.className = 'scroll-img'; track.appendChild(img);
    });
  }
  buildSet(); buildSet(); // Two copies for seamless loop
  document.getElementById('img-scroll-wrap').classList.add('on');
  document.getElementById('img-scroll-overlay').classList.add('on');
  document.getElementById('stop-scroll-btn').classList.add('on');
  toast('Images scrolling for viewers!');
}
function stopScrollImages() {
  scrollRunning = false;
  document.getElementById('img-scroll-wrap').classList.remove('on');
  document.getElementById('img-scroll-overlay').classList.remove('on');
  document.getElementById('stop-scroll-btn').classList.remove('on');
}

// Listen for call deletion (other side ended or rejected)
db.doc('calls/' + roomId).onSnapshot(function(snap) {
  if (!snap.exists && callActive) { endCall(false, true); }
});

// INIT
loadPeer().then(function() {
  if (IS_HOST) {
    document.getElementById('img-upload-btn').style.display = 'flex';
    document.getElementById('img-upload-btn').onclick = openImgSheet;
  }
  return startCall();
}).then(function() {
  listenCallChat();
}).catch(function(e) {
  console.error('Call init error:', e);
  toast('Failed to connect: ' + (e.message || e));
});

window.addEventListener('beforeunload', function() { if (callActive) endCall(); });
</script>
