<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet – Private Call</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; background: black; }
    #video-container { position: relative; width: 100vw; height: 100vh; background: black; }
    .remote-video { width: 100% !important; height: 100% !important; object-fit: cover; }
    .local-video {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 120px;
      height: 160px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid white;
      z-index: 20;
      background: black;
    }
    .glass-panel {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .control-btn {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .control-btn:active { transform: scale(0.9); }
    .end-btn {
      background: #ef4444;
      width: auto;
      padding: 0 20px;
      border-radius: 40px;
      gap: 8px;
    }
    .timer {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 6px 16px;
      border-radius: 40px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      font-family: monospace;
      z-index: 30;
    }
  </style>
</head>
<body>

<div id="video-container"></div>

<div class="timer" id="timer">00:00</div>

<!-- Control buttons (bottom center) -->
<div class="fixed bottom-6 left-0 right-0 flex justify-center gap-4 z-40">
  <button id="micBtn" class="control-btn">
    <span class="material-symbols-outlined">mic</span>
  </button>
  <button id="cameraBtn" class="control-btn">
    <span class="material-symbols-outlined">videocam</span>
  </button>
  <button id="endCallBtn" class="control-btn end-btn">
    <span class="material-symbols-outlined">call_end</span>
    <span>End Call</span>
  </button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, increment, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);

  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) window.location.replace("login.html");
  const myUserId = currentUser.userId.toString();

  const urlParams = new URLSearchParams(window.location.search);
  const roomId = urlParams.get("room");
  const callerId = urlParams.get("callerId");
  const hostId = urlParams.get("hostId");

  if (!roomId || !callerId || !hostId) {
    alert("Invalid call");
    window.location.href = "dashboard.html";
  }

  const isCaller = (myUserId === callerId);
  const peerId = isCaller ? hostId : callerId;

  // Agora
  const APP_ID = "873172a9b2064b1ca97b4f45ee6ed9b5";
  const TOKEN = "007eJxTYNBZOltE3KbDv+GwmZzfwXnCs1Y/3BXGfPfEqYDHO+VqY9YrMFiYGxuaGyVaJhkZmJkkGSYnWponmaSZmKammqWmWCaZWvhez2wIZGSYyfeGlZEBAkF8Xoai/PzceFMzE0sDc3MLBgYAMJ4hIQ==";
  let client = null;
  let localAudioTrack = null;
  let localVideoTrack = null;
  let isMuted = false;
  let cameraEnabled = true;

  // Call duration & coin deduction
  let startTime = Date.now();
  let timerInterval = null;
  let lastDeductionTime = startTime;
  const COST_PER_MINUTE = 1000; // coins
  let callActive = true;

  async function deductCoins(amount) {
    if (!isCaller) return; // only caller pays
    const userRef = doc(db, "users", myUserId);
    const userSnap = await getDoc(userRef);
    const currentCoins = userSnap.data()?.coins || 0;
    if (currentCoins < amount) {
      // Not enough coins – end call
      alert("Insufficient coins to continue the call. Call will end.");
      endCall();
      return false;
    }
    await updateDoc(userRef, { coins: increment(-amount) });
    return true;
  }

  function updateTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const minutes = Math.floor(elapsed / 60);
    const seconds = elapsed % 60;
    document.getElementById("timer").innerText = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    // Deduct coins every minute (on minute boundaries)
    const now = Date.now();
    const minutesSinceLastDeduction = Math.floor((now - lastDeductionTime) / 60000);
    if (minutesSinceLastDeduction >= 1 && isCaller) {
      deductCoins(COST_PER_MINUTE).then(success => {
        if (success) {
          lastDeductionTime = now;
        } else {
          // deduction failed (insufficient) – call ends
          if (callActive) endCall();
        }
      });
    }
  }

  async function endCall() {
    if (!callActive) return;
    callActive = false;
    if (timerInterval) clearInterval(timerInterval);
    // Remove call document from Firestore (so the other side also knows)
    await deleteDoc(doc(db, "calls", roomId)).catch(console.error);
    if (client) {
      if (localAudioTrack) localAudioTrack.close();
      if (localVideoTrack) localVideoTrack.close();
      await client.leave();
    }
    // Redirect: caller goes to dashboard, host goes back to live
    if (isCaller) {
      window.location.href = "dashboard.html";
    } else {
      window.location.href = `live.html?room=${roomId}&host=true`;
    }
  }

  // Agora setup
  async function startCall() {
    client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    await client.join(APP_ID, roomId, TOKEN, null);
    // Create local tracks
    [localAudioTrack, localVideoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
    // Create local video container (small in corner)
    const localDiv = document.createElement("div");
    localDiv.id = "local-player";
    localDiv.className = "local-video";
    document.getElementById("video-container").appendChild(localDiv);
    localVideoTrack.play("local-player");
    await client.publish([localAudioTrack, localVideoTrack]);

    // Remote user
    client.on("user-published", async (user, mediaType) => {
      await client.subscribe(user, mediaType);
      if (mediaType === "video") {
        const remoteDiv = document.createElement("div");
        remoteDiv.id = user.uid;
        remoteDiv.style.width = "100%";
        remoteDiv.style.height = "100%";
        remoteDiv.className = "remote-video";
        document.getElementById("video-container").appendChild(remoteDiv);
        user.videoTrack.play(remoteDiv);
      }
      if (mediaType === "audio") {
        user.audioTrack.play();
      }
    });
    client.on("user-unpublished", (user) => {
      const remoteDiv = document.getElementById(user.uid);
      if (remoteDiv) remoteDiv.remove();
    });
  }

  // Controls
  async function toggleMic() {
    if (!localAudioTrack) return;
    isMuted = !isMuted;
    await localAudioTrack.setEnabled(!isMuted);
    document.getElementById("micBtn").innerHTML = isMuted
      ? '<span class="material-symbols-outlined">mic_off</span>'
      : '<span class="material-symbols-outlined">mic</span>';
  }
  async function toggleCamera() {
    if (!localVideoTrack) return;
    cameraEnabled = !cameraEnabled;
    await localVideoTrack.setEnabled(cameraEnabled);
    document.getElementById("cameraBtn").innerHTML = cameraEnabled
      ? '<span class="material-symbols-outlined">videocam</span>'
      : '<span class="material-symbols-outlined">videocam_off</span>';
  }

  // Initial call start
  (async () => {
    await startCall();
    timerInterval = setInterval(updateTimer, 1000);
    document.getElementById("micBtn").onclick = toggleMic;
    document.getElementById("cameraBtn").onclick = toggleCamera;
    document.getElementById("endCallBtn").onclick = endCall;
    // Also listen for deletion of the call document (in case the other user ends)
    onSnapshot(doc(db, "calls", roomId), (snap) => {
      if (!snap.exists() && callActive) {
        // Call ended by other party
        alert("The other user ended the call.");
        endCall();
      }
    });
  })();

  window.addEventListener("beforeunload", () => {
    if (callActive) {
      endCall();
    }
  });
</script>
</body>
</html>
