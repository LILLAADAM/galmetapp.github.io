<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet – Pro Call</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<style>
body { margin:0; background:black; overflow:hidden; }

/* Video Layout */
.video-wrapper {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
}

.video-box {
  width: 50%;
  height: 100%;
  position: relative;
}

.video-box video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Top Info */
.top-bar {
  position:absolute;
  top:15px;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  z-index:50;
  color:white;
}

/* Controls */
.controls {
  position:absolute;
  bottom:25px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:20px;
  z-index:50;
}

.btn {
  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.end {
  background:red;
  padding:0 25px;
  border-radius:40px;
}
</style>
</head>

<body>

<div class="video-wrapper">
  <div id="localBox" class="video-box"></div>
  <div id="remoteBox" class="video-box"></div>
</div>

<!-- TOP -->
<div class="top-bar">
  <div id="myName">You</div>
  <div id="timer">00:00</div>
  <div id="otherName">User</div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div id="micBtn" class="btn">🎤</div>
  <div id="camBtn" class="btn">📷</div>
  <div id="flipBtn" class="btn">🔄</div>
  <div id="endBtn" class="btn end">END</div>
</div>

<script type="module">
import { 
  initializeApp 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { 
  getFirestore, doc, getDoc, updateDoc, increment, deleteDoc, onSnapshot 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* Firebase */
const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
});
const db = getFirestore(app);

/* User */
const user = JSON.parse(localStorage.getItem("user"));
const myId = user.userId.toString();
const myName = user.username;

/* Params */
const url = new URLSearchParams(window.location.search);
const roomId = url.get("room");
const callerId = url.get("callerId");
const hostId = url.get("hostId");

const isCaller = myId === callerId;
const otherId = isCaller ? hostId : callerId;

/* UI */
document.getElementById("myName").innerText = myName;

/* Agora */
const APP_ID = "873172a9b2064b1ca97b4f45ee6ed9b5";
const TOKEN = "YOUR_TOKEN";

let client, localTracks;
let micOn = true;
let camOn = true;
let frontCam = true;

/* PERMISSION */
async function checkPermissions() {
  await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
}

/* START */
async function startCall() {

  await checkPermissions();

  client = AgoraRTC.createClient({ mode:"rtc", codec:"vp8" });

  await client.join(APP_ID, roomId, TOKEN, myId);

  localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

  const localDiv = document.createElement("div");
  document.getElementById("localBox").appendChild(localDiv);
  localTracks[1].play(localDiv);

  await client.publish(localTracks);

  client.on("user-published", async (user, type) => {
    await client.subscribe(user, type);

    if (type === "video") {
      const remoteDiv = document.createElement("div");
      document.getElementById("remoteBox").innerHTML = "";
      document.getElementById("remoteBox").appendChild(remoteDiv);
      user.videoTrack.play(remoteDiv);
    }

    if (type === "audio") user.audioTrack.play();
  });
}

/* TIMER + COINS */
let start = Date.now();

setInterval(async () => {
  const sec = Math.floor((Date.now() - start)/1000);
  document.getElementById("timer").innerText =
    String(Math.floor(sec/60)).padStart(2,'0') + ":" +
    String(sec%60).padStart(2,'0');

  if (isCaller && sec % 60 === 0) {
    const ref = doc(db,"users",myId);
    const snap = await getDoc(ref);
    if (snap.data().coins < 1000) {
      alert("Coins finished");
      endCall();
    } else {
      await updateDoc(ref,{ coins: increment(-1000) });
    }
  }

},1000);

/* CONTROLS */

document.getElementById("micBtn").onclick = async () => {
  micOn = !micOn;
  await localTracks[0].setEnabled(micOn);
};

document.getElementById("camBtn").onclick = async () => {
  camOn = !camOn;
  await localTracks[1].setEnabled(camOn);
};

document.getElementById("flipBtn").onclick = async () => {
  frontCam = !frontCam;

  const newTrack = await AgoraRTC.createCameraVideoTrack({
    facingMode: frontCam ? "user" : "environment"
  });

  await client.unpublish(localTracks[1]);
  localTracks[1].close();

  localTracks[1] = newTrack;

  await client.publish(localTracks[1]);

  document.getElementById("localBox").innerHTML = "";
  const div = document.createElement("div");
  document.getElementById("localBox").appendChild(div);
  newTrack.play(div);
};

async function endCall() {
  await deleteDoc(doc(db,"calls",roomId)).catch(()=>{});
  await client.leave();
  window.location.href = "dashboard.html";
}

document.getElementById("endBtn").onclick = endCall;

/* SYNC END */
onSnapshot(doc(db,"calls",roomId),(snap)=>{
  if(!snap.exists()) endCall();
});

startCall();
</script>

</body>
</html>
