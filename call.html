<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Galmet – Video Call</title>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
:root{
  --bg:#06080f;--surf:#0d1017;--surf2:#131720;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --blue:#4f7cff;--pink:#ff3d6e;--gold:#ffc531;--green:#1a9e5c;
  --text:#eef0ff;--muted:rgba(238,240,255,0.42);
  --glass:rgba(10,13,22,0.82);--blur:blur(20px);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);}
.ms{font-family:'Material Symbols Rounded';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
.ms.f{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}

/* VIDEO STAGE */
#remote-wrap{position:fixed;inset:0;z-index:0;background:#0a0a12;}
#remote-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
#local-wrap{position:fixed;bottom:108px;right:16px;width:120px;height:168px;z-index:20;border-radius:18px;overflow:hidden;border:2px solid rgba(79,124,255,.5);box-shadow:0 8px 30px rgba(0,0,0,.6);cursor:move;background:#1a2030;transition:width .2s,height .2s;}
#local-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
#local-wrap.big{width:160px;height:220px;}

/* VIGNETTE */
#vg{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(6,8,15,.7) 0%,transparent 22%,transparent 58%,rgba(6,8,15,.92) 100%);}

/* CONNECTING OVERLAY */
#connect-ov{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s;}
#connect-ov.gone{opacity:0;pointer-events:none;}
#conn-ava{width:80px;height:80px;border-radius:50%;border:3px solid var(--blue);object-fit:cover;display:block;}
#conn-name{font-size:16px;font-weight:900;}
#conn-status{font-size:12px;color:var(--muted);font-weight:600;}
.spin{width:32px;height:32px;border:3px solid rgba(79,124,255,.18);border-top-color:var(--blue);border-radius:50%;animation:sp .75s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* BACK TO LIVE POPUP (host only, after call) */
#back-live-popup{position:fixed;inset:0;z-index:200;background:rgba(6,8,15,.88);backdrop-filter:blur(14px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#back-live-popup.on{display:flex;}
.blp-card{background:var(--surf);border:1px solid var(--border2);border-radius:24px;padding:32px 28px;text-align:center;width:300px;max-width:90vw;}
.blp-icon{font-size:48px;margin-bottom:10px;}
.blp-title{font-size:18px;font-weight:900;margin-bottom:6px;}
.blp-sub{font-size:12.5px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.blp-stats{display:flex;gap:10px;margin-bottom:18px;}
.blp-stat{flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:13px;padding:11px 8px;text-align:center;}
.blp-stat .sv{font-size:20px;font-weight:900;color:var(--gold);}
.blp-stat .sl{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:2px;}
#back-live-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;transition:transform .13s;}
#back-live-btn:active{transform:scale(.97);}

/* HEADER BAR */
#top-bar{position:fixed;top:0;left:0;right:0;z-index:30;padding:max(env(safe-area-inset-top),14px) 14px 0;display:flex;justify-content:space-between;align-items:flex-start;}
.peer-chip{display:flex;align-items:center;gap:8px;background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:99px;padding:5px 12px 5px 5px;}
.peer-chip img{width:34px;height:34px;border-radius:50%;border:2px solid var(--blue);object-fit:cover;}
.peer-info{display:flex;flex-direction:column;gap:2px;}
.peer-name{font-size:12px;font-weight:900;}
.peer-role{font-size:9.5px;color:var(--muted);font-weight:700;}
.timer-chip{background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:99px;padding:6px 14px;font-size:16px;font-weight:900;font-variant-numeric:tabular-nums;}
.cost-chip{display:flex;align-items:center;gap:4px;background:rgba(255,197,49,.12);border:1px solid rgba(255,197,49,.22);border-radius:99px;padding:5px 10px;}
.cost-chip span{font-size:10px;font-weight:900;color:var(--gold);}

/* TOAST */
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(10px);z-index:300;background:var(--surf2);border:1px solid var(--border2);border-radius:99px;padding:8px 18px;font-size:12.5px;font-weight:700;opacity:0;transition:all .26s;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* SCROLLING IMAGES (host uploads) */
#img-scroll-wrap{position:fixed;top:50%;left:0;right:0;z-index:25;transform:translateY(-50%);pointer-events:none;overflow:hidden;height:200px;display:none;}
#img-scroll-wrap.on{display:block;}
#img-scroll-track{display:flex;gap:12px;width:max-content;animation:imgScroll 18s linear infinite;}
@keyframes imgScroll{from{transform:translateX(0);}to{transform:translateX(-50%)}}
.scroll-img{width:180px;height:190px;object-fit:cover;border-radius:14px;border:2px solid rgba(255,255,255,.15);flex-shrink:0;}
#img-scroll-overlay{position:fixed;inset:0;z-index:24;pointer-events:none;background:rgba(6,8,15,.35);}
#img-scroll-overlay.on{display:block;}

/* CHAT PANEL */
#chat-panel{position:fixed;right:0;bottom:80px;top:0;z-index:25;width:0;background:var(--glass);backdrop-filter:var(--blur);border-left:1px solid var(--border);transition:width .3s cubic-bezier(.32,1,.46,1);overflow:hidden;display:flex;flex-direction:column;}
#chat-panel.open{width:min(280px,85vw);}
#chat-panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 12px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
#chat-panel-hdr span{font-size:13px;font-weight:900;}
.cp-close{background:none;border:none;cursor:pointer;color:var(--muted);display:flex;}
#chat-msgs{flex:1;overflow-y:auto;padding:10px 10px;display:flex;flex-direction:column;gap:5px;}
#chat-msgs::-webkit-scrollbar{display:none;}
.chat-msg-item{padding:6px 10px;border-radius:10px;font-size:11.5px;line-height:1.4;max-width:96%;}
.chat-msg-item.mine{background:rgba(79,124,255,.18);border:1px solid rgba(79,124,255,.22);align-self:flex-end;}
.chat-msg-item.theirs{background:rgba(255,255,255,.07);border:1px solid var(--border);align-self:flex-start;}
.chat-msg-item .sender{font-size:9.5px;font-weight:900;color:var(--muted);margin-bottom:2px;}
.chat-msg-item .msgtext{color:var(--text);}
.chat-msg-item .translated{font-size:9.5px;color:var(--gold);margin-top:3px;display:none;}
.chat-msg-item .trans-btn{font-size:9px;color:var(--blue);cursor:pointer;margin-top:2px;background:none;border:none;font-family:inherit;display:block;}
#chat-input-wrap{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;}
#call-chat-input{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--border2);border-radius:10px;padding:8px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
#call-chat-input::placeholder{color:var(--muted);}
#call-send-btn{background:var(--blue);border:none;border-radius:9px;width:32px;height:32px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* LANG SELECT */
#lang-row{display:flex;align-items:center;gap:5px;padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
#lang-row span{font-size:9px;color:var(--muted);font-weight:700;white-space:nowrap;}
#lang-sel{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;padding:4px 6px;color:var(--text);font-size:10px;font-family:inherit;outline:none;}

/* BOTTOM CONTROLS */
#controls{position:fixed;bottom:0;left:0;right:0;z-index:30;padding:12px 16px;padding-bottom:max(env(safe-area-inset-bottom,12px),12px);display:flex;align-items:center;justify-content:center;gap:10px;}
.ctrl-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-family:inherit;}
.ctrl-btn:active{transform:scale(.92);}
.cb-default{background:rgba(255,255,255,.1);border:1px solid var(--border2);color:var(--text);}
.cb-active{background:rgba(79,124,255,.2);border:1px solid rgba(79,124,255,.4);color:var(--blue);}
.cb-danger{background:rgba(255,61,110,.15);border:1px solid rgba(255,61,110,.35);color:var(--pink);}
.cb-muted{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);}
#end-call-btn{background:var(--pink);color:#fff;border:none;border-radius:99px;padding:0 22px;height:52px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;box-shadow:0 6px 20px rgba(255,61,110,.3);}

/* IMAGE UPLOAD SHEET */
#img-sheet{position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--surf);border:1px solid var(--border2);border-radius:20px 20px 0 0;transform:translateY(102%);transition:transform .34s cubic-bezier(.32,1,.46,1);padding-bottom:max(env(safe-area-inset-bottom),16px);}
#img-sheet.on{transform:translateY(0);}
.sh-handle{width:32px;height:4px;background:rgba(255,255,255,.13);border-radius:99px;margin:10px auto 0;}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px;}
.sh-title{font-size:14px;font-weight:900;}
.sh-close{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;}
#img-preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:4px 13px 10px;max-height:200px;overflow-y:auto;}
#img-preview-grid::-webkit-scrollbar{display:none;}
.prev-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--border);}
.img-sheet-actions{padding:10px 13px 10px;display:flex;gap:8px;}
.isa-upload{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--border2);border-radius:12px;padding:12px;text-align:center;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;}
#do-scroll-btn{flex:1;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:12px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;}
#stop-scroll-btn{width:100%;margin:0 13px 10px;background:rgba(255,61,110,.12);color:var(--pink);border:1px solid rgba(255,61,110,.28);border-radius:12px;padding:10px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;box-sizing:border-box;}
#stop-scroll-btn{display:none;}
#stop-scroll-btn.on{display:block;}

/* BACKDROP */
#bd{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:100;opacity:0;pointer-events:none;transition:opacity .26s;}
#bd.on{opacity:1;pointer-events:auto;}
</style>
</head>
<body>

<!-- VIDEO AREAS -->
<div id="remote-wrap"></div>
<div id="local-wrap"></div>
<div id="vg"></div>

<!-- SCROLLING IMAGES OVERLAY -->
<div id="img-scroll-overlay"></div>
<div id="img-scroll-wrap">
  <div id="img-scroll-track"></div>
</div>

<!-- CONNECTING OVERLAY -->
<div id="connect-ov">
  <div class="spin"></div>
  <img id="conn-ava" src="" alt="">
  <div id="conn-name">Connecting…</div>
  <div id="conn-status">Waiting for peer…</div>
</div>

<!-- BACK TO LIVE POPUP (host after call) -->
<div id="back-live-popup">
  <div class="blp-card">
    <div class="blp-icon">📺</div>
    <div class="blp-title">Call Ended</div>
    <div class="blp-sub">Your viewers are waiting for you to return to the live stream.</div>
    <div class="blp-stats">
      <div class="blp-stat"><div class="sv" id="blp-dur">0:00</div><div class="sl">Duration</div></div>
      <div class="blp-stat"><div class="sv" id="blp-gems">0</div><div class="sl">Gems Earned</div></div>
    </div>
    <button id="back-live-btn">🎥 Back to Live</button>
  </div>
</div>

<div id="toast"></div>

<!-- TOP BAR -->
<div id="top-bar">
  <div class="peer-chip">
    <img id="peer-ava" src="" alt="">
    <div class="peer-info">
      <div class="peer-name" id="peer-name">Connecting…</div>
      <div class="peer-role" id="peer-role">Host</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <div class="timer-chip" id="timer">00:00</div>
    <div class="cost-chip"><span class="ms f" style="font-size:11px;color:var(--gold);">monetization_on</span><span id="cost-per-min">… /min</span></div>
  </div>
</div>

<!-- CHAT PANEL -->
<div id="chat-panel">
  <div id="chat-panel-hdr">
    <span>💬 Call Chat</span>
    <button class="cp-close" id="close-chat-btn"><span class="ms" style="font-size:16px;">close</span></button>
  </div>
  <div id="lang-row">
    <span>Translate to:</span>
    <select id="lang-sel">
      <option value="">Off</option>
      <option value="en">English</option>
      <option value="ur">Urdu</option>
      <option value="hi">Hindi</option>
      <option value="ar">Arabic</option>
      <option value="zh">Chinese</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="ru">Russian</option>
      <option value="tr">Turkish</option>
      <option value="pt">Portuguese</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
    </select>
  </div>
  <div id="chat-msgs"></div>
  <div id="chat-input-wrap">
    <input id="call-chat-input" type="text" placeholder="Message…" autocomplete="off" maxlength="200">
    <button id="call-send-btn"><span class="ms" style="font-size:15px;">send</span></button>
  </div>
</div>

<!-- IMAGE SHEET (host only) -->
<div id="img-sheet">
  <div class="sh-handle"></div>
  <div class="sh-hdr">
    <span class="sh-title">📷 Scroll Images</span>
    <button class="sh-close" id="img-sh-close"><span class="ms" style="font-size:14px;">close</span></button>
  </div>
  <div id="img-preview-grid"></div>
  <div class="img-sheet-actions">
    <label class="isa-upload" for="img-file-input"><span class="ms f" style="font-size:16px;">add_photo_alternate</span>Add Photos</label>
    <input type="file" id="img-file-input" accept="image/*" multiple style="display:none;">
    <button id="do-scroll-btn">▶ Start Scrolling</button>
  </div>
  <button id="stop-scroll-btn">■ Stop Scrolling</button>
</div>

<div id="bd"></div>

<!-- BOTTOM CONTROLS -->
<div id="controls">
  <button class="ctrl-btn cb-default" id="mic-btn"><span class="ms" style="font-size:22px;">mic</span></button>
  <button class="ctrl-btn cb-default" id="cam-btn"><span class="ms" style="font-size:22px;">videocam</span></button>
  <button id="end-call-btn"><span class="ms" style="font-size:20px;">call_end</span>End</button>
  <button class="ctrl-btn cb-default" id="chat-toggle-btn"><span class="ms" style="font-size:22px;">chat</span></button>
  <button class="ctrl-btn cb-default" id="img-upload-btn" style="display:none;"><span class="ms f" style="font-size:22px;">photo_library</span></button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, increment, deleteDoc,
  onSnapshot, collection, addDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const FBC={apiKey:"AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",authDomain:"galmet-app.firebaseapp.com",projectId:"galmet-app",storageBucket:"galmet-app.firebasestorage.app"};
const fapp=initializeApp(FBC);
const db=getFirestore(fapp);

/* AUTH */
const CU=JSON.parse(localStorage.getItem("user")||"null");
if(!CU?.userId)location.replace("login.html");
const ME=CU.userId.toString();
const MY_NAME=CU.username||"User";
const MY_AVA=CU.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(MY_NAME)}&background=1a2e6e&color=fff`;

const sp=new URLSearchParams(location.search);
const roomId=sp.get("room");
const callerId=sp.get("callerId");
const hostId=sp.get("hostId");
if(!roomId||!callerId||!hostId){alert("Invalid call");location.href="dashboard.html";}
const IS_HOST=ME===hostId;
const IS_CALLER=ME===callerId;
const peerId=IS_HOST?callerId:hostId;

const APP_ID="873172a9b2064b1ca97b4f45ee6ed9b5";
const TOKEN="007eJxTYHC/KnpO5rpCFs8c7+nLQ26yuWXEWpnmB9xS+agWbMxiUa/AYGFubGhulGiZZGRgZpJkmJxoaZ5kkmZimppqlppimWT6+fDtzIZARoackF1MjAwQCOLzMhTl5+fGm1oYG5kYWpgyMAAAgbgfZA==";

/* STATE */
let agora=null,locAudio=null,locVideo=null;
let isMuted=false,camEnabled=true;
let callActive=false;
let startTime=null;
let timerInterval=null;
let deductInterval=null;
let callPrice=1000;
let gemsEarned=0;
let peerData=null;
let chatUnsub=null;
let uploadedImages=[];
let scrollRunning=false;
let scrollDupInterval=null;
const callRoomId='call_'+roomId;

/* DOM */
const connectOv=document.getElementById('connect-ov');
const backPopup=document.getElementById('back-live-popup');
const timerEl=document.getElementById('timer');
const chatMsgs=document.getElementById('chat-msgs');
const chatPanel=document.getElementById('chat-panel');

/* HELPERS */
function esc(s){return s?s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])):''}
let toastT=null;
function toast(msg,dur=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),dur);}
function fmtTime(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),sc=s%60;return String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');}

/* LOAD PEER INFO */
async function loadPeer(){
  const snap=await getDoc(doc(db,'users',peerId));
  if(snap.exists()){
    peerData=snap.data();
    document.getElementById('peer-ava').src=peerData.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(peerData.username||'User')}&background=1a2e6e&color=fff`;
    document.getElementById('peer-name').textContent=peerData.username||'User';
    document.getElementById('conn-ava').src=peerData.photoURL||'';
    document.getElementById('conn-name').textContent=peerData.username||'User';
  }
  document.getElementById('peer-role').textContent=IS_HOST?'Caller':'Host';
  // Load call price
  const callSnap=await getDoc(doc(db,'calls',roomId));
  if(callSnap.exists()&&callSnap.data().callPrice){
    callPrice=callSnap.data().callPrice;
  }
  document.getElementById('cost-per-min').textContent=`${callPrice} /min`;
}

/* TIMER */
function startTimer(){
  startTime=Date.now();
  timerInterval=setInterval(()=>{
    if(!callActive)return;
    timerEl.textContent=fmtTime(Date.now()-startTime);
  },1000);
}

/* COIN DEDUCTION (caller pays per minute) */
function startDeduction(){
  if(!IS_CALLER)return;
  deductInterval=setInterval(async()=>{
    if(!callActive)return;
    const snap=await getDoc(doc(db,'users',ME));
    const coins=snap.data()?.coins||0;
    if(coins<callPrice){
      toast('Insufficient coins — call ending');
      setTimeout(()=>endCall(true),2000);
      return;
    }
    await updateDoc(doc(db,'users',ME),{coins:increment(-callPrice)});
    // Add gems to host
    await updateDoc(doc(db,'users',hostId),{gems:increment(callPrice),totalGemsEarned:increment(callPrice),callGemsEarned:increment(callPrice)}).catch(()=>{});
    gemsEarned+=callPrice;
    document.getElementById('blp-gems').textContent=gemsEarned;
  },60000);
}

/* AGORA */
async function startCall(){
  agora=AgoraRTC.createClient({mode:'rtc',codec:'vp8'});
  await agora.join(APP_ID,roomId,TOKEN,null);
  try{
    [locAudio,locVideo]=await AgoraRTC.createMicrophoneAndCameraTracks();
  }catch(e){
    toast('Camera/mic error: '+e.message);
    connectOv.classList.add('gone');return;
  }
  locVideo.play('local-wrap');
  await agora.publish([locAudio,locVideo]);

  agora.on('user-published',async(user,mt)=>{
    await agora.subscribe(user,mt);
    if(mt==='video'){
      const d=document.createElement('div');d.id='rv-'+user.uid;d.style.cssText='width:100%;height:100%;';
      document.getElementById('remote-wrap').appendChild(d);
      user.videoTrack.play('rv-'+user.uid);
      // Both connected — start call
      if(!callActive){
        callActive=true;
        connectOv.classList.add('gone');
        startTimer();
        if(IS_CALLER)startDeduction();
        document.getElementById('conn-status').textContent='Connected';
      }
    }
    if(mt==='audio')user.audioTrack.play();
  });

  agora.on('user-unpublished',(user,mt)=>{
    if(mt==='video')document.getElementById('rv-'+user.uid)?.remove();
  });
  agora.on('user-left',()=>{
    // Peer left
    if(callActive)endCall(false,true);
  });

  // Timeout: if no peer in 30s
  setTimeout(()=>{
    if(!callActive){
      toast('No answer — ending call');
      endCall();
    }
  },30000);
}

/* DRAG local video */
(function(){
  const el=document.getElementById('local-wrap');
  let dragging=false,ox=0,oy=0,startX=0,startY=0;
  el.addEventListener('touchstart',e=>{
    dragging=true;
    const t=e.touches[0];
    startX=t.clientX;startY=t.clientY;
    ox=el.offsetLeft;oy=el.offsetTop;
    el.style.right='auto';el.style.bottom='auto';
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const t=e.touches[0];
    el.style.left=(ox+(t.clientX-startX))+'px';
    el.style.top=(oy+(t.clientY-startY))+'px';
  },{passive:true});
  el.addEventListener('touchend',()=>{dragging=false;});
  // Mouse
  el.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;startY=e.clientY;ox=el.offsetLeft;oy=el.offsetTop;el.style.right='auto';el.style.bottom='auto';});
  document.addEventListener('mousemove',e=>{if(!dragging)return;el.style.left=(ox+(e.clientX-startX))+'px';el.style.top=(oy+(e.clientY-startY))+'px';});
  document.addEventListener('mouseup',()=>{dragging=false;});
})();

/* MIC / CAM */
document.getElementById('mic-btn').onclick=async()=>{

document.getElementById('cam-btn').onclick=async()=>{

/* END CALL */
async function endCall(insufficientCoins=false,peerLeft=false){
  if(!callActive&&!connectOv)return;
  callActive=false;
  clearInterval(timerInterval);
  clearInterval(deductInterval);
  stopScrollImages();

  const duration=startTime?Date.now()-startTime:0;
  // Update call doc
  try{
    await updateDoc(doc(db,'calls',roomId),{status:'ended',duration:Math.floor(duration/1000),endedAt:serverTimestamp()});
  }catch(e){}
  try{await deleteDoc(doc(db,'calls',roomId));}catch(e){}

  // Mark host no longer on call
  try{await updateDoc(doc(db,'lives',hostId),{onCall:false,callStarted:null});}catch(e){}

  // Stop agora
  if(agora){
    locAudio?.close();locVideo?.close();
    await agora.leave().catch(()=>{});
  }

  // Clear chat listener
  if(chatUnsub)chatUnsub();

  if(insufficientCoins)toast('Call ended: insufficient coins');
  if(peerLeft)toast('The other person left the call');

  const durationStr=fmtTime(duration);
  document.getElementById('blp-dur').textContent=durationStr;
  document.getElementById('blp-gems').textContent=gemsEarned;

  if(IS_HOST){
    // Show "Back to Live" popup
    backPopup.classList.add('on');
  }else{
    // Caller → back to live as viewer
    location.href=`live.html?room=${roomId}`;
  }
}
document.getElementById('end-call-btn').onclick=()=>endCall();

/* BACK TO LIVE (host) */
document.getElementById('back-live-btn').onclick=()=>{
  location.href=`live.html?room=${roomId}&host=true`;
};

/* CHAT */
function listenCallChat(){
  const q=query(collection(db,'callChat',callRoomId,'messages'),orderBy('ts','asc'));
  chatUnsub=onSnapshot(q,snap=>{
    snap.docChanges().forEach(ch=>{
      if(ch.type==='added'){
        const d=ch.doc.data();
        renderMsg(ch.doc.id,d);
      }
    });
    chatMsgs.scrollTop=chatMsgs.scrollHeight;
  });
}
function renderMsg(id,d){
  const mine=d.uid===ME;
  const div=document.createElement('div');
  div.id='msg-'+id;
  div.className='chat-msg-item '+(mine?'mine':'theirs');
  const langTarget=document.getElementById('lang-sel').value;
  div.innerHTML=`
    <div class="sender">${esc(d.name)}</div>
    <div class="msgtext">${esc(d.text)}</div>
    ${!mine&&langTarget?`<button class="trans-btn" onclick="translateMsg('${id}','${esc(d.text)}')">🌐 Translate</button><div class="translated" id="trans-${id}"></div>`:''}
  `;
  chatMsgs.appendChild(div);
}
async function sendCallChat(text){
  if(!text.trim())return;
  await addDoc(collection(db,'callChat',callRoomId,'messages'),{uid:ME,name:MY_NAME,ava:MY_AVA,text:text.trim(),ts:serverTimestamp()});
}
document.getElementById('call-send-btn').onclick=()=>{
  const inp=document.getElementById('call-chat-input');
  sendCallChat(inp.value);inp.value='';
};
document.getElementById('call-chat-input').addEventListener('keypress',e=>{
  if(e.key==='Enter'){const inp=e.target;sendCallChat(inp.value);inp.value='';}
});

/* TRANSLATE via LibreTranslate public instance */
window.translateMsg=async(msgId,text)=>{
  const langTarget=document.getElementById('lang-sel').value;
  if(!langTarget){toast('Select a language first');return;}
  const transEl=document.getElementById('trans-'+msgId);
  if(!transEl)return;
  transEl.textContent='Translating…';
  transEl.style.display='block';
  try{
    const r=await fetch('https://libretranslate.de/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q:text,source:'auto',target:langTarget,format:'text'})});
    const j=await r.json();
    transEl.textContent='→ '+(j.translatedText||'Translation unavailable');
  }catch(e){
    // Fallback: use Google Translate (no-auth read endpoint)
    try{
      const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${langTarget}&dt=t&q=${encodeURIComponent(text)}`;
      const r=await fetch(url);const j=await r.json();
      const out=j[0]?.map(x=>x[0]).join('')||'Translation unavailable';
      transEl.textContent='→ '+out;
    }catch{transEl.textContent='Translation failed';}
  }
};

/* CHAT PANEL TOGGLE */
document.getElementById('chat-toggle-btn').onclick=()=>{
  chatPanel.classList.toggle('open');
  document.getElementById('chat-toggle-btn').className='ctrl-btn '+(chatPanel.classList.contains('open')?'cb-active':'cb-default');

document.getElementById('close-chat-btn').onclick=()=>{

/* IMAGE UPLOAD & SCROLL (host only) */
let localImgURLs=[];
function openImgSheet(){
  document.getElementById('img-sheet').classList.add('on');
  document.getElementById('bd').classList.add('on');
}
document.getElementById('img-sh-close').onclick=()=>{
  document.getElementById('img-sheet').classList.remove('on');
  document.getElementById('bd').classList.remove('on');
};
document.getElementById('bd').onclick=()=>{
  document.getElementById('img-sheet').classList.remove('on');
  document.getElementById('bd').classList.remove('on');
};
document.getElementById('img-file-input').onchange=async(e)=>{
  const files=Array.from(e.target.files);
  const grid=document.getElementById('img-preview-grid');
  for(const f of files){
    const url=URL.createObjectURL(f);
    localImgURLs.push(url);
    const img=document.createElement('img');img.src=url;img.className='prev-img';
    grid.appendChild(img);
  }
};
document.getElementById('do-scroll-btn').onclick=()=>{
  if(!localImgURLs.length){toast('Add images first');return;}
  startScrollImages();
  document.getElementById('img-sheet').classList.remove('on');
  document.getElementById('bd').classList.remove('on');
};
document.getElementById('stop-scroll-btn').onclick=stopScrollImages;

function startScrollImages(){
  if(scrollRunning)return;
  scrollRunning=true;
  const track=document.getElementById('img-scroll-track');
  track.innerHTML='';
  // Build two copies for seamless loop
  const buildImgs=()=>localImgURLs.map(u=>{
    const img=document.createElement('img');img.src=u;img.className='scroll-img';return img;
  });
  buildImgs().forEach(i=>track.appendChild(i));
  buildImgs().forEach(i=>track.appendChild(i));
  document.getElementById('img-scroll-wrap').classList.add('on');
  document.getElementById('img-scroll-overlay').classList.add('on');
  document.getElementById('stop-scroll-btn').classList.add('on');
  toast('Images scrolling — viewers can see them!');
}

function stopScrollImages(){
  scrollRunning=false;
  document.getElementById('img-scroll-wrap').classList.remove('on');
  document.getElementById('img-scroll-overlay').classList.remove('on');
  document.getElementById('stop-scroll-btn').classList.remove('on');
}

/* LISTEN for call doc deletion (other side ended) */
onSnapshot(doc(db,'calls',roomId),snap=>{
  if(!snap.exists()&&callActive){
    endCall(false,true);
  }
});

/* INIT */
(async()=>{
  await loadPeer();
  if(IS_HOST){
    document.getElementById('img-upload-btn').style.display='flex';
    document.getElementById('img-upload-btn').onclick=openImgSheet;
  }
  await startCall();
  listenCallChat();
})();

window.addEventListener('beforeunload',()=>{
  if(callActive)endCall();
});
</script>
