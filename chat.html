<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 10px;
      background: #4CAF50;
      color: white;
    }

    .header img {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      margin-right: 10px;
    }

    #chatBox {
      height: 75vh;
      overflow-y: auto;
      padding: 10px;
    }

    .me {
      background: #4CAF50;
      color: white;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
      margin-left: auto;
    }

    .other {
      background: #ddd;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
    }

    .inputBox {
      display: flex;
      padding: 10px;
      background: white;
    }

    .inputBox input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    .inputBox button {
      margin-left: 10px;
      padding: 10px 15px;
      background: #4CAF50;
      border: none;
      color: white;
      border-radius: 50%;
    }
  </style>
</head>

<body>

<div class="header">
  <img id="userPhoto" src="">
  <span id="userName">User</span>
</div>

<div id="chatBox"></div>

<div class="inputBox">
  <input id="messageInput" placeholder="Enter message">
  <button onclick="sendMessage()">➤</button>
</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const chatId = new URLSearchParams(window.location.search).get("id");
const currentUser = JSON.parse(localStorage.getItem("user"));

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("messageInput");

// ✅ LOAD OTHER USER INFO
async function loadUser() {
  const chatRef = doc(db, "chats", chatId);
  const snap = await getDoc(chatRef);

  const users = snap.data().users;
  const otherId = users.find(u => u !== currentUser.userId);

  const userRef = doc(db, "users", otherId);
  const userSnap = await getDoc(userRef);

  if (userSnap.exists()) {
    document.getElementById("userName").innerText = userSnap.data().username;
    document.getElementById("userPhoto").src = userSnap.data().photoURL;
  }
}

loadUser();

// ✅ REALTIME CHAT
const q = query(
  collection(db, "chats", chatId, "messages"),
  orderBy("createdAt")
);

onSnapshot(q, (snapshot) => {
  chatBox.innerHTML = "";

  snapshot.forEach((doc) => {
    const msg = doc.data();

    const div = document.createElement("div");
    div.className =
      msg.senderId === currentUser.userId ? "me" : "other";

    div.innerText = msg.text;
    chatBox.appendChild(div);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});

// ✅ SEND
window.sendMessage = async function () {
  if (!input.value.trim()) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text: input.value,
    senderId: currentUser.userId,
    createdAt: serverTimestamp()
  });

  input.value = "";
};
</script>

</body>
</html>
