<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const storage = getStorage(undefined, "gs://galmet-app.firebasestorage.app");

const currentUser = JSON.parse(localStorage.getItem("user"));
if (!currentUser?.uid) {
  alert("Login required");
  location.href = "index.html";
}

const myUid = currentUser.uid;
const otherUid = new URLSearchParams(location.search).get("id");
const chatId = [myUid, otherUid].sort().join("_");

/* ================= USER ================= */
async function loadOtherUser() {
  const snap = await getDoc(doc(db, "users", otherUid));
  if (!snap.exists()) return;

  const data = snap.data();
  name.innerText = data.fullName || data.username;
  profileImg.src = data.photoURL ||
    `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username)}`;
}

/* ================= PROFILE CLICK ================= */
window.openProfile = () => {
  location.href = `view.html?id=${otherUid}`;
};

/* ================= MESSAGES ================= */
function loadMessages() {
  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, (snapshot) => {
    messages.innerHTML = "";

    snapshot.forEach(docSnap => {
      renderMessage(docSnap.data());
    });

    messages.scrollTop = messages.scrollHeight;
  });
}

/* ================= RENDER ================= */
function renderMessage(m) {
  const div = document.createElement("div");
  div.className = m.senderId === myUid ? "me" : "other";

  if (m.text) div.innerText = m.text;

  if (m.image) {
    const img = document.createElement("img");
    img.src = m.image;
    img.className = "chat-img";
    img.onclick = () => openFullImage(m.image);
    div.appendChild(img);
  }

  messages.appendChild(div);
}

/* ================= TEXT ================= */
window.sendMessage = async () => {
  const text = msg.value.trim();
  if (!text) return;

  msg.value = "";

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });
};

/* ================= EMOJI ================= */
window.addEmoji = () => {
  msg.value += "😊";
};

/* ================= IMAGE PICK ================= */
window.pickImage = () => {
  imageInput.click();
};

let selectedFile = null;

imageInput.onchange = (e) => {
  selectedFile = e.target.files[0];
  if (!selectedFile) return;

  previewModal.style.display = "flex";
  previewImage.src = URL.createObjectURL(selectedFile);
};

/* ================= COMPRESS ================= */
function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxWidth = 800;

      let scale = maxWidth / img.width;
      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}

/* ================= SEND IMAGE ================= */
window.sendImage = async () => {
  if (!selectedFile) return;

  const compressed = await compressImage(selectedFile);

  const fileRef = ref(storage, "chatImages/" + Date.now());
  await uploadBytes(fileRef, compressed);
  const url = await getDownloadURL(fileRef);

  await addDoc(collection(db, "chats", chatId, "messages"), {
    image: url,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });

  closePreview();
};

/* ================= PREVIEW ================= */
window.closePreview = () => {
  previewModal.style.display = "none";
  selectedFile = null;
};

/* ================= FULL VIEW ================= */
window.openFullImage = (url) => {
  viewer.style.display = "flex";
  viewerImg.src = url;
};

window.closeViewer = () => {
  viewer.style.display = "none";
};

/* ================= LOAD ================= */
window.onload = () => {
  loadMessages();
  loadOtherUser();
};
</script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

/* HEADER */
header {
  background:#4CAF50;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
  cursor:pointer;
}

header img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

/* CHAT */
#messages {
  height:calc(100vh - 140px);
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* FIX WIDTH */
.me, .other {
  width:fit-content;
  max-width:75%;
  padding:10px;
  margin:4px;
  border-radius:14px;
  word-wrap:break-word;
}

.me {
  background:#4CAF50;
  color:white;
  align-self:flex-end;
}

.other {
  background:#e4e6eb;
  align-self:flex-start;
}

.chat-img {
  max-width:180px;
  border-radius:10px;
}

/* BOTTOM */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  align-items:center;
  padding:8px;
  background:white;
}

.plus {
  width:42px;
  height:42px;
  border-radius:50%;
  background:#4CAF50;
  color:white;
  border:none;
  font-size:22px;
}

input {
  flex:1;
  margin:0 6px;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

/* EMOJI */
.emoji {
  font-size:20px;
  cursor:pointer;
}

/* BUTTON */
button {
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:20px;
  padding:10px;
}

/* PREVIEW MODAL FIXED */
#previewModal {
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:999;
  
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
}

/* IMAGE AREA */
#previewModal img {
  max-width:100%;
  max-height:75vh; /* 🔥 FIX: prevents pushing buttons */
  object-fit:contain;
  margin-top:20px;
}

/* BUTTON AREA FIXED */
 .preview-actions {
  width:100%;
  padding:15px;
  display:flex;
  justify-content:center;
  gap:20px;
  background:rgba(0,0,0,0.6);
}

/* BUTTON STYLE */
.preview-actions button {
  background:#4CAF50;
  border:none;
  padding:12px 20px;
  border-radius:25px;
  color:white;
  font-size:16px;
}

/* VIEW */
#viewer {
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
}

#viewer img {
  max-width:100%;
}
</style>
</head>

<body>

<header onclick="openProfile()">
  <img id="profileImg">
  <span id="name"></span>
</header>

<div id="messages"></div>

<div class="bottom">
  <button class="plus" onclick="pickImage()">+</button>
  <span class="emoji" onclick="addEmoji()">😊</span>
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
  <input type="file" id="imageInput" accept="image/*" hidden>
</div>

<!-- PREVIEW -->
<div id="previewModal">
  <img id="previewImage">
  
  <div class="preview-actions">
    <button onclick="closePreview()">Cancel</button>
    <button onclick="sendImage()">Send</button>
  </div>
</div>

<!-- FULL -->
<div id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

</body>
</html>
