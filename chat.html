<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module">
    import { db } from "./firebase.js";
    import {
      collection, addDoc, query, orderBy,
      onSnapshot, serverTimestamp, doc, getDoc, setDoc
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // 🔥 CURRENT USER
    const currentUser = JSON.parse(localStorage.getItem("user"));

    if (!currentUser) {
      alert("Login required");
      window.location.href = "index.html";
    }

    // 🔥 GET OTHER USER
    const params = new URLSearchParams(window.location.search);
    const otherUserId = params.get("id");

    if (!otherUserId) {
      alert("No user selected");
      window.location.href = "dashboard.html";
    }

    // 🔥 CHAT ID
    function getChatId(a, b) {
      return [a, b].sort().join("_");
    }

    const chatId = getChatId(currentUser.uid, otherUserId);

    // 🔥 LOAD USER PROFILE
    async function loadOtherUser() {
  try {
    const snap = await getDoc(doc(db, "users", otherUserId));

    if (!snap.exists()) {
      document.getElementById("name").innerText = "Unknown";
      document.getElementById("profileImg").src =
        "https://ui-avatars.com/api/?name=User";
      return;
    }

    const data = snap.data();

    const username = data.username || "User";
    const photo =
      data.photoURL ||
      `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}`;

    document.getElementById("name").innerText = username;
    document.getElementById("profileImg").src = photo;

  } catch (err) {
    console.error("User load error:", err);
  }
}

    // 🔥 LOAD MESSAGES
    function loadMessages() {
      const q = query(
        collection(db, "chats", chatId, "messages"),
        orderBy("createdAt")
      );

      onSnapshot(q, (snapshot) => {
        const box = document.getElementById("messages");
        box.innerHTML = "";

        snapshot.forEach(doc => {
          const m = doc.data();

          const div = document.createElement("div");
          div.className =
            m.senderId === currentUser.uid ? "me" : "other";

          div.innerText = m.text;

          box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
      });
    }

    // 🔥 SEND MESSAGE + SAVE CHAT LIST
    window.sendMessage = async function () {
      const input = document.getElementById("msg");
      const text = input.value.trim();

      if (!text) return;

      const msgData = {
        text,
        senderId: currentUser.uid,
        receiverId: otherUserId,
        createdAt: serverTimestamp()
      };

      // save message
      await addDoc(collection(db, "chats", chatId, "messages"), msgData);

      // save chat list (for both users)
      await setDoc(doc(db, "userChats", currentUser.userId, "list", otherUserId), {
        userId: otherUserId,
        lastMessage: text,
        updatedAt: serverTimestamp()
      });

      await setDoc(doc(db, "userChats", otherUserId, "list", currentUser.userId), {
        userId: currentUser.userId,
        lastMessage: text,
        updatedAt: serverTimestamp()
      });

      input.value = "";
    };

    // 🔥 ENTER KEY SEND
    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    // 🔥 LOAD
    window.onload = () => {
      loadMessages();
      loadOtherUser();
    };
  </script>

  <style>
    body {
      margin:0;
      font-family:sans-serif;
      background:#f5f5f5;
    }

    header {
      background:#4CAF50;
      color:white;
      padding:12px;
      display:flex;
      align-items:center;
      position:sticky;
      top:0;
      z-index:10;
    }

    header img {
      width:40px;
      height:40px;
      border-radius:50%;
      margin-right:10px;
    }

    #messages {
      height:calc(100vh - 120px);
      overflow-y:auto;
      padding:10px;
    }

    .me, .other {
      max-width:75%;
      padding:10px;
      margin:6px;
      border-radius:14px;
      font-size:14px;
      word-wrap:break-word;
    }

    .me {
      background:#4CAF50;
      color:white;
      margin-left:auto;
    }

    .other {
      background:#ddd;
      color:black;
    }

    .bottom {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      padding:8px;
      background:white;
      border-top:1px solid #ccc;
    }

    input {
      flex:1;
      padding:10px;
      border:1px solid #ccc;
      border-radius:20px;
      outline:none;
    }

    button {
      margin-left:6px;
      border-radius:20px;
      padding:10px 16px;
      background:#4CAF50;
      color:white;
      border:none;
    }

    @media (max-width:600px){
      .me, .other {
        font-size:13px;
      }
    }
  </style>
</head>

<body>

<header>
  <img id="profileImg">
  <span id="name">User</span>
</header>

<div id="messages"></div>

<div class="bottom">
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

</body>
</html>
