<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const storage = getStorage(undefined, "gs://galmet-app.firebasestorage.app");

const currentUser = JSON.parse(localStorage.getItem("user"));
if (!currentUser?.uid) {
  alert("Login required");
  location.href = "index.html";
}

const myUid = currentUser.uid;
const otherUid = new URLSearchParams(location.search).get("id");
const chatId = [myUid, otherUid].sort().join("_");

/* ================= LOAD USER ================= */
async function loadOtherUser() {
  const snap = await getDoc(doc(db, "users", otherUid));
  if (!snap.exists()) return;

  const data = snap.data();

  document.getElementById("name").innerText =
    data.fullName || data.username || "User";

  document.getElementById("profileImg").src =
    data.photoURL ||
    `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username)}`;
}

/* ================= CLICK HEADER ================= */
window.openProfile = () => {
  location.href = `view.html?id=${otherUid}`;
};

/* ================= LOAD MESSAGES ================= */
function loadMessages() {
  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, (snapshot) => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(docSnap => {
      const m = docSnap.data();

      const div = document.createElement("div");
      div.className = m.senderId === myUid ? "me" : "other";

      if (m.text) div.innerText = m.text;

      if (m.image) {
        const img = document.createElement("img");
        img.src = m.image;
        img.className = "chat-img";
        img.onclick = () => openFullImage(m.image);
        div.appendChild(img);
      }

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

/* ================= FULL IMAGE VIEW ================= */
window.openFullImage = (url) => {
  const viewer = document.getElementById("viewer");
  const img = document.getElementById("viewerImg");
  img.src = url;
  viewer.style.display = "flex";
};

window.closeViewer = () => {
  document.getElementById("viewer").style.display = "none";
};

/* ================= COMPRESS IMAGE ================= */
function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.src = e.target.result;
    };

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxWidth = 800;

      let scale = maxWidth / img.width;
      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}

/* ================= IMAGE PICK ================= */
window.pickImage = () => {
  document.getElementById("imageInput").click();
};

let selectedFile = null;

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("imageInput").addEventListener("change", e => {
    selectedFile = e.target.files[0];
    if (!selectedFile) return;

    document.getElementById("previewModal").style.display = "flex";
    document.getElementById("previewImage").src =
      URL.createObjectURL(selectedFile);
  });
});

/* ================= SEND IMAGE ================= */
window.sendImage = async () => {
  if (!selectedFile) return;

  const compressed = await compressImage(selectedFile);

  const fileRef = ref(storage, "chatImages/" + Date.now());
  await uploadBytes(fileRef, compressed);
  const url = await getDownloadURL(fileRef);

  await addDoc(collection(db, "chats", chatId, "messages"), {
    image: url,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });

  closePreview();
};

/* ================= PREVIEW CONTROL ================= */
window.closePreview = () => {
  document.getElementById("previewModal").style.display = "none";
  selectedFile = null;
};

/* ================= TEXT ================= */
window.sendMessage = async () => {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });

  input.value = "";
};

/* ================= LOAD ================= */
window.onload = () => {
  loadMessages();
  loadOtherUser();
};
</script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

header {
  background:#4CAF50;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
  cursor:pointer;
}

header img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

#messages {
  height:calc(100vh - 140px);
  overflow:auto;
  padding:10px;
}

.me, .other {
  max-width:70%;
  padding:10px;
  margin:6px;
  border-radius:14px;
}

.me { background:#4CAF50; color:white; margin-left:auto; }
.other { background:#e4e6eb; }

.chat-img {
  max-width:120px;
  border-radius:10px;
  margin-top:5px;
}

/* bottom */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:8px;
  background:white;
}

.plus {
  width:42px;
  height:42px;
  border-radius:50%;
  background:#4CAF50;
  color:white;
  border:none;
  font-size:22px;
}

input {
  flex:1;
  margin:0 6px;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

button {
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:20px;
  padding:10px;
}

/* PREVIEW MODAL */
#previewModal {
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#previewModal img {
  max-width:90%;
}

.preview-actions {
  position:absolute;
  bottom:20px;
  display:flex;
  gap:20px;
}

/* FULL VIEW */
#viewer {
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#viewer img {
  max-width:100%;
}

.save-btn {
  position:absolute;
  bottom:20px;
  right:20px;
}
</style>
</head>

<body>

<header onclick="openProfile()">
  <img id="profileImg">
  <span id="name"></span>
</header>

<div id="messages"></div>

<div class="bottom">
  <button class="plus" onclick="pickImage()">+</button>
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
  <input type="file" id="imageInput" accept="image/*" hidden>
</div>

<!-- PREVIEW -->
<div id="previewModal">
  <img id="previewImage">
  <div class="preview-actions">
    <button onclick="closePreview()">Cancel</button>
    <button onclick="sendImage()">Send</button>
  </div>
</div>

<!-- FULL VIEW -->
<div id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
  <a id="downloadBtn" class="save-btn" download>Save</a>
</div>

</body>
</html>
