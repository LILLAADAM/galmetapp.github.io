<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const storage = getStorage(undefined, "gs://galmet-app.firebasestorage.app");

/* USER */
const currentUser = JSON.parse(localStorage.getItem("user"));
if (!currentUser?.uid) {
  alert("Login required");
  location.href = "index.html";
}

const myUid = currentUser.uid;
const otherUid = new URLSearchParams(location.search).get("id");
const chatId = [myUid, otherUid].sort().join("_");

/* LOAD USER */
async function loadOtherUser() {
  const snap = await getDoc(doc(db, "users", otherUid));
  if (!snap.exists()) return;

  const data = snap.data();

  document.getElementById("name").innerText =
    data.fullName || data.username || "User";

  document.getElementById("profileImg").src =
    data.photoURL ||
    `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username)}`;
}

/* CLICK HEADER */
window.openProfile = () => {
  location.href = `view.html?id=${otherUid}`;
};

/* LOAD MESSAGES */
function loadMessages() {
  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, (snapshot) => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(docSnap => {
      const m = docSnap.data();

      const div = document.createElement("div");
      div.className = m.senderId === myUid ? "me" : "other";

      if (m.text) div.innerText = m.text;

      if (m.image) {
        const img = document.createElement("img");
        img.src = m.image;
        img.className = "chat-img";
        div.appendChild(img);
      }

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

/* IMAGE PICK */
window.pickImage = () => {
  document.getElementById("imageInput").click();
};

let selectedFile = null;

document.addEventListener("DOMContentLoaded", () => {
  const previewModal = document.getElementById("previewModal");
  previewModal.style.display = "none"; // ✅ FIX (IMPORTANT)

  document.getElementById("imageInput").addEventListener("change", e => {
    selectedFile = e.target.files[0];
    if (!selectedFile) return;

    previewModal.style.display = "flex";
    document.getElementById("previewImage").src =
      URL.createObjectURL(selectedFile);
  });
});

/* COMPRESS */
function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxWidth = 800;

      let scale = maxWidth / img.width;
      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}

/* SEND IMAGE */
window.sendImage = async () => {
  if (!selectedFile) return;

  const compressed = await compressImage(selectedFile);

  const fileRef = ref(storage, "chatImages/" + Date.now());
  await uploadBytes(fileRef, compressed);
  const url = await getDownloadURL(fileRef);

  await addDoc(collection(db, "chats", chatId, "messages"), {
    image: url,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });

  closePreview();
};

/* CLOSE PREVIEW */
window.closePreview = () => {
  document.getElementById("previewModal").style.display = "none";
  selectedFile = null;
};

/* SEND TEXT */
window.sendMessage = async () => {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });

  input.value = "";
};

/* LOAD */
window.onload = () => {
  loadMessages();
  loadOtherUser();
};
</script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

header {
  background:#4CAF50;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
}

header img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

/* CHAT */
#messages {
  position:fixed;
  top:60px;
  bottom:60px;
  left:0;
  right:0;
  overflow:auto;
  padding:10px;
}

/* BUBBLES */
.me, .other {
  width:fit-content;
  max-width:75%;
  padding:8px;
  margin:4px;
  border-radius:14px;
}

.me { background:#4CAF50; color:white; margin-left:auto; }
.other { background:#e4e6eb; }

/* IMAGE */
.chat-img {
  max-width:140px;
  border-radius:10px;
  display:block;
}

/* INPUT */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:8px;
  background:white;
}

.plus {
  width:40px;
  height:40px;
  border-radius:50%;
  background:#4CAF50;
  color:white;
  border:none;
}

/* PREVIEW */
#previewModal {
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#previewModal img {
  max-width:90%;
  max-height:70vh;
}

/* ✅ GREEN BUTTONS FIX */
.preview-actions {
  position:absolute;
  bottom:40px;
  display:flex;
  gap:20px;
}

.preview-actions button {
  background:#4CAF50;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:20px;
}
</style>
</head>

<body>

<header onclick="openProfile()">
  <img id="profileImg">
  <span id="name"></span>
</header>

<div id="messages"></div>

<div class="bottom">
  <button class="plus" onclick="pickImage()">+</button>
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
  <input type="file" id="imageInput" accept="image/*" hidden>
</div>

<!-- PREVIEW -->
<div id="previewModal">
  <img id="previewImage">
  <div class="preview-actions">
    <button onclick="closePreview()">Cancel</button>
    <button onclick="sendImage()">Send</button>
  </div>
</div>

</body>
</html>
