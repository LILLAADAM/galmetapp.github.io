<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:sans-serif; background:#f5f6fa; }

.top {
    padding:12px;
    background:#4cd964;
    color:white;
    font-weight:bold;
}

#chat {
    height:calc(100vh - 120px);
    overflow-y:auto;
    padding:10px;
}

.msg {
    padding:10px;
    margin:5px;
    border-radius:10px;
    max-width:70%;
}

.me { background:#4cd964; margin-left:auto; color:white; }
.other { background:#ddd; }

.bottom {
    display:flex;
    padding:10px;
    gap:10px;
    background:white;
}

input {
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#4cd964;
    color:white;
}

</style>
</head>

<body>

<div class="top" id="name">Chat</div>

<div id="chat"></div>

<div class="bottom">
<input id="msg" placeholder="Message...">
<button onclick="send()">➤</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app"
});

const auth = getAuth(app);
const db = getFirestore(app);

const otherId = new URLSearchParams(location.search).get("id");

let myId = null;
let chatId = null;
let messagesRef = null;

// 🔥 WAIT FOR AUTH
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        alert("Login required");
        return;
    }

    // GET MY USER DATA
    const snap = await getDoc(doc(db,"users",user.uid));
    myId = snap.data().userId;

    // GET OTHER USER NAME
    const q = await getDoc(doc(db,"users",user.uid));
    
    chatId = [myId, Number(otherId)].sort().join("_");

    messagesRef = collection(db,"chats",chatId,"messages");

    // 🔥 REALTIME LISTENER
    onSnapshot(query(messagesRef, orderBy("time")), snap => {

        let html = "";

        snap.forEach(d=>{
            const m = d.data();

            html += `<div class="msg ${m.sender==myId?'me':'other'}">
                ${m.text}
            </div>`;
        });

        document.getElementById("chat").innerHTML = html;

        // auto scroll
        document.getElementById("chat").scrollTop = 999999;
    });

});

// ✅ SEND FUNCTION (FIXED)
window.send = async () => {

    const text = document.getElementById("msg").value.trim();

    if (!text || !messagesRef) return;

    await addDoc(messagesRef,{
        text,
        sender: myId,
        time: Date.now()
    });

    document.getElementById("msg").value="";
};

</script>

</body>
</html>
