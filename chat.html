<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>

  <script type="module">
    import { db } from "./firebase.js";

    import {
      collection, addDoc, query, orderBy,
      onSnapshot, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import {
      getAuth, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const auth = getAuth();

    let currentUser = null;
    let otherUserId = null;
    let chatId = null;

    // 🔥 WAIT FOR LOGIN
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Login required");
        window.location.href = "index.html";
        return;
      }

      console.log("✅ Chat user:", user.uid);

      currentUser = {
        userId: user.uid,
        username: user.displayName || "User",
        photoURL: user.photoURL || ""
      };

      // 👉 get other user
      const params = new URLSearchParams(window.location.search);
      otherUserId = params.get("id");

      if (!otherUserId) {
        alert("Invalid chat user");
        return;
      }

      chatId = getChatId(currentUser.userId, otherUserId);

      // ✅ set UI
      document.getElementById("name").innerText = currentUser.username;

      if (currentUser.photoURL) {
        document.getElementById("profileImg").src = currentUser.photoURL;
      }

      document.getElementById("profileImg").onclick = () => {
        if (currentUser.photoURL) {
          window.open(currentUser.photoURL, "_blank");
        }
      };

      // ✅ START CHAT
      loadMessages();
    });

    function getChatId(a, b) {
      return [a, b].sort().join("_");
    }

    function loadMessages() {
      const q = query(
        collection(db, "chats", chatId, "messages"),
        orderBy("createdAt")
      );

      onSnapshot(q, (snapshot) => {
        const box = document.getElementById("messages");
        box.innerHTML = "";

        snapshot.forEach(doc => {
          const m = doc.data();
          const div = document.createElement("div");

          div.className = m.senderId === currentUser.userId
            ? "me"
            : "other";

          div.innerText = m.text;
          box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
      });
    }

    window.sendMessage = async function () {
      const input = document.getElementById("msg");
      const text = input.value.trim();

      if (!text) return;

      await addDoc(collection(db, "chats", chatId, "messages"), {
        text: text,
        senderId: currentUser.userId,
        receiverId: otherUserId,
        createdAt: serverTimestamp()
      });

      input.value = "";
    };
  </script>

  <style>
    body { margin:0; font-family:sans-serif; }

    header {
      background:#4CAF50;
      color:white;
      padding:12px;
      display:flex;
      align-items:center;
    }

    header img {
      width:35px;
      height:35px;
      border-radius:50%;
      margin-right:10px;
      cursor:pointer;
    }

    #messages {
      height:80vh;
      overflow-y:auto;
      padding:10px;
      background:#f5f5f5;
    }

    .me {
      background:#4CAF50;
      color:white;
      padding:8px;
      margin:5px;
      border-radius:10px;
      width:fit-content;
      margin-left:auto;
    }

    .other {
      background:#ddd;
      padding:8px;
      margin:5px;
      border-radius:10px;
      width:fit-content;
    }

    .bottom {
      display:flex;
      padding:10px;
    }

    input {
      flex:1;
      padding:10px;
    }

    button {
      background:#4CAF50;
      color:white;
      border:none;
      padding:10px;
    }
  </style>
</head>

<body>

<header>
  <img id="profileImg" src="https://via.placeholder.com/40">
  <span id="name">User</span>
</header>

<div id="messages"></div>

<div class="bottom">
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

</body>
</html>
