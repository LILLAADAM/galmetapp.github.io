<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { db } from "./firebase.js";
import {
  collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const storage = getStorage();

const currentUser = JSON.parse(localStorage.getItem("user"));

if (!currentUser || !currentUser.uid) {
  alert("Login required");
  window.location.href = "index.html";
}

const myUid = currentUser.uid;
const params = new URLSearchParams(window.location.search);
const otherUid = params.get("id");

if (!otherUid) {
  alert("No user selected");
  window.location.href = "dashboard.html";
}

const chatId = [myUid, otherUid].sort().join("_");

// ✅ MARK AS READ
async function markAsRead() {
  await setDoc(doc(db, "userChats", myUid, "list", otherUid), {
    unread: 0
  }, { merge: true });
}

// ✅ LOAD USER
async function loadOtherUser() {
  const snap = await getDoc(doc(db, "users", otherUid));
  if (!snap.exists()) return;

  const data = snap.data();

  document.getElementById("name").innerText =
    data.fullName || data.username || "User";

  document.getElementById("profileImg").src =
    data.photoURL ||
    `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username)}`;
}

// ✅ LOAD MESSAGES
function loadMessages() {
  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, (snapshot) => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(doc => {
      const m = doc.data();

      const div = document.createElement("div");
      div.className = m.senderId === myUid ? "me" : "other";

      if (m.text) {
        div.innerText = m.text;
      }

      if (m.image) {
        const img = document.createElement("img");
        img.src = m.image;
        img.className = "chat-img";
        div.appendChild(img);
      }

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

// ✅ SEND TEXT
window.sendMessage = async function () {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });

  await updateChatList(text);
  input.value = "";
};

// ✅ UPDATE CHAT LIST
async function updateChatList(lastMsg) {
  await setDoc(doc(db, "userChats", myUid, "list", otherUid), {
    uid: otherUid,
    lastMessage: lastMsg,
    updatedAt: serverTimestamp(),
    unread: 0
  });

  await setDoc(doc(db, "userChats", otherUid, "list", myUid), {
    uid: myUid,
    lastMessage: lastMsg,
    updatedAt: serverTimestamp(),
    unread: 1
  });
}

// ✅ PICK IMAGE
window.pickImage = () => {
  document.getElementById("imageInput").click();
};

// ✅ IMAGE PREVIEW BEFORE SEND
document.getElementById("imageInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const preview = document.getElementById("previewImg");
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";

  document.getElementById("sendImageBtn").style.display = "block";
});

// ✅ SEND IMAGE
window.sendImage = async function () {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return;

  const fileRef = ref(storage, "chatImages/" + Date.now());
  await uploadBytes(fileRef, file);
  const url = await getDownloadURL(fileRef);

  await addDoc(collection(db, "chats", chatId, "messages"), {
    image: url,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });

  await updateChatList("📷 Image");

  // reset preview
  document.getElementById("previewImg").style.display = "none";
  document.getElementById("sendImageBtn").style.display = "none";
  document.getElementById("imageInput").value = "";
};

// ENTER KEY
window.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});

// LOAD
window.onload = () => {
  loadMessages();
  loadOtherUser();
  markAsRead();
};
</script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

header {
  background:#4CAF50;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
}

header img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

#messages {
  height:calc(100vh - 160px);
  overflow-y:auto;
  padding:10px;
}

.me, .other {
  max-width:75%;
  padding:10px;
  margin:6px;
  border-radius:14px;
}

.me {
  background:#4CAF50;
  color:white;
  margin-left:auto;
}

.other {
  background:#e4e6eb;
  color:black;
  margin-right:auto;
}

.chat-img {
  max-width:200px;
  border-radius:10px;
  margin-top:5px;
}

.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  align-items:center;
  padding:8px;
  background:white;
  border-top:1px solid #ccc;
}

.plus {
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  background:#eee;
  font-size:20px;
}

input {
  flex:1;
  margin:0 5px;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

button {
  padding:10px 14px;
  border-radius:20px;
  background:#4CAF50;
  color:white;
  border:none;
}

#previewImg {
  position:fixed;
  bottom:80px;
  left:10px;
  max-width:150px;
  border-radius:10px;
  display:none;
}

#sendImageBtn {
  position:fixed;
  bottom:80px;
  right:10px;
  display:none;
}
</style>
</head>

<body>

<header>
  <img id="profileImg">
  <span id="name">User</span>
</header>

<div id="messages"></div>

<img id="previewImg">
<button id="sendImageBtn" onclick="sendImage()">Send Image</button>

<div class="bottom">
  <button class="plus" onclick="pickImage()">+</button>
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
  <input type="file" id="imageInput" accept="image/*" capture="environment" hidden>
</div>

</body>
</html>
