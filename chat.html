<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>

  <script type="module">
    import { db } from "./firebase.js";
    import {
      collection, addDoc, query, orderBy,
      onSnapshot, serverTimestamp, doc, getDoc
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // 🔥 GET CURRENT USER
    const currentUser = JSON.parse(localStorage.getItem("user"));

    if (!currentUser) {
      alert("Login required");
      window.location.href = "index.html";
    }

    // 🔥 GET OTHER USER ID
    const params = new URLSearchParams(window.location.search);
    const otherUserId = params.get("id");

    if (!otherUserId) {
      alert("No user selected");
      window.location.href = "dashboard.html";
    }

    // 🔥 CREATE CHAT ID
    function getChatId(a, b) {
      return [a, b].sort().join("_");
    }

    const chatId = getChatId(currentUser.userId, otherUserId);

    // 🔥 LOAD OTHER USER PROFILE
    async function loadOtherUser() {
      const snap = await getDoc(doc(db, "users", otherUserId));

      if (!snap.exists()) return;

      const data = snap.data();

      document.getElementById("name").innerText =
        data.username || "User";

      document.getElementById("profileImg").src =
        data.photoURL || "https://ui-avatars.com/api/?name=" + data.username;
    }

    // 🔥 LOAD MESSAGES
    function loadMessages() {
      const q = query(
        collection(db, "chats", chatId, "messages"),
        orderBy("createdAt")
      );

      onSnapshot(q, (snapshot) => {
        const box = document.getElementById("messages");
        box.innerHTML = "";

        snapshot.forEach(doc => {
          const m = doc.data();
          const div = document.createElement("div");

          div.className =
            m.senderId === currentUser.userId ? "me" : "other";

          div.innerText = m.text;
          box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
      });
    }

    // 🔥 SEND MESSAGE
    window.sendMessage = async function () {
      const input = document.getElementById("msg");
      const text = input.value.trim();

      if (!text) return;

      await addDoc(collection(db, "chats", chatId, "messages"), {
        text,
        senderId: currentUser.userId,
        receiverId: otherUserId,
        createdAt: serverTimestamp()
      });

      input.value = "";
    };

    // 🔥 LOAD EVERYTHING
    window.onload = () => {
      loadMessages();
      loadOtherUser();
    };
  </script>

  <style>
    body { margin:0; font-family:sans-serif; }

    header {
      background:#4CAF50;
      color:white;
      padding:12px;
      display:flex;
      align-items:center;
    }

    header img {
      width:35px;
      height:35px;
      border-radius:50%;
      margin-right:10px;
    }

    #messages {
      height:80vh;
      overflow-y:auto;
      padding:10px;
      background:#f5f5f5;
    }

    .me {
      background:#4CAF50;
      color:white;
      padding:8px;
      margin:5px;
      border-radius:10px;
      width:fit-content;
      margin-left:auto;
    }

    .other {
      background:#ddd;
      padding:8px;
      margin:5px;
      border-radius:10px;
      width:fit-content;
    }

    .bottom {
      display:flex;
      padding:10px;
    }

    input {
      flex:1;
      padding:10px;
    }

    button {
      background:#4CAF50;
      color:white;
      border:none;
      padding:10px;
    }
  </style>
</head>

<body>

<header>
  <img id="profileImg">
  <span id="name">User</span>
</header>

<div id="messages"></div>

<div class="bottom">
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

</body>
</html>
