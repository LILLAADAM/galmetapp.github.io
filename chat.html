<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet Chat</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f3f7fb",
            "surface-container-low": "#ecf1f6",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60",
            "primary": "#006571",
            "primary-container": "#00e3fd",
            "primary-dim": "#005863",
            "on-primary": "#d8f8ff",
            "secondary": "#755700",
            "secondary-container": "#ffca4d",
            "tertiary": "#b60051",
            "outline": "#73777b",
            "outline-variant": "#a9aeb1",
            "error": "#b31b25"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .chat-bubble-left {
      border-bottom-left-radius: 4px;
    }
    .chat-bubble-right {
      border-bottom-right-radius: 4px;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .messages-container {
      scroll-behavior: smooth;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 170px);
    }
    @media (min-width: 640px) {
      .messages-container {
        padding-bottom: 190px;
      }
    }
    
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #fff;
      border-top-color: #006571;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* Gift panel glassmorphism */
    .glass-panel {
      background: rgba(10, 15, 18, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .gift-gradient {
      background: linear-gradient(180deg, rgba(0, 227, 253, 0.1) 0%, rgba(0, 101, 113, 0.05) 100%);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface flex flex-col min-h-screen">

<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl flex items-center justify-between px-4 h-16 shadow-sm">
  <div class="flex items-center gap-3">
    <button onclick="goBack()" class="p-2 hover:bg-primary-container/30 transition-colors rounded-full text-primary">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <div class="flex items-center gap-2 cursor-pointer" onclick="viewProfile()">
      <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
        <img id="chatAvatar" class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=User">
      </div>
      <h1 id="chatName" class="font-headline font-semibold text-lg text-primary">Loading...</h1>
    </div>
  </div>
  <div class="flex items-center">
    <button onclick="openMenu()" class="p-2 hover:bg-primary-container/30 transition-colors rounded-full text-primary">
      <span class="material-symbols-outlined">more_vert</span>
    </button>
  </div>
</header>

<!-- Sub-header (user details) -->
<div id="subHeader" class="fixed top-16 w-full z-40 bg-white/40 backdrop-blur-md px-6 py-3 flex flex-col gap-1 border-b border-outline-variant/20">
  <div class="flex items-center gap-4 text-xs font-medium text-on-surface-variant">
    <div id="userCountry" class="flex items-center gap-1 bg-surface-container-lowest px-2 py-1 rounded-full shadow-sm">🌍 Loading...</div>
    <div id="userGenderAge" class="flex items-center gap-1 bg-surface-container-lowest px-2 py-1 rounded-full shadow-sm text-primary">♂ ?</div>
    <div id="userLanguage" class="flex items-center gap-1 bg-surface-container-lowest px-2 py-1 rounded-full shadow-sm">🌐 English</div>
  </div>
  <div id="userLocation" class="flex items-center gap-1 text-[10px] text-outline px-1">
    <span class="material-symbols-outlined text-[12px]">location_on</span>
    <span>Location unknown</span>
  </div>
</div>

<!-- Chat Messages -->
<main id="messagesContainer" class="messages-container flex-1 mt-36 px-4 overflow-y-auto space-y-6 pt-4"></main>

<!-- Bottom Input Bar -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-white/90 backdrop-blur-lg rounded-t-2xl shadow-[0_-8px_30px_rgb(0,0,0,0.04)]">
  <div class="flex gap-2 px-4 overflow-x-auto py-2 no-scrollbar">
    <button onclick="sendQuickReply('Down for a game?')" class="shrink-0 bg-surface-container-low text-primary-dim px-3 py-1.5 rounded-full text-[11px] font-medium hover:bg-primary-container/20">Down for a game?</button>
    <button onclick="sendQuickReply('So proud of you')" class="shrink-0 bg-surface-container-low text-primary-dim px-3 py-1.5 rounded-full text-[11px] font-medium hover:bg-primary-container/20">So proud of you</button>
    <button onclick="sendQuickReply('Hello! 👋')" class="shrink-0 bg-surface-container-low text-primary-dim px-3 py-1.5 rounded-full text-[11px] font-medium hover:bg-primary-container/20">Hello! 👋</button>
    <button onclick="sendQuickReply('Tell me more')" class="shrink-0 bg-surface-container-low text-primary-dim px-3 py-1.5 rounded-full text-[11px] font-medium hover:bg-primary-container/20">Tell me more</button>
  </div>
  <div class="px-4 pt-1 pb-2 flex items-center gap-2">
    <div class="flex-1 bg-surface-container-low rounded-full px-3 py-2 flex items-center gap-1">
      <input id="messageInput" type="text" class="bg-transparent border-none focus:ring-0 text-sm w-full font-body placeholder:text-outline-variant" placeholder="Say something...">
    </div>
    <button onclick="sendMessage()" class="w-10 h-10 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container shadow-md active:scale-90 transition">
      <span class="material-symbols-outlined text-xl">send</span>
    </button>
  </div>
  <div class="flex justify-around items-center px-4 pb-4 pt-1">
    <button onclick="pickImage()" class="text-slate-400 p-2 hover:scale-110 transition">
      <span class="material-symbols-outlined text-xl">image</span>
    </button>
    <button onclick="openCamera()" class="text-slate-400 p-2 hover:scale-110 transition">
      <span class="material-symbols-outlined text-xl">photo_camera</span>
    </button>
    <button onclick="startVideoCall()" class="relative text-slate-400 p-2 hover:scale-110 transition">
      <span class="material-symbols-outlined text-xl">videocam</span>
      <div class="absolute top-0 -right-2 bg-secondary-container text-on-secondary-fixed text-[8px] font-bold px-1 py-0.5 rounded-full flex items-center gap-0.5 shadow-sm">
        <span class="material-symbols-outlined text-[8px]" style="font-variation-settings:'FILL'1">monetization_on</span>
        <span>0.1</span>
      </div>
    </button>
    <button onclick="openGiftPanel()" class="text-slate-400 p-2 hover:scale-110 transition">
      <span class="material-symbols-outlined text-xl">redeem</span>
    </button>
  </div>
</div>

<!-- Menu Modal -->
<div id="menuModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60] hidden items-end justify-center" onclick="closeMenu()">
  <div class="bg-surface-container-lowest w-full rounded-t-2xl p-6 max-w-md mx-auto" onclick="event.stopPropagation()">
    <div class="flex flex-col gap-4">
      <button id="followBtn" onclick="toggleFollow()" class="w-full text-left py-3 px-4 rounded-xl bg-surface-container-low font-medium">Follow</button>
      <button id="blockBtn" onclick="toggleBlock()" class="w-full text-left py-3 px-4 rounded-xl bg-surface-container-low font-medium">Block</button>
      <button onclick="viewProfile()" class="w-full text-left py-3 px-4 rounded-xl bg-surface-container-low font-medium">View Profile</button>
      <button onclick="closeMenu()" class="w-full text-left py-3 px-4 rounded-xl text-error font-medium">Cancel</button>
    </div>
  </div>
</div>

<!-- Image Preview Modal -->
<div id="previewModal" class="fixed inset-0 bg-black/90 z-[70] hidden flex-col items-center justify-center gap-6" onclick="closePreview()">
  <img id="previewImage" class="max-w-[90%] max-h-[70vh] rounded-xl object-contain">
  <div class="flex gap-4" onclick="event.stopPropagation()">
    <button onclick="closePreview()" class="px-6 py-2 bg-surface rounded-full">Cancel</button>
    <button id="sendImageBtn" onclick="sendImageMessage()" class="px-6 py-2 bg-primary text-white rounded-full">Send</button>
  </div>
</div>

<!-- Fullscreen Image Viewer -->
<div id="viewerModal" class="fixed inset-0 bg-black/95 z-[80] hidden flex-col items-center justify-center" onclick="closeViewer()">
  <img id="viewerImage" class="max-w-[90%] max-h-[80vh] rounded-lg object-contain">
  <a id="downloadLink" class="absolute bottom-10 right-6 bg-primary text-white px-4 py-2 rounded-full text-sm" download>Save Image</a>
</div>

<!-- Toast & Loading -->
<div id="toast" class="fixed bottom-28 left-1/2 -translate-x-1/2 bg-black/80 text-white px-4 py-2 rounded-full text-sm z-[90] hidden"></div>
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner"></div>
</div>

<!-- ================= NEW GIFT PANEL (Glass, half‑screen) ================= -->
<div id="giftPanel" class="fixed inset-0 z-[100] hidden items-end justify-center">
  <div class="glass-panel w-full max-w-md rounded-t-3xl flex flex-col" style="height: 62%;">
    <!-- Drag handle -->
    <div class="w-full flex justify-center py-3">
      <div class="w-12 h-1.5 bg-white/20 rounded-full"></div>
    </div>
    <!-- Top banner -->
    <div class="px-4 pb-2">
      <div class="w-full py-2.5 px-4 bg-gradient-to-r from-primary to-primary-dim rounded-xl flex items-center justify-between shadow-lg shadow-primary/20">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-secondary-fixed text-lg" style="font-variation-settings:'FILL'1">filter_vintage</span>
          <p class="text-[11px] font-headline font-bold text-white tracking-wide">Lucky Gifts - Have chances to win the 1000x jackpot</p>
        </div>
        <span class="material-symbols-outlined text-white/70 text-sm">chevron_right</span>
      </div>
    </div>
    <!-- Tab Navigation -->
    <div class="flex items-center justify-between px-6 py-3 border-b border-white/5">
      <div class="flex items-center gap-6">
        <button id="tabHot" class="text-sm font-headline font-semibold text-white/50">Hot</button>
        <button id="TabLucky" class="text-sm font-headline font-semibold text-white/50">Lucky</button>
        <div class="relative py-2">
          <button id="tabLuxury" class="text-sm font-headline font-bold text-primary-fixed">Luxury</button>
          <div class="absolute bottom-0 left-0 w-full h-0.5 bg-primary-fixed rounded-full"></div>
        </div>
      </div>
      <div class="flex items-center gap-2 bg-white/5 py-1.5 px-3 rounded-full border border-white/10">
        <span class="material-symbols-outlined text-secondary-fixed text-sm" style="font-variation-settings:'FILL'1">monetization_on</span>
        <span id="giftUserCoins" class="text-xs font-bold text-white font-headline">0</span>
        <span class="material-symbols-outlined text-white/30 text-sm">add_circle</span>
      </div>
    </div>
    <!-- Gift Grid -->
    <div class="flex-1 overflow-y-auto px-4 py-4 scrollbar-hide">
      <div id="giftGrid" class="grid grid-cols-4 gap-3">
        <!-- Gifts loaded dynamically -->
      </div>
    </div>
    <!-- Footer (close) -->
    <div class="h-20 flex items-center justify-center border-t border-white/5">
      <button onclick="closeGiftPanel()" class="px-6 py-2 bg-white/10 rounded-full text-white text-sm">Close</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot, doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);
  const storage = getStorage(app);

  // User check
  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) {
    alert("Please login first");
    window.location.replace("login.html");
    throw new Error("Not logged in");
  }
  const myUserId = currentUser.userId.toString();
  const otherUserId = new URLSearchParams(window.location.search).get("id");
  if (!otherUserId) {
    alert("Invalid chat");
    window.location.href = "chats.html";
  }
  const chatId = [myUserId, otherUserId].sort().join("_");

  // DOM elements
  const messagesDiv = document.getElementById("messagesContainer");
  const messageInput = document.getElementById("messageInput");
  const chatNameSpan = document.getElementById("chatName");
  const chatAvatarImg = document.getElementById("chatAvatar");
  const followBtn = document.getElementById("followBtn");
  const blockBtn = document.getElementById("blockBtn");
  const toast = document.getElementById("toast");
  const loadingOverlay = document.getElementById("loadingOverlay");
  const giftPanel = document.getElementById("giftPanel");
  const giftGrid = document.getElementById("giftGrid");
  const giftUserCoinsSpan = document.getElementById("giftUserCoins");

  let selectedImageFile = null;
  let userScrolledUp = false;
  let userCoins = 0;

  messagesDiv.addEventListener("scroll", () => {
    const isNearBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight < 50;
    userScrolledUp = !isNearBottom;
  });

  function showToast(msg) {
    toast.innerText = msg;
    toast.classList.remove("hidden");
    setTimeout(() => toast.classList.add("hidden"), 2000);
  }

  // Load other user info
  async function loadOtherUser() {
    const userDoc = await getDoc(doc(db, "users", otherUserId));
    if (!userDoc.exists()) return;
    const data = userDoc.data();
    chatNameSpan.innerText = data.username || data.email || "User";
    chatAvatarImg.src = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username || "User")}&background=006571&color=fff`;
    
    const countryEl = document.getElementById("userCountry");
    if (data.country) {
      const countryName = typeof data.country === "object" ? data.country.name : data.country;
      const countryCode = typeof data.country === "object" ? data.country.code : "";
      const flag = countryCode ? getFlagEmoji(countryCode) : "🌍";
      countryEl.innerHTML = `${flag} ${countryName}`;
    } else {
      countryEl.innerHTML = "🌍 Unknown";
    }
    
    const genderAgeEl = document.getElementById("userGenderAge");
    if (data.gender || data.age) {
      const genderSymbol = data.gender === 'male' ? '♂' : (data.gender === 'female' ? '♀' : '');
      genderAgeEl.innerHTML = `${genderSymbol} ${data.age || '?'}`;
    }
    
    const locationEl = document.getElementById("userLocation");
    if (data.country) {
      const countryName = typeof data.country === "object" ? data.country.name : data.country;
      locationEl.innerHTML = `<span class="material-symbols-outlined text-[12px]">location_on</span> <span>From ${countryName}</span>`;
    }
  }
  
  function getFlagEmoji(countryCode) {
    if (!countryCode) return "🌍";
    const codePoints = countryCode.toUpperCase().split('').map(c => 127397 + c.charCodeAt(0));
    return String.fromCodePoint(...codePoints);
  }

  // Load user's coins for gift panel
  async function loadUserCoins() {
    const userSnap = await getDoc(doc(db, "users", myUserId));
    if (userSnap.exists()) {
      userCoins = userSnap.data().coins || 0;
      giftUserCoinsSpan.innerText = userCoins;
    }
  }

  // Gift functions
  async function loadGifts() {
    const snapshot = await getDocs(collection(db, "gifts"));
    giftGrid.innerHTML = "";
    snapshot.forEach(docSnap => {
      const g = docSnap.data();
      const giftDiv = document.createElement("div");
      giftDiv.className = "flex flex-col items-center gap-1 cursor-pointer hover:scale-105 transition";
      giftDiv.onclick = () => sendGiftNow(docSnap.id, g.coinPrice, g.name, g.image);
      giftDiv.innerHTML = `
        <div class="w-full aspect-square bg-white/5 rounded-2xl flex items-center justify-center gift-gradient border border-white/10 p-2">
          <img src="${g.image}" class="w-full h-full object-contain">
        </div>
        <span class="text-[10px] text-white/80 font-medium">${g.name}</span>
        <span class="text-[9px] text-secondary-fixed font-bold">🌕 ${g.coinPrice}</span>
      `;
      giftGrid.appendChild(giftDiv);
    });
  }

  async function sendGiftNow(giftId, price, name, image) {
    if (userCoins < price) {
      showToast("Not enough coins!");
      return;
    }
    // Deduct coins optimistically? Better call backend
    try {
      const res = await fetch("https://us-central1-galmet-app.cloudfunctions.net/sendGift", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          senderId: myUserId,
          receiverId: otherUserId,
          giftId: giftId,
          quantity: 1
        })
      });
      const data = await res.json();
      if (data.error) {
        showToast(data.error);
      } else {
        showToast(`🎁 ${name} sent!`);
        closeGiftPanel();
        // Update local coins
        userCoins -= price;
        giftUserCoinsSpan.innerText = userCoins;
        // Also update user object in localStorage and Firestore? Backend already did.
        // The chat message will appear via Firestore trigger.
      }
    } catch (err) {
      showToast("Error sending gift");
    }
  }

  function openGiftPanel() {
    giftPanel.classList.remove("hidden");
    giftPanel.classList.add("flex");
    loadUserCoins();
    loadGifts();
  }
  window.closeGiftPanel = () => {
    giftPanel.classList.add("hidden");
    giftPanel.classList.remove("flex");
  };
  window.openGiftPanel = openGiftPanel;

  // Real-time messages (including gifts)
  function loadMessages() {
    const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "asc"));
    onSnapshot(q, (snapshot) => {
      const wasUserAtBottom = !userScrolledUp;
      messagesDiv.innerHTML = "";
      let lastTimestamp = null;
      snapshot.forEach(docSnap => {
        const msg = docSnap.data();
        const time = msg.createdAt ? new Date(msg.createdAt.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
        if (lastTimestamp !== msg.createdAt?.seconds) {
          const timeDiv = document.createElement("div");
          timeDiv.className = "flex justify-center";
          timeDiv.innerHTML = `<span class="text-[10px] font-bold font-headline text-outline uppercase tracking-widest bg-surface-container-low px-3 py-1 rounded-full">${time}</span>`;
          messagesDiv.appendChild(timeDiv);
          lastTimestamp = msg.createdAt?.seconds;
        }
        const isMe = msg.senderId === myUserId;
        const bubbleDiv = document.createElement("div");
        if (isMe) {
          bubbleDiv.className = "flex flex-col items-end gap-1";
          bubbleDiv.innerHTML = `
            <div class="bg-primary-container text-on-surface p-3 rounded-lg chat-bubble-right max-w-[85%] shadow-sm">
              ${msg.type === "gift" ? `
                <div class="bg-yellow-100 p-3 rounded-lg text-center">
                  <img src="${msg.giftImage}" class="w-16 h-16 mx-auto mb-2">
                  <p class="text-sm font-semibold">🎁 ${msg.giftName} x${msg.quantity}</p>
                </div>
              ` : ''}
              ${msg.text ? `<p class="text-sm leading-relaxed">${escapeHtml(msg.text)}</p>` : ''}
              ${msg.image ? `<div class="rounded-md overflow-hidden mt-1"><img src="${msg.image}" class="max-w-[200px] max-h-[200px] rounded-lg cursor-pointer" onclick="openImageViewer('${msg.image}')"></div>` : ''}
            </div>
          `;
        } else {
          bubbleDiv.className = "flex items-start gap-3 max-w-[85%]";
          bubbleDiv.innerHTML = `
            <div class="w-8 h-8 rounded-full overflow-hidden mt-1 shrink-0">
              <img src="${chatAvatarImg.src}" class="w-full h-full object-cover">
            </div>
            <div class="bg-surface-container-lowest text-on-surface p-3 rounded-lg chat-bubble-left shadow-sm">
              ${msg.type === "gift" ? `
                <div class="bg-yellow-100 p-3 rounded-lg text-center">
                  <img src="${msg.giftImage}" class="w-16 h-16 mx-auto mb-2">
                  <p class="text-sm font-semibold">🎁 ${msg.giftName} x${msg.quantity}</p>
                </div>
              ` : ''}
              ${msg.text ? `<p class="text-sm leading-relaxed">${escapeHtml(msg.text)}</p>` : ''}
              ${msg.image ? `<div class="rounded-md overflow-hidden mt-1"><img src="${msg.image}" class="max-w-[200px] max-h-[200px] rounded-lg cursor-pointer" onclick="openImageViewer('${msg.image}')"></div>` : ''}
            </div>
          `;
        }
        messagesDiv.appendChild(bubbleDiv);
      });
      // Auto-scroll logic
      if (wasUserAtBottom || (snapshot.docs.length > 0 && snapshot.docs[snapshot.docs.length-1].data().senderId === myUserId)) {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        userScrolledUp = false;
      }
      resetUnread();
    });
  }

  async function resetUnread() {
    await setDoc(doc(db, "userChats", myUserId, "list", otherUserId), { unread: 0 }, { merge: true });
  }

  async function updateChatList(lastMsg) {
    await setDoc(doc(db, "userChats", myUserId, "list", otherUserId), {
      uid: otherUserId,
      lastMessage: lastMsg,
      updatedAt: serverTimestamp(),
      unread: 0
    }, { merge: true });
    const otherRef = doc(db, "userChats", otherUserId, "list", myUserId);
    const snap = await getDoc(otherRef);
    let unreadCount = 1;
    if (snap.exists()) unreadCount = (snap.data().unread || 0) + 1;
    await setDoc(otherRef, {
      uid: myUserId,
      lastMessage: lastMsg,
      updatedAt: serverTimestamp(),
      unread: unreadCount
    }, { merge: true });
  }

  // Send text
  window.sendMessage = async () => {
    const text = messageInput.value.trim();
    if (!text) return;
    messageInput.value = "";
    const blockedByThem = await getDoc(doc(db, "blocked", otherUserId, "list", myUserId));
    const blockedByMe = await getDoc(doc(db, "blocked", myUserId, "list", otherUserId));
    if (blockedByThem.exists() || blockedByMe.exists()) {
      showToast("You cannot message this user");
      return;
    }
    await addDoc(collection(db, "chats", chatId, "messages"), {
      text: text,
      senderId: myUserId,
      receiverId: otherUserId,
      createdAt: serverTimestamp()
    });
    await updateChatList(text);
    setTimeout(() => { messagesDiv.scrollTop = messagesDiv.scrollHeight; userScrolledUp = false; }, 50);
  };

  window.sendQuickReply = async (text) => {
    messageInput.value = text;
    await sendMessage();
  };

  // Image pick & send
  window.pickImage = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      selectedImageFile = file;
      const previewImg = document.getElementById("previewImage");
      previewImg.src = URL.createObjectURL(file);
      document.getElementById("previewModal").classList.remove("hidden");
    };
    input.click();
  };

  async function compressImage(file) {
    return new Promise((resolve) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = (e) => img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let width = img.width;
        let height = img.height;
        const maxDim = 1024;
        if (width > maxDim || height > maxDim) {
          if (width > height) {
            height = (height / width) * maxDim;
            width = maxDim;
          } else {
            width = (width / height) * maxDim;
            height = maxDim;
          }
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.85);
      };
      reader.readAsDataURL(file);
    });
  }

  window.sendImageMessage = async () => {
    if (!selectedImageFile) return;
    loadingOverlay.classList.remove("hidden");
    try {
      const compressed = await compressImage(selectedImageFile);
      const fileName = `chatImages/${Date.now()}_${Math.random()}.jpg`;
      const storageRef = ref(storage, fileName);
      await uploadBytes(storageRef, compressed);
      const url = await getDownloadURL(storageRef);
      await addDoc(collection(db, "chats", chatId, "messages"), {
        image: url,
        senderId: myUserId,
        receiverId: otherUserId,
        createdAt: serverTimestamp()
      });
      await updateChatList("📷 Image");
      closePreview();
      setTimeout(() => { messagesDiv.scrollTop = messagesDiv.scrollHeight; userScrolledUp = false; }, 50);
    } catch (err) {
      console.error(err);
      showToast("Failed to send image");
    } finally {
      loadingOverlay.classList.add("hidden");
    }
  };

  window.closePreview = () => {
    document.getElementById("previewModal").classList.add("hidden");
    selectedImageFile = null;
  };

  // Camera
  window.openCamera = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      const video = document.createElement("video");
      video.srcObject = stream;
      video.play();
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      video.addEventListener("loadedmetadata", () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(async (blob) => {
          const file = new File([blob], "camera-photo.jpg", { type: "image/jpeg" });
          selectedImageFile = file;
          const previewImg = document.getElementById("previewImage");
          previewImg.src = URL.createObjectURL(file);
          document.getElementById("previewModal").classList.remove("hidden");
          stream.getTracks().forEach(track => track.stop());
          video.remove();
        }, "image/jpeg", 0.85);
      });
    } catch (err) {
      console.error(err);
      showToast("Camera permission denied");
    }
  };

  // Follow/block logic (simplified, same as before)
  function initRealtimeStatus() {
    const followRef = doc(db, "followers", otherUserId, "list", myUserId);
    const blockByMeRef = doc(db, "blocked", myUserId, "list", otherUserId);
    const blockByThemRef = doc(db, "blocked", otherUserId, "list", myUserId);
    onSnapshot(followRef, () => updateMenuState());
    onSnapshot(blockByMeRef, () => updateMenuState());
    onSnapshot(blockByThemRef, () => updateMenuState());
  }
  
  async function updateMenuState() {
    const followed = await getDoc(doc(db, "followers", otherUserId, "list", myUserId));
    const blockedByMe = await getDoc(doc(db, "blocked", myUserId, "list", otherUserId));
    const blockedByThem = await getDoc(doc(db, "blocked", otherUserId, "list", myUserId));
    const isBlocked = blockedByMe.exists() || blockedByThem.exists();
    if (isBlocked) {
      followBtn.innerText = "Follow";
      blockBtn.innerText = "Unblock";
    } else {
      followBtn.innerText = followed.exists() ? "Unfollow" : "Follow";
      blockBtn.innerText = "Block";
    }
  }

  window.toggleFollow = async () => {
    const followRef = doc(db, "followers", otherUserId, "list", myUserId);
    const followingRef = doc(db, "following", myUserId, "list", otherUserId);
    const exists = (await getDoc(followRef)).exists();
    if (exists) {
      await deleteDoc(followRef);
      await deleteDoc(followingRef);
      await deleteDoc(doc(db, "friends", otherUserId, "list", myUserId));
      await deleteDoc(doc(db, "friends", myUserId, "list", otherUserId));
      showToast("Unfollowed");
    } else {
      await setDoc(followRef, { uid: myUserId });
      await setDoc(followingRef, { uid: otherUserId });
      const otherFollowsMe = await getDoc(doc(db, "followers", myUserId, "list", otherUserId));
      if (otherFollowsMe.exists()) {
        await setDoc(doc(db, "friends", otherUserId, "list", myUserId), { uid: myUserId });
        await setDoc(doc(db, "friends", myUserId, "list", otherUserId), { uid: otherUserId });
      }
      showToast("Followed");
    }
    closeMenu();
  };

  window.toggleBlock = async () => {
    const blockedRef = doc(db, "blocked", myUserId, "list", otherUserId);
    const exists = (await getDoc(blockedRef)).exists();
    if (exists) {
      await deleteDoc(blockedRef);
      showToast("Unblocked");
    } else {
      await setDoc(blockedRef, { uid: otherUserId });
      await deleteDoc(doc(db, "followers", otherUserId, "list", myUserId));
      await deleteDoc(doc(db, "following", myUserId, "list", otherUserId));
      await deleteDoc(doc(db, "friends", otherUserId, "list", myUserId));
      await deleteDoc(doc(db, "friends", myUserId, "list", otherUserId));
      showToast("Blocked");
    }
    closeMenu();
  };

  // Navigation
  window.goBack = () => { window.history.back(); };
  window.viewProfile = () => { window.location.href = `view.html?id=${otherUserId}`; };
  window.openMenu = () => {
    document.getElementById("menuModal").classList.remove("hidden");
    document.getElementById("menuModal").classList.add("flex");
  };
  window.closeMenu = () => {
    document.getElementById("menuModal").classList.add("hidden");
    document.getElementById("menuModal").classList.remove("flex");
  };
  window.startVideoCall = () => { showToast("Video call costs 0.1 coins (coming soon)"); };
  window.openImageViewer = (url) => {
    const viewer = document.getElementById("viewerModal");
    const viewerImg = document.getElementById("viewerImage");
    const downloadLink = document.getElementById("downloadLink");
    viewerImg.src = url;
    downloadLink.href = url;
    viewer.classList.remove("hidden");
  };
  window.closeViewer = () => { document.getElementById("viewerModal").classList.add("hidden"); };

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  // Initialization
  loadOtherUser();
  loadMessages();
  initRealtimeStatus();
  messageInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
  setTimeout(() => {
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    userScrolledUp = false;
  }, 500);
  
  // Close modals on outside click
  document.getElementById("menuModal").addEventListener("click", (e) => { if (e.target === document.getElementById("menuModal")) closeMenu(); });
  document.getElementById("previewModal").addEventListener("click", (e) => { if (e.target === document.getElementById("previewModal")) closePreview(); });
  document.getElementById("viewerModal").addEventListener("click", (e) => { if (e.target === document.getElementById("viewerModal")) closeViewer(); });
  document.getElementById("giftPanel").addEventListener("click", (e) => { if (e.target === document.getElementById("giftPanel")) closeGiftPanel(); });
</script>
</body>
