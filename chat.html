<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {margin:0;font-family:Segoe UI;}

.chat {
    height:90vh;
    overflow:auto;
    padding:10px;
}

.me {text-align:right;}
.msg {
    display:inline-block;
    padding:10px;
    margin:5px;
    border-radius:10px;
    background:#eee;
}

.me .msg {background:#4cd964;color:white;}

.input {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
}

input {flex:1;padding:10px;}
button {padding:10px;}
</style>
</head>

<body>

<div id="chat" class="chat"></div>

<div class="input">
<input id="msg">
<button onclick="send()">➤</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app"
});

const auth = getAuth(app);
const db = getFirestore(app);

const other = new URLSearchParams(location.search).get("id");

// 🔥 GET MY USER ID
const myDoc = await getDoc(doc(db,"users",auth.currentUser.uid));
const myId = myDoc.data().userId;

// 🔥 CHAT ID FIX
const chatId = [myId, other].sort().join("_");

const messagesRef = collection(db,"chats",chatId,"messages");

// SEND
window.send = async () => {

    const text = document.getElementById("msg").value;

    if (!text) return;

    await addDoc(messagesRef,{
        text,
        sender: myId,
        time: Date.now()
    });

    document.getElementById("msg").value="";
};

// LISTEN
onSnapshot(query(messagesRef, orderBy("time")), snap => {

    let html = "";

    snap.forEach(d=>{
        const m = d.data();

        html += `<div style="
        padding:10px;
        margin:5px;
        border-radius:10px;
        background:${m.sender==myId?'#4cd964':'#ddd'};
        text-align:${m.sender==myId?'right':'left'};
        ">${m.text}</div>`;
    });

    document.getElementById("chat").innerHTML = html;
});

</script>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

</body>
</html>
