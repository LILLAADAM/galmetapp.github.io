<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, getDoc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const storage = getStorage(undefined, "gs://galmet-app.firebasestorage.app");

/* ================= USER ================= */
const currentUser = JSON.parse(localStorage.getItem("user"));
if (!currentUser?.uid) {
  alert("Login required");
  location.href = "index.html";
}

const myUid = currentUser.uid;
const otherUid = new URLSearchParams(location.search).get("id");
const chatId = [myUid, otherUid].sort().join("_");

/* ================= LOAD USER ================= */
async function loadOtherUser() {
  const snap = await getDoc(doc(db, "users", otherUid));
  if (!snap.exists()) return;

  const data = snap.data();

  document.getElementById("name").innerText =
    data.fullName || data.username || "User";

  document.getElementById("profileImg").src =
    data.photoURL ||
    `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username)}`;
}

/* ================= REALTIME MESSAGES (NO DELAY) ================= */
function loadMessages() {
  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, (snapshot) => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(docSnap => {
      const m = docSnap.data();

      const div = document.createElement("div");
      div.className = m.senderId === myUid ? "me" : "other";

      if (m.text) div.innerText = m.text;

      if (m.image) {
        const img = document.createElement("img");
        img.src = m.image;
        img.className = "chat-img";
        img.onclick = () => openViewer(m.image);
        div.appendChild(img);
      }

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

/* ================= IMAGE VIEW ================= */
window.openViewer = (url) => {
  document.getElementById("viewerImg").src = url;
  document.getElementById("downloadBtn").href = url;
  document.getElementById("viewer").style.display = "flex";
};

window.closeViewer = () => {
  document.getElementById("viewer").style.display = "none";
};

/* ================= IMAGE PICK ================= */
window.pickImage = () => {
  document.getElementById("imageInput").click();
};

let selectedFile = null;

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("imageInput").addEventListener("change", e => {
    selectedFile = e.target.files[0];
    if (!selectedFile) return;

    document.getElementById("previewModal").style.display = "flex";
    document.getElementById("previewImage").src =
      URL.createObjectURL(selectedFile);
  });
});

/* ================= COMPRESS ================= */
function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxWidth = 800;

      let scale = maxWidth / img.width;
      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}

/* ================= SEND IMAGE (INSTANT + UNREAD) ================= */
window.sendImage = async () => {

  const a = await getDoc(doc(db,"blocked",otherUid,"list",myUid));
  const b = await getDoc(doc(db,"blocked",myUid,"list",otherUid));

  if(a.exists() || b.exists()){
    showToast("Blocked user");
    return;
  }

  if (!selectedFile) return;
  const compressed = await compressImage(selectedFile);

  const fileRef = ref(storage, "chatImages/" + Date.now());
  await uploadBytes(fileRef, compressed);
  const url = await getDownloadURL(fileRef);

  await addDoc(collection(db, "chats", chatId, "messages"), {
    image: url,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });

  await updateChatList("📷 Image");

  closePreview();
};

window.closePreview = () => {
  document.getElementById("previewModal").style.display = "none";
  selectedFile = null;
};

/* ================= SEND TEXT (NO DELAY) ================= */
window.sendMessage = async () => {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  input.value = ""; // ⚡ instant feel

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });

  await updateChatList(text);
};

/* ================= UPDATE CHAT LIST (REAL UNREAD) ================= */
async function updateChatList(lastMsg) {

  // MY SIDE (reset unread)
  await setDoc(doc(db, "userChats", myUid, "list", otherUid), {
    uid: otherUid,
    lastMessage: lastMsg,
    updatedAt: serverTimestamp(),
    unread: 0
  }, { merge: true });

  // OTHER SIDE (increase unread)
  const otherRef = doc(db, "userChats", otherUid, "list", myUid);
  const snap = await getDoc(otherRef);

  let unreadCount = 1;
  if (snap.exists()) {
    unreadCount = (snap.data().unread || 0) + 1;
  }

  await setDoc(otherRef, {
    uid: myUid,
    lastMessage: lastMsg,
    updatedAt: serverTimestamp(),
    unread: unreadCount
  }, { merge: true });
}

/* ================= RESET UNREAD WHEN OPEN ================= */
async function resetUnread() {
  await setDoc(doc(db, "userChats", myUid, "list", otherUid), {
    unread: 0
  }, { merge: true });
}

/* ================= LOAD ================= */
window.onload = async () => {
  loadMessages();
  loadOtherUser();
  await resetUnread();
};
/* ================= MENU + BLOCK SYSTEM ================= */

const menuBox = document.getElementById("menuBox");

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=> t.style.display="none",2000);
}

/* REALTIME STATE */
onSnapshot(doc(db,"followers",otherUid,"list",myUid), updateMenu);
onSnapshot(doc(db,"followers",myUid,"list",otherUid), updateMenu);
onSnapshot(doc(db,"blocked",otherUid,"list",myUid), updateMenu);
onSnapshot(doc(db,"blocked",myUid,"list",otherUid), updateMenu);
  
/* CHECK STATE */
async function updateMenu(){

  const f1 = await getDoc(doc(db,"followers",otherUid,"list",myUid));
  const blockA = await getDoc(doc(db,"blocked",otherUid,"list",myUid));
  const blockB = await getDoc(doc(db,"blocked",myUid,"list",otherUid));

  const isBlocked = blockA.exists() || blockB.exists();

  const items = menuBox.querySelectorAll("div");

  if(isBlocked){
    items[0].innerText = "Follow";
    items[1].innerText = "Unblock";

    document.getElementById("msg").disabled = true;

  } else {

    document.getElementById("msg").disabled = false;

    if(f1.exists()){
      items[0].innerText = "Unfollow";
    } else {
      items[0].innerText = "Follow";
    }

    items[1].innerText = "Block";
  }
}
  
window.toggleFollow = async () => {

  const a = doc(db,"followers",otherUid,"list",myUid);
  const b = doc(db,"following",myUid,"list",otherUid);

  const snap = await getDoc(a);

  if(snap.exists()){
    await deleteDoc(a);
    await deleteDoc(b);

    await deleteDoc(doc(db,"friends",otherUid,"list",myUid));
    await deleteDoc(doc(db,"friends",myUid,"list",otherUid));

    showToast("Unfollowed");
  }
  else{
    await setDoc(a,{uid:myUid});
    await setDoc(b,{uid:otherUid});

    const other = await getDoc(doc(db,"followers",myUid,"list",otherUid));

    if(other.exists()){
      await setDoc(doc(db,"friends",otherUid,"list",myUid),{uid:myUid});
      await setDoc(doc(db,"friends",myUid,"list",otherUid),{uid:otherUid});
    }

    showToast("Followed");
  }

  closeMenu();
};

window.toggleBlock = async () => {

  const ref = doc(db,"blocked",otherUid,"list",myUid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    await deleteDoc(ref);
    showToast("Unblocked");
  } else {

    await setDoc(ref,{uid:myUid});

    // REMOVE ALL RELATIONS
    await deleteDoc(doc(db,"followers",otherUid,"list",myUid));
    await deleteDoc(doc(db,"following",myUid,"list",otherUid));
    await deleteDoc(doc(db,"friends",otherUid,"list",myUid));
    await deleteDoc(doc(db,"friends",myUid,"list",otherUid));

    showToast("Blocked");
  }

  closeMenu();
};
  
window.sendMessage = async () => {

const a = await getDoc(doc(db,"blocked",otherUid,"list",myUid));
const b = await getDoc(doc(db,"blocked",myUid,"list",otherUid));

if(a.exists() || b.exists()){
  showToast("Blocked user");
  return;
}
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });

  await updateChatList(text);
};

window.openMenu = () => {
  menuBox.style.display="block";
};

function closeMenu(){
  menuBox.style.display="none";
}

/* CLICK OUTSIDE */
window.addEventListener("click",(e)=>{
  if(!menuBox.contains(e.target) && e.target.innerText !== "⋯"){
    closeMenu();
  }
});

window.openProfile = () => {
  location.href = "view.html?id=" + otherUid;
};
  
</script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

/* HEADER */
header {
  background:#4CAF50;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
}

header img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}
.popup {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  border-radius:15px 15px 0 0;
  display:none;
}

.popup div {
  padding:15px;
  text-align:center;
  border-bottom:1px solid #eee;
}

.toast {
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}
/* CHAT */
#messages {
  position:fixed;
  top:60px;
  bottom:70px;
  left:0;
  right:0;
  overflow:auto;
  padding:10px;
}

/* BUBBLES */
.me, .other {
  width:fit-content;
  max-width:75%;
  padding:10px;
  margin:6px;
  border-radius:16px;
}

.me { background:#4CAF50; color:white; margin-left:auto; }
.other { background:#e4e6eb; }

/* IMAGE */
.chat-img {
  max-width:160px;
  border-radius:12px;
  cursor:pointer;
}

/* INPUT FIX (BIG + MOBILE) */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:white;
  gap:6px;
}

.plus {
  width:42px;
  height:42px;
  border-radius:50%;
  background:#4CAF50;
  color:white;
  border:none;
  font-size:20px;
}

input {
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
  font-size:15px;
}

button {
  background:#4CAF50;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:20px;
}

/* PREVIEW */
#previewModal {
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#previewModal img {
  max-width:90%;
  max-height:70vh;
}

.preview-actions {
  position:absolute;
  bottom:40px;
  display:flex;
  gap:20px;
}

/* FULL VIEW */
#viewer {
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#viewer img {
  max-width:100%;
}

.save-btn {
  position:absolute;
  bottom:30px;
  right:20px;
  background:#4CAF50;
  padding:10px 15px;
  border-radius:20px;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <img id="profileImg" onclick="openProfile()">
  <span id="name" onclick="openProfile()"></span>

  <div onclick="openMenu()" style="margin-left:auto; cursor:pointer;">⋯</div>
</header>
<!-- MENU -->
<div class="popup" id="menuBox">
  <div onclick="toggleFollow()">Follow</div>
  <div onclick="toggleBlock()">Block</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
  
<div id="messages"></div>

<div class="bottom">
  <button class="plus" onclick="pickImage()">+</button>
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
  <input type="file" id="imageInput" accept="image/*" hidden>
</div>

<!-- PREVIEW -->
<div id="previewModal">
  <img id="previewImage">
  <div class="preview-actions">
    <button onclick="closePreview()">Cancel</button>
    <button onclick="sendImage()">Send</button>
  </div>
</div>

<!-- FULL IMAGE VIEW -->
<div id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
  <a id="downloadBtn" class="save-btn" download>Save</a>
</div>

</body>
</html>
