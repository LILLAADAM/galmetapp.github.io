<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const storage = getStorage(undefined, "gs://galmet-app.firebasestorage.app");

const currentUser = JSON.parse(localStorage.getItem("user"));
if (!currentUser?.uid) location.href = "index.html";

const myUid = currentUser.uid;
const otherUid = new URLSearchParams(location.search).get("id");
const chatId = [myUid, otherUid].sort().join("_);

/* LOAD USER */
async function loadOtherUser() {
  const snap = await getDoc(doc(db, "users", otherUid));
  if (!snap.exists()) return;
  const data = snap.data();

  name.innerText = data.fullName || data.username;
  profileImg.src = data.photoURL;
}

/* REALTIME (FIXED FAST) */
function loadMessages() {
  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, (snapshot) => {
    snapshot.docChanges().forEach(change => {
      if (change.type === "added") {
        renderMessage(change.doc.data());
      }
    });
  });
}

/* RENDER (NO EXTRA SPACE) */
function renderMessage(m) {
  const div = document.createElement("div");
  div.className = m.senderId === myUid ? "me" : "other";

  if (m.text) {
    div.innerText = m.text;
  }

  if (m.image) {
    const img = document.createElement("img");
    img.src = m.image;
    img.className = "chat-img";
    img.onclick = () => openFullImage(m.image);
    div.appendChild(img);
  }

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* SEND TEXT (INSTANT UI) */
window.sendMessage = async () => {
  const text = msg.value.trim();
  if (!text) return;

  renderMessage({
    text,
    senderId: myUid
  });

  msg.value = "";

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });
};

/* IMAGE */
let selectedFile = null;

window.pickImage = () => imageInput.click();

imageInput.onchange = e => {
  selectedFile = e.target.files[0];
  previewModal.style.display = "flex";
  previewImage.src = URL.createObjectURL(selectedFile);
};

window.sendImage = async () => {
  if (!selectedFile) return;

  previewModal.style.display = "none";

  const fileRef = ref(storage, "chatImages/" + Date.now());
  await uploadBytes(fileRef, selectedFile);
  const url = await getDownloadURL(fileRef);

  renderMessage({
    image: url,
    senderId: myUid
  });

  await addDoc(collection(db, "chats", chatId, "messages"), {
    image: url,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });
};

/* FULL IMAGE */
window.openFullImage = (url) => {
  viewer.style.display = "flex";
  viewerImg.src = url;
};

window.closeViewer = () => viewer.style.display = "none";

/* EMOJI */
window.addEmoji = () => {
  msg.value += "😊";
};

window.onload = () => {
  loadMessages();
  loadOtherUser();
};
</script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

/* HEADER */
header {
  background:#4CAF50;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
}

header img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

/* CHAT */
#messages {
  height:calc(100vh - 140px);
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* FIXED WIDTH */
.me, .other {
  width:fit-content;
  max-width:75%;
  padding:10px;
  margin:4px;
  border-radius:14px;
  word-wrap:break-word;
}

.me {
  background:#4CAF50;
  color:white;
  align-self:flex-end;
}

.other {
  background:#e4e6eb;
  align-self:flex-start;
}

/* IMAGE FIX */
.chat-img {
  max-width:180px;
  border-radius:10px;
  display:block;
}

/* BOTTOM */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:8px;
  background:white;
  align-items:center;
}

.plus {
  width:40px;
  height:40px;
  border-radius:50%;
  background:#4CAF50;
  color:white;
  border:none;
  font-size:20px;
}

input {
  flex:1;
  margin:0 6px;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

/* EMOJI */
.emoji {
  font-size:20px;
  margin-right:5px;
  cursor:pointer;
}

/* BUTTON */
button {
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:20px;
  padding:10px;
}

/* PREVIEW */
#previewModal {
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#previewModal img { max-width:90%; }

/* VIEWER */
#viewer {
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
}
#viewer img { max-width:100%; }
</style>
</head>

<body>

<header>
  <img id="profileImg">
  <span id="name"></span>
</header>

<div id="messages"></div>

<div class="bottom">
  <button class="plus" onclick="pickImage()">+</button>
  <span class="emoji" onclick="addEmoji()">😊</span>
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
  <input type="file" id="imageInput" hidden>
</div>

<!-- PREVIEW -->
<div id="previewModal">
  <img id="previewImage">
  <button onclick="sendImage()">Send</button>
</div>

<!-- FULL -->
<div id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

</body>
</html>
