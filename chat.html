<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { db } from "./firebase.js";
import {
  collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const currentUser = JSON.parse(localStorage.getItem("user"));

if (!currentUser || !currentUser.uid) {
  alert("Login required");
  window.location.href = "index.html";
}

const myUid = currentUser.uid;

const params = new URLSearchParams(window.location.search);
const otherUid = params.get("id");

if (!otherUid) {
  alert("No user selected");
  window.location.href = "dashboard.html";
}

const chatId = [myUid, otherUid].sort().join("_");

// 🔥 MARK AS READ (NEW)
async function markAsRead() {
  await setDoc(doc(db, "userChats", myUid, "list", otherUid), {
    unread: 0
  }, { merge: true });
}

// 🔥 LOAD OTHER USER (SAME)
async function loadOtherUser() {
  try {
    const snap = await getDoc(doc(db, "users", otherUid));

    if (!snap.exists()) return;

    const data = snap.data();

    document.getElementById("name").innerText =
      data.username || "User";

    document.getElementById("profileImg").src =
      data.photoURL ||
      `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username)}`;

  } catch (err) {
    console.error(err);
  }
}

// 🔥 LOAD MESSAGES (SAME)
function loadMessages() {
  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, (snapshot) => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(doc => {
      const m = doc.data();

      const div = document.createElement("div");
      div.className =
        m.senderId === myUid ? "me" : "other";

      div.innerText = m.text;

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

// 🔥 SEND MESSAGE (SAME — NO CHANGE)
window.sendMessage = async function () {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  const msgData = {
    text,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  };

  await addDoc(collection(db, "chats", chatId, "messages"), msgData);

  await setDoc(doc(db, "userChats", myUid, "list", otherUid), {
    uid: otherUid,
    lastMessage: text,
    updatedAt: serverTimestamp(),
    unread: 0
  });

  await setDoc(doc(db, "userChats", otherUid, "list", myUid), {
    uid: myUid,
    lastMessage: text,
    updatedAt: serverTimestamp(),
    unread: 1
  });

  input.value = "";
};

// ENTER KEY (SAME)
window.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});

// 🔥 LOAD (UPDATED)
window.onload = () => {
  loadMessages();
  loadOtherUser();
  markAsRead(); // ✅ IMPORTANT
};

</script>

  <style>
    body {
      margin:0;
      font-family:sans-serif;
      background:#f5f5f5;
    }

    header {
      background:#4CAF50;
      color:white;
      padding:12px;
      display:flex;
      align-items:center;
      position:sticky;
      top:0;
    }

    header img {
      width:40px;
      height:40px;
      border-radius:50%;
      margin-right:10px;
    }

    #messages {
      height:calc(100vh - 120px);
      overflow-y:auto;
      padding:10px;
    }

    .me, .other {
      max-width:75%;
      padding:10px;
      margin:6px;
      border-radius:14px;
      font-size:14px;
    }

    .me {
      background:#4CAF50;
      color:white;
      margin-left:auto;
    }

    .other {
      background:#ddd;
    }

    .bottom {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      padding:8px;
      background:white;
      border-top:1px solid #ccc;
    }

    input {
      flex:1;
      padding:10px;
      border-radius:20px;
      border:1px solid #ccc;
    }

    button {
      margin-left:6px;
      padding:10px 16px;
      border-radius:20px;
      background:#4CAF50;
      color:white;
      border:none;
    }
  </style>
</head>

<body>

<header>
  <img id="profileImg">
  <span id="name">User</span>
</header>

<div id="messages"></div>

<div class="bottom">
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

</body>
</html>
