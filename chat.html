<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, doc, getDoc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const storage = getStorage(undefined, "gs://galmet-app.firebasestorage.app");

/* ================= USER ================= */
const currentUser = JSON.parse(localStorage.getItem("user"));
if (!currentUser?.uid) {
  alert("Login required");
  location.href = "index.html";
}

const myUid = currentUser.uid;
const otherUid = new URLSearchParams(location.search).get("id");
const chatId = [myUid, otherUid].sort().join("_");

/* ================= MENU ================= */
const menuBox = document.getElementById("menuBox");

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=> t.style.display="none",2000);
}

/* ================= LOAD USER ================= */
async function loadOtherUser() {
  const snap = await getDoc(doc(db, "users", otherUid));
  if (!snap.exists()) return;

  const data = snap.data();

  document.getElementById("name").innerText =
    data.fullName || data.username || "User";

  document.getElementById("profileImg").src =
    data.photoURL ||
    `https://ui-avatars.com/api/?name=${encodeURIComponent(data.username)}`;
}

/* ================= CLICK HEADER → PROFILE ================= */
window.openProfile = () => {
  location.href = "view.html?id=" + otherUid;
};

/* ================= REALTIME STATE ================= */
onSnapshot(doc(db,"followers",otherUid,"list",myUid), updateMenu);
onSnapshot(doc(db,"blocked",otherUid,"list",myUid), updateMenu);

async function updateMenu(){

  const followSnap = await getDoc(doc(db,"followers",otherUid,"list",myUid));
  const blockSnap = await getDoc(doc(db,"blocked",otherUid,"list",myUid));

  const items = document.querySelectorAll("#menuBox div");

  if(blockSnap.exists()){
    items[0].innerText = "Follow";
    items[1].innerText = "Unblock";

    document.getElementById("msg").disabled = true;
  } else {

    document.getElementById("msg").disabled = false;

    if(followSnap.exists()){
      items[0].innerText = "Unfollow";
    } else {
      items[0].innerText = "Follow";
    }

    items[1].innerText = "Block";
  }
}

/* ================= FOLLOW ================= */
window.toggleFollow = async () => {

  const a = doc(db,"followers",otherUid,"list",myUid);
  const b = doc(db,"following",myUid,"list",otherUid);

  const snap = await getDoc(a);

  if(snap.exists()){
    await deleteDoc(a);
    await deleteDoc(b);

    await deleteDoc(doc(db,"friends",otherUid,"list",myUid));
    await deleteDoc(doc(db,"friends",myUid,"list",otherUid));

    showToast("Unfollowed");
  }
  else{
    await setDoc(a,{uid:myUid});
    await setDoc(b,{uid:otherUid});
    showToast("Followed");
  }

  closeMenu();
};

/* ================= BLOCK ================= */
window.toggleBlock = async () => {

  const ref = doc(db,"blocked",otherUid,"list",myUid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    await deleteDoc(ref);
    showToast("Unblocked");
  } else {

    await setDoc(ref,{uid:myUid});

    await deleteDoc(doc(db,"followers",otherUid,"list",myUid));
    await deleteDoc(doc(db,"following",myUid,"list",otherUid));
    await deleteDoc(doc(db,"friends",otherUid,"list",myUid));
    await deleteDoc(doc(db,"friends",myUid,"list",otherUid));

    showToast("Blocked");
  }

  closeMenu();
};

/* ================= MENU ================= */
window.openMenu = () => {
  document.getElementById("menuBox").style.display="block";
};

function closeMenu(){
  document.getElementById("menuBox").style.display="none";
}

window.addEventListener("click",(e)=>{
  if(!menuBox.contains(e.target) && e.target.innerText !== "⋯"){
    closeMenu();
  }
});

/* ================= REALTIME MESSAGES ================= */
function loadMessages() {

  onSnapshot(query(
    collection(db, "chats", chatId, "messages"),
    orderBy("createdAt")
  ), (snapshot) => {

    const box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(docSnap => {
      const m = docSnap.data();

      const div = document.createElement("div");
      div.className = m.senderId === myUid ? "me" : "other";

      if (m.text) div.innerText = m.text;

      if (m.image) {
        const img = document.createElement("img");
        img.src = m.image;
        img.className = "chat-img";
        img.onclick = () => openViewer(m.image);
        div.appendChild(img);
      }

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

/* ================= BLOCK CHECK SEND ================= */
async function isBlocked(){
  const snap = await getDoc(doc(db,"blocked",otherUid,"list",myUid));
  return snap.exists();
}

/* ================= SEND MESSAGE ================= */
window.sendMessage = async () => {

  if(await isBlocked()){
    showToast("Blocked user");
    return;
  }

  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    senderId: myUid,
    receiverId: otherUid,
    createdAt: serverTimestamp()
  });
};

/* ================= LOAD ================= */
window.onload = async () => {
  loadMessages();
  loadOtherUser();
};
</script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

header {
  background:#4CAF50;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
}

header img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
  cursor:pointer;
}

header span {
  cursor:pointer;
}

.menu {
  margin-left:auto;
  cursor:pointer;
}

/* CHAT */
#messages {
  position:fixed;
  top:60px;
  bottom:70px;
  left:0;
  right:0;
  overflow:auto;
  padding:10px;
}

.me, .other {
  max-width:75%;
  padding:10px;
  margin:6px;
  border-radius:16px;
}

.me { background:#4CAF50; color:white; margin-left:auto; }
.other { background:#e4e6eb; }

.chat-img {
  max-width:160px;
  border-radius:12px;
}

/* INPUT */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:white;
  gap:6px;
}

.plus {
  width:42px;
  height:42px;
  border-radius:50%;
  background:#4CAF50;
  color:white;
  border:none;
}

input {
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
}

button {
  background:#4CAF50;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:20px;
}

/* MENU */
.popup {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  border-radius:15px 15px 0 0;
  display:none;
}

.popup div {
  padding:15px;
  text-align:center;
  border-bottom:1px solid #eee;
}

/* TOAST */
.toast {
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}
</style>
</head>

<body>

<header>
  <img id="profileImg" onclick="openProfile()">
  <span id="name" onclick="openProfile()"></span>
  <div class="menu" onclick="openMenu()">⋯</div>
</header>

<div id="messages"></div>

<div class="bottom">
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

<div class="popup" id="menuBox">
  <div onclick="toggleFollow()">Follow</div>
  <div onclick="toggleBlock()">Block</div>
</div>

<div class="toast" id="toast"></div>

</body>
</html>
