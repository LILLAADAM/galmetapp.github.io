<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galmet Lucky Race</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f2a;
color:white;
}

.topbar{
background:#1424a0;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.coins{
background:#1f33c7;
padding:5px 12px;
border-radius:20px;
}

.playBtn{
display:block;
margin:40px auto;
background:#ffb200;
border:none;
padding:12px 30px;
border-radius:30px;
font-size:16px;
}

.gamePanel{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:80%;
background:#0f1b6b;
border-radius:20px 20px 0 0;
transition:0.4s;
padding:10px;
}

.gamePanel.active{
bottom:0;
}

.timer{
text-align:center;
margin:10px;
}

.track{
background:#333;
height:80px;
border-radius:10px;
margin:10px 0;
position:relative;
overflow:hidden;
}

.car{
position:absolute;
left:0;
top:10px;
transition:3s linear;
}

.car img{
width:60px;
}

.vehicles{
display:flex;
justify-content:space-around;
margin-top:10px;
}

.card{
background:white;
color:black;
padding:8px;
border-radius:10px;
text-align:center;
width:90px;
}

.bet{
display:flex;
justify-content:center;
margin:10px;
}

.bet button{
font-size:18px;
padding:5px 12px;
}

.playRace{
display:block;
margin:auto;
background:#ffb200;
border:none;
padding:10px 20px;
border-radius:10px;
}

.feed{
background:white;
color:black;
height:100px;
overflow:auto;
border-radius:10px;
padding:5px;
font-size:12px;
margin-top:10px;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:10px;
display:none;
width:80%;
}

</style>

</head>

<body>

<div class="topbar">
<div>Galmet Race</div>
<div class="coins">Coins: <span id="coins">500</span></div>
</div>

<button class="playBtn" onclick="openGame()">Play Demo Race</button>

<div class="gamePanel" id="game">

<div style="text-align:right">
<button onclick="closeGame()">Close</button>
</div>

<div class="timer">
Next race in <span id="timer">10</span>s
</div>

<div class="track">

<div class="car" id="car1">
<img src="rooms.webp">
</div>

<div class="car" id="car2" style="top:35px">
<img src="profile.webp">
</div>

<div class="car" id="car3" style="top:60px">
<img src="voice.webp">
</div>

</div>

<div class="vehicles">

<div class="card" onclick="pick(1)">
Monster<br>2.4x
</div>

<div class="card" onclick="pick(2)">
ORV<br>2.2x
</div>

<div class="card" onclick="pick(3)">
Bike<br>4.8x
</div>

</div>

<p style="text-align:center">
Selected: <span id="vehicle">None</span>
</p>

<div class="bet">

<button onclick="minus()">-</button>

<div style="padding:5px 20px">
<span id="bet">10</span>
</div>

<button onclick="plus()">+</button>

</div>

<button class="playRace" onclick="race()">Play</button>

<div class="feed" id="feed">
Live bets will appear here
</div>

</div>

<div class="popup" id="popup">
<p id="result"></p>
<button onclick="closePopup()">OK</button>
</div>

<audio id="raceSound">
<source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

<script>

let coins=500
let bet=10
let vehicle=0
let timer=10

function openGame(){
document.getElementById("game").classList.add("active")
}

function closeGame(){
document.getElementById("game").classList.remove("active")
}

function pick(v){
vehicle=v
document.getElementById("vehicle").innerText=v
}

function plus(){
bet+=10
document.getElementById("bet").innerText=bet
}

function minus(){
if(bet>10){
bet-=10
document.getElementById("bet").innerText=bet
}
}

function race(){

if(vehicle==0){
alert("Pick vehicle")
return
}

if(bet>coins){
alert("Add coins")
return
}

coins-=bet

document.getElementById("coins").innerText=coins

document.getElementById("raceSound").play()

let c1=Math.random()*300
let c2=Math.random()*300
let c3=Math.random()*300

document.getElementById("car1").style.left=c1+"px"
document.getElementById("car2").style.left=c2+"px"
document.getElementById("car3").style.left=c3+"px"

setTimeout(function(){

let winner=1

if(c2>c1 && c2>c3) winner=2
if(c3>c1 && c3>c2) winner=3

let msg="Winner: "+winner

if(vehicle==winner){

coins+=bet*2

msg+=" | You WON!"

}else{

msg+=" | You lost"

}

document.getElementById("coins").innerText=coins

document.getElementById("result").innerText=msg
document.getElementById("popup").style.display="block"

},3200)

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

setInterval(function(){

timer--

if(timer<0) timer=10

document.getElementById("timer").innerText=timer

},1000)

setInterval(function(){

let players=["Alex","Sam","Lee","Tom","Nina"]

let cars=["Monster","ORV","Bike"]

let p=players[Math.floor(Math.random()*players.length)]

let c=cars[Math.floor(Math.random()*cars.length)]

let amount=Math.floor(Math.random()*100)+10

let feed=document.getElementById("feed")

feed.innerHTML=p+" bet "+amount+" on "+c+"<br>"+feed.innerHTML

},2000)

</script>

</body>
</html>
