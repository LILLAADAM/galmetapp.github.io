
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galmet Lucky Race</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f2a;
color:white;
}

.topbar{
background:#1424a0;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.coins{
background:#1f33c7;
padding:5px 12px;
border-radius:20px;
}

.playBtn{
display:block;
margin:40px auto;
background:#ffb200;
border:none;
padding:12px 30px;
border-radius:30px;
font-size:16px;
}

.gamePanel{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:80%;
background:#0f1b6b;
border-radius:20px 20px 0 0;
transition:0.4s;
padding:10px;
}

.gamePanel.active{
bottom:0;
}

.timer{
text-align:center;
font-size:18px;
margin:10px;
}

.track{
background:#2c2c2c;
border-radius:10px;
height:180px;
margin:10px 0;
position:relative;
overflow:hidden;
}

.lane{
height:30px;
border-bottom:1px dashed white;
position:relative;
}

.car{
position:absolute;
left:0;
top:0;
transition:3s linear;
}

.car img{
width:50px;
}

.vehicles{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.card{
background:white;
color:black;
padding:8px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.bet{
display:flex;
justify-content:center;
margin:10px;
}

.bet button{
font-size:18px;
padding:5px 12px;
}

.playRace{
display:block;
margin:auto;
background:#ffb200;
border:none;
padding:10px 20px;
border-radius:10px;
}

.feed{
background:white;
color:black;
height:120px;
overflow:auto;
border-radius:10px;
padding:5px;
font-size:12px;
margin-top:10px;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:10px;
display:none;
width:80%;
text-align:center;
}

</style>
</head>

<body>

<div class="topbar">
<div>Galmet Race</div>
<div class="coins">Coins: <span id="coins">500</span></div>
</div>

<button class="playBtn" onclick="openGame()">Play Demo Race</button>

<div class="gamePanel" id="game">

<div style="text-align:right">
<button onclick="closeGame()">Close</button>
</div>

<div class="timer">
Next race in <span id="timer">10</span>s
</div>

<div class="track">

<div class="lane"><div class="car" id="car1"><img src="monster.webp"></div></div>
<div class="lane"><div class="car" id="car2"><img src="orv.webp"></div></div>
<div class="lane"><div class="car" id="car3"><img src="bike.webp"></div></div>
<div class="lane"><div class="car" id="car4"><img src="sport.webp"></div></div>
<div class="lane"><div class="car" id="car5"><img src="super.webp"></div></div>
<div class="lane"><div class="car" id="car6"><img src="atv.webp"></div></div>

</div>

<div class="vehicles">

<div class="card" onclick="pick(1)">Monster 2.4x</div>
<div class="card" onclick="pick(2)">ORV 2.2x</div>
<div class="card" onclick="pick(3)">Bike 4.8x</div>
<div class="card" onclick="pick(4)">Sport 3.1x</div>
<div class="card" onclick="pick(5)">Super 4.0x</div>
<div class="card" onclick="pick(6)">ATV 3.0x</div>

</div>

<p style="text-align:center">
Selected: <span id="vehicle">None</span>
</p>

<div class="bet">

<button onclick="minus()">-</button>

<div style="padding:5px 20px">
<span id="bet">10</span>
</div>

<button onclick="plus()">+</button>

</div>

<button class="playRace" onclick="race()">Play</button>

<div class="feed" id="feed"></div>

</div>

<div class="popup" id="popup">
<p id="result"></p>
<button onclick="closePopup()">OK</button>
</div>

<script>

let coins=500
let bet=10
let vehicle=0
let timer=10

function openGame(){
document.getElementById("game").classList.add("active")
}

function closeGame(){
document.getElementById("game").classList.remove("active")
}

function pick(v){
vehicle=v
document.getElementById("vehicle").innerText=v
}

function plus(){
bet+=10
document.getElementById("bet").innerText=bet
}

function minus(){
if(bet>10){
bet-=10
document.getElementById("bet").innerText=bet
}
}

function resetCars(){

for(let i=1;i<=6;i++){
document.getElementById("car"+i).style.transition="none"
document.getElementById("car"+i).style.left="0px"
}

setTimeout(()=>{
for(let i=1;i<=6;i++){
document.getElementById("car"+i).style.transition="3s linear"
}
},50)

}

function race(){

if(vehicle==0){
alert("Pick vehicle")
return
}

if(bet>coins){
alert("Not enough coins")
return
}

resetCars()

coins-=bet
document.getElementById("coins").innerText=coins

let distances=[]

for(let i=0;i<6;i++){
distances.push(Math.random()300)
}

for(let i=1;i<=6;i++){
document.getElementById("car"+i).style.left=distances[i-1]+"px"
}

setTimeout(function(){

let winner=distances.indexOf(Math.max(...distances))+1

let msg="Winner: "+winner

if(vehicle==winner){
coins+=bet2
msg+=" | You WON!"
}else{
msg+=" | You lost"
}

document.getElementById("coins").innerText=coins

document.getElementById("result").innerText=msg
document.getElementById("popup").style.display="block"

},3100)

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

setInterval(function(){

timer--

if(timer<0) timer=10

document.getElementById("timer").innerText=timer

},1000)

setInterval(function(){

let players=["Alex","Sam","Lee","Tom","Nina","Kai","Mia"]

let cars=["Monster","ORV","Bike","Sport","Super","ATV"]

let p=players[Math.floor(Math.random()*players.length)]

let c=cars[Math.floor(Math.random()*cars.length)]

let amount=Math.floor(Math.random()*100)+10

let feed=document.getElementById("feed")

feed.innerHTML=p+" bet "+amount+" on "+c+"<br>"+feed.innerHTML

},2000)

</script>

</
