<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galmet Race</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#1a2bd6,#0b0f2a);
color:white;
text-align:center;
}

.topbar{
background:#1324a0;
padding:12px;
display:flex;
justify-content:space-between;
}

.playBtn{
margin-top:60px;
background:#ffb200;
border:none;
padding:14px 40px;
border-radius:30px;
font-size:16px;
}

.panel{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:75%;
background:#0f1b6b;
border-radius:20px 20px 0 0;
transition:0.4s;
padding:10px;
}

.panel.active{
bottom:0;
}

.track{
background:#333;
height:150px;
border-radius:10px;
margin:10px;
position:relative;
}

.car{
position:absolute;
left:0;
transition:3s linear;
}

.l1{top:10px}
.l2{top:60px}
.l3{top:110px}

.vehicleButtons{
display:flex;
justify-content:space-around;
margin-top:10px;
}

.card{
background:white;
color:black;
padding:8px;
border-radius:10px;
width:90px;
}

.bet{
display:flex;
justify-content:center;
margin:10px;
}

.bet button{
font-size:20px;
}

.feed{
background:white;
color:black;
height:100px;
overflow:auto;
border-radius:10px;
font-size:12px;
margin-top:10px;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div class="topbar">
<div>Galmet Race</div>
<div>Coins: <span id="coins">500</span></div>
</div>

<button class="playBtn" onclick="openGame()">Play Demo Race</button>

<div class="panel" id="game">

<button onclick="closeGame()">Close</button>

<div class="track">

<div class="car l1" id="car1">🚙</div>
<div class="car l2" id="car2">🚗</div>
<div class="car l3" id="car3">🏍</div>

</div>

<div class="vehicleButtons">

<div class="card" onclick="pick(1)">
Monster<br>2.4x
</div>

<div class="card" onclick="pick(2)">
ORV<br>2.2x
</div>

<div class="card" onclick="pick(3)">
Bike<br>4.8x
</div>

</div>

<p>Selected: <span id="vehicle">None</span></p>

<div class="bet">

<button onclick="minus()">-</button>

<div style="padding:5px 20px">
<span id="bet">10</span>
</div>

<button onclick="plus()">+</button>

</div>

<button onclick="race()">Play</button>

<div class="feed" id="feed"></div>

</div>

<div class="popup" id="popup">
<p id="result"></p>
<button onclick="closePopup()">OK</button>
</div>

<script>

let coins=500
let bet=10
let vehicle=0

function openGame(){
document.getElementById("game").classList.add("active")
}

function closeGame(){
document.getElementById("game").classList.remove("active")
}

function pick(v){
vehicle=v
document.getElementById("vehicle").innerText=v
}

function plus(){
bet+=10
document.getElementById("bet").innerText=bet
}

function minus(){
if(bet>10){
bet-=10
document.getElementById("bet").innerText=bet
}
}

function resetCars(){
document.getElementById("car1").style.left="0px"
document.getElementById("car2").style.left="0px"
document.getElementById("car3").style.left="0px"
}

function race(){

if(vehicle==0){
alert("Pick vehicle")
return
}

if(bet>coins){
alert("Not enough coins")
return
}

resetCars()

coins-=bet
document.getElementById("coins").innerText=coins

let d1=Math.random()*250
let d2=Math.random()*250
let d3=Math.random()250

setTimeout(()=>{
document.getElementById("car1").style.left=d1+"px"
document.getElementById("car2").style.left=d2+"px"
document.getElementById("car3").style.left=d3+"px"
},100)

setTimeout(()=>{

let winner=1

if(d2>d1 && d2>d3) winner=2
if(d3>d1 && d3>d2) winner=3

let msg="Winner vehicle: "+winner

if(vehicle==winner){
coins+=bet2
msg+=" | YOU WIN!"
}else{
msg+=" | You lost"
}

document.getElementById("coins").innerText=coins
document.getElementById("result").innerText=msg
document.getElementById("popup").style.display="block"

},3200)

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

setInterval(function(){

let players=["Alex","Sam","Lee","Tom","Nina","Kai"]

let cars=["Monster","ORV","Bike"]

let p=players[Math.floor(Math.random()*players.length)]
let c=cars[Math.floor(Math.random()*cars.length)]
let amount=Math.floor(Math.random()*100)+10

let feed=document.getElementById("feed")

feed.innerHTML=p+" bet "+amount+" on "+c+"<br>"+feed.innerHTML

},2000)

</script>

</body>
</html>
