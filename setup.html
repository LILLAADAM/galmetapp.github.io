<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Profile</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#0f1b5c,#1f2f9c);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.box {
    background: rgba(255,255,255,0.08);
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:400px;
    text-align:center;
}

img {
    width:100px;
    height:100px;
    border-radius:50%;
    margin-bottom:15px;
    object-fit:cover;
    border:3px solid rgba(255,255,255,0.2);
}

input {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

.upload-btn {
    background:#222;
    margin-bottom:10px;
}

.continue {
    background:#4cd964;
    color:white;
}

</style>
</head>

<body>

<div class="box">

<h2>Setup Profile</h2>

<img id="preview" src="https://ui-avatars.com/api/?name=User">

<input id="username" placeholder="Enter unique username (min 4 chars)">

<input type="file" id="photoInput" hidden>

<button class="upload-btn" onclick="document.getElementById('photoInput').click()">
📸 Upload Profile Photo
</button>

<button class="continue" onclick="saveProfile()">Continue</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, updateDoc, getDoc, collection, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";


const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.appspot.com"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;

// AUTH
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location = "index.html";
    } else {
        currentUser = user;
    }
});


// ✅ UNIQUE USERNAME CHECK
async function isUsernameTaken(username) {
    const q = query(collection(db,"users"), where("username","==",username));
    const snap = await getDocs(q);

    if (snap.empty) return false;

    let taken = false;
    snap.forEach(docSnap=>{
        if(docSnap.id !== currentUser.uid){
            taken = true;
        }
    });

    return taken;
}


// ✅ SAVE PROFILE
window.saveProfile = async () => {

    if (!currentUser) {
        alert("Please wait...");
        return;
    }

    const username = document.getElementById("username").value.trim();
    const file = document.getElementById("photo").files[0];

    if (!username) {
        alert("Enter username");
        return;
    }

    // UNIQUE CHECK
    const taken = await isUsernameTaken(username);
    if (taken) {
        alert("Username already taken ❌");
        return;
    }

    let photoURL = "";

    try {

        // ✅ UPLOAD IMAGE TO FIREBASE STORAGE
        if (file) {
            const storageRef = ref(storage, "profiles/" + currentUser.uid);

            await uploadBytes(storageRef, file);
            photoURL = await getDownloadURL(storageRef);
        }

        // SAVE DATA
        await updateDoc(doc(db, "users", currentUser.uid), {
            username,
            ...(photoURL && { photoURL })
        });

        // CONFIRM SAVE
        await ensureSaved(username);

    } catch (err) {
        console.error(err);
        alert("Upload failed ❌ (check console)");
    }
};


// CONFIRM SAVE
async function ensureSaved(username) {
    for (let i = 0; i < 5; i++) {
        const snap = await getDoc(doc(db, "users", currentUser.uid));
        if (snap.exists() && snap.data().username === username) {
            window.location = "dashboard.html";
            return;
        }
        await new Promise(r => setTimeout(r, 300));
    }

    alert("Saving delay... try again");
}

</script>

</body>
</html>
