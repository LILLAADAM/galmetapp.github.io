<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Registration - Avatar Setup</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <!-- Cropper.js for image cropping -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f3f7fb", "surface-container-low": "#ecf1f6",
            "surface-container-lowest": "#ffffff", "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60", "primary": "#006571",
            "primary-container": "#00e3fd", "primary-fixed-dim": "#00d4ec",
            "secondary": "#755700", "tertiary": "#b60051",
            "outline": "#73777b", "outline-variant": "#a9aeb1"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body { min-height: 100dvh; }
    .cropper-view-box, .cropper-face { border-radius: 50%; }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen">

<!-- Top Navigation -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-transparent backdrop-blur-xl">
  <div class="flex items-center gap-2">
    <span class="text-2xl font-black bg-gradient-to-r from-cyan-600 to-cyan-400 bg-clip-text text-transparent">Galmet</span>
  </div>
  <div class="flex items-center gap-4">
    <button class="text-slate-500 hover:bg-cyan-50 transition-colors p-2 rounded-full">
      <span class="material-symbols-outlined">help</span>
    </button>
  </div>
</header>

<main class="pt-24 pb-12 px-6 max-w-md mx-auto flex flex-col min-h-screen">
  <!-- Progress Header -->
  <div class="mb-10 text-center">
    <div class="flex justify-center gap-2 mb-6">
      <div class="h-1.5 w-8 rounded-full bg-primary-container/30"></div>
      <div class="h-1.5 w-8 rounded-full bg-primary-container/30"></div>
      <div class="h-1.5 w-12 rounded-full bg-primary shadow-[0_0_8px_rgba(0,101,113,0.3)]"></div>
    </div>
    <h1 class="font-headline font-bold text-3xl text-on-surface tracking-tight mb-2">Almost there!</h1>
    <p class="text-on-surface-variant font-medium">Add a photo – you can crop it before uploading.</p>
  </div>

  <!-- Avatar Preview -->
  <div class="flex-grow flex flex-col items-center">
    <div class="relative group">
      <div class="w-56 h-56 rounded-xl bg-surface-container-lowest flex items-center justify-center p-2 shadow-[0_20px_50px_rgba(0,101,113,0.05)] border border-white/50 overflow-hidden">
        <img id="profilePreview" class="w-full h-full object-cover rounded-lg" src="https://ui-avatars.com/api/?name=User">
        <input type="file" id="photoInput" accept="image/*" hidden>
      </div>
      <button onclick="document.getElementById('photoInput').click()" class="absolute -bottom-4 -right-4 bg-primary text-on-primary w-14 h-14 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all">
        <span class="material-symbols-outlined text-3xl">photo_camera</span>
      </button>
    </div>

    <!-- Suggested images (unchanged) -->
    <div class="w-full mt-12 mb-8">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-headline font-semibold text-on-surface">Gallery Preview</h3>
        <span class="text-[10px] uppercase tracking-widest text-primary font-bold">Suggested</span>
      </div>
      <div class="grid grid-cols-4 gap-3">
        <div class="aspect-square rounded-lg overflow-hidden bg-surface-container-low">
          <img class="w-full h-full object-cover opacity-60 grayscale hover:grayscale-0 transition-all cursor-pointer" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9ECu9QLZtoe1VHree3DtwMH5qMfm5Tzq77qcn8viyv6JB-g3YseEacUFsUMXrqkWIWelYpHJ0vUClcuL8MLhMfaROQBvqgMnx6E5dQxORK4-7q34ikWKonPZFEDQCByPd7fNhDZp8o3h8Fy-923vjGSZcScnbbi8qIAfMl7P3umvdbZZBQIi8g4ScO9jATIcLKbH3JEfJGfwMHJosn_enBP6yBMsy9rBivth9wtWpfp4C-_B2eEsenIT2alUpYk4TCd9xtkuZY52j">
        </div>
        <div class="aspect-square rounded-lg overflow-hidden bg-surface-container-low">
          <img class="w-full h-full object-cover opacity-60 grayscale hover:grayscale-0 transition-all cursor-pointer" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6Yv8-Cc2G1HzJg-yaT06aQWhaP7mh7flMA1FHS0B9-WE9tiBT1faIgKxJWoEos93tWEKDQoi77pSU3iMbdVj6pNU_tEK_hiz_41g9NIcn0BPlaJgNk5a3TZERMLaz6_ubcE-6JMh1NsHRmy0ycT9U4fJRmEGw3iXE6KInRaSoTzXXveWqLjyfXh1uB5bhvakpALRURs5p2rhUTM3BSy9DY08chwCljiRrOr1LpbH1zbevbgCmsBmJepNqcQdg04IAq05t-QRbhrGX">
        </div>
      </div>
    </div>

    <!-- Complete Button -->
    <div class="mt-12 space-y-4 w-full">
      <button id="completeBtn" class="w-full py-5 rounded-full bg-gradient-to-r from-primary to-primary-fixed-dim text-white font-headline font-bold text-lg shadow-[0_12px_24px_-8px_rgba(0,101,113,0.4)] hover:shadow-[0_16px_32px_-8px_rgba(0,101,113,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
        <span class="material-symbols-outlined">check_circle</span>
        Complete Setup
      </button>
      <div class="flex items-center justify-center gap-2 py-2">
        <div class="w-2 h-2 rounded-full bg-primary-fixed-dim animate-pulse"></div>
        <p class="text-xs font-label text-outline uppercase tracking-widest">Step 3 of 3</p>
      </div>
    </div>
  </div>
</main>

<!-- Crop Modal -->
<div id="cropModal" class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-md hidden flex-col items-center justify-center p-4">
  <div class="bg-surface rounded-2xl w-full max-w-md p-4">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-headline font-bold">Crop your photo</h3>
      <button onclick="closeCropModal()" class="text-outline">✕</button>
    </div>
    <div class="relative h-80 w-full overflow-hidden rounded-lg bg-black">
      <img id="cropImage" class="max-w-full max-h-full" src="">
    </div>
    <div class="flex gap-3 mt-4">
      <button onclick="cancelCrop()" class="flex-1 py-2 rounded-full bg-surface-container-low text-on-surface-variant">Cancel</button>
      <button onclick="applyCrop()" class="flex-1 py-2 rounded-full bg-primary text-white">Apply & Upload</button>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="fixed inset-0 z-[100] bg-surface/80 backdrop-blur-md flex flex-col items-center justify-center hidden">
  <div class="relative">
    <div class="w-24 h-24 rounded-full border-4 border-primary-container border-t-primary animate-spin"></div>
    <div class="absolute inset-0 flex items-center justify-center">
      <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings:'FILL'1">explore</span>
    </div>
  </div>
  <p class="mt-8 font-headline font-bold text-2xl text-primary animate-bounce">Galmet</p>
  <p class="text-on-surface-variant font-medium">Uploading your photo...</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

  // Firebase config
  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);
  const storage = getStorage(app);

  // Check user
  let user = JSON.parse(localStorage.getItem("user"));
  if (!user || !user.userId) {
    window.location.replace("login.html");
  }
  const userIdStr = user.userId.toString();

  // If already fully completed, redirect to dashboard
  if (user.profileCompleted === true && user.photoURL) {
    window.location.replace("dashboard.html");
  }

  // DOM elements
  const photoInput = document.getElementById("photoInput");
  const profilePreview = document.getElementById("profilePreview");
  const completeBtn = document.getElementById("completeBtn");
  const cropModal = document.getElementById("cropModal");
  const cropImage = document.getElementById("cropImage");
  const loadingOverlay = document.getElementById("loadingOverlay");

  let cropper = null;
  let selectedFile = null;

  // Handle file selection
  photoInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => {
      cropImage.src = ev.target.result;
      cropModal.classList.remove("hidden");
      if (cropper) cropper.destroy();
      cropper = new Cropper(cropImage, {
        aspectRatio: 1,
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 0.8,
        cropBoxMovable: true,
        cropBoxResizable: true,
        background: false,
        rounded: true
      });
    };
    reader.readAsDataURL(file);
  });

  window.closeCropModal = () => {
    cropModal.classList.add("hidden");
    if (cropper) cropper.destroy();
    cropper = null;
    selectedFile = null;
    photoInput.value = "";
  };
  window.cancelCrop = closeCropModal;

  window.applyCrop = async () => {
    if (!cropper) return;
    const canvas = cropper.getCroppedCanvas({ width: 512, height: 512, imageSmoothingQuality: 'high' });
    canvas.toBlob(async (blob) => {
      const croppedFile = new File([blob], "avatar.jpg", { type: "image/jpeg" });
      selectedFile = croppedFile;
      // Update preview immediately
      const previewUrl = URL.createObjectURL(croppedFile);
      profilePreview.src = previewUrl;
      cropModal.classList.add("hidden");
      if (cropper) cropper.destroy();
      cropper = null;
    }, "image/jpeg", 0.9);
  };

  // Upload and complete setup
  window.completeSetup = async () => {
    if (!selectedFile) {
      alert("Please select a photo first");
      return;
    }
    loadingOverlay.classList.remove("hidden");
    try {
      // Compress (already cropped to 512x512, but we can re-compress if needed)
      const storageRef = ref(storage, `profiles/${userIdStr}`);
      await uploadBytes(storageRef, selectedFile);
      const photoURL = await getDownloadURL(storageRef);

      // Update Firestore via cloud function
      const completeRes = await fetch("https://us-central1-galmet-app.cloudfunctions.net/completeProfile", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: user.email, photoURL })
      });
      const completeData = await completeRes.json();
      if (!completeData.success) throw new Error("Profile update failed");

      // Also update local user
      user.photoURL = photoURL;
      user.profileCompleted = true;
      localStorage.setItem("user", JSON.stringify(user));

      // Final redirect
      window.location.replace("dashboard.html");
    } catch (err) {
      console.error(err);
      alert("Upload failed: " + err.message);
      loadingOverlay.classList.add("hidden");
    }
  };

  completeBtn.onclick = window.completeSetup;

  // Optional: suggested images click – load them into cropper
  document.querySelectorAll(".gallery-preview img, .grid img").forEach(img => {
    img.addEventListener("click", () => {
      fetch(img.src)
        .then(res => res.blob())
        .then(blob => {
          const file = new File([blob], "suggested.jpg", { type: "image/jpeg" });
          selectedFile = file;
          const reader = new FileReader();
          reader.onload = (ev) => {
            cropImage.src = ev.target.result;
            cropModal.classList.remove("hidden");
            if (cropper) cropper.destroy();
            cropper = new Cropper(cropImage, { aspectRatio: 1, viewMode: 1, dragMode: 'move', autoCropArea: 0.8, cropBoxMovable: true, cropBoxResizable: true });
          };
          reader.readAsDataURL(blob);
        });
    });
  });
</script>
</body>
</html>
