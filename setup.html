<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Profile</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f1b5c,#1f2f9c);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.box {
    background: rgba(255,255,255,0.08);
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}

h2 {
    margin-bottom:20px;
}

input {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:12px;
    background:#4cd964;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

button:hover {
    opacity:0.9;
}
</style>
</head>

<body>

<div class="box">
    <h2>Setup Profile</h2>

    <!-- ✅ USERNAME -->
    <input id="username" placeholder="Enter username">

    <!-- ✅ PHOTO -->
    <input type="file" id="photo">

    <!-- ✅ BUTTON -->
    <button onclick="saveProfile()">Continue</button>
</div>


<script type="module">

// 🔥 FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG (same as dashboard)
const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
});

const auth = getAuth(app);
const db = getFirestore(app);


// ✅ SAVE PROFILE FUNCTION
window.saveProfile = async () => {

    try {
        const user = auth.currentUser;

        if (!user) {
            alert("User not logged in");
            return;
        }

        const username = document.getElementById("username").value.trim();
        const file = document.getElementById("photo").files[0];

        if (!username) {
            alert("Enter username");
            return;
        }

        let photoURL = "";

        // 🔥 IMAGE UPLOAD (base64)
        if (file) {
            const reader = new FileReader();

            reader.onload = async () => {
                photoURL = reader.result;

                await updateDoc(doc(db, "users", user.uid), {
                    username,
                    photoURL
                });

                alert("Profile saved ✅");
                window.location = "dashboard.html";
            };

            reader.readAsDataURL(file);

        } else {

            await updateDoc(doc(db, "users", user.uid), {
                username
            });

            alert("Profile saved ✅");
            window.location = "dashboard.html";
        }

    } catch (err) {
        console.error(err);
        alert("Error saving profile ❌");
    }
};

</script>

</body>
</html>
