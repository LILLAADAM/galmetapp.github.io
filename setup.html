<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;

// ✅ AUTH CHECK
onAuthStateChanged(auth, (user)=>{
  if(!user){
    window.location = "index.html";
  } else {
    currentUser = user;
  }
});

// ✅ IMAGE PREVIEW
window.addEventListener("DOMContentLoaded", () => {

  const input = document.getElementById("photoInput");
  const preview = document.getElementById("profilePreview");

  input.addEventListener("change", (e)=>{
    const file = e.target.files[0];
    if(!file) return;

    // SHOW IMAGE IN UI
    const reader = new FileReader();
    reader.onload = (ev)=>{
      preview.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

});


// ✅ IMAGE COMPRESS FUNCTION (HIGH QUALITY)
async function compressImage(file) {
  return new Promise((resolve) => {

    const img = new Image();
    const reader = new FileReader();

    reader.onload = (e) => img.src = e.target.result;

    img.onload = () => {

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      // 🔥 MAX SIZE (BEST FOR APPS)
      const maxSize = 512;

      let width = img.width;
      let height = img.height;

      if (width > height) {
        if (width > maxSize) {
          height *= maxSize / width;
          width = maxSize;
        }
      } else {
        if (height > maxSize) {
          width *= maxSize / height;
          height = maxSize;
        }
      }

      canvas.width = width;
      canvas.height = height;

      ctx.drawImage(img, 0, 0, width, height);

      // 🔥 QUALITY 0.8 (BEST BALANCE)
      canvas.toBlob((blob) => {
        resolve(blob);
      }, "image/jpeg", 0.8);

    };

    reader.readAsDataURL(file);
  });
}


// ✅ COMPLETE SETUP
window.completeSetup = async function(){

  if(!currentUser){
    alert("Please wait...");
    return;
  }

  const file = document.getElementById("photoInput").files[0];

  if(!file){
    alert("Please select image");
    return;
  }

  try {

    // 🔥 COMPRESS IMAGE
    const compressed = await compressImage(file);

    const storageRef = ref(storage, "profiles/" + currentUser.uid);

    // 🔥 UPLOAD COMPRESSED FILE
    await uploadBytes(storageRef, compressed);

    const photoURL = await getDownloadURL(storageRef);

    // 🔥 SAVE TO FIRESTORE
    await updateDoc(doc(db, "users", currentUser.uid), {
      photoURL: photoURL,
      profileCompleted: true
    });

    // SAVE LOCAL
    localStorage.setItem("user", JSON.stringify({
      uid: currentUser.uid,
      photoURL: photoURL
    }));

    window.location = "dashboard.html";

  } catch(err){
    console.error(err);
    alert("Upload failed ❌");
  }
};

</script>
