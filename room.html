<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { margin:0; font-family:sans-serif; }

.top {
  background:#00d0e0;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.seats {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.seat {
  height:80px;
  background:#eee;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  display:flex;
  gap:10px;
  background:white;
}

button {
  padding:10px;
  border:none;
  border-radius:20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
  <div id="roomName">Room</div>
  <div id="users">Users: 1</div>
</div>

<!-- SEATS -->
<div class="seats">
  <div class="seat">Host</div>
  <div class="seat">+</div>
  <div class="seat">+</div>
  <div class="seat">+</div>
  <div class="seat">+</div>
  <div class="seat">+</div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <button style="background:#eee;">Chat</button>
  <button style="background:#00d0e0;color:white;">🎤 Mic</button>
  <button onclick="leaveRoom()" style="background:red;color:white;">Leave</button>
</div>

<script type="module">

import { db } from "./firebase.js";
import {
  doc, getDoc, setDoc, deleteDoc,
  collection, onSnapshot, updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const params = new URLSearchParams(location.search);
const roomId = params.get("id");

const user = JSON.parse(localStorage.getItem("user"));
const uid = user.uid;

// 🔥 JOIN ROOM
async function joinRoom(){

  const roomRef = doc(db,"rooms",roomId);
  const snap = await getDoc(roomRef);

  if(!snap.exists()){
    alert("Room not found");
    return;
  }

  document.getElementById("roomName").innerText = snap.data().name;

  await setDoc(doc(db,"rooms",roomId,"members",uid),{
    uid:uid,
    role:"guest"
  });

  await updateDoc(roomRef,{
    users: (snap.data().users || 1) + 1
  });

}

joinRoom();

// 🔥 REALTIME USERS
onSnapshot(collection(db,"rooms",roomId,"members"), (snap)=>{
  document.getElementById("users").innerText = "Users: " + snap.size;
});

// ❌ LEAVE
window.leaveRoom = async () => {

  await deleteDoc(doc(db,"rooms",roomId,"members",uid));

  const roomRef = doc(db,"rooms",roomId);
  const snap = await getDoc(roomRef);

  if(snap.exists()){
    await updateDoc(roomRef,{
      users: Math.max((snap.data().users || 1)-1,0)
    });
  }

  location.href = "party.html";
};

</script>

</body>
</html>
