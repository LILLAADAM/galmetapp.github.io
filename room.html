<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Room</title>
</head>

<body style="margin:0; background:black; color:white; font-family:sans-serif;">

<!-- HEADER -->
<div style="display:flex; justify-content:space-between; padding:15px;">
  <h3>Party Room</h3>
  <button onclick="leaveRoom()">Leave</button>
</div>

<!-- ROOM INFO -->
<div style="text-align:center; margin-top:50px;">
  <h2 id="roomId"></h2>
  <p id="role"></p>
</div>

<!-- ACTION BUTTONS -->
<div style="position:fixed; bottom:20px; width:100%; text-align:center;">
  <button onclick="toggleMic()">🎤 Mic</button>
  <button onclick="sendGift()">🎁 Gift</button>
</div>

<script>

const params = new URLSearchParams(location.search);
const roomId = params.get("id");
const isHost = params.get("host");

document.getElementById("roomId").innerText = "Room: " + roomId;
document.getElementById("role").innerText = isHost ? "Host" : "Guest";

// LEAVE
function leaveRoom(){
  window.location.href = "party.html";
}

// MIC
function toggleMic(){
  alert("Mic feature next step");
}

// GIFT
function sendGift(){
  alert("Gift system next step");
}

<script type="module">

import { db } from "./firebase.js";
import {
  doc, getDoc, setDoc, deleteDoc,
  collection, onSnapshot, updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const params = new URLSearchParams(location.search);
const roomId = params.get("id");

const user = JSON.parse(localStorage.getItem("user"));
const uid = user.uid;

document.getElementById("roomId").innerText = "Room: " + roomId;

// ✅ JOIN ROOM
async function joinRoom(){

  const roomRef = doc(db,"rooms",roomId);
  const snap = await getDoc(roomRef);

  if(!snap.exists()){
    alert("Room not found");
    return;
  }

  await setDoc(doc(db,"rooms",roomId,"members",uid),{
    uid:uid,
    role:"guest"
  });

  await updateDoc(roomRef,{
    users: (snap.data().users || 1) + 1
  });

}

joinRoom();

// 🔥 REALTIME USERS COUNT
onSnapshot(collection(db,"rooms",roomId,"members"), (snap)=>{
  document.getElementById("role").innerText =
    "Users: " + snap.size;
});

// ❌ LEAVE ROOM
window.leaveRoom = async () => {

  await deleteDoc(doc(db,"rooms",roomId,"members",uid));

  const roomRef = doc(db,"rooms",roomId);
  const snap = await getDoc(roomRef);

  if(snap.exists()){
    await updateDoc(roomRef,{
      users: Math.max((snap.data().users || 1)-1,0)
    });
  }

  location.href = "party.html";
};

</script>

</body>
</html>
