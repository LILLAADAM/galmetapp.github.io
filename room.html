<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet – Party Room</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { background: #f3f7fb; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .custom-glass { background: rgba(0, 101, 113, 0.2); backdrop-filter: blur(12px); }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .chat-mask { mask-image: linear-gradient(to top, black 85%, transparent 100%); }
    .gift-panel, .invite-panel, .quantity-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      border-radius: 20px 20px 0 0;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 200;
      max-height: 60%;
      overflow-y: auto;
    }
    .gift-grid, .invite-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .gift-item, .invite-item { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 8px; text-align: center; cursor: pointer; transition: 0.2s; }
    .gift-item:active, .invite-item:active { transform: scale(0.95); }
    .gift-item img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 4px; }
    .gift-name { font-size: 10px; color: white; }
    .gift-price { font-size: 9px; color: #f59e0b; }
    .close-gift, .close-invite { background: rgba(255,255,255,0.2); border: none; padding: 8px; border-radius: 30px; color: white; cursor: pointer; }
    .camera-frame {
      position: relative;
      width: 90px;
      height: 90px;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }
    .camera-frame video, .camera-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .camera-frame .avatar-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
    }
    .top-row { display: flex; justify-content: center; gap: 0; margin-bottom: 24px; }
    .top-seat { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; border-right: 1px solid rgba(255,255,255,0.2); }
    .top-seat:last-child { border-right: none; }
    .bg-picker, .controls-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      border-radius: 20px 20px 0 0;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 250;
    }
    .bg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .bg-option { aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
    .bg-option.selected { border-color: #00e3fd; }
    .bg-option img { width: 100%; height: 100%; object-fit: cover; }
    .controls-grid { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .ctrl-btn { background: #006571; border: none; padding: 8px 16px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
    .bottom-bar { flex-wrap: wrap; justify-content: center; gap: 8px; }
    .bottom-bar .flex-1 { min-width: 140px; }
    @media (max-width: 480px) {
      .camera-frame { width: 70px; height: 70px; }
      .bottom-bar .flex-1 { min-width: 100px; }
      .ctrl-btn { padding: 6px 12px; font-size: 10px; }
    }
  </style>
</head>
<body class="bg-background font-body text-on-background min-h-screen overflow-x-hidden">

<!-- Hero Background -->
<div class="fixed inset-0 z-0">

<!-- Top Navigation -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 py-3 bg-[#f3f7fb]/80 backdrop-blur-xl border-b border-white/5">

</header>

<main class="relative z-10 pt-20 pb-40 px-4 flex flex-col min-h-screen">
  <!-- Seat Grid -->
  <div class="max-w-md mx-auto w-full">
    <!-- Top Row: 3 seats (live video) attached -->
    <div class="top-row" id="topRowSeats"></div>
    <!-- Bottom Row: 5 seats (audio only / invite) -->
    <div class="grid grid-cols-5 gap-2 mb-8" id="bottomRowSeats"></div>
  </div>

  <!-- Room Rules / Announcement -->
  <div class="max-w-xs mx-auto mb-6">
    <div class="custom-glass rounded-lg p-3 border border-primary-fixed/20 shadow-lg">
      <div class="flex items-center gap-2 mb-1.5">
        <span class="material-symbols-outlined text-primary-fixed text-xs" style="font-variation-settings:'FILL'1">info</span>
        <h3 id="roomAnnouncementTitle" class="text-white text-[11px] font-headline font-bold">Welcome to the Party</h3>
      </div>
      <p id="roomAnnouncementText" class="text-white/80 text-[9px] leading-snug">Enjoy our party! Keep it friendly.</p>
      <div class="mt-2 flex gap-1.5">
        <span id="roomCategoryTag" class="bg-primary-fixed/20 text-primary-fixed text-[7px] px-1.5 py-0.5 rounded-full font-bold">#Party</span>
      </div>

  </div>

  <!-- Chat Area -->

  <!-- Quick Action Buttons -->
  <div class="flex gap-1.5 mb-2 overflow-x-auto pb-2 scrollbar-hide">
    <button class="quick-btn whitespace-nowrap px-3 py-1.5 bg-white/10 backdrop-blur-md rounded-full text-white text-[9px] font-headline font-bold border border-white/5 active:scale-95" data-msg="🎵 Let's beat the music!">Beat</button>
    <button class="quick-btn whitespace-nowrap px-3 py-1.5 bg-white/10 backdrop-blur-md rounded-full text-white text-[9px] font-headline font-bold border border-white/5 active:scale-95" data-msg="🎲 Bingo!">Bingo</button>
    <button class="quick-btn whitespace-nowrap px-3 py-1.5 bg-gradient-to-r from-tertiary to-tertiary-fixed-dim rounded-full text-white text-[9px] font-headline font-bold shadow-md active:scale-95" data-msg="✨ Blingbling!">Blingbling</button>
    <button class="quick-btn whitespace-nowrap px-3 py-1.5 bg-white/10 backdrop-blur-md rounded-full text-white text-[9px] font-headline font-bold border border-white/5 active:scale-95" data-msg="👏 Clap clap!">Clap</button>
  </div>
</main>

<!-- Bottom Bar -->
<div class="fixed bottom-0 w-full z-50 bg-white/90 backdrop-blur-2xl rounded-t-[1.5rem] shadow-[0_-4px_20px_rgba(0,0,0,0.1)] bottom-bar">
  <div class="flex items-center justify-between px-5 py-3 gap-3 flex-wrap">

      </button>
      <button onclick="window.location.href='party.html'" class="flex flex-col items-center justify-center bg-primary text-white rounded-full p-2.5 shadow-md active:scale-110">
        <span class="material-symbols-outlined text-xl" style="font-variation-settings:'FILL'1">sports_esports</span>
      </button>
      <button id="bgPickerBtn" class="text-slate-400 hover:text-slate-600 active:scale-110">
        <span class="material-symbols-outlined text-2xl">grid_view</span>
      </button>
    </div>
  </div>
  <div class="h-4"></div>
</div>

<!-- Gift Panel -->
<div id="giftPanel" class="gift-panel">
  <div class="flex justify-between items-center mb-2">
    <h3 class="text-white font-bold">Select Gift</h3>

</div>

<!-- Invite Panel -->
<div id="invitePanel" class="invite-panel">
  <div class="flex justify-between items-center mb-2">
    <h3 class="text-white font-bold">Invite a Friend</h3>
    <button id="closeInvitePanel" class="close-invite">✕</button>
  </div>
  <div id="inviteList" class="invite-grid"></div>
</div>

<!-- Background Picker Panel -->
<div id="bgPickerPanel" class="bg-picker">

  </div>
  <div class="controls-grid">

    <button id="toggleCamBtn" class="ctrl-btn">📷 Camera</button>
    <button id="switchCamBtn" class="ctrl-btn">🔄 Switch Camera</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, limit, updateDoc, increment, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);

  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) window.location.replace("login.html");
  const myUserId = currentUser.userId.toString();
  const agoraUID = Number(currentUser.userId);
  const myUsername = currentUser.username || "User";
  const myPhoto = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(myUsername)}&background=006571&color=fff`;

  const urlParams = new URLSearchParams(window.location.search);
  const roomId = urlParams.get("id");
  if (!roomId) { alert("Invalid room"); window.location.href = "party.html"; }
  const roomRef = doc(db, "rooms", roomId);
  const membersRef = collection(db, "rooms", roomId, "members");
  const messagesRef = collection(db, "rooms", roomId, "messages");

  // Agora
  const APP_ID = "873172a9b2064b1ca97b4f45ee6ed9b5";
  const TOKEN = "007eJxTYNgf3zFVVc1vqcmx/X9OXy/PrUgsXmXoeNimROEVu7RPuZACg4W5saG5UaJlkpGBmUmSYXKipXmSSZqJaWqqWWqKZZKp1JQbmQ2BjAyqH/ewMDJAIIgvwpDob5Zu5pQdlBsa4ViZGmQUaplWwsAAACc3I8I=";
  let client = null;
  let localTracks = [];
  let remoteUsers = {};
  let cameraFront = true;

  // DOM elements
  const hostAvatarImg = document.getElementById("hostAvatar");
  const roomNameSpan = document.getElementById("roomName");
  const roomInfoSpan = document.getElementById("roomInfo");
  const rewardAmountSpan = document.getElementById("rewardAmount");
  const viewerCountSpan = document.getElementById("viewerCount");
  const roomAnnouncementTitle = document.getElementById("roomAnnouncementTitle");
  const roomAnnouncementText = document.getElementById("roomAnnouncementText");
  const roomCategoryTag = document.getElementById("roomCategoryTag");
  const roomCoverImg = document.getElementById("roomCover");
  const topRowSeats = document.getElementById("topRowSeats");
  const bottomRowSeats = document.getElementById("bottomRowSeats");
  const chatMessagesDiv = document.getElementById("chatMessages");
  const leaveBtn = document.getElementById("leaveBtn");
  const menuBtn = document.getElementById("menuBtn");
  const menuIcon = document.getElementById("menuIcon");
  const leaveIcon = document.getElementById("leaveIcon");
  const openGiftBtn = document.getElementById("openGiftBtn");
  const giftPanel = document.getElementById("giftPanel");
  const closeGiftPanelBtn = document.getElementById("closeGiftPanel");
  const giftGrid = document.getElementById("giftGrid");
  const quantityPanel = document.getElementById("quantityPanel");
  const closeQuantityPanel = document.getElementById("closeQuantityPanel");
  const confirmSendGift = document.getElementById("confirmSendGift");
  const chatInput = document.getElementById("chatInput");
  const sendMsgBtn = document.getElementById("sendMsgBtn");
  const bgPickerBtn = document.getElementById("bgPickerBtn");
  const bgPickerPanel = document.getElementById("bgPickerPanel");
  const closeBgPicker = document.getElementById("closeBgPicker");
  const bgGrid = document.getElementById("bgGrid");
  const controlsPanel = document.getElementById("controlsPanel");
  const closeControls = document.getElementById("closeControls");
  const toggleMicBtn = document.getElementById("toggleMicBtn");
  const toggleCamBtn = document.getElementById("toggleCamBtn");
  const switchCamBtn = document.getElementById("switchCamBtn");
  const invitePanel = document.getElementById("invitePanel");
  const closeInvitePanel = document.getElementById("closeInvitePanel");
  const inviteList = document.getElementById("inviteList");

  let roomData = null;
  let members = [];
  let hostId = null;
  let isHost = false;
  let selectedGift = null;
  let selectedQuantity = 1;

  const backgrounds = [
    "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800",
    "https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=800",
    "https://images.unsplash.com/photo-1536240474400-bc3c7eac8f0d?w=800",
    "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800",
    "https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?w=800",
    "https://images.unsplash.com/photo-1511884642898-4c92249e20b6?w=800"
  ];

  // ========== 1. Load Room Data ==========
  async function loadRoomData() {
    const snap = await getDoc(roomRef);
    if (!snap.exists()) { alert("Room not found"); window.location.href = "party.html"; return; }
    roomData = snap.data();
    hostId = roomData.hostId?.toString();
    isHost = (myUserId === hostId);
    roomNameSpan.innerText = roomData.name || "Unnamed Room";
    roomInfoSpan.innerText = `ID: ${hostId || "?"} • LIVE`;
    rewardAmountSpan.innerText = roomData.rewards || 0;
    roomAnnouncementTitle.innerText = roomData.announcement ? "Announcement" : "Welcome";
    roomAnnouncementText.innerText = roomData.announcement || "Enjoy the party! Keep it friendly.";
    roomCategoryTag.innerText = roomData.category ? `#${roomData.category}` : "#Party";
    if (roomData.coverPhoto) roomCoverImg.src = roomData.coverPhoto;
    if (hostId) {
      const userSnap = await getDoc(doc(db, "users", hostId));
      if (userSnap.exists()) hostAvatarImg.src = userSnap.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(userSnap.username || "Host")}&background=006571&color=fff`;
      else hostAvatarImg.src = roomData.hostPhoto || `https://ui-avatars.com/api/?name=${encodeURIComponent(roomData.hostName || "Host")}&background=006571&color=fff`;
    }
    if (isHost) {
      menuIcon.innerText = "more_vert";
      leaveIcon.innerText = "arrow_back";
      menuBtn.onclick = () => { if (confirm("End the live party?")) endLive(); };
    } else {
      menuIcon.innerText = "close";
      leaveIcon.innerText = "arrow_back";
      menuBtn.onclick = () => { if (confirm("Leave the party?")) leaveRoom(); };
    }
  }

  async function endLive() { await deleteDoc(roomRef); window.location.href = "party.html"; }

  // ========== 2. Real-time Members & Seat Display ==========
  function renderSeats() {
    const allMembers = [...members];
    const hostIndex = allMembers.findIndex(m => m.uid === hostId);
    if (hostIndex !== -1) { const hostMember = allMembers.splice(hostIndex, 1)[0]; allMembers.unshift(hostMember); }
    const topMembers = allMembers.slice(0, 3);
    const bottomMembers = allMembers.slice(3, 8);
    // Top row (attached)
    topRowSeats.innerHTML = "";
    for (let i = 0; i < 3; i++) {
      const member = topMembers[i];
      const seatDiv = document.createElement("div");
      seatDiv.className = "top-seat";
      if (member) {
        const videoId = `video-${member.uid}`;
        seatDiv.innerHTML = `
          <div id="${videoId}" class="camera-frame"></div>
          <span class="text-white text-[9px] font-medium truncate max-w-[70px]">${member.username}</span>
        `;
        // If video track exists, play it; otherwise show avatar
        if (remoteUsers[member.uid]?.videoTrack) {
          const container = document.getElementById(videoId);
          if (container) remoteUsers[member.uid].videoTrack.play(container);
        } else {
          // Show avatar in camera frame
          const container = document.getElementById(videoId);
          if (container) {
            container.innerHTML = `<img src="${member.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(member.username)}&background=006571&color=fff`}" style="width:100%;height:100%;object-fit:cover;">`;
          }
        }
        // Host can click to remove
        if (isHost && member.uid !== hostId) {
          seatDiv.style.cursor = "pointer";
          seatDiv.onclick = () => {
            if (confirm(`Remove ${member.username} from seat?`)) {
              deleteDoc(doc(db, "rooms", roomId, "members", member.uid));
            }
          };
        }
      } else {
        // Empty seat (join)
        seatDiv.className = "top-seat cursor-pointer";
        seatDiv.onclick = () => joinRoom();
        seatDiv.innerHTML = `
          <div class="camera-frame flex items-center justify-center">
            <span class="material-symbols-outlined text-white/60 text-3xl">add</span>
          </div>
          <span class="text-white/60 text-[9px]">Join</span>
        `;
      }
      topRowSeats.appendChild(seatDiv);
    }
    // Bottom row
    bottomRowSeats.innerHTML = "";
    for (let i = 0; i < 5; i++) {
      const member = bottomMembers[i];
      if (member) {
        const div = document.createElement("div");
        div.className = "flex flex-col items-center gap-1";
        div.innerHTML = `
          <div class="w-12 h-12 rounded-full bg-black/40 backdrop-blur-sm border border-white/10 overflow-hidden">
            <img src="${member.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(member.username)}&background=006571&color=fff`}" class="w-full h-full object-cover">
          </div>
          <span class="text-white/60 text-[7px] uppercase tracking-widest truncate max-w-[48px]">${member.username}</span>
        `;
        if (isHost && member.uid !== hostId) {
          div.style.cursor = "pointer";
          div.onclick = () => {
            if (confirm(`Remove ${member.username} from room?`)) {
              deleteDoc(doc(db, "rooms", roomId, "members", member.uid));
            }
          };
        }
        bottomRowSeats.appendChild(div);
      } else {
        const div = document.createElement("div");
        div.className = "flex flex-col items-center gap-1 cursor-pointer";
        div.onclick = () => joinRoom();
        div.innerHTML = `
          <div class="w-12 h-12 rounded-full bg-black/40 backdrop-blur-sm border border-white/10 flex items-center justify-center">
            <span class="material-symbols-outlined text-white/60 text-xl">add</span>
          </div>
          <span class="text-white/40 text-[7px] uppercase tracking-widest">Join</span>
        `;
        bottomRowSeats.appendChild(div);
      }
    }
    viewerCountSpan.innerText = members.length;
  }

  async function loadMembers() {
    onSnapshot(membersRef, async (snap) => {
      const membersList = [];
      for (const docSnap of snap.docs) {
        const member = docSnap.data();
        const uid = member.uid?.toString();
        if (!uid) continue;
        let username = "User", photoURL = "";
        try {
          const userSnap = await getDoc(doc(db, "users", uid));
          if (userSnap.exists()) { username = userSnap.data().username || "User"; photoURL = userSnap.data().photoURL || ""; }
        } catch(e) {}
        membersList.push({ uid, username, photoURL, role: member.role || "guest" });
      }
      members = membersList;
      renderSeats();
    });
  }

  // ========== 3. Join / Leave (no auto join) ==========
  async function joinRoom() {
    const memberDoc = doc(db, "rooms", roomId, "members", myUserId);
    const memberSnap = await getDoc(memberDoc);
    if (!memberSnap.exists()) {
      await setDoc(memberDoc, { uid: myUserId, role: "guest", joinedAt: serverTimestamp() });
      await updateDoc(roomRef, { users: increment(1) });
    }
  }

  async function leaveRoom() {
    await deleteDoc(doc(db, "rooms", roomId, "members", myUserId));
    await updateDoc(roomRef, { users: increment(-1) });
    if (client) { for (let track of localTracks) track.close(); await client.leave(); }
    window.location.href = "party.html";
  }
  leaveBtn.onclick = () => {
    if (isHost) { if (confirm("End live and go back?")) endLive(); }
    else leaveRoom();
  };

  // ========== 4. Agora Video Integration ==========
  async function startAgora() {
    client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    await client.join(APP_ID, roomId, TOKEN, agoraUID);
    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();
    await client.publish(localTracks);
    client.on("user-published", async (user, mediaType) => {
      await client.subscribe(user, mediaType);
      if (mediaType === "video") {
        remoteUsers[user.uid] = { videoTrack: user.videoTrack };
        const container = document.getElementById(`video-${user.uid}`);
        if (container) user.videoTrack.play(container);
      }
      if (mediaType === "audio") user.audioTrack.play();
    });
    client.on("user-unpublished", (user) => {
      const container = document.getElementById(`video-${user.uid}`);
      if (container) container.innerHTML = "";
      delete remoteUsers[user.uid];
    });
  }

  function updateLocalVideoDisplay() {
    const container = document.getElementById(`video-${myUserId}`);
    if (!container) return;
    if (localTracks[1] && localTracks[1].enabled) {
      container.innerHTML = "";
      localTracks[1].play(container);
    } else {
      container.innerHTML = `<img src="${myPhoto}" style="width:100%;height:100%;object-fit:cover;">`;
    }
  }

  async function switchCamera() {
    if (!localTracks[1]) return;
    cameraFront = !cameraFront;
    const newTrack = await AgoraRTC.createCameraVideoTrack({ cameraId: cameraFront ? "environment" : "user", encoderConfig: "720p" });
    await client.unpublish(localTracks[1]);
    localTracks[1].close();
    localTracks[1] = newTrack;
    await client.publish(localTracks[1]);
    updateLocalVideoDisplay();
  }

  // ========== 5. Real-time Chat ==========
  function listenChat() {
    const q = query(messagesRef, orderBy("timestamp", "desc"), limit(50));
    onSnapshot(q, (snap) => {
      const msgs = [];
      snap.forEach(d => msgs.push({ id: d.id, ...d.data() }));
      msgs.reverse();
      chatMessagesDiv.innerHTML = "";
      msgs.slice(-10).forEach(msg => {
        const div = document.createElement("div");
        div.className = "flex items-start gap-2";
        if (msg.type === 'gift') {
          div.innerHTML = `<span class="text-amber-400 font-bold text-[10px]">🎁 ${escapeHtml(msg.senderName)}:</span> <span class="text-white text-[10px]">sent ${escapeHtml(msg.giftName)} x${msg.quantity || 1}</span>`;
        } else {
          div.innerHTML = `<span class="text-primary-fixed font-bold text-[10px]">${escapeHtml(msg.senderName)}:</span> <span class="text-white text-[10px] break-words">${escapeHtml(msg.text)}</span>`;
        }
        chatMessagesDiv.appendChild(div);
      });
      chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    });
  }

  async function sendMessage(text, type = 'text', giftData = null) {
    if (!text.trim() && type !== 'gift') return;
    const message = { senderId: myUserId, senderName: myUsername, timestamp: serverTimestamp(), type: type };
    if (type === 'text') message.text = text;
    if (type === 'gift' && giftData) {
      message.text = `sent ${giftData.name} x${giftData.quantity}`;
      message.giftName = giftData.name;
      message.giftImage = giftData.image;
      message.quantity = giftData.quantity;
    }
    await addDoc(messagesRef, message);
  }

  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => { const msg = btn.getAttribute('data-msg'); if (msg) sendMessage(msg); });
  });
  function sendChat() {
    const text = chatInput.value.trim();
    if (text) { sendMessage(text); chatInput.value = ''; }
  }
  sendMsgBtn.onclick = sendChat;
  chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });

  // ========== 6. Gift System with Quantity ==========
  async function loadGifts() {
    const snapshot = await getDocs(collection(db, "gifts"));
    giftGrid.innerHTML = "";
    snapshot.forEach(docSnap => {
      const g = docSnap.data();
      const div = document.createElement("div");
      div.className = "gift-item";
      div.onclick = () => {
        selectedGift = { id: docSnap.id, name: g.name, image: g.image, price: g.coinPrice };
        quantityPanel.style.display = "flex";
        giftPanel.style.display = "none";
      };
      div.innerHTML = `<img src="${g.image}"><div class="gift-name">${g.name}</div><div class="gift-price">${g.coinPrice} coins</div>`;
      giftGrid.appendChild(div);
    });
  }

  async function sendGift() {
    if (!selectedGift) return;
    const price = selectedGift.price * selectedQuantity;
    if (myUserId === hostId) { alert("Cannot send gift to yourself"); return; }
    const userSnap = await getDoc(doc(db, "users", myUserId));
    if ((userSnap.data()?.coins || 0) < price) { alert("Not enough coins!"); return; }
    await updateDoc(doc(db, "users", myUserId), { coins: increment(-price) });
    if (hostId) {
      const hostRef = doc(db, "users", hostId);
      const hostSnap = await getDoc(hostRef);
      const charmLevel = hostSnap.data()?.charmLevel || 0;
      const gemsEarned = Math.floor(price * (0.30 + charmLevel * 0.01));
      await updateDoc(hostRef, { gems: increment(gemsEarned) });
      await updateDoc(roomRef, { rewards: increment(gemsEarned) });
      rewardAmountSpan.innerText = (roomData?.rewards || 0) + gemsEarned;
    }
    await sendMessage('', 'gift', { name: selectedGift.name, image: selectedGift.image, quantity: selectedQuantity });
    const anim = document.createElement("div");
    anim.className = "fixed bottom-40 right-10 z-50 animate-bounce";
    anim.innerHTML = `<img src="${selectedGift.image}" class="w-16 h-16 drop-shadow-xl">`;
    document.body.appendChild(anim);
    setTimeout(() => anim.remove(), 2000);
    closeQuantityPanelFn();
    closeGiftPanelFn();
    selectedGift = null;
  }

  function openGiftPanelFn() { giftPanel.style.display = "flex"; loadGifts(); }
  function closeGiftPanelFn() { giftPanel.style.display = "none"; }
  function closeQuantityPanelFn() { quantityPanel.style.display = "none"; }
  openGiftBtn.onclick = openGiftPanelFn;
  closeGiftPanelBtn.onclick = closeGiftPanelFn;
  closeQuantityPanel.onclick = closeQuantityPanelFn;
  document.querySelectorAll('.qty-btn').forEach(btn => {
    btn.addEventListener('click', () => { selectedQuantity = parseInt(btn.dataset.qty); });
  });
  confirmSendGift.onclick = sendGift;

  // ========== 7. Invite System (Host only) ==========
  async function openInvitePanel() {
    // Get all users from Firestore except current members and host himself
    const allUsers = await getDocs(collection(db, "users"));
    const memberIds = new Set(members.map(m => m.uid));
    const availableUsers = [];
    allUsers.forEach(docSnap => {
      const uid = docSnap.id;
      if (uid !== myUserId && !memberIds.has(uid)) {
        const data = docSnap.data();
        availableUsers.push({ uid, username: data.username || "User", photoURL: data.photoURL });
      }
    });
    inviteList.innerHTML = "";
    if (availableUsers.length === 0) {
      inviteList.innerHTML = '<div class="text-white text-center col-span-4">No users to invite</div>';
    } else {
      availableUsers.forEach(user => {
        const div = document.createElement("div");
        div.className = "invite-item";
        div.innerHTML = `
          <img src="${user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&background=006571&color=fff`}" class="w-10 h-10 rounded-full mx-auto">
          <div class="text-white text-xs">${user.username}</div>
        `;
        div.onclick = async () => {
          await setDoc(doc(db, "rooms", roomId, "members", user.uid), {
            uid: user.uid,
            role: "guest",
            joinedAt: serverTimestamp()
          });
          await updateDoc(roomRef, { users: increment(1) });
          closeInvitePanelFn();
        };
        inviteList.appendChild(div);
      });
    }
    invitePanel.style.display = "flex";
  }
  function closeInvitePanelFn() { invitePanel.style.display = "none"; }
  closeInvitePanel.onclick = closeInvitePanelFn;

  // ========== 8. Background Picker ==========
  function initBgPicker() {
    bgGrid.innerHTML = "";
    backgrounds.forEach((url) => {
      const div = document.createElement("div");
      div.className = "bg-option";
      div.innerHTML = `<img src="${url}">`;
      div.onclick = () => { roomCoverImg.src = url; closeBgPickerFn(); updateDoc(roomRef, { coverPhoto: url }).catch(console.error); };
      bgGrid.appendChild(div);
    });
  }
  function openBgPickerFn() { bgPickerPanel.style.display = "flex"; }
  function closeBgPickerFn() { bgPickerPanel.style.display = "none"; }
  bgPickerBtn.onclick = openBgPickerFn;
  closeBgPicker.onclick = closeBgPickerFn;

  // ========== 9. Controls Panel ==========
  function openControls() { controlsPanel.style.display = "flex"; }
  function closeControlsFn() { controlsPanel.style.display = "none"; }
  document.getElementById("bgPickerBtn").addEventListener("click", openControls);
  closeControls.onclick = closeControlsFn;
  let micEnabled = true, camEnabled = true;
  toggleMicBtn.onclick = () => {
    if (localTracks[0]) {
      micEnabled = !micEnabled;
      localTracks[0].setEnabled(micEnabled);
      toggleMicBtn.innerHTML = micEnabled ? "🎤 Mic" : "🎤 Mic (Off)";
    }
  };
  toggleCamBtn.onclick = () => {
    if (localTracks[1]) {
      camEnabled = !camEnabled;
      localTracks[1].setEnabled(camEnabled);
      toggleCamBtn.innerHTML = camEnabled ? "📷 Camera" : "📷 Camera (Off)";
      updateLocalVideoDisplay();
    }
  };
  switchCamBtn.onclick = switchCamera;

  // ========== 10. Helper ==========
  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  // ========== Init ==========
  async function init() {
    await loadRoomData();
    // Do NOT auto join. Only join when user clicks seat.
    await startAgora();
    loadMembers();
    listenChat();
    initBgPicker();
    setTimeout(() => {
      if (isHost) {
        // Host auto joins his own seat
        joinRoom();
        // Host can also see invite button on empty seats? We'll add a context menu? For simplicity, host can click empty seat -> invite panel.
        // Override empty seat click for host: instead of join, open invite panel.
        // We'll modify the renderSeats function for host to show invite on empty seats.
      }
      updateLocalVideoDisplay();
    }, 1000);
    // Override empty seat click for host
    const originalRender = renderSeats;
    window.renderSeats = renderSeats;
    // Add invite button for host on empty seats (we'll patch the click event after render)
  }
  // Patch renderSeats to add invite for host on empty top seats
  const origRender = renderSeats;
  renderSeats = function() {
    origRender();
    if (isHost) {
      document.querySelectorAll('.top-seat .camera-frame .material-symbols-outlined').forEach(el => {
        const parent = el.closest('.top-seat');
        if (parent && parent.querySelector('.camera-frame') && parent.querySelector('.camera-frame').innerHTML.includes('add')) {
          parent.onclick = () => openInvitePanel();
          parent.querySelector('span:last-child').innerText = 'Invite';
        }
      });
      document.querySelectorAll('.bottom-row .camera-frame .material-symbols-outlined').forEach(el => {
        const parent = el.closest('.flex.flex-col.items-center.gap-1');
        if (parent && parent.querySelector('.material-symbols-outlined')?.innerText === 'add') {
          parent.onclick = () => openInvitePanel();
          parent.querySelector('span:last-child').innerText = 'Invite';
        }
      });
    }
  };
  init();
</script>
</body>
