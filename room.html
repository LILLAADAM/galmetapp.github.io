<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet – Party Room</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { background: #f3f7fb; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .custom-glass { background: rgba(0, 101, 113, 0.2); backdrop-filter: blur(12px); }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .chat-mask { mask-image: linear-gradient(to top, black 85%, transparent 100%); }
    .gift-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      border-radius: 20px 20px 0 0;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 200;
      max-height: 60%;
      overflow-y: auto;
    }
    .gift-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .gift-item { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 8px; text-align: center; cursor: pointer; transition: 0.2s; }
    .gift-item:active { transform: scale(0.95); }
    .gift-item img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 4px; }
    .gift-name { font-size: 10px; color: white; }
    .gift-price { font-size: 9px; color: #f59e0b; }
    .close-gift { background: rgba(255,255,255,0.2); border: none; padding: 8px; border-radius: 30px; color: white; }
    .camera-frame {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
    }
    .camera-frame video, .camera-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bg-picker {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      border-radius: 20px 20px 0 0;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 250;
    }
    .bg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .bg-option { aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
    .bg-option.selected { border-color: #00e3fd; }
    .bg-option img { width: 100%; height: 100%; object-fit: cover; }
    .controls-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      border-radius: 20px 20px 0 0;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 260;
    }
    .controls-grid { display: flex; gap: 12px; justify-content: center; }
    .ctrl-btn { background: #006571; border: none; padding: 10px 20px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body class="bg-background font-body text-on-background min-h-screen overflow-x-hidden">

<!-- Hero Background (room cover or default) -->

  <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60"></div>
</div>

<!-- Top Navigation -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 py-3 bg-[#f3f7fb]/80 backdrop-blur-xl border-b border-white/5">
  <div class="flex items-center gap-2">
    <button id="leaveBtn" class="w-8 h-8 flex items-center justify-center rounded-full bg-black/10 text-slate-600 hover:bg-black/20 active:scale-90 transition-all">

    <div class="flex items-center gap-2">
      <div class="relative">
        <img id="hostAvatar" class="w-9 h-9 rounded-full border-2 border-primary-fixed object-cover" src="">
        <div class="absolute -bottom-0.5 -right-0.5 bg-secondary rounded-full p-0.5">
          <span class="material-symbols-outlined text-[10px] text-white" style="font-variation-settings:'FILL'1">star</span>
        </div>
      </div>
      <div>
        <h1 id="roomName" class="text-[#006571] font-headline font-bold tracking-tight leading-none text-xs"></h1>

  </div>
</header>

<main class="relative z-10 pt-20 pb-40 px-4 flex flex-col min-h-screen">
  <!-- Seat Grid -->
  <div class="max-w-md mx-auto w-full">
    <!-- Top Row: 3 seats (live video) -->
    <div class="grid grid-cols-3 gap-4 mb-6" id="topRowSeats"></div>
    <!-- Bottom Row: 5 seats (audio only / invite) -->
    <div class="grid grid-cols-5 gap-2 mb-8" id="bottomRowSeats"></div>
  </div>

  <!-- Room Rules / Announcement -->
  <div class="max-w-xs mx-auto mb-6">
    <div class="custom-glass rounded-lg p-3 border border-primary-fixed/20 shadow-lg">
      <div class="flex items-center gap-2 mb-1.5">
        <span class="material-symbols-outlined text-primary-fixed text-xs" style="font-variation-settings:'FILL'1">info</span>
        <h3 id="roomAnnouncementTitle" class="text-white text-[11px] font-headline font-bold">Welcome to the Party</h3>
      </div>
      <p id="roomAnnouncementText" class="text-white/80 text-[9px] leading-snug">Enjoy our party! Keep it friendly.</p>
      <div class="mt-2 flex gap-1.5">
        <span id="roomCategoryTag" class="bg-primary-fixed/20 text-primary-fixed text-[7px] px-1.5 py-0.5 rounded-full font-bold">#Party</span>
      </div>

  <!-- Chat Area -->
  <div class="mt-auto mb-4 max-w-sm chat-mask h-32 overflow-y-auto pr-4 scrollbar-hide">

  <!-- Quick Action Buttons -->
  <div class="flex gap-1.5 mb-2 overflow-x-auto pb-2 scrollbar-hide">

    <button class="quick-btn whitespace-nowrap px-3 py-1.5 bg-white/10 backdrop-blur-md rounded-full text-white text-[9px] font-headline font-bold border border-white/5 active:scale-95 transition-transform" data-msg="🎲 Bingo!">Bingo</button>
    <button class="quick-btn whitespace-nowrap px-3 py-1.5 bg-gradient-to-r from-tertiary to-tertiary-fixed-dim rounded-full text-white text-[9px] font-headline font-bold shadow-md active:scale-95 transition-transform" data-msg="✨ Blingbling!">Blingbling</button>
    <button class="quick-btn whitespace-nowrap px-3 py-1.5 bg-white/10 backdrop-blur-md rounded-full text-white text-[9px] font-headline font-bold border border-white/5 active:scale-95 transition-transform" data-msg="👏 Clap clap!">Clap</button>
  </div>
</main>

<!-- Bottom Bar -->
<div class="fixed bottom-0 w-full z-50 bg-white/90 backdrop-blur-2xl rounded-t-[1.5rem] shadow-[0_-4px_20px_rgba(0,0,0,0.1)]">
  <div class="flex items-center justify-between px-5 py-3 gap-3">
    <div class="flex-1 bg-slate-100 rounded-full px-4 py-2 flex items-center gap-2">
      <span class="material-symbols-outlined text-slate-400 text-base">chat_bubble</span>
      <input type="text" id="chatInput" class="flex-1 bg-transparent border-none text-sm text-slate-700 placeholder-slate-400 focus:outline-none" placeholder="Say something...">

      <button id="openGiftBtn" class="relative text-slate-400 hover:text-primary transition-colors active:scale-110">
        <span class="material-symbols-outlined text-2xl">redeem</span>
        <div class="absolute -top-1 -right-1 w-2 h-2 bg-tertiary rounded-full border border-white"></div>

      <button onclick="window.location.href='party.html'" class="flex flex-col items-center justify-center bg-primary text-white rounded-full p-2.5 shadow-md active:scale-110 transition-transform">

      </button>
      <button id="bgPickerBtn" class="text-slate-400 hover:text-slate-600 active:scale-110">
        <span class="material-symbols-outlined text-2xl">grid_view</span>

</div>

<!-- Gift Panel -->

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, limit, updateDoc, increment, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);

  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) {
    window.location.replace("login.html");
  }

  const myUserId = currentUser.userId.toString();   // for Firestore
  const agoraUID = Number(currentUser.userId);      // for Agora
  const myUsername = currentUser.username || "User";
  const myPhoto = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(myUsername)}&background=006571&color=fff`;

  const urlParams = new URLSearchParams(window.location.search);
  const roomId = urlParams.get("id");
  if (!roomId) {
    alert("Invalid room");
    window.location.href = "party.html";
  }
  const roomRef = doc(db, "rooms", roomId);
  const membersRef = collection(db, "rooms", roomId, "members");
  const messagesRef = collection(db, "rooms", roomId, "messages");

  // Agora
  const APP_ID = "873172a9b2064b1ca97b4f45ee6ed9b5";
  const TOKEN = "007eJxTYNgf3zFVVc1vqcmx/X9OXy/PrUgsXmXoeNimROEVu7RPuZACg4W5saG5UaJlkpGBmUmSYXKipXmSSZqJaWqqWWqKZZKp1JQbmQ2BjAyqH/ewMDJAIIgvwpDob5Zu5pQdlBsa4ViZGmQUaplWwsAAACc3I8I=";
  let client = null;
  let localTracks = [];
  let remoteUsers = {};

  // DOM elements
  const hostAvatarImg = document.getElementById("hostAvatar");
  const roomNameSpan = document.getElementById("roomName");
  const roomInfoSpan = document.getElementById("roomInfo");
  const rewardAmountSpan = document.getElementById("rewardAmount");
  const viewerCountSpan = document.getElementById("viewerCount");
  const roomAnnouncementTitle = document.getElementById("roomAnnouncementTitle");
  const roomAnnouncementText = document.getElementById("roomAnnouncementText");
  const roomCategoryTag = document.getElementById("roomCategoryTag");
  const roomCoverImg = document.getElementById("roomCover");
  const topRowSeats = document.getElementById("topRowSeats");
  const bottomRowSeats = document.getElementById("bottomRowSeats");
  const chatMessagesDiv = document.getElementById("chatMessages");
  const leaveBtn = document.getElementById("leaveBtn");
  const menuBtn = document.getElementById("menuBtn");
  const menuIcon = document.getElementById("menuIcon");
  const leaveIcon = document.getElementById("leaveIcon");
  const openGiftBtn = document.getElementById("openGiftBtn");
  const giftPanel = document.getElementById("giftPanel");
  const closeGiftPanelBtn = document.getElementById("closeGiftPanel");
  const giftGrid = document.getElementById("giftGrid");
  const chatInput = document.getElementById("chatInput");
  const bgPickerBtn = document.getElementById("bgPickerBtn");
  const bgPickerPanel = document.getElementById("bgPickerPanel");
  const closeBgPicker = document.getElementById("closeBgPicker");
  const bgGrid = document.getElementById("bgGrid");
  const controlsPanel = document.getElementById("controlsPanel");
  const closeControls = document.getElementById("closeControls");
  const toggleMicBtn = document.getElementById("toggleMicBtn");
  const toggleCamBtn = document.getElementById("toggleCamBtn");

  let roomData = null;
  let members = [];
  let hostId = null;
  let isHost = false;

  // Professional backgrounds
  const backgrounds = [
    "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800",
    "https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=800",
    "https://images.unsplash.com/photo-1536240474400-bc3c7eac8f0d?w=800",
    "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800",
    "https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?w=800",
    "https://images.unsplash.com/photo-1511884642898-4c92249e20b6?w=800"
  ];

  // ========== 1. Load Room Data ==========
  async function loadRoomData() {
    const snap = await getDoc(roomRef);
    if (!snap.exists()) {
      alert("Room not found");
      window.location.href = "party.html";
      return;
    }
    roomData = snap.data();
    hostId = roomData.hostId?.toString();
    isHost = (myUserId === hostId);
    roomNameSpan.innerText = roomData.name || "Unnamed Room";
    roomInfoSpan.innerText = `ID: ${hostId || "?"} • LIVE`;
    rewardAmountSpan.innerText = roomData.rewards || 0;
    roomAnnouncementTitle.innerText = roomData.announcement ? "Announcement" : "Welcome";
    roomAnnouncementText.innerText = roomData.announcement || "Enjoy the party! Keep it friendly.";
    roomCategoryTag.innerText = roomData.category ? `#${roomData.category}` : "#Party";
    if (roomData.coverPhoto) roomCoverImg.src = roomData.coverPhoto;
    if (hostId) {
      const userSnap = await getDoc(doc(db, "users", hostId));
      if (userSnap.exists()) {
        const hostUser = userSnap.data();
        hostAvatarImg.src = hostUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(hostUser.username || "Host")}&background=006571&color=fff`;
      } else {
        hostAvatarImg.src = roomData.hostPhoto || `https://ui-avatars.com/api/?name=${encodeURIComponent(roomData.hostName || "Host")}&background=006571&color=fff`;
      }
    }
    // UI based on role
    if (isHost) {
      menuIcon.innerText = "more_vert";
      leaveIcon.innerText = "arrow_back";
      menuBtn.onclick = () => {
        if (confirm("End the live party? This will close the room for everyone.")) {
          endLive();
        }
      };
    } else {
      menuIcon.innerText = "close";
      leaveIcon.innerText = "arrow_back";
      menuBtn.onclick = () => {
        if (confirm("Leave the party?")) {
          leaveRoom();
        }
      };
    }
  }

  async function endLive() {
    await deleteDoc(roomRef);
    window.location.href = "party.html";
  }

  // ========== 2. Real-time Members & Seat Display ==========
  function renderSeats() {
    // Sort members: host first, then others by join time
    const allMembers = [...members];
    const hostIndex = allMembers.findIndex(m => m.uid === hostId);
    if (hostIndex !== -1) {
      const hostMember = allMembers.splice(hostIndex, 1)[0];
      allMembers.unshift(hostMember);
    }
    // Top row: first 3 members (live video)
    const topMembers = allMembers.slice(0, 3);
    const bottomMembers = allMembers.slice(3, 8);
    
    // Render top row
    topRowSeats.innerHTML = "";
    for (let i = 0; i < 3; i++) {
      const member = topMembers[i];
      if (member) {
        const div = document.createElement("div");
        div.className = "flex flex-col items-center gap-1";
        div.innerHTML = `
          <div id="video-${member.uid}" class="camera-frame"></div>
          <span class="text-white text-[9px] font-medium truncate max-w-[64px]">${member.username}</span>
        `;
        topRowSeats.appendChild(div);
        // Play video if track exists
        if (remoteUsers[member.uid]?.videoTrack) {
          const container = document.getElementById(`video-${member.uid}`);
          if (container) remoteUsers[member.uid].videoTrack.play(container);
        }
      } else {
        // Empty seat (invite / join)
        const div = document.createElement("div");
        div.className = "flex flex-col items-center gap-1 cursor-pointer";
        div.onclick = () => joinRoom();
        div.innerHTML = `
          <div class="camera-frame flex items-center justify-center">
            <span class="material-symbols-outlined text-white/60 text-3xl">add</span>
          </div>
          <span class="text-white/60 text-[9px]">Join</span>
        `;
        topRowSeats.appendChild(div);
      }
    }
    // Bottom row (audio only)
    bottomRowSeats.innerHTML = "";
    for (let i = 0; i < 5; i++) {
      const member = bottomMembers[i];
      if (member) {
        const div = document.createElement("div");
        div.className = "flex flex-col items-center gap-1";
        div.innerHTML = `
          <div class="w-12 h-12 rounded-full bg-black/40 backdrop-blur-sm border border-white/10 overflow-hidden">
            <img src="${member.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(member.username)}&background=006571&color=fff`}" class="w-full h-full object-cover">
          </div>
          <span class="text-white/60 text-[7px] uppercase tracking-widest truncate max-w-[48px]">${member.username}</span>
        `;
        bottomRowSeats.appendChild(div);
      } else {
        const div = document.createElement("div");
        div.className = "flex flex-col items-center gap-1 cursor-pointer";
        div.onclick = () => joinRoom();
        div.innerHTML = `
          <div class="w-12 h-12 rounded-full bg-black/40 backdrop-blur-sm border border-white/10 flex items-center justify-center">
            <span class="material-symbols-outlined text-white/60 text-xl">add</span>
          </div>
          <span class="text-white/40 text-[7px] uppercase tracking-widest">Join</span>
        `;
        bottomRowSeats.appendChild(div);
      }
    }
    viewerCountSpan.innerText = members.length;
  }

  async function loadMembers() {
    onSnapshot(membersRef, async (snap) => {
      const membersList = [];
      for (const docSnap of snap.docs) {
        const member = docSnap.data();
        const uid = member.uid?.toString();
        if (!uid) continue;
        let username = "User";
        let photoURL = "";
        try {
          const userSnap = await getDoc(doc(db, "users", uid));
          if (userSnap.exists()) {
            const u = userSnap.data();
            username = u.username || "User";
            photoURL = u.photoURL || "";
          }
        } catch(e) {}
        membersList.push({ uid, username, photoURL, role: member.role || "guest" });
      }
      members = membersList;
      renderSeats();
    });
  }

  // ========== 3. Join / Leave Room ==========
  async function joinRoom() {
    const memberDoc = doc(db, "rooms", roomId, "members", myUserId);
    const memberSnap = await getDoc(memberDoc);
    if (!memberSnap.exists()) {
      await setDoc(memberDoc, {
        uid: myUserId,
        role: "guest",
        joinedAt: serverTimestamp()
      });
      await updateDoc(roomRef, { users: increment(1) });
    }
  }

  async function leaveRoom() {
    await deleteDoc(doc(db, "rooms", roomId, "members", myUserId));
    await updateDoc(roomRef, { users: increment(-1) });
    if (client) {
      for (let track of localTracks) track.close();
      await client.leave();
    }
    window.location.href = "party.html";
  }
  leaveBtn.onclick = () => {
    if (isHost) {
      if (confirm("End live and go back?")) endLive();
    } else {
      leaveRoom();
    }
  };

  // ========== 4. Agora Video Integration ==========
  async function startAgora() {
    client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    await client.join(APP_ID, roomId, TOKEN, agoraUID);
    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();
    // Play local video in a container (add to top row)
    const localDiv = document.createElement("div");
    localDiv.id = `video-${myUserId}`;
    localDiv.className = "camera-frame";
    // We'll insert into the top row during render, but for now we just create and play later.
    // The render function will handle placement. We'll just play after render.
    await client.publish(localTracks);
    // Handle remote users
    client.on("user-published", async (user, mediaType) => {
      await client.subscribe(user, mediaType);
      if (mediaType === "video") {
        remoteUsers[user.uid] = { videoTrack: user.videoTrack };
        const container = document.getElementById(`video-${user.uid}`);
        if (container) user.videoTrack.play(container);
      }
      if (mediaType === "audio") {
        user.audioTrack.play();
      }
    });
    client.on("user-unpublished", (user) => {
      const container = document.getElementById(`video-${user.uid}`);
      if (container) container.innerHTML = "";
      delete remoteUsers[user.uid];
    });
  }

  // After members load, ensure local video is played in its container
  function playLocalVideo() {
    const container = document.getElementById(`video-${myUserId}`);
    if (container && localTracks[1]) {
      localTracks[1].play(container);
    }
  }

  // ========== 5. Real-time Chat ==========
  function listenChat() {
    const q = query(messagesRef, orderBy("timestamp", "desc"), limit(50));
    onSnapshot(q, (snap) => {
      const msgs = [];
      snap.forEach(d => msgs.push({ id: d.id, ...d.data() }));
      msgs.reverse();
      chatMessagesDiv.innerHTML = "";
      msgs.slice(-10).forEach(msg => {
        const div = document.createElement("div");
        div.className = "flex items-start gap-2";
        if (msg.type === 'gift') {
          div.innerHTML = `
            <span class="text-amber-400 font-bold text-[10px] whitespace-nowrap">🎁 ${escapeHtml(msg.senderName)}:</span>
            <p class="text-white text-[10px]">sent ${escapeHtml(msg.giftName)} x${msg.quantity || 1}</p>
          `;
        } else {
          div.innerHTML = `
            <span class="text-primary-fixed font-bold text-[10px] whitespace-nowrap">${escapeHtml(msg.senderName)}:</span>
            <p class="text-white text-[10px] break-words">${escapeHtml(msg.text)}</p>
          `;
        }
        chatMessagesDiv.appendChild(div);
      });
      chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    });
  }

  async function sendMessage(text, type = 'text', giftData = null) {
    if (!text.trim() && type !== 'gift') return;
    const message = {
      senderId: myUserId,
      senderName: myUsername,
      timestamp: serverTimestamp(),
      type: type
    };
    if (type === 'text') message.text = text;
    if (type === 'gift' && giftData) {
      message.text = `sent ${giftData.name} x${giftData.quantity}`;
      message.giftName = giftData.name;
      message.giftImage = giftData.image;
      message.quantity = giftData.quantity;
    }
    await addDoc(messagesRef, message);
  }

  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const msg = btn.getAttribute('data-msg');
      if (msg) sendMessage(msg);
    });
  });

  chatInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && chatInput.value.trim()) {
      sendMessage(chatInput.value.trim());
      chatInput.value = '';
    }
  });

  // ========== 6. Gift System (with charm level based gems) ==========
  async function loadGifts() {
    const snapshot = await getDocs(collection(db, "gifts"));
    giftGrid.innerHTML = "";
    snapshot.forEach(docSnap => {
      const g = docSnap.data();
      const div = document.createElement("div");
      div.className = "gift-item";
      div.onclick = () => sendGift(docSnap.id, g.name, g.image, g.coinPrice);
      div.innerHTML = `
        <img src="${g.image}">
        <div class="gift-name">${g.name}</div>
        <div class="gift-price">${g.coinPrice} coins</div>
      `;
      giftGrid.appendChild(div);
    });
  }

  async function sendGift(giftId, giftName, giftImage, price) {
    if (myUserId === hostId) {
      alert("You cannot send a gift to yourself");
      return;
    }
    const userSnap = await getDoc(doc(db, "users", myUserId));
    const userCoins = userSnap.data()?.coins || 0;
    if (userCoins < price) {
      alert("Not enough coins!");
      return;
    }
    await updateDoc(doc(db, "users", myUserId), { coins: increment(-price) });
    if (hostId) {
      const hostRef = doc(db, "users", hostId);
      const hostSnap = await getDoc(hostRef);
      // Get host's charm level to calculate gems earned
      const charmLevel = hostSnap.data()?.charmLevel || 0;
      // Gem rate: 30% + (level * 1%) as per backend
      const gemRate = 0.30 + (charmLevel * 0.01);
      const gemsEarned = Math.floor(price * gemRate);
      await updateDoc(hostRef, { gems: increment(gemsEarned) });
      await updateDoc(roomRef, { rewards: increment(gemsEarned) });
      rewardAmountSpan.innerText = (roomData?.rewards || 0) + gemsEarned;
    }
    await sendMessage('', 'gift', { name: giftName, image: giftImage, quantity: 1 });
    const anim = document.createElement("div");
    anim.className = "fixed bottom-40 right-10 z-50 animate-bounce";
    anim.innerHTML = `<img src="${giftImage}" class="w-16 h-16 drop-shadow-xl">`;
    document.body.appendChild(anim);
    setTimeout(() => anim.remove(), 2000);
    closeGiftPanelFn();
  }

  function openGiftPanelFn() { giftPanel.style.display = "flex"; loadGifts(); }
  function closeGiftPanelFn() { giftPanel.style.display = "none"; }
  openGiftBtn.onclick = openGiftPanelFn;
  closeGiftPanelBtn.onclick = closeGiftPanelFn;

  // ========== 7. Background Picker ==========
  function initBgPicker() {
    bgGrid.innerHTML = "";
    backgrounds.forEach((url) => {
      const div = document.createElement("div");
      div.className = "bg-option";
      div.innerHTML = `<img src="${url}">`;
      div.onclick = () => {
        roomCoverImg.src = url;
        closeBgPickerFn();
        updateDoc(roomRef, { coverPhoto: url }).catch(console.error);
      };
      bgGrid.appendChild(div);
    });
  }
  function openBgPickerFn() { bgPickerPanel.style.display = "flex"; }
  function closeBgPickerFn() { bgPickerPanel.style.display = "none"; }
  bgPickerBtn.onclick = openBgPickerFn;
  closeBgPicker.onclick = closeBgPickerFn;

  // ========== 8. Controls Panel (Mic/Camera) ==========
  function openControls() { controlsPanel.style.display = "flex"; }
  function closeControlsFn() { controlsPanel.style.display = "none"; }
  document.getElementById("bgPickerBtn").addEventListener("click", openControls); // Reuse 4-dots button to open controls
  closeControls.onclick = closeControlsFn;

  function toggleMic() {
    if (localTracks[0]) {
      const enabled = localTracks[0].enabled;
      localTracks[0].setEnabled(!enabled);
      toggleMicBtn.innerHTML = enabled ? "🎤 Mic (Off)" : "🎤 Mic (On)";
    }
  }
  function toggleCam() {
    if (localTracks[1]) {
      const enabled = localTracks[1].enabled;
      localTracks[1].setEnabled(!enabled);
      toggleCamBtn.innerHTML = enabled ? "📷 Camera (Off)" : "📷 Camera (On)";
    }
  }
  toggleMicBtn.onclick = toggleMic;
  toggleCamBtn.onclick = toggleCam;

  // ========== 9. Helper ==========
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  // ========== Init ==========
  async function init() {
    await loadRoomData();
    await joinRoom();
    await startAgora();
    loadMembers();
    listenChat();
    initBgPicker();
    // Wait a bit for members to render, then play local video
    setTimeout(() => {
      playLocalVideo();
      // Also play remote videos that might have arrived before containers
      Object.keys(remoteUsers).forEach(uid => {
        const container = document.getElementById(`video-${uid}`);
        if (container && remoteUsers[uid].videoTrack) {
          remoteUsers[uid].videoTrack.play(container);
        }
      });
    }, 1000);
  }
  init();
</script>
</body>
</html>
