<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up</title>

<style>
body{
    font-family: Arial;
    background:#0b1f4b;
    color:#fff;
    padding:20px;
}
.box{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}
.btn{
    background:#4cd964;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
}
.btn:hover{opacity:0.8}
.small{font-size:13px;opacity:0.7;}
#paymentBox{
    background:#111;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>💳 Top Up Balance</h2>

<div class="box">

<div class="btn" onclick="topup(1)">
1 USDT <br><span class="small">5000 Coins</span>
</div>

<div class="btn" onclick="topup(10)">
10 USDT <br><span class="small">55000 Coins</span>
</div>

<div class="btn" onclick="topup(50)">
50 USDT <br><span class="small">300000 Coins</span>
</div>

</div>

<div id="paymentBox" style="display:none;"></div>

<div class="box">
<h3>Topup History</h3>
<div id="history">Loading...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
};

initializeApp(firebaseConfig);

// ===============================
let currentUser = null;
let checkInterval = null;
let timerInterval = null;

// ===============================
// 🔐 LOGIN CHECK
// ===============================
window.addEventListener("DOMContentLoaded", () => {

    const user = JSON.parse(localStorage.getItem("user"));

    if (!user || !user.userId) {
        alert("Login required");
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    loadHistory();

    const saved = localStorage.getItem("activeTopup");
    if (saved) {
        const data = JSON.parse(saved);
        renderPayment(data.topupId, data.amount, data.wallet, data.network, data.startTime);
    }
});

// ===============================
// 🚀 TOPUP
// ===============================
window.topup = async function(amount){

    try{

        const res = await fetch("https://createtopup-k3vzdssfra-uc.a.run.app",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                userId: currentUser.userId,
                amount: amount
            })
        });

        const data = await res.json();

        if(!data.success){
            alert("Topup failed");
            return;
        }

        const saveData = {
            topupId: data.topupId,
            amount: amount,
            wallet: data.wallet,
            network: data.network,
            startTime: Date.now()
        };

        localStorage.setItem("activeTopup", JSON.stringify(saveData));

        renderPayment(
            data.topupId,
            amount,
            data.wallet,
            data.network,
            saveData.startTime
        );

    }catch(e){
        alert("Network error");
    }
};

// ===============================
// 💳 PAYMENT UI
// ===============================
function renderPayment(topupId, amount, wallet, network, startTime){

    const box = document.getElementById("paymentBox");

    if(!box) return;

    const qr = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${wallet}`;

    box.style.display="block";

    box.innerHTML = `
        <h3>Send Payment</h3>
        <img src="${qr}" />
        <p>Network: ${network}</p>
        <p>Wallet: ${wallet}</p>
        <p>Amount: ${amount} USDT</p>
        <div id="timer"></div>
        <p>Waiting for payment...</p>
    `;

    startTimer(startTime);
    startChecking(topupId);
}

// ===============================
// ⏳ TIMER
// ===============================
function startTimer(startTime){

    if(timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(()=>{

        let passed = Math.floor((Date.now()-startTime)/1000);
        let remaining = 900 - passed;

        if(remaining <= 0){
            clearInterval(timerInterval);
            localStorage.removeItem("activeTopup");
            document.getElementById("timer").innerHTML="Expired";
            return;
        }

        let m = Math.floor(remaining/60);
        let s = remaining%60;

        document.getElementById("timer").innerHTML =
            `Time: ${m}:${s<10?"0"+s:s}`;

    },1000);
}

// ===============================
// 🔍 CHECK STATUS
// ===============================
function startChecking(topupId){

    if(checkInterval) clearInterval(checkInterval);

    checkInterval = setInterval(async ()=>{

        try{
            const res = await fetch(
                "https://gettopups-k3vzdssfra-uc.a.run.app?topupId="+topupId
            );

            const data = await res.json();

            if(data.status === "completed"){

                clearInterval(checkInterval);
                clearInterval(timerInterval);

                localStorage.removeItem("activeTopup");

                document.getElementById("paymentBox").innerHTML = `
                    <h3 style="color:#4cd964;">Payment Completed ✅</h3>
                `;

                loadHistory();

                setTimeout(()=>{
                    window.location.href="dashboard.html";
                },2000);
            }

        }catch(e){
            console.log("Check error");
        }

    },3000);
}

// ===============================
// 📜 HISTORY
// ===============================
async function loadHistory(){

    try{
        const res = await fetch(
            "https://gettopups-k3vzdssfra-uc.a.run.app?userId="+currentUser.userId
        );

        const data = await res.json();

        let html="";

        data.forEach(t=>{
            html+=`<div>${t.amount} USDT - <b>${t.status}</b></div>`;
        });

        document.getElementById("history").innerHTML=html;

    }catch(e){
        document.getElementById("history").innerHTML="Error loading history";
    }
}

</script>

</body>
</html>
