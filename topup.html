<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up</title>

<style>
body {
    background:#0f1b5c;
    color:white;
    font-family:sans-serif;
    padding:20px;
}

.card {
    background:#1f2f9c;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#paymentBox {
    display:none;
    background:#000;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}
</style>
</head>

<body>

<h2>💳 Top Up Balance</h2>

<div class="card">
    <p>Select USDT amount:</p>

    <button onclick="topup(1)">1 USDT (5000 Coins)</button>
    <button onclick="topup(10)">10 USDT (50000 Coins)</button>
    <button onclick="topup(50)">50 USDT (250000 Coins)</button>
    <button onclick="topup(100)">100 USDT (500000 Coins)</button>
</div>

<!-- PAYMENT BOX -->
<div id="paymentBox">
    <h3>Send Payment</h3>
    <p><b>Network:</b> TRC20</p>
    <p><b>Wallet:</b> TXYZ123456ABCDEF</p>
    <p><b>Amount:</b> <span id="payAmount"></span> USDT</p>

    <p>After payment, wait for admin confirmation.</p>
</div>

<div class="card">
    <h3>Topup History</h3>
    <div id="history">Loading...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;

// ✅ WAIT FOR LOGIN
onAuthStateChanged(auth, (user) => {
    if(user){
        currentUser = user;
        console.log("Logged in:", user.uid);
        loadHistory();
    } else {
        alert("Please login first");
    }
});


// ✅ GET NUMERIC USER ID FROM FIRESTORE
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const db = getFirestore(app);

async function fetchUserData() {

    const userRef = doc(db, "users", currentUser.uid);
    const snap = await getDoc(userRef);

    if(!snap.exists()){
        throw new Error("User not found");
    }

    return snap.data(); // ✅ contains userId
}


// ✅ CREATE TOPUP
window.topup = async function(amount){

    console.log("Clicked:", amount);

    if(!currentUser){
        alert("Login not ready");
        return;
    }

    try {

        const userData = await fetchUserData();

        const res = await fetch("https://createtopup-k3vzdssfra-uc.a.run.app", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                userId: userData.userId,
                amount: amount
            })
        });

        const data = await res.json();

        console.log(data);

        if(data.success){
            showPayment(amount);
            loadHistory();
        } else {
            alert("Error creating topup");
        }

    } catch(e){
        console.error(e);
        alert("Request failed");
    }
};


// ✅ SHOW PAYMENT UI
function showPayment(amount){
    document.getElementById("paymentBox").style.display = "block";
    document.getElementById("payAmount").innerText = amount;
}


// ✅ LOAD HISTORY
async function loadHistory(){

    if(!currentUser) return;

    const userData = await fetchUserData();

    try {

        const res = await fetch(
            "https://gettopups-k3vzdssfra-uc.a.run.app?userId=" + userData.userId
        );

        const data = await res.json();

        console.log("History:", data);

        if(!Array.isArray(data)){
            document.getElementById("history").innerHTML = "No data";
            return;
        }

        let html = "";

        data.forEach(t => {
            html += `
            <div style="margin-bottom:10px;">
                ${t.amount} USDT - <b>${t.status}</b>
            </div>`;
        });

        document.getElementById("history").innerHTML = html;

    } catch(e){
        console.error(e);
        document.getElementById("history").innerHTML = "Error loading";
    }
}

</script>

</body>
</html>
