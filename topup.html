<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up</title>

<style>
body {
    background:#0f1b5c;
    color:white;
    font-family:sans-serif;
    padding:20px;
}

.card {
    background:#1f2f9c;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>💳 Top Up Balance</h2>

<!-- ✅ STEP 1: SELECT AMOUNT -->
<div class="card">
    <p>Select USDT amount:</p>

    <button onclick="topup(1)">1 USDT</button>
    <button onclick="topup(10)">10 USDT</button>
    <button onclick="topup(50)">50 USDT</button>
    <button onclick="topup(100)">100 USDT</button>
</div>

<!-- ✅ STEP 2: PAYMENT SCREEN -->
<div id="paymentBox" style="display:none;" class="card">
    <h3>Send Payment</h3>

    <p><b>Topup ID:</b> <span id="tid"></span></p>
    <p><b>Amount:</b> <span id="amt"></span> USDT</p>

    <p><b>Network:</b> TRC20</p>

    <p><b>Wallet Address:</b></p>
    <p id="wallet">TXYZ123ABC456789XXXX</p>

    <!-- 🔥 PUT YOUR QR IMAGE HERE -->
    <img src="https://via.placeholder.com/150" width="150">

    <p style="margin-top:10px;">After payment, wait for confirmation.</p>
</div>

<!-- ✅ STEP 3: HISTORY -->
<div class="card">
    <h3>Topup History</h3>
    <div id="history"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;

// ✅ WAIT FOR LOGIN STATE
onAuthStateChanged(auth, (user) => {

    if (user) {
        currentUser = user;
        console.log("✅ Logged in:", user.uid);

        // load history after login
        loadHistory();

    } else {
        console.log("❌ Not logged in");
    }

});


// ✅ TOPUP FUNCTION
window.topup = async function(amount){

    if(!currentUser){
        alert("Login required");
        return;
    }

    const res = await fetch("https://createtopup-k3vzdssfra-uc.a.run.app", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            userId: currentUser.uid,
            amount: amount
        })
    });

    const data = await res.json();

    if(data.success){
        showPayment(data.topupId, amount);
        loadHistory();
    } else {
        alert("Error");
    }
};


// ✅ HISTORY
async function loadHistory(){

    if(!currentUser) return;

    const res = await fetch(
        "https://gettopups-k3vzdssfra-uc.a.run.app?userId=" + currentUser.uid
    );

    const data = await res.json();

    let html = "";

    data.forEach(t => {
        html += `
        <div>
            ${t.amount} USDT - <b>${t.status}</b>
        </div>`;
    });

    document.getElementById("history").innerHTML = html;
}
