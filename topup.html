<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up</title>

<style>
body {
    background:#0f1b5c;
    color:white;
    font-family:sans-serif;
    padding:20px;
}

.card {
    background:#1f2f9c;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#paymentBox {
    display:none;
}
</style>
</head>

<body>

<h2>💳 Top Up Balance</h2>

<!-- ✅ AMOUNT SELECTION -->
<div class="card">
    <p>Select USDT amount:</p>

    <button onclick="topup(1)">1 USDT (5000 Coins)</button>
    <button onclick="topup(10)">10 USDT (50000 Coins)</button>
    <button onclick="topup(50)">50 USDT (250000 Coins)</button>
    <button onclick="topup(100)">100 USDT (500000 Coins)</button>
</div>

<!-- ✅ PAYMENT BOX -->
<div id="paymentBox" class="card">
    <h3>Send Payment</h3>

    <p><b>Topup ID:</b> <span id="tid"></span></p>
    <p><b>Amount:</b> <span id="amt"></span></p>

    <p><b>Network:</b> TRC20</p>

    <!-- 🔥 CHANGE WALLET HERE -->
    <p><b>Wallet:</b></p>
    <p id="wallet">TXXXXXXXXXXXXXXX</p>

    <!-- 🔥 CHANGE QR HERE -->
    <img src="https://via.placeholder.com/150" width="150">

    <p style="margin-top:10px;">After payment, wait for admin confirmation.</p>
</div>

<!-- ✅ HISTORY -->
<div class="card">
    <h3>Topup History</h3>
    <div id="history">Loading...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;

// ✅ WAIT FOR LOGIN
onAuthStateChanged(auth, (user) => {

    if (user) {
        currentUser = user;
        console.log("✅ Logged in:", user.uid);
        loadHistory();
    } else {
        console.log("❌ Not logged in");
    }

});


// ✅ COIN CALCULATION
function calculateCoins(usdt){
    return usdt * 5000;
}


// ✅ TOPUP FUNCTION
window.topup = async function(amount){

    console.log("Clicked:", amount);

    if(!currentUser){
        alert("Please wait... logging in");
        return;
    }

    try {

        const res = await fetch("https://createtopup-k3vzdssfra-uc.a.run.app", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                userId: currentUser.uid,
                amount: amount
            })
        });

        const data = await res.json();

        console.log(data);

        if(data.success){

            showPayment(data.topupId, amount);

        } else {
            alert("Error creating topup");
        }

    } catch(e){
        console.error(e);
        alert("Request failed");
    }
};


// ✅ SHOW PAYMENT
function showPayment(topupId, amount){

    document.getElementById("paymentBox").style.display = "block";

    document.getElementById("tid").innerText = topupId;

    document.getElementById("amt").innerText =
        amount + " USDT (" + calculateCoins(amount) + " Coins)";
}


// ✅ LOAD HISTORY
async function loadHistory(){

    if(!currentUser) return;

    const res = await fetch(
        "https://gettopups-k3vzdssfra-uc.a.run.app?userId=" + currentUser.uid
    );

    const data = await res.json();

    let html = "";

    data.forEach(t => {
        html += `
        <div style="margin-bottom:10px;">
            ${t.amount} USDT - <b>${t.status}</b>
        </div>`;
    });

    document.getElementById("history").innerHTML = html;
}

</script>

</body>
</html>
