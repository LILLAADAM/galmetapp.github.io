<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up</title>

<style>
body{
    font-family: Arial;
    background:#0b1f4b;
    color:#fff;
    padding:20px;
}

.box{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.btn{
    background:#4cd964;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
}

.btn:hover{opacity:0.8}

.small{
    font-size:13px;
    opacity:0.7;
}

#paymentBox{
    background:#111;
    padding:20px;
    border-radius:10px;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

</head>
<body>

<h2>💳 Top Up Balance</h2>

<div class="box">
    <h3>Select USDT amount:</h3>

    <div class="btn" onclick="topup(1)">
        1 USDT <br>
        <span class="small"><s>5000 Coins</s></span><br>
        5000 Coins
    </div>

    <div class="btn" onclick="topup(10)">
        10 USDT <br>
        <span class="small"><s>50000 Coins</s></span><br>
        55000 Coins
    </div>

    <div class="btn" onclick="topup(50)">
        50 USDT <br>
        <span class="small"><s>250000 Coins</s></span><br>
        300000 Coins
    </div>

    <div class="btn" onclick="topup(100)">
        100 USDT <br>
        <span class="small"><s>500000 Coins</s></span><br>
        620000 Coins
    </div>
</div>

<div id="paymentBox" style="display:none;"></div>

<div class="box">
    <h3>Topup History</h3>
    <div id="history">Loading...</div>
</div>

<script type="module">

// ✅ YOUR FIREBASE CONFIG HERE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// 🔐 WAIT FOR LOGIN
onAuthStateChanged(auth, async (user)=>{
    if(!user){
        alert("Login required");
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    loadHistory();
});

// 🔥 GET USER ID
async function fetchUserData(){
    const ref = doc(db,"users",currentUser.uid);
    const snap = await getDoc(ref);

    return snap.data(); // contains userId
}

// ===============================
// 🚀 CREATE TOPUP
// ===============================
window.topup = async function(amount){

    try{

        const userData = await fetchUserData();

        const res = await fetch("https://createtopup-k3vzdssfra-uc.a.run.app",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                userId: userData.userId,
                amount: amount
            })
        });

        const data = await res.json();

        if(data.success){
            showPayment(data.topupId, amount);
        }else{
            alert("Error creating topup");
        }

    }catch(e){
        alert("Request failed");
    }
};

// ===============================
// 💳 SHOW PAYMENT + QR
// ===============================
function showPayment(topupId, amount){

    const wallet = "TXYZ123456ABCDEF"; // change here
    const qr = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${wallet}`;

    document.getElementById("paymentBox").style.display="block";

    document.getElementById("paymentBox").innerHTML = `
        <h3>Send Payment</h3>
        <img src="${qr}" />
        <p>Network: TRC20</p>
        <p>Wallet: ${wallet}</p>
        <p>Amount: ${amount} USDT</p>

        <div id="timer"></div>
        <p>Waiting for payment...</p>
    `;

    startTimer(topupId);
}

// ===============================
// ⏳ TIMER + AUTO CHECK
// ===============================
function startTimer(topupId){

    let time = 900;

    const interval = setInterval(async ()=>{

        let m = Math.floor(time/60);
        let s = time%60;

        document.getElementById("timer").innerHTML =
            `Time: ${m}:${s<10?"0"+s:s}`;

        if(time % 5 === 0){
            checkStatus(topupId);
        }

        time--;

        if(time <= 0){
            clearInterval(interval);
        }

    },1000);
}

// ===============================
// 🔍 CHECK STATUS
// ===============================
async function checkStatus(topupId){

    const res = await fetch(
        "https://gettopups-k3vzdssfra-uc.a.run.app?topupId="+topupId
    );

    const data = await res.json();

    if(data.status === "completed"){
        alert("Payment confirmed ✅");
        window.location.href="dashboard.html";
    }
}

// ===============================
// 📜 LOAD HISTORY
// ===============================
async function loadHistory(){

    const userData = await fetchUserData();

    const res = await fetch(
        "https://gettopups-k3vzdssfra-uc.a.run.app?userId="+userData.userId
    );

    const data = await res.json();

    if(!Array.isArray(data)){
        document.getElementById("history").innerHTML="No data";
        return;
    }

    let html="";

    data.forEach(t=>{
        html+=`<div>${t.amount} USDT - <b>${t.status}</b></div>`;
    });

    document.getElementById("history").innerHTML=html;
}

</script>

</body>
</html>
