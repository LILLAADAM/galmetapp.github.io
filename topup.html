<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up</title>

<style>
body{
    font-family: Arial;
    background:#0b1f4b;
    color:#fff;
    padding:20px;
}
.box{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}
.btn{
    background:#4cd964;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
}
.btn:hover{opacity:0.8}
.small{font-size:13px;opacity:0.7;}
#paymentBox{
    background:#111;
    padding:20px;
    border-radius:10px;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// ===============================
// 💰 15 WALLET ROTATION
// ===============================
const wallets = [
"TU5Jjeo27gNauHtDp5oAdNcvvqNUZkc4Pm",
  "TLNaDp16E1nGHvi4EFAZm3oDKu1spLz9mr",
  "TShvUteXBEk4T9rqiGA6UPm79Dhbd7cdFa",
  "TPhWnXrn8egGgE5btGbhkhkztRsSeYEjEG",
  "TCnFsps5LKEMK6qMqkekLgXYRjtKo8U9vS",
  "TCaFRQy8oXisAUxRbqLKeKJB8iqxV31YmZ",
  "TYZP5PhHcc5ZtkJHgUCs3XcQVWjzabYxtp",
  "TDDhf3XZKqLqtM8nVGHTruWoMX9f7bkBxJ",
  "THk4uzJTv78KtSYQnxiQk1QmMny3fKYZFj",
  "TQroiJa5fupBKTZySDdRrMtHEi1scSb8T6",
  "TUTNNRSABtLotrs96Q3mSGoPN2QFaP2Xww",
  "TGyxkr8QjoWXkr8MT78yKcLhM1S42RUQdh",
  "TQY4XLQbYFseisMkmeryLDksR4X8zHfMMp",
  "TJgss3bUQD9SsU2Wa7fYcDxQuAaPsUzKYo",
  "TVrpcGhNUyJGKUFWNSGTqBMMgxqQtGxsAK"
];

function getNextWallet(){
    let index = localStorage.getItem("walletIndex") || 0;
    index = Number(index);

    const wallet = wallets[index];

    index++;
    if(index >= wallets.length) index = 0;

    localStorage.setItem("walletIndex", index);

    return wallet;
}

// ===============================
// 🔐 AUTH
// ===============================
onAuthStateChanged(auth, async (user)=>{
    if(!user){
        window.location.href="login.html";
        return;
    }

    currentUser = user;

    loadHistory();

    // ✅ restore payment
    const saved = localStorage.getItem("activeTopup");
    if(saved){
        const data = JSON.parse(saved);
        renderPayment(data.topupId, data.amount, data.wallet, data.startTime);
    }
});

// ===============================
async function fetchUserData(){
    const ref = doc(db,"users",currentUser.uid);
    const snap = await getDoc(ref);
    return snap.data();
}

// ===============================
// 🚀 CREATE TOPUP
// ===============================
window.topup = async function(amount){

    const wallet = getNextWallet();

    const userData = await fetchUserData();

    const res = await fetch("https://createtopup-k3vzdssfra-uc.a.run.app",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            userId: userData.userId,
            amount: amount,
            wallet: wallet   // 🔥 IMPORTANT
        })
    });

    const data = await res.json();

    if(data.success){

        const saveData = {
            topupId: data.topupId,
            amount: amount,
            wallet: wallet,
            startTime: Date.now()
        };

        localStorage.setItem("activeTopup", JSON.stringify(saveData));

        renderPayment(
            data.topupId,
            amount,
            wallet,
            saveData.startTime
        );

    }else{
        alert("Error");
    }
};

// ===============================
// 💳 RENDER PAYMENT
// ===============================
function renderPayment(topupId, amount, wallet, startTime){

    const qr = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${wallet}`;

    document.getElementById("paymentBox").style.display="block";

    document.getElementById("paymentBox").innerHTML = `
        <h3>Send Payment</h3>
        <img src="${qr}" />
        <p>Network: TRC20</p>
        <p>Wallet: ${wallet}</p>
        <p>Amount: ${amount} USDT</p>
        <div id="timer"></div>
        <p>Waiting for payment...</p>
    `;

    startTimer(topupId, startTime);
}

// ===============================
// ⏳ TIMER + CHECK
// ===============================
function startTimer(topupId, startTime){

    const interval = setInterval(()=>{

        let passed = Math.floor((Date.now()-startTime)/1000);
        let remaining = 900 - passed;

        if(remaining <= 0){
            clearInterval(interval);
            localStorage.removeItem("activeTopup");
            document.getElementById("timer").innerHTML="Expired";
            return;
        }

        let m = Math.floor(remaining/60);
        let s = remaining%60;

        document.getElementById("timer").innerHTML =
            `Time: ${m}:${s<10?"0"+s:s}`;

        if(remaining % 5 === 0){
            checkStatus(topupId);
        }

    },1000);
}

// ===============================
// 🔍 CHECK STATUS
// ===============================
async function checkStatus(topupId){

    try {

        const res = await fetch(
            "https://gettopups-k3vzdssfra-uc.a.run.app?topupId=" + topupId
        );

        if(!res.ok) return;

        const data = await res.json();

        console.log("STATUS:", data);

        if(data.status === "completed"){

            localStorage.removeItem("activeTopup");

            document.getElementById("paymentBox").innerHTML = `
                <h3 style="color:#4cd964;">Payment Completed ✅</h3>
                <p>Coins added to your account</p>
            `;

            setTimeout(()=>{
                window.location.href="dashboard.html";
            },2000);
        }

    } catch(e){
        console.log("Check failed");
    }
}

// ===============================
// 📜 HISTORY
// ===============================
async function loadHistory(){

    const userData = await fetchUserData();

    const res = await fetch(
        "https://gettopups-k3vzdssfra-uc.a.run.app?userId="+userData.userId
    );

    const data = await res.json();

    let html="";

    data.forEach(t=>{
        html+=`<div>${t.amount} USDT - <b>${t.status}</b></div>`;
    });

    document.getElementById("history").innerHTML=html;
}

</script>
</head>

<body>

<h2>💳 Top Up Balance</h2>

<div class="box">

<div class="btn" onclick="topup(1)">
1 USDT <br><span class="small"><s>5000</s></span><br>5000 Coins
</div>

<div class="btn" onclick="topup(10)">
10 USDT <br><span class="small"><s>50000</s></span><br>55000 Coins
</div>

<div class="btn" onclick="topup(50)">
50 USDT <br><span class="small"><s>250000</s></span><br>300000 Coins
</div>

<div class="btn" onclick="topup(100)">
100 USDT <br><span class="small"><s>500000</s></span><br>620000 Coins
</div>

</div>

<div id="paymentBox" style="display:none;"></div>

<div class="box">
<h3>Topup History</h3>
<div id="history">Loading...</div>
</div>

</body>
</html>
