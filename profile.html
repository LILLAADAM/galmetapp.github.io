<h2>Your Profile</h2>

<img id="photo" width="80" style="border-radius:50%"><br><br>

<div id="username"></div>
<div id="email"></div>

<br>
<button onclick="logout()">Logout</button>

<script type="module">
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const auth = getAuth();
const db = getFirestore();

onAuthStateChanged(auth, async (user)=>{
    if(!user){
        location="index.html";
        return;
    }

    const snap = await getDoc(doc(db,"users",user.uid));
    const data = snap.data();

    document.getElementById("username").innerText = data.username || "No username";
    document.getElementById("email").innerText = data.email;
    document.getElementById("photo").src = data.photoURL || "https://via.placeholder.com/80";
});

window.logout = ()=> signOut(auth).then(()=>location="index.html");
</script>
