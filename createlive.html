<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Go Live - Galmet</title>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
:root{
  --bg:#06080f;--surf:#0d1017;--surf2:#131720;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --blue:#4f7cff;--pink:#ff3d6e;--gold:#ffc531;--teal:#00e5c4;
  --text:#eef0ff;--muted:rgba(238,240,255,0.42);
  --glass:rgba(10,13,22,0.82);--blur:blur(18px);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);}
.ms{font-family:'Material Symbols Rounded';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
.ms.f{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}

/* PREVIEW */
#preview{position:fixed;inset:0;z-index:0;background:#000;}
#preview video{width:100%;height:100%;object-fit:cover;display:block;}
/* filters on preview */
#preview.fw-beauty video{filter:brightness(1.12) saturate(1.1) contrast(.96) blur(0.3px)!important;}
#preview.fw-warm video{filter:sepia(.42) saturate(1.4) brightness(1.05)!important;}
#preview.fw-cool video{filter:hue-rotate(22deg) saturate(1.22) brightness(.97)!important;}
#preview.fw-vivid video{filter:saturate(1.95) contrast(1.08)!important;}
#preview.fw-mono video{filter:grayscale(1) contrast(1.06)!important;}
#preview.fw-golden video{filter:sepia(.62) saturate(1.5) brightness(1.08) hue-rotate(-8deg)!important;}
#preview.fw-rose video{filter:hue-rotate(-22deg) saturate(1.45) brightness(1.04)!important;}
#preview.fw-night video{filter:hue-rotate(190deg) saturate(.78) brightness(.72)!important;}
/* mirror */
#preview.mirrored video{transform:scaleX(-1)!important;}
#vg{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(6,8,15,.7) 0%,transparent 30%,transparent 50%,rgba(6,8,15,.96) 100%);}

/* BACK BUTTON */
#back-btn{position:fixed;top:max(env(safe-area-inset-top),16px);left:16px;z-index:30;width:38px;height:38px;border-radius:50%;background:rgba(6,8,15,.6);backdrop-filter:var(--blur);border:1px solid var(--border2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* RIGHT CONTROLS */
#right-ctrl{position:fixed;top:max(env(safe-area-inset-top),16px);right:14px;z-index:30;display:flex;flex-direction:column;gap:10px;}
.rctrl-btn{width:44px;height:44px;border-radius:14px;background:rgba(6,8,15,.6);backdrop-filter:var(--blur);border:1px solid var(--border2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.rctrl-btn:active{transform:scale(.91);}
.rctrl-btn.on{background:rgba(79,124,255,.2);border-color:rgba(79,124,255,.4);color:var(--blue);}

/* FILTER ROW (appears when filter icon clicked) */
#filter-row{position:fixed;right:68px;top:max(env(safe-area-inset-top),16px);z-index:30;display:flex;flex-direction:column;gap:6px;opacity:0;pointer-events:none;transform:translateX(10px);transition:all .22s;}
#filter-row.on{opacity:1;pointer-events:auto;transform:translateX(0);}
.fchip{background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:10px;padding:5px 10px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
.fchip.sel{background:var(--blue);border-color:var(--blue);color:#fff;}

/* TOAST */
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:100;background:rgba(13,16,23,.95);border:1px solid var(--border2);border-radius:99px;padding:8px 18px;font-size:12.5px;font-weight:700;opacity:0;transition:all .26s;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* BOTTOM PANEL */
#btm-panel{position:fixed;bottom:0;left:0;right:0;z-index:30;padding:16px 16px max(env(safe-area-inset-bottom,20px),20px);}

/* POSTER UPLOAD + TITLE ROW */
.setup-row{display:flex;align-items:center;gap:10px;background:rgba(6,8,15,.75);backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:16px;padding:10px 12px;margin-bottom:12px;}
#poster-btn{width:54px;height:54px;border-radius:12px;background:rgba(255,255,255,.08);border:1.5px dashed rgba(255,255,255,.25);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;overflow:hidden;position:relative;}
#poster-img{width:100%;height:100%;object-fit:cover;display:none;border-radius:10px;}
#poster-plus{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);}
#poster-plus .ms{font-size:18px;}
#poster-plus span{font-size:7.5px;font-weight:700;text-align:center;line-height:1.2;}
.setup-right{flex:1;display:flex;flex-direction:column;gap:7px;}
#title-input{background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-weight:700;font-family:inherit;width:100%;}
#title-input::placeholder{color:var(--muted);}
.setup-divider{height:1px;background:var(--border);}
.setup-row2{display:flex;align-items:center;gap:6px;}
.privacy-btn{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;padding:2px 0;}
.privacy-btn .ms{font-size:14px;}
#poster-input{display:none;}

/* GO LIVE BUTTON */
#go-live-btn{width:100%;background:linear-gradient(135deg,var(--teal),var(--blue));border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:900;color:#fff;cursor:pointer;font-family:inherit;letter-spacing:.02em;box-shadow:0 6px 24px rgba(0,229,196,.3);transition:transform .13s;display:flex;align-items:center;justify-content:center;gap:8px;}
#go-live-btn:active{transform:scale(.97);}
#go-live-btn.loading{opacity:.7;pointer-events:none;}

/* VALIDATION TOAST (above setup row) */
#val-msg{font-size:11px;font-weight:700;color:var(--gold);text-align:center;background:rgba(255,197,49,.1);border:1px solid rgba(255,197,49,.2);border-radius:99px;padding:5px 14px;margin-bottom:8px;display:none;}
#val-msg.on{display:block;}
</style>
</head>
<body>

<div id="preview"></div>
<div id="vg"></div>

<button id="back-btn" onclick="goBack()"><span class="ms">arrow_back</span></button>

<!-- RIGHT CONTROLS -->
<div id="right-ctrl">
  <div class="rctrl-btn" id="filter-toggle-btn" onclick="toggleFilters()" title="Filters"><span class="ms f">auto_fix_high</span></div>
  <div class="rctrl-btn" id="flip-btn" onclick="flipCam()" title="Flip Camera"><span class="ms">flip_camera_ios</span></div>
  <div class="rctrl-btn" id="mirror-btn" onclick="toggleMirror()" title="Mirror"><span class="ms">camera_front</span></div>
  <div class="rctrl-btn" id="beauty-btn" onclick="toggleBeauty()" title="Beauty"><span class="ms f" style="font-size:20px;">face_retouching_natural</span></div>
</div>

<!-- FILTER CHIPS -->
<div id="filter-row">
  <div class="fchip sel" data-f="none">Original</div>
  <div class="fchip" data-f="beauty">Beauty</div>
  <div class="fchip" data-f="warm">Warm</div>
  <div class="fchip" data-f="cool">Cool</div>
  <div class="fchip" data-f="vivid">Vivid</div>
  <div class="fchip" data-f="mono">Mono</div>
  <div class="fchip" data-f="golden">Golden</div>
  <div class="fchip" data-f="rose">Rose</div>
  <div class="fchip" data-f="night">Night</div>
</div>

<div id="toast"></div>

<!-- BOTTOM PANEL -->
<div id="btm-panel">
  <div id="val-msg">&#128247; Please upload a live poster before going live</div>
  <div class="setup-row">
    <div id="poster-btn" onclick="document.getElementById('poster-input').click()">
      <img id="poster-img" src="" alt="">
      <div id="poster-plus">
        <span class="ms f">add_photo_alternate</span>
        <span>Add Cover</span>
      </div>
    </div>
    <input type="file" id="poster-input" accept="image/*">
    <div class="setup-right">
      <input id="title-input" type="text" placeholder="Add a title for your live..." maxlength="60">
      <div class="setup-divider"></div>
      <div class="setup-row2">
        <div class="privacy-btn" id="privacy-btn" onclick="togglePrivacy()">
          <span class="ms f" id="privacy-icon">public</span>
          <span id="privacy-label">Public</span>
          <span class="ms" style="font-size:12px;">expand_more</span>
        </div>
        <span style="flex:1;"></span>
        <span style="font-size:10px;color:var(--muted);font-weight:600;" id="char-count">0/60</span>
      </div>
    </div>
  </div>
  <button id="go-live-btn" onclick="startLive()">
    <span class="ms f" style="font-size:20px;">live_tv</span>
    Go Live
  </button>
</div>

<script>
var FBC = { apiKey:"AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY", authDomain:"galmet-app.firebaseapp.com", projectId:"galmet-app", storageBucket:"galmet-app.firebasestorage.app" };
if (!firebase.apps.length) firebase.initializeApp(FBC);
var db = firebase.firestore();

var CU = JSON.parse(localStorage.getItem("user") || "null");
if (!CU || !CU.userId) { location.replace("login.html"); }
var ME = String(CU.userId);
var MY_NAME = CU.username || "User";
var MY_AVA = CU.photoURL || "";
var APP_ID = "873172a9b2064b1ca97b4f45ee6ed9b5";
var TOKEN = "007eJxTYHC/KnpO5rpCFs8c7" + "+nLQ26yuWXEWpnmB9xS" + "+agWbMxiUa/AYGFubGhulGiZZGRgZpJkmJxoaZ5kkmZimppqlppimWT6" + "+fDtzIZARoackF1MjAwQCOLzMhTl5" + "+fGm1oYG5kYWpgyMAAAgbgfZA==";

var localTrack = null, camFront = true, mirrorOn = false;
var activeFilter = 'none', beautyOn = false;
var privacyPublic = true, posterDataUrl = '', posterFile = null;
var filtersOpen = false;

var preview = document.getElementById('preview');
var toastEl = document.getElementById('toast');
var toastT = null;
function toast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('on');
  clearTimeout(toastT); toastT = setTimeout(function(){toastEl.classList.remove('on');}, 2800);
}

// CAMERA INIT
function initCamera() {
  AgoraRTC.createCameraVideoTrack({ facingMode:'user', encoderConfig:'720p_1' }).then(function(track) {
    localTrack = track;
    localTrack.play('preview');
    applyMirrorDirect();
  }).catch(function(e) { toast('Camera error: ' + e.message); });
}
initCamera();

// MIRROR
function applyMirrorDirect() {
  if (!localTrack) return;
  var videos = preview.querySelectorAll('video');
  videos.forEach(function(v) { v.style.transform = mirrorOn ? 'scaleX(-1)' : ''; });
  if (mirrorOn) preview.classList.add('mirrored'); else preview.classList.remove('mirrored');
}
function toggleMirror() {
  mirrorOn = !mirrorOn;
  document.getElementById('mirror-btn').classList.toggle('on', mirrorOn);
  applyMirrorDirect();
  toast(mirrorOn ? 'Mirror: On' : 'Mirror: Off');
}

// FLIP CAMERA
function flipCam() {
  camFront = !camFront;
  if (localTrack) localTrack.stop();
  AgoraRTC.createCameraVideoTrack({ facingMode: camFront ? 'user' : 'environment', encoderConfig:'720p_1' }).then(function(track) {
    localTrack = track;
    localTrack.play('preview');
    setTimeout(applyMirrorDirect, 200);
    applyFilter(activeFilter);
  }).catch(function(e){ toast('Flip failed: ' + e.message); });
}

// FILTERS
var FILTERS = ['none','beauty','warm','cool','vivid','mono','golden','rose','night'];
function applyFilter(name) {
  activeFilter = name;
  FILTERS.forEach(function(f){ preview.classList.remove('fw-'+f); });
  if (name !== 'none') preview.classList.add('fw-'+name);
  document.querySelectorAll('.fchip').forEach(function(c){
    c.classList.toggle('sel', c.dataset.f === name);
  });
}
function toggleBeauty() {
  beautyOn = !beautyOn;
  document.getElementById('beauty-btn').classList.toggle('on', beautyOn);
  applyFilter(beautyOn ? 'beauty' : 'none');
  toast(beautyOn ? 'Beauty filter on' : 'Beauty off');
}
function toggleFilters() {
  filtersOpen = !filtersOpen;
  document.getElementById('filter-row').classList.toggle('on', filtersOpen);
  document.getElementById('filter-toggle-btn').classList.toggle('on', filtersOpen);
}
document.querySelectorAll('.fchip').forEach(function(chip) {
  chip.onclick = function() { applyFilter(chip.dataset.f); };
});

// PRIVACY
function togglePrivacy() {
  privacyPublic = !privacyPublic;
  document.getElementById('privacy-icon').textContent = privacyPublic ? 'public' : 'lock';
  document.getElementById('privacy-label').textContent = privacyPublic ? 'Public' : 'Private';
  toast(privacyPublic ? 'Public live' : 'Private live');
}

// POSTER UPLOAD
document.getElementById('poster-input').onchange = function(e) {
  var f = e.target.files[0]; if (!f) return;
  posterFile = f;
  var reader = new FileReader();
  reader.onload = function(r) {
    posterDataUrl = r.result;
    document.getElementById('poster-img').src = posterDataUrl;
    document.getElementById('poster-img').style.display = 'block';
    document.getElementById('poster-plus').style.display = 'none';
    document.getElementById('val-msg').classList.remove('on');
  };
  reader.readAsDataURL(f);
};

// TITLE CHAR COUNT
document.getElementById('title-input').addEventListener('input', function() {
  document.getElementById('char-count').textContent = this.value.length + '/60';
});

// START LIVE
function startLive() {
  var title = document.getElementById('title-input').value.trim() || (MY_NAME + "'s Live");
  if (!posterDataUrl) {
    document.getElementById('val-msg').classList.add('on');
    toast('Please add a cover photo first');
    return;
  }
  var btn = document.getElementById('go-live-btn');
  btn.classList.add('loading');
  btn.innerHTML = '<div class="spin" style="width:20px;height:20px;border-width:2px;margin:0;"></div> Starting...';

  // Stop preview track - live.html will create its own
  if (localTrack) { localTrack.stop(); localTrack.close(); localTrack = null; }

  var ROOM = ME + '_' + Date.now();
  // Store settings in sessionStorage so live.html can pick them up
  sessionStorage.setItem('live_settings', JSON.stringify({
    filter: activeFilter, mirror: mirrorOn, camFront: camFront,
    posterURL: posterDataUrl, title: title, privacy: privacyPublic ? 'public' : 'private', room: ROOM
  }));

  // Create live session in Firestore
  db.doc('lives/' + ME).set({
    roomId: ROOM, userId: ME, username: MY_NAME, photoURL: MY_AVA,
    status: 'live', title: title, posterURL: posterDataUrl,
    privacy: privacyPublic ? 'public' : 'private',
    activeFilter: activeFilter, mirrorMode: mirrorOn, camFront: camFront,
    onCall: false, callPrice: 1000, callStarted: null, bgImages: [],
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    location.href = 'live.html?room=' + ROOM + '&host=true';
  }).catch(function(e) {
    btn.classList.remove('loading');
    btn.innerHTML = '<span class="ms f" style="font-size:20px;">live_tv</span> Go Live';
    toast('Error: ' + e.message);
  });
}

function goBack() {
  if (localTrack) { localTrack.stop(); localTrack.close(); }
  history.back();
}

window.addEventListener('pagehide', function() {
  if (localTrack) { localTrack.stop(); localTrack.close(); }
});
// Helper spin style
var st = document.createElement('style');
st.textContent = '.spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.18);border-top-color:#fff;border-radius:50%;animation:sp .75s linear infinite;}@keyframes sp{to{transform:rotate(360deg);}}';
document.head.appendChild(st);
</script>
</body>
</html>
