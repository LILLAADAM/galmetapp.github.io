<!DOCTYPE html>
<html>
<head>
  <title>Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script type="module">
    import { db } from "./firebase.js";
    import {
      collection, query, orderBy,
      onSnapshot, doc, getDoc
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const currentUser = JSON.parse(localStorage.getItem("user"));

    if (!currentUser) {
      window.location.href = "index.html";
    }

    function loadChats() {
      const q = query(
        collection(db, "userChats", currentUser.userId, "list"),
        orderBy("updatedAt", "desc")
      );

      onSnapshot(q, async (snapshot) => {
        const box = document.getElementById("chatList");
        box.innerHTML = "";

        for (const d of snapshot.docs) {
          const chat = d.data();

          // 🔥 GET USER INFO
          const userSnap = await getDoc(doc(db, "users", chat.userId));
          const user = userSnap.data();

          const div = document.createElement("div");
          div.className = "chat-item";

          const name = user?.username || "User";
          const photo = user?.photoURL || `https://ui-avatars.com/api/?name=${name}`;

          div.innerHTML = `
            <img src="${photo}">
            <div class="info">
              <div class="name">${name}</div>
              <div class="last">${chat.lastMessage || ""}</div>
            </div>
          `;

          div.onclick = () => {
            window.location.href = "chat.html?id=" + chat.userId;
          };

          box.appendChild(div);
        }
      });
    }

    window.onload = loadChats;
  </script>

  <style>
    body {
      margin:0;
      font-family:sans-serif;
      background:#f5f5f5;
    }

    header {
      background:#4CAF50;
      color:white;
      padding:15px;
      font-size:18px;
      font-weight:bold;
    }

    .chat-item {
      display:flex;
      align-items:center;
      padding:12px;
      border-bottom:1px solid #ddd;
      background:white;
      cursor:pointer;
    }

    .chat-item img {
      width:45px;
      height:45px;
      border-radius:50%;
      margin-right:10px;
    }

    .name {
      font-weight:bold;
    }

    .last {
      font-size:13px;
      color:#666;
    }
  </style>
</head>

<body>

<header>Chats</header>

<div id="chatList"></div>

</body>
</html>
