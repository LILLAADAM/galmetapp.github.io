<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

.top {
  background:#4CAF50;
  color:white;
  padding:15px;
  font-size:18px;
}

.chat {
  display:flex;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
  background:white;
}

.chat img {
  width:50px;
  height:50px;
  border-radius:50%;
}

.info {
  flex:1;
  margin-left:10px;
}

.name { font-weight:bold; }
.msg { font-size:13px; color:gray; }

.badge {
  background:red;
  color:white;
  border-radius:50%;
  padding:5px 8px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="top">Chats</div>
<div id="list"></div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection, onSnapshot, doc, getDoc, query, orderBy
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const currentUser = JSON.parse(localStorage.getItem("user"));

if (!currentUser || !currentUser.uid) {
  alert("Login required");
  location = "index.html";
}

// ✅ SORT BY LATEST (ALREADY CORRECT)
const q = query(
  collection(db, "userChats", currentUser.uid, "list"),
  orderBy("updatedAt", "desc")
);

onSnapshot(q, async (snapshot) => {

  const list = document.getElementById("list");
  list.innerHTML = "";

  for (const d of snapshot.docs) {
    const chat = d.data();

    const userSnap = await getDoc(doc(db, "users", chat.uid));
    if (!userSnap.exists()) continue;

    const u = userSnap.data();

    const div = document.createElement("div");
    div.className = "chat";
    div.onclick = () => openChat(chat.uid);

    div.innerHTML = `
      <img src="${u.photoURL || 'https://ui-avatars.com/api/?name='+u.username}">
      
      <div class="info">
        <div class="name">${u.username}</div>
        <div class="msg">${chat.lastMessage || ""}</div>
      </div>

      ${chat.unread ? `<div class="badge">${chat.unread}</div>` : ""}
    `;

    list.appendChild(div);
  }

});

// 🔥 OPEN CHAT
window.openChat = (id) => {
  location = "chat.html?id=" + id;
};

</script>

</body>
</html>
