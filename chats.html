<!DOCTYPE html>
<html>
<head>
  <title>Chats</title>
  <script type="module">
    import { db } from "./firebase.js";
    import {
      collection, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const currentUser = JSON.parse(localStorage.getItem("user"));

    if (!currentUser) {
      alert("Login required");
      window.location.href = "index.html";
    }

    window.onload = async () => {
      const snap = await getDocs(collection(db, "users"));
      const list = document.getElementById("list");

      snap.forEach(doc => {
        const u = doc.data();

        if (u.userId === currentUser.userId) return;

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <img src="${u.photoURL || 'https://via.placeholder.com/40'}">
          <div>
            <b>${u.username || u.userId}</b>
            <div class="sub">Tap to chat</div>
          </div>
        `;

        div.onclick = () => {
          window.location.href = "chat.html?id=" + u.userId;
        };

        list.appendChild(div);
      });
    };
  </script>

  <style>
    body { font-family:sans-serif; margin:0; }
    header {
      background:#4CAF50;
      color:white;
      padding:15px;
    }
    .item {
      display:flex;
      padding:10px;
      border-bottom:1px solid #eee;
      cursor:pointer;
    }
    .item img {
      width:40px;
      height:40px;
      border-radius:50%;
      margin-right:10px;
    }
    .sub { font-size:12px; color:gray; }
  </style>
</head>

<body>

<header>Chats</header>

<div id="list"></div>

</body>
</html>
