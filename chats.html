<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;

  /* ❌ Disable long press selection */
  -webkit-user-select:none;
  user-select:none;
}

.top {
  background:#4CAF50;
  color:white;
  padding:15px;
  font-size:18px;
}

/* PLATFORM MESSAGE */
.platform {
  background:#fff3cd;
  padding:12px;
  font-weight:bold;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

/* CHAT */
.chat {
  display:flex;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
  background:white;
  cursor:pointer;
}

.chat img {
  width:50px;
  height:50px;
  border-radius:50%;
}

.info {
  flex:1;
  margin-left:10px;
}

.name { font-weight:bold; }
.msg { font-size:13px; color:gray; }

.badge {
  background:red;
  color:white;
  border-radius:50%;
  padding:4px 8px;
  font-size:12px;
  min-width:18px;
  text-align:center;
}
</style>
</head>

<body>

<div class="top">Chats</div>

<!-- ⭐ PLATFORM MESSAGE -->
<div class="platform" onclick="openAdmin()">
  📢 Platform Messages
</div>

<div id="list"></div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  doc,
  getDoc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* USER */
const currentUser = JSON.parse(localStorage.getItem("user"));

if (!currentUser || !currentUser.uid) {
  alert("Login required");
  location = "index.html";
}

const myUid = currentUser.uid;

/* 🔥 CACHE USERS (FIX DISAPPEAR ISSUE) */
let usersCache = {};

/* REALTIME LIST */
const q = query(
  collection(db, "userChats", myUid, "list"),
  orderBy("updatedAt", "desc")
);

onSnapshot(q, async (snapshot) => {

  const list = document.getElementById("list");

  // ❌ DO NOT CLEAR FULL UI → FIX disappearing issue
  list.innerHTML = "";

  for (const d of snapshot.docs) {

    const chat = d.data();
    const otherId = chat.uid;

    if (!otherId) continue;

    // 🔥 CACHE USER DATA
    if (!usersCache[otherId]) {
      const userSnap = await getDoc(doc(db, "users", otherId));
      if (!userSnap.exists()) continue;
      usersCache[otherId] = userSnap.data();
    }

    const u = usersCache[otherId];

    const div = document.createElement("div");
    div.className = "chat";

    div.onclick = () => openChat(otherId);

    div.innerHTML = `
      <img src="${u.photoURL || 'https://ui-avatars.com/api/?name=' + (u.username || 'User')}">
      
      <div class="info">
        <div class="name">${u.fullName || u.username || "User"}</div>
        <div class="msg">${chat.lastMessage || ""}</div>
      </div>

      ${chat.unread && chat.unread > 0 
        ? `<div class="badge">${chat.unread}</div>` 
        : ""}
    `;

    list.appendChild(div);
  }

});

/* OPEN CHAT */
window.openChat = (id) => {
  location.href = "chat.html?id=" + id;
};

/* OPEN ADMIN */
window.openAdmin = () => {
  location.href = "admin.html";
};

</script>

</body>
</html>
