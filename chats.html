<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
  -webkit-user-select:none;
  user-select:none;
}

/* HEADER */
.top {
  background:#4CAF50;
  color:white;
  padding:15px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* SEARCH ICON */
.search {
  font-size:20px;
  cursor:pointer;
}

/* PLATFORM */
.platform {
  background:#fff3cd;
  padding:12px;
  font-weight:bold;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

/* CHAT */
.chat {
  display:flex;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
  background:white;
}

.chat img {
  width:50px;
  height:50px;
  border-radius:50%;
  margin-right:10px;
  cursor:pointer;
}

.info {
  flex:1;
}

.name { font-weight:bold; }
.msg { font-size:13px; color:gray; }

.badge {
  background:red;
  color:white;
  border-radius:50%;
  padding:4px 8px;
  font-size:12px;
  min-width:18px;
  text-align:center;
}
</style>
</head>

<body>

<div class="top">
  Chats
  <span class="search" onclick="openSearch()">🔍</span>
</div>

<!-- PLATFORM -->
<div class="platform" onclick="openPlatform()">
  📢 Platform Messages <span id="pBadge"></span>
</div>

<div id="list"></div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  doc,
  getDoc,
  query,
  orderBy,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* USER */
const currentUser = JSON.parse(localStorage.getItem("user"));

if (!currentUser || !currentUser.uid) {
  alert("Login required");
  location = "index.html";
}

const myUid = currentUser.uid;

/* CACHE */
let usersCache = {};

/* ================= PLATFORM BADGE ================= */

const badge = document.getElementById("pBadge");
let lastSeen = null;

// 🔥 REALTIME READ STATUS
onSnapshot(doc(db, "platformReads", myUid), (snap) => {
  lastSeen = snap.exists() ? snap.data().lastSeen : null;
});

// 🔥 REALTIME MESSAGES
const pQuery = query(
  collection(db, "platformMessages"),
  orderBy("createdAt", "desc")
);

onSnapshot(pQuery, (snapshot) => {

  let unread = 0;

  snapshot.forEach(d => {
    const m = d.data();

    if (!lastSeen || (m.createdAt && m.createdAt > lastSeen)) {
      unread++;
    }
  });

  badge.innerHTML = unread > 0 
    ? `<span class="badge">${unread}</span>` 
    : "";
});

/* OPEN PLATFORM */
window.openPlatform = async () => {

  // 🔥 INSTANT MARK READ
  await setDoc(doc(db, "platformReads", myUid), {
    lastSeen: serverTimestamp()
  }, { merge:true });

  location.href = "platform.html";
};

/* ================= CHAT LIST ================= */

const q = query(
  collection(db, "userChats", myUid, "list"),
  orderBy("updatedAt", "desc")
);

onSnapshot(q, async (snapshot) => {

  const list = document.getElementById("list");
  list.innerHTML = "";

  for (const d of snapshot.docs) {

    const chat = d.data();
    const otherId = chat.uid;

    if (!otherId) continue;

    if (!usersCache[otherId]) {
      const userSnap = await getDoc(doc(db, "users", otherId));
      if (!userSnap.exists()) continue;
      usersCache[otherId] = userSnap.data();
    }

    const u = usersCache[otherId];

    const div = document.createElement("div");
    div.className = "chat";

    div.innerHTML = `
      <img src="${u.photoURL || 'https://ui-avatars.com/api/?name=' + (u.username || 'User')}" onclick="openProfile('${otherId}')">
      
      <div class="info" onclick="openChat('${otherId}')">
        <div class="name">${u.fullName || u.username || "User"}</div>
        <div class="msg">${chat.lastMessage || ""}</div>
      </div>

      ${chat.unread && chat.unread > 0 
        ? `<div class="badge">${chat.unread}</div>` 
        : ""}
    `;

    list.appendChild(div);
  }

});

/* ================= NAVIGATION ================= */

window.openChat = (id) => {
  location.href = "chat.html?id=" + id;
};

window.openProfile = (id) => {
  location.href = "view.html?id=" + id;
};

window.openSearch = () => {
  location.href = "search.html";
};

</script>

</body>
</html>
