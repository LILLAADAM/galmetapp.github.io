<!DOCTYPE html>
<html>
<head>
<title>Chats</title>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, query, orderBy,
  onSnapshot, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const currentUser = JSON.parse(localStorage.getItem("user"));

if (!currentUser) {
  location = "index.html";
}

// 🔥 LOAD CHAT LIST
function loadChats() {
  const q = query(
    collection(db, "userChats", currentUser.userId, "list"),
    orderBy("updatedAt", "desc")
  );

  onSnapshot(q, async (snap) => {
    const box = document.getElementById("chatList");
    box.innerHTML = "";

    for (const d of snap.docs) {
      const data = d.data();

      // 🔥 get user info
      const userSnap = await getDoc(doc(db, "users", data.userId));
      const user = userSnap.data();

      const div = document.createElement("div");
      div.className = "chatItem";

      div.innerHTML = `
        <img src="${user.photoURL || 'https://ui-avatars.com/api/?name='+user.username}">
        <div>
          <div class="name">${user.username}</div>
          <div class="msg">${data.lastMessage}</div>
        </div>
      `;

      div.onclick = () => {
        location = "chat.html?id=" + data.userId;
      };

      box.appendChild(div);
    }
  });
}

window.onload = loadChats;
</script>

<style>
body {
  margin:0;
  font-family:sans-serif;
}

.header {
  background:#4CAF50;
  color:white;
  padding:15px;
  font-size:18px;
}

.chatItem {
  display:flex;
  gap:10px;
  padding:12px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

.chatItem img {
  width:45px;
  height:45px;
  border-radius:50%;
}

.name {
  font-weight:bold;
}

.msg {
  color:gray;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">Chats</div>
<div id="chatList"></div>

</body>
</html>
