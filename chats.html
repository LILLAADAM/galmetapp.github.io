<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chats - Galmet</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .animate-subtle-spin {
      animation: subtle-spin 2s linear infinite;
    }
    @keyframes subtle-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f3f7fb",
            "surface-container-low": "#ecf1f6",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60",
            "primary": "#006571",
            "primary-container": "#00e3fd",
            "secondary": "#755700",
            "tertiary": "#b60051",
            "outline": "#73777b",
            "outline-variant": "#a9aeb1"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
</head>
<body class="bg-surface font-body text-on-surface">

<!-- Top App Bar -->
<header class="fixed top-0 w-full z-40 bg-surface/80 backdrop-blur-xl flex justify-between items-center px-6 py-4 border-b border-outline-variant/20">
  <div class="flex items-center gap-3">
    <h1 class="font-headline text-2xl font-bold text-primary">Chats</h1>
    <div class="flex items-center gap-1.5">
      <span class="material-symbols-outlined text-[14px] text-primary/60 animate-subtle-spin">sync</span>
      <span class="text-[11px] font-label font-bold text-primary/60 tracking-wider">live</span>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <button onclick="location.href='search.html'" class="p-2 rounded-full hover:bg-primary-container/30 transition">
      <span class="material-symbols-outlined text-primary">search</span>
    </button>
    <img id="profilePic" onclick="openProfile()" class="w-8 h-8 rounded-full object-cover border border-primary/30 cursor-pointer" src="https://ui-avatars.com/api/?name=User">
  </div>
</header>

<!-- Main Content -->
<main class="pt-20 pb-28 px-4 max-w-2xl mx-auto min-h-screen">
  <!-- PINNED: Galmet Official (always on top) -->
  <div onclick="openOfficial()" class="bg-surface-container-lowest hover:bg-surface-container-high transition cursor-pointer p-4 mb-4 flex items-center gap-4 rounded-xl border border-outline-variant/20">
    <div class="w-14 h-14 bg-primary rounded-full flex items-center justify-center text-white shadow-md">
      <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL'1">forum</span>
    </div>
    <div class="flex-1">
      <div class="flex justify-between items-center">
        <h3 class="font-headline font-bold text-on-surface">Galmet Official</h3>
        <span class="text-[11px] text-outline">Now</span>
      </div>
      <p class="text-sm text-primary font-medium truncate">Welcome to Galmet! 🌟</p>
    </div>
  </div>

  <!-- Dynamic Chat List (all conversations, real‑time) -->
  <div id="chatList" class="space-y-2"></div>
</main>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/80 backdrop-blur-xl rounded-t-2xl shadow-[0_-4px_24px_rgba(0,101,113,0.06)]">
  <button onclick="location.href='dashboard.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-label">Home</span>
  </button>
  <button onclick="location.href='party.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">sports_esports</span>
    <span class="text-[10px] font-label">Party</span>
  </button>
  <button class="flex flex-col items-center text-primary">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL'1">chat_bubble</span>
    <span class="text-[10px] font-label font-bold">Chats</span>
  </button>
  <button onclick="location.href='profile.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">person</span>
    <span class="text-[10px] font-label">Profile</span>
  </button>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, doc, getDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);

  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) {
    window.location.replace("login.html");
  }
  const myUserId = currentUser.userId.toString();

  // Profile picture
  const profileImg = document.getElementById("profilePic");
  profileImg.src = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.email || "User")}&background=006571&color=fff`;

  window.openProfile = () => location.href = "profile.html";
  window.openOfficial = () => location.href = "official.html";  // create this page for group chat

  // ==================== LOAD ALL CONVERSATIONS (userChats) ====================
  const chatsRef = collection(db, "userChats", myUserId, "list");
  const q = query(chatsRef, orderBy("updatedAt", "desc"));

  onSnapshot(q, async (snapshot) => {
    const chatListDiv = document.getElementById("chatList");
    chatListDiv.innerHTML = "";

    if (snapshot.empty) {
      chatListDiv.innerHTML = `<div class="text-center py-8 text-outline">No conversations yet. Start a chat from the Party tab!</div>`;
      return;
    }

    // Build array with user data and message info
    const items = [];
    for (const docSnap of snapshot.docs) {
      const chat = docSnap.data();
      const otherId = chat.uid;
      if (!otherId) continue;

      // Fetch other user's data
      const userSnap = await getDoc(doc(db, "users", otherId));
      if (!userSnap.exists()) continue;
      const user = userSnap.data();

      items.push({
        id: otherId,
        name: user.username || user.email || "User",
        photo: user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username || "User")}&background=006571&color=fff`,
        lastMessage: chat.lastMessage || "Tap to start chatting",
        updatedAt: chat.updatedAt,
        unread: chat.unread || 0
      });
    }

    // Sort by updatedAt (already sorted by query, but keep for safety)
    items.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));

    // Render each conversation
    for (const item of items) {
      const time = item.updatedAt ? new Date(item.updatedAt.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
      const div = document.createElement("div");
      div.className = "bg-surface-container-lowest hover:bg-surface-container-high transition cursor-pointer p-4 flex items-center gap-4 rounded-xl border border-outline-variant/20";
      div.onclick = () => location.href = `chat.html?id=${item.id}`;

      div.innerHTML = `
        <div class="shrink-0" onclick="event.stopPropagation(); location.href='view.html?id=${item.id}'">
          <img class="w-14 h-14 rounded-full object-cover" src="${item.photo}">
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-center">
            <h3 class="font-headline font-bold text-on-surface truncate">${escapeHtml(item.name)}</h3>
            <span class="text-[11px] text-outline">${time}</span>
          </div>
          <div class="flex justify-between items-center mt-0.5">
            <p class="text-sm text-on-surface-variant truncate">${escapeHtml(item.lastMessage)}</p>
            ${item.unread > 0 ? `<div class="bg-tertiary text-white text-[10px] font-bold px-2 py-0.5 rounded-full">${item.unread}</div>` : ''}
          </div>
        </div>
      `;
      chatListDiv.appendChild(div);
    }
  });

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }
</script>
</body>
</html>
