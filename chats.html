<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chats - Galmet</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .animate-subtle-spin {
      animation: subtle-spin 2s linear infinite;
    }
    @keyframes subtle-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f3f7fb",
            "surface-container-low": "#ecf1f6",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60",
            "primary": "#006571",
            "primary-container": "#00e3fd",
            "secondary": "#755700",
            "tertiary": "#b60051",
            "outline": "#73777b",
            "outline-variant": "#a9aeb1"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
</head>
<body class="bg-surface font-body text-on-surface">

<!-- Top App Bar -->
<header class="fixed top-0 w-full z-40 bg-surface/80 backdrop-blur-xl flex justify-between items-center px-6 py-4 border-b border-outline-variant/20">
  <div class="flex items-center gap-3">
    <h1 class="font-headline text-2xl font-bold text-primary">Chats</h1>
    <div class="flex items-center gap-1.5">
      <span class="material-symbols-outlined text-[14px] text-primary/60 animate-subtle-spin">sync</span>
      <span class="text-[11px] font-label font-bold text-primary/60 tracking-wider">live</span>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <button onclick="location.href='search.html'" class="p-2 rounded-full hover:bg-primary-container/30 transition">
      <span class="material-symbols-outlined text-primary">search</span>
    </button>
    <img id="profilePic" onclick="openProfile()" class="w-8 h-8 rounded-full object-cover border border-primary/30 cursor-pointer" src="https://ui-avatars.com/api/?name=User">
  </div>
</header>

<!-- Main Content -->
<main class="pt-20 pb-28 px-4 max-w-2xl mx-auto min-h-screen">
  <!-- PINNED: Galmet Official (always on top) -->
  <div onclick="openOfficial()" class="bg-surface-container-lowest hover:bg-surface-container-high transition cursor-pointer p-4 mb-4 flex items-center gap-4 rounded-xl border border-outline-variant/20">
    <div class="w-14 h-14 bg-primary rounded-full flex items-center justify-center text-white shadow-md">
      <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL'1">forum</span>
    </div>
    <div class="flex-1">
      <div class="flex justify-between items-center">
        <h3 class="font-headline font-bold text-on-surface">Galmet Official</h3>
        <span class="text-[11px] text-outline">Now</span>
      </div>
      <p class="text-sm text-primary font-medium truncate">Welcome to Galmet! 🌟</p>
    </div>
  </div>

  <!-- Dynamic Chat List (real‑time, no flicker) -->
  <div id="chatList" class="space-y-2"></div>
</main>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/80 backdrop-blur-xl rounded-t-2xl shadow-[0_-4px_24px_rgba(0,101,113,0.06)]">
  <button onclick="location.href='dashboard.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-label">Home</span>
  </button>
  <button onclick="location.href='party.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">sports_esports</span>
    <span class="text-[10px] font-label">Party</span>
  </button>
  <button class="flex flex-col items-center text-primary">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL'1">chat_bubble</span>
    <span class="text-[10px] font-label font-bold">Chats</span>
  </button>
  <button onclick="location.href='ownprofile.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">person</span>
    <span class="text-[10px] font-label">Profile</span>
  </button>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, doc, getDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);

  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) {
    window.location.replace("login.html");
  }
  const myUserId = currentUser.userId.toString();

  // Profile picture
  const profileImg = document.getElementById("profilePic");
  profileImg.src = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.email || "User")}&background=006571&color=fff`;

  window.openProfile = () => location.href = "profile.html";
  window.openOfficial = () => location.href = "platform.html";

  // Cache for user data
  const userCache = new Map();
  // Map of chat ID -> DOM element
  const chatElements = new Map();
  // Ordered list of chat IDs
  let orderedIds = [];

  const chatListDiv = document.getElementById("chatList");

  function formatTime(timestamp) {
    if (!timestamp) return "";
    const date = new Date(timestamp.seconds * 1000);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  async function getUserData(userId) {
    if (userCache.has(userId)) return userCache.get(userId);
    const userSnap = await getDoc(doc(db, "users", userId));
    if (!userSnap.exists()) return null;
    const user = userSnap.data();
    const userData = {
      id: userId,
      name: user.username || user.email || "User",
      photo: user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username || "User")}&background=006571&color=fff`
    };
    userCache.set(userId, userData);
    return userData;
  }

  function createChatElement(chatId, itemData) {
    const div = document.createElement("div");
    div.className = "bg-surface-container-lowest hover:bg-surface-container-high transition cursor-pointer p-4 flex items-center gap-4 rounded-xl border border-outline-variant/20 chat-item";
    div.setAttribute("data-chat-id", chatId);
    div.onclick = () => location.href = `chat.html?id=${chatId}`;
    updateChatElementContent(div, itemData);
    return div;
  }

  function updateChatElementContent(el, data) {
    const { name, photo, lastMessage, updatedAt, unread } = data;
    const time = formatTime(updatedAt);
    el.innerHTML = `
      <div class="shrink-0" onclick="event.stopPropagation(); location.href='view.html?id=${data.id}'">
        <img class="w-14 h-14 rounded-full object-cover" src="${photo}">
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex justify-between items-center">
          <h3 class="font-headline font-bold text-on-surface truncate">${escapeHtml(name)}</h3>
          <span class="text-[11px] text-outline">${time}</span>
        </div>
        <div class="flex justify-between items-center mt-0.5">
          <p class="text-sm text-on-surface-variant truncate">${escapeHtml(lastMessage)}</p>
          ${unread > 0 ? `<div class="bg-tertiary text-white text-[10px] font-bold px-2 py-0.5 rounded-full">${unread}</div>` : ''}
        </div>
      </div>
    `;
    el.__data = data;
  }

  function reorderDOM() {
    const fragment = document.createDocumentFragment();
    for (const id of orderedIds) {
      const el = chatElements.get(id);
      if (el) fragment.appendChild(el);
    }
    chatListDiv.innerHTML = "";
    if (fragment.children.length > 0) {
      chatListDiv.appendChild(fragment);
    } else {
      chatListDiv.innerHTML = `<div class="text-center py-8 text-outline">No conversations yet. Start a chat from the Party tab!</div>`;
    }
  }

  const chatsRef = collection(db, "userChats", myUserId, "list");
  const q = query(chatsRef, orderBy("updatedAt", "desc"));

  onSnapshot(q, async (snapshot) => {
    const changes = snapshot.docChanges();
    let needsReorder = false;

    for (const change of changes) {
      const chatDoc = change.doc;
      const chatId = chatDoc.id;
      const chatData = chatDoc.data();
      const otherId = chatData.uid;
      if (!otherId) continue;

      const userData = await getUserData(otherId);
      if (!userData) continue;

      const itemData = {
        id: otherId,
        name: userData.name,
        photo: userData.photo,
        lastMessage: chatData.lastMessage || "Tap to start chatting",
        updatedAt: chatData.updatedAt,
        unread: chatData.unread || 0
      };

      if (change.type === "added") {
        const newEl = createChatElement(otherId, itemData);
        chatElements.set(otherId, newEl);
        orderedIds.push(otherId);
        needsReorder = true;
      } else if (change.type === "modified") {
        const existingEl = chatElements.get(otherId);
        if (existingEl) {
          updateChatElementContent(existingEl, itemData);
          needsReorder = true; // because updatedAt may have changed order
        }
      } else if (change.type === "removed") {
        const el = chatElements.get(otherId);
        if (el) el.remove();
        chatElements.delete(otherId);
        orderedIds = orderedIds.filter(id => id !== otherId);
        needsReorder = true;
      }
    }

    if (needsReorder || (changes.length === 0 && snapshot.docs.length > 0 && chatElements.size === 0)) {
      // Initial load or order changed
      if (chatElements.size === 0 && snapshot.docs.length > 0) {
        // First load – populate all
        for (const docSnap of snapshot.docs) {
          const chatData = docSnap.data();
          const otherId = chatData.uid;
          if (!otherId) continue;
          const userData = await getUserData(otherId);
          if (!userData) continue;
          const itemData = {
            id: otherId,
            name: userData.name,
            photo: userData.photo,
            lastMessage: chatData.lastMessage || "Tap to start chatting",
            updatedAt: chatData.updatedAt,
            unread: chatData.unread || 0
          };
          const el = createChatElement(otherId, itemData);
          chatElements.set(otherId, el);
          orderedIds.push(otherId);
        }
      }
      // Sort by updatedAt descending
      orderedIds.sort((a, b) => {
        const aData = chatElements.get(a)?.__data?.updatedAt?.seconds || 0;
        const bData = chatElements.get(b)?.__data?.updatedAt?.seconds || 0;
        return bData - aData;
      });
      reorderDOM();
    }
  });
</script>
</body>
</html>
