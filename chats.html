<!DOCTYPE html>
<html>
<head>
  <title>Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .header {
      background: #4CAF50;
      color: white;
      padding: 15px;
      font-size: 18px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #ccc;
      margin-right: 10px;
    }

    .info {
      flex: 1;
    }

    .name {
      font-weight: bold;
    }

    .last {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="header">Chats</div>
<div id="chatList"></div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const currentUser = JSON.parse(localStorage.getItem("user"));
const list = document.getElementById("chatList");

async function loadChats() {
  const snapshot = await getDocs(collection(db, "chats"));
  list.innerHTML = "";

  for (const chat of snapshot.docs) {
    const data = chat.data();

    if (!data.users.includes(currentUser.userId)) continue;

    const otherId = data.users.find(u => u !== currentUser.userId);

    // get user data
    const userSnap = await getDoc(doc(db, "users", otherId));

    let username = otherId;
    let photo = "";

    if (userSnap.exists()) {
      username = userSnap.data().username;
      photo = userSnap.data().photoURL;
    }

    const div = document.createElement("div");
    div.className = "chat-item";

    div.innerHTML = `
      <img src="${photo}" class="avatar">
      <div class="info">
        <div class="name">${username}</div>
        <div class="last">Tap to chat</div>
      </div>
    `;

    div.onclick = () => {
      window.location = `chat.html?id=${chat.id}`;
    };

    list.appendChild(div);
  }
}

loadChats();
</script>

</body>
</html>
