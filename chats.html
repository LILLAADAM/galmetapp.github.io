<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chats - Galmet</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
    }
    .animate-subtle-spin {
      animation: subtle-spin 2s linear infinite;
    }
    @keyframes subtle-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-dim": "#ced5db",
            "surface-bright": "#f3f7fb",
            "surface": "#f3f7fb",
            "surface-variant": "#d7dee3",
            "surface-container-low": "#ecf1f6",
            "surface-container": "#e3e9ee",
            "surface-container-high": "#dde3e8",
            "surface-container-highest": "#d7dee3",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60",
            "primary": "#006571",
            "primary-container": "#00e3fd",
            "primary-fixed-dim": "#00d4ec",
            "on-primary": "#d8f8ff",
            "secondary": "#755700",
            "secondary-container": "#ffca4d",
            "tertiary": "#b60051",
            "tertiary-container": "#ff8fa9",
            "error": "#b31b25",
            "outline": "#73777b",
            "outline-variant": "#a9aeb1"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
</head>
<body class="bg-surface font-body text-on-surface">

<!-- Top App Bar -->
<header class="fixed top-0 w-full z-40 bg-surface/80 backdrop-blur-xl flex justify-between items-center px-6 py-4 border-b border-outline-variant/20">
  <div class="flex items-center gap-3">
    <h1 class="font-headline text-2xl font-bold text-primary">Chats</h1>
    <div class="flex items-center gap-1.5">
      <span class="material-symbols-outlined text-[14px] text-primary/60 animate-subtle-spin">sync</span>
      <span class="text-[11px] font-label font-bold text-primary/60 tracking-wider">live</span>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <button onclick="location.href='search.html'" class="p-2 rounded-full hover:bg-primary-container/30 transition">
      <span class="material-symbols-outlined text-primary">search</span>
    </button>
    <img id="profilePic" onclick="openProfile()" class="w-8 h-8 rounded-full object-cover border border-primary/30 cursor-pointer" src="https://ui-avatars.com/api/?name=User">
  </div>
</header>

<!-- Main Content -->
<main class="pt-20 pb-28 px-4 max-w-2xl mx-auto min-h-screen">
  <!-- Quick Navigation Row -->
  <div class="flex justify-between items-center bg-white/40 backdrop-blur-md px-6 py-5 mb-8 rounded-2xl">
    <div onclick="openOfficial()" class="flex flex-col items-center gap-2 cursor-pointer group">
      <div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center text-primary group-active:scale-95 transition">
        <span class="material-symbols-outlined text-3xl" style="font-variation-settings:'FILL'1">stars</span>
      </div>
      <span class="text-[11px] font-label font-bold text-on-surface-variant uppercase tracking-tighter">Gemgala Official</span>
    </div>
    <div onclick="openStrangerList()" class="flex flex-col items-center gap-2 cursor-pointer group">
      <div class="w-14 h-14 bg-secondary-container/20 rounded-2xl flex items-center justify-center text-secondary group-active:scale-95 transition">
        <span class="material-symbols-outlined text-3xl">group</span>
      </div>
      <span class="text-[11px] font-label font-bold text-on-surface-variant uppercase tracking-tighter">Strangers</span>
    </div>
    <div class="flex flex-col items-center gap-2 cursor-pointer group">
      <div class="w-14 h-14 bg-tertiary-container/20 rounded-2xl flex items-center justify-center text-tertiary group-active:scale-95 transition">
        <span class="material-symbols-outlined text-3xl">photo_library</span>
      </div>
      <span class="text-[11px] font-label font-bold text-on-surface-variant uppercase tracking-tighter">Moments</span>
    </div>
  </div>

  <!-- PINNED CHAT: Gemgala Official (always top) -->
  <div id="officialChat" onclick="openOfficial()" class="bg-surface-container-lowest hover:bg-surface-container-high transition cursor-pointer p-4 mb-2 flex items-center gap-4 rounded-xl border border-outline-variant/20">
    <div class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center text-white shadow-md">
      <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL'1">forum</span>
    </div>
    <div class="flex-1">
      <div class="flex justify-between items-center">
        <h3 class="font-headline font-bold text-on-surface">Gemgala Official</h3>
        <span class="text-[11px] text-outline">Now</span>
      </div>
      <p class="text-sm text-primary font-medium truncate">Welcome to the Gemgala community! 🌟</p>
    </div>
    <span class="material-symbols-outlined text-outline">chevron_right</span>
  </div>

  <!-- PINNED SECTION: Stranger Messages (second) -->
  <div id="strangerSection" class="mt-4 mb-3">
    <div class="flex items-center justify-between mb-2 px-1">
      <h3 class="font-label font-bold text-xs uppercase tracking-wider text-outline">Stranger Messages</h3>
      <span class="text-[10px] text-primary font-bold">New matches</span>
    </div>
    <div onclick="openStrangerList()" class="bg-surface-container-lowest hover:bg-surface-container-high transition cursor-pointer p-4 flex items-center gap-4 rounded-xl border border-outline-variant/20">
      <div class="relative w-14 h-14 bg-secondary rounded-2xl flex items-center justify-center text-white">
        <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL'1">chat_bubble</span>
        <div class="absolute -top-1 -right-1 w-5 h-5 bg-tertiary rounded-full border-2 border-white flex items-center justify-center">
          <span class="text-[10px] font-bold text-white">8</span>
        </div>
      </div>
      <div class="flex-1">
        <div class="flex justify-between items-center">
          <h3 class="font-headline font-bold text-on-surface">Stranger Chats</h3>
          <span class="text-[11px] text-outline">New</span>
        </div>
        <p class="text-sm text-on-surface-variant truncate">8 people want to connect with you</p>
      </div>
      <span class="material-symbols-outlined text-outline">chevron_right</span>
    </div>
  </div>

  <!-- Dynamic User Chats (from Firestore) -->
  <div class="mt-6">
    <h3 class="font-label font-bold text-xs uppercase tracking-wider text-outline mb-3 px-1">Your Contacts</h3>
    <div id="chatList" class="space-y-2"></div>
  </div>
</main>

<!-- Bottom Navigation Bar (same as Galmet design) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/80 backdrop-blur-xl rounded-t-2xl shadow-[0_-4px_24px_rgba(0,101,113,0.06)]">
  <button onclick="location.href='dashboard.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-label">Home</span>
  </button>
  <button onclick="location.href='party.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">sports_esports</span>
    <span class="text-[10px] font-label">Party</span>
  </button>
  <button id="activeChatNav" class="flex flex-col items-center text-primary">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL'1">chat_bubble</span>
    <span class="text-[10px] font-label font-bold">Chats</span>
  </button>
  <button onclick="location.href='profile.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">person</span>
    <span class="text-[10px] font-label">Profile</span>
  </button>
</nav>

<script type="module">
  // ==================== FIREBASE INIT (same config as setup.html) ====================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { getStorage } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);
  const storage = getStorage(app);

  // ==================== USER CHECK (FIXED) ====================
  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) {
    // Redirect to login page, not index.html
    window.location.replace("login.html");
    throw new Error("Not logged in");
  }
  const myUserId = currentUser.userId.toString(); // Firestore keys are strings

  // ==================== PROFILE IMAGE ====================
  const profileImg = document.getElementById("profilePic");
  if (currentUser.photoURL) {
    profileImg.src = currentUser.photoURL;
  } else {
    profileImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.email || "User")}&background=006571&color=fff`;
  }

  // ==================== USER CACHE ====================
  let usersCache = {};

  // ==================== LOAD REAL CHATS FROM FIRESTORE ====================
  // Structure: userChats/{myUserId}/list/{otherUserId}
  const chatsRef = collection(db, "userChats", myUserId, "list");
  const q = query(chatsRef, orderBy("updatedAt", "desc"));

  onSnapshot(q, async (snapshot) => {
    const chatListDiv = document.getElementById("chatList");
    chatListDiv.innerHTML = "";

    for (const docSnap of snapshot.docs) {
      const chat = docSnap.data();
      const otherId = chat.uid; // the other user's ID (string)
      if (!otherId) continue;

      // Fetch other user's data (cached)
      if (!usersCache[otherId]) {
        const userDoc = await getDoc(doc(db, "users", otherId));
        if (userDoc.exists()) {
          usersCache[otherId] = userDoc.data();
        } else {
          continue;
        }
      }
      const otherUser = usersCache[otherId];

      const chatDiv = document.createElement("div");
      chatDiv.className = "bg-surface-container-lowest hover:bg-surface-container-high transition cursor-pointer p-4 flex items-center gap-4 rounded-xl border border-outline-variant/20";
      chatDiv.onclick = () => {
        window.location.href = `chat.html?id=${otherId}`;
      };

      const displayName = otherUser.username || otherUser.email || "User";
      const avatar = otherUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=006571&color=fff`;
      const lastMessage = chat.lastMessage || "Tap to start chatting";
      const time = chat.updatedAt ? new Date(chat.updatedAt.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
      const unread = chat.unread || 0;

      chatDiv.innerHTML = `
        <div class="shrink-0" onclick="event.stopPropagation(); window.location.href='view.html?id=${otherId}'">
          <img class="w-14 h-14 rounded-full object-cover" src="${avatar}">
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-center">
            <h3 class="font-headline font-bold text-on-surface truncate">${escapeHtml(displayName)}</h3>
            <span class="text-[11px] text-outline">${time}</span>
          </div>
          <div class="flex justify-between items-center mt-0.5">
            <p class="text-sm text-on-surface-variant truncate">${escapeHtml(lastMessage)}</p>
            ${unread > 0 ? `<div class="bg-tertiary text-white text-[10px] font-bold px-2 py-0.5 rounded-full">${unread}</div>` : ''}
          </div>
        </div>
        <span class="material-symbols-outlined text-outline">chevron_right</span>
      `;
      chatListDiv.appendChild(chatDiv);
    }

    if (snapshot.empty) {
      chatListDiv.innerHTML = `<div class="text-center py-8 text-outline">No conversations yet. Start a chat from the party tab!</div>`;
    }
  });

  // ==================== GLOBAL NAVIGATION ====================
  window.openOfficial = () => {
    // You can either open a dedicated official chat room or a special page
    window.location.href = "platform.html";  // create this page or point to a group chat
  };
  window.openStrangerList = () => {
    window.location.href = "strangers.html";
  };
  window.openProfile = () => {
    window.location.href = "view.html";
  };

  // Helper to escape HTML
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
</script>
</body>
</html>
