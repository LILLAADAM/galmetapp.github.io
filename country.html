  <!-- main container: same width & padding as registration page -->
  <div class="w-full max-w-md mx-auto flex flex-col min-h-screen bg-background">

    <div class="w-full px-6 pt-5 pb-2 flex items-center justify-between shrink-0">

      <!-- centered / primary title: Select Region (matches "Create Profile" style) -->

        Select region

      <!-- right spacer for symmetry -->

    </div>

    <!-- main content: search + country list (no extra help texts, no location request, no descriptions) -->
    <main class="flex-1 w-full px-6 py-4 flex flex-col gap-5 overflow-hidden">
      
      <!-- Search field - matches nickname input style exactly -->
      <div class="relative group w-full">
        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-outline/60">
          <span class="material-symbols-outlined text-xl">search</span>
        </div>
        <input type="text" id="searchCountry"

               placeholder="Search country or region" autocomplete="off">
      </div>

      <!-- country list container: scrollable, clean, no extra footers -->
      <div class="flex-1 overflow-y-auto no-scrollbar rounded-2xl" style="max-height: calc(100vh - 180px);">
        <div id="countryListContainer" class="flex flex-col gap-1 pb-6">
          <!-- dynamic list injected via JS -->
          <div class="flex justify-center items-center py-10 text-outline">
            <span class="material-symbols-outlined animate-pulse mr-2">globe</span> Loading countries...
          </div>
        </div>
      </div>
      
      <!-- subtle hint: tap on any country to select and return (no extra descriptive terms, minimal) -->
      <p class="text-center text-[10px] text-outline/40 font-medium tracking-wide py-1">
        tap country to continue
      </p>
    </main>

    // DOM elements
    const searchInput = document.getElementById('searchCountry');
    const containerDiv = document.getElementById('countryListContainer');

    // Render country list based on search query
    function renderCountryList(filterText = '') {
      const lowerFilter = filterText.toLowerCase().trim();
      let filtered = COUNTRIES;
      
      if (lowerFilter !== '') {
        filtered = COUNTRIES.filter(c => c.name.toLowerCase().includes(lowerFilter));
      }
      
      if (!containerDiv) return;
      
      if (filtered.length === 0) {
        containerDiv.innerHTML = `
          <div class="flex flex-col items-center justify-center py-12 text-outline/70 gap-2">
            <span class="material-symbols-outlined text-4xl">travel_explore</span>
            <p class="text-sm font-medium">No matching region</p>
            <p class="text-xs">Try another search</p>
          </div>
        `;
        return;
      }
      
      // Build list items with exact same visual style as material design
      const itemsHtml = filtered.map(country => `
        <div class="country-item flex items-center gap-4 w-full bg-surface-container-lowest rounded-xl px-4 py-3 ring-1 ring-outline-variant/10 hover:ring-primary/30 hover:bg-surface-container-low active:scale-[0.98] transition-all cursor-pointer" data-name="${country.name.replace(/[^a-zA-Z0-9]/g, '_')}" data-flag="${country.flag}" data-fullname="${country.name.replace(/['"]/g, '&quot;')}">
          <div class="text-3xl drop-shadow-sm">${country.flag}</div>
          <span class="font-body font-medium text-on-surface text-base tracking-tight">${country.name}</span>
        </div>
      `).join('');
      
      containerDiv.innerHTML = itemsHtml;
      
      // Attach click handlers to each country item
      const countryElements = document.querySelectorAll('.country-item');
      countryElements.forEach(el => {
        el.addEventListener('click', (e) => {
          // extract flag and name from data attributes or from inner elements
          const flagEl = el.querySelector('div:first-child');
          const nameSpan = el.querySelector('span');
          const flag = flagEl ? flagEl.innerText : '🌍';
          const countryName = nameSpan ? nameSpan.innerText : '';
          
          // fallback: get from dataset if needed
          const finalCountry = { name: countryName, flag: flag };
          
          // Save to localStorage exactly as main registration expects (object with name and flag)
          localStorage.setItem('selectedCountry', JSON.stringify(finalCountry));
          
          // OPTIONAL: subtle haptic feedback? just go back to previous page
          // return to registration step 2 (country selection page auto-closes)
          if (document.referrer && document.referrer.includes('step2')) {
            window.history.back();
          } else {
            // safe fallback: go back in history (works from registration page)
            window.history.back();
          }
        });
      });
    }
    
    // Debounce helper for smooth search
    let debounceTimer;
    function onSearchInput(e) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        renderCountryList(e.target.value);
      }, 150);
    }
    
    // initial load + search event
    document.addEventListener('DOMContentLoaded', () => {
      // render full list initially
      renderCountryList('');
      
      if (searchInput) {
        searchInput.addEventListener('input', onSearchInput);
        // optional: clear on focus?
      }
      
      // ensure that if any leftover selectedCountry in localStorage doesn't interfere, but it's fine
      // also no extra "request location" or help terms
    });
    
    // handle pageshow for back/forward cache consistency
    window.addEventListener('pageshow', () => {
      if (searchInput) renderCountryList(searchInput.value);
      else renderCountryList('');
    });
    
    // remove any stray "selectedCountry" test that could break? but keep as expected
    // Note: we DO NOT remove selectedCountry before user picks one, it's up to user choice
  </script>
