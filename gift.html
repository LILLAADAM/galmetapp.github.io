<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Send Gift</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

h2 {
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.gift {
  background: white;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.gift:hover {
  transform: scale(1.05);
}

.gift img {
  width: 60px;
  height: 60px;
}

.price {
  color: orange;
  font-weight: bold;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
});

const db = getFirestore(app);

// ✅ GET USERS
const senderId = JSON.parse(localStorage.getItem("user"))?.userId;
const receiverId = new URLSearchParams(location.search).get("uid");

const grid = document.getElementById("giftGrid");

// 🔥 LOAD GIFTS
async function loadGifts() {
  const snap = await getDocs(collection(db, "gifts"));

  snap.forEach(doc => {
    const g = doc.data();

    const div = document.createElement("div");
    div.className = "gift";

    div.innerHTML = `
      <img src="${g.image}">
      <div>${g.name}</div>
      <div class="price">${g.coinPrice} coins</div>
    `;

    div.onclick = () => sendGift(doc.id);

    grid.appendChild(div);
  });
}

// 🔥 SEND GIFT
async function sendGift(giftId) {

  if (!senderId || !receiverId) {
    alert("User missing");
    return;
  }

  const res = await fetch("https://us-central1-galmet-app.cloudfunctions.net/sendGift", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      senderId,
      receiverId,
      giftId,
      quantity: 1
    })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
  } else {
    alert("✅ Gift sent!\n💎 Gems: " + data.gemsEarned + "\n⭐ Level: " + data.charmLevel);
  }
}

window.onload = loadGifts;
</script>

</head>

<body>

<h2>🎁 Send Gift</h2>

<div id="giftGrid" class="grid"></div>

</body>
</html>
