<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, doc, getDoc,
  collection, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
});

const db = getFirestore(app);

/* USER */
const me = JSON.parse(localStorage.getItem("user"));

if (!me?.uid) {
  location.href = "index.html";
}

const myUid = me.uid;

/* LOAD USER */
async function loadUser(){

  const snap = await getDoc(doc(db,"users",myUid));
  if(!snap.exists()) return;

  const u = snap.data();

  document.getElementById("username").innerText =
    u.username || "User";

  document.getElementById("userIdText").innerText =
    "ID: " + (u.userId || "");

  document.getElementById("profileImg").src =
    u.photoURL || "https://ui-avatars.com/api/?name=User";

  document.getElementById("coins").innerText =
    u.coins || 0;
}

/* REALTIME STATS */
onSnapshot(collection(db,"followers",myUid,"list"), s=>{
  document.getElementById("followersCount").innerText = s.size;
});

onSnapshot(collection(db,"following",myUid,"list"), s=>{
  document.getElementById("followingCount").innerText = s.size;
});

onSnapshot(collection(db,"friends",myUid,"list"), s=>{
  document.getElementById("friendsCount").innerText = s.size;
});

/* NAVIGATION */
window.goView = () => {
  location.href = "view.html?id=" + myUid;
};

window.goProfile = () => {
  location.href = "profile.html";
};

window.goSettings = () => {
  location.href = "settings.html";
};

/* START */
loadUser();

</script>
