        extend: {
          colors: {
            "surface": "#f3f7fb", "surface-container-low": "#ecf1f6",

            "secondary": "#755700", "tertiary": "#b60051",
            "outline": "#73777b", "outline-variant": "#a9aeb1"

            "headline": ["Plus Jakarta Sans"],

            "label": ["Plus Jakarta Sans"]

          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }

      }

      background-color: #f3f7fb;
      overflow-x: hidden;
    }
    h1, h2, h3, .font-headline {

    }
    /* Gender chip colours */
    .gender-chip-male { background: #3b82f6; color: white; }

<body class="text-on-surface min-h-screen">

<main class="px-4 pb-20 space-y-3 pt-4">
  <!-- User Identity Section -->
  <section class="relative group active:scale-[0.98] transition-transform duration-200">
    <div class="flex items-center gap-3 p-1">
      <div class="relative w-16 h-16 cursor-pointer" onclick="goToView()">

  <!-- USER IMAGE (TOP) -->
<img id="profileImg"
     class="w-full h-full rounded-full object-cover border-2 border-white relative z-20">

<!-- FRAME (BEHIND) -->
<img id="avatarFrame"
     class="absolute top-0 left-0 w-full h-full object-contain scale-125 pointer-events-none z-10">

  <!-- FLAG -->
  <div class="absolute bottom-0 right-0 bg-white p-0.5 rounded-full shadow-sm">
    <span id="countryFlag" class="text-[14px]">🌍</span>
  </div>

</div>
      <div class="flex-1 cursor-pointer" onclick="goToView()">
        <h2 id="username" class="font-headline font-extrabold text-2xl"></h2>
        <p id="userIdText" class="text-sm text-outline"></p>
      </div>
      <span onclick="goToEditProfile()" class="material-symbols-outlined cursor-pointer text-primary">chevron_right</span>
    </div>
  </section>

  <!-- Stats Bar -->
  <section class="bg-white rounded-lg py-3 px-2 flex justify-around items-center shadow-sm">
    <button class="flex flex-col items-center group">
      <span id="friendsCount" class="font-headline font-bold text-xl text-on-surface group-hover:text-primary transition-colors">0</span>
      <span class="text-on-surface-variant text-[9px] font-bold uppercase tracking-wider opacity-70">Friends</span>
    </button>
    <div class="w-px h-5 bg-surface-variant/50"></div>
    <button class="flex flex-col items-center group">
      <span id="followingCount" class="font-headline font-bold text-xl text-on-surface group-hover:text-primary transition-colors">0</span>
      <span class="text-on-surface-variant text-[9px] font-bold uppercase tracking-wider opacity-70">Following</span>
    </button>
    <div class="w-px h-5 bg-surface-variant/50"></div>
    <button class="flex flex-col items-center group">
      <span id="followersCount" class="font-headline font-bold text-xl text-on-surface group-hover:text-primary transition-colors">0</span>
      <span class="text-on-surface-variant text-[9px] font-bold uppercase tracking-wider opacity-70">Followers</span>
    </button>
  </section>

  <!-- Level Card (dynamic: Wealth for male, Charm for female) -->
  <section id="levelCard" class="p-3 rounded-lg shadow-md relative overflow-hidden flex items-center justify-between cursor-pointer active:scale-[0.99] transition-transform wealth-level-0">
    <div class="absolute -top-6 -right-6 w-20 h-20 bg-white/10 rounded-full blur-xl"></div>
    <div class="relative z-10 flex items-center gap-3">
      <div class="bg-primary-container/30 backdrop-blur-md p-2 rounded-full flex items-center justify-center">
        <span id="levelIcon" class="material-symbols-outlined text-white text-xl">military_tech</span>
      </div>
      <div>
        <p id="levelLabel" class="text-white/70 text-[9px] font-bold uppercase tracking-widest leading-none mb-1">Wealth Level</p>
        <h3 id="levelValue" class="font-headline text-xl font-black text-white leading-none">Lv.0</h3>
      </div>
    </div>
    <div class="bg-white/20 p-1 rounded-full text-white">
      <span class="material-symbols-outlined text-base">chevron_right</span>
    </div>
  </section>

  <!-- Currencies Row -->
  <section class="grid grid-cols-2 gap-2">
    <div id="coinsCard" class="bg-secondary-container/20 p-2.5 rounded-lg flex items-center gap-2.5 border border-secondary/10 cursor-pointer active:scale-95 transition-transform">
      <div class="bg-secondary-container w-9 h-9 rounded-full flex items-center justify-center shadow-sm flex-shrink-0">
        <span class="material-symbols-outlined text-on-secondary-fixed text-lg" style="font-variation-settings: 'FILL' 1;">monetization_on</span>
      </div>
      <div>
        <p class="text-[9px] font-bold text-on-secondary-fixed-variant uppercase tracking-tighter">My coins</p>
        <p id="coins" class="font-headline font-extrabold text-base text-on-secondary-fixed">0</p>
      </div>
    </div>
    <div id="gemsCard" class="bg-tertiary-container/20 p-2.5 rounded-lg flex items-center gap-2.5 border border-tertiary/10 cursor-pointer active:scale-95 transition-transform">
      <div class="bg-tertiary-container w-9 h-9 rounded-full flex items-center justify-center shadow-sm flex-shrink-0">
        <span class="material-symbols-outlined text-on-tertiary-container text-lg" style="font-variation-settings: 'FILL' 1;">diamond</span>
      </div>
      <div>
        <p class="text-[9px] font-bold text-on-tertiary-fixed-variant uppercase tracking-tighter">My gems</p>
        <p id="gems" class="font-headline font-extrabold text-base text-on-tertiary-container leading-none">0</p>
      </div>
    </div>
  </section>

  <!-- Action Grid -->
  <section class="bg-surface-container-low/40 p-4 rounded-xl">
    <div class="grid grid-cols-4 gap-1">
      <button class="flex flex-col items-center gap-1.5 group" onclick="alert('Store coming soon')">
        <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center shadow-sm group-hover:bg-primary group-hover:text-white transition-all">

        </div>
        <span class="text-[10px] font-bold text-on-surface-variant">Store</span>
      </button>
      <button id="inviteBtn" class="flex flex-col items-center gap-1.5 group">
        <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center shadow-sm group-hover:bg-secondary group-hover:text-white transition-all">
          <span class="material-symbols-outlined text-secondary group-hover:text-white text-xl">person_add</span>
        </div>
        <span class="text-[10px] font-bold text-on-surface-variant">Invite</span>
      </button>
      <button class="flex flex-col items-center gap-1.5 group" onclick="alert('Tasks coming soon')">
        <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center shadow-sm group-hover:bg-tertiary group-hover:text-white transition-all">
          <span class="material-symbols-outlined text-tertiary group-hover:text-white text-xl">task_alt</span>
        </div>
        <span class="text-[10px] font-bold text-on-surface-variant">Tasks</span>
      </button>
      <button id="agentBtn" class="flex flex-col items-center gap-1.5 group">
        <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center shadow-sm group-hover:bg-primary-dim group-hover:text-white transition-all">
          <span class="material-symbols-outlined text-on-primary-fixed-variant group-hover:text-white text-xl">support_agent</span>
        </div>
        <span class="text-[10px] font-bold text-on-surface-variant">Agent</span>
      </button>
    </div>
  </section>

  <section class="bg-white rounded-lg shadow-sm overflow-hidden">
    <button class="w-full flex items-center gap-4 px-4 py-3 hover:bg-surface-container-low transition-colors text-left group border-b border-surface-container-high/50">

      <span class="material-symbols-outlined text-outline-variant text-base">chevron_right</span>
    </button>
    <button class="w-full flex items-center gap-4 px-4 py-3 hover:bg-surface-container-low transition-colors text-left group border-b border-surface-container-high/50">
      <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors text-[20px]">quiz</span>
      <span class="flex-1 font-bold text-on-surface text-[14px]">FAQ &amp; Feedback</span>
      <span class="material-symbols-outlined text-outline-variant text-base">chevron_right</span>
    </button>
    <button onclick="goSettings()" class="w-full flex items-center gap-4 px-4 py-3 hover:bg-surface-container-low transition-colors text-left group">
      <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors text-[20px]">tune</span>
      <span class="flex-1 font-bold text-on-surface text-[14px]">Settings</span>
      <span class="material-symbols-outlined text-outline-variant text-base">chevron_right</span>
    </button>
  </section>
</main>

<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/80 backdrop-blur-xl rounded-t-2xl shadow-[0_-4px_24px_rgba(0,101,113,0.06)]">
  <button onclick="location.href='dashboard.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">home</span>

  </button>

    <span class="material-symbols-outlined">chat_bubble</span>
    <span class="text-[10px] font-label">Chats</span>
  </button>

    <span class="material-symbols-outlined" style="font-variation-settings:'FILL'1">person</span>
    <span class="text-[10px] font-label font-bold">Profile</span>
  </button>
</nav>

  function getFlagFromCountryName(countryName) {
    if (!countryName) return "🌍";
    const match = COUNTRIES.find(c => c.name.toLowerCase() === countryName.toLowerCase());
    return match ? match.flag : "🌍";
  }

  // Apply level card gradient
  function setLevelCard(card, level, type) {
    const classes = type === 'wealth' 
      ? ['wealth-level-0','wealth-level-1','wealth-level-2','wealth-level-3','wealth-level-4','wealth-level-5','wealth-level-6','wealth-level-7','wealth-level-8','wealth-level-9','wealth-level-10']
      : ['charm-level-0','charm-level-1','charm-level-2','charm-level-3','charm-level-4','charm-level-5','charm-level-6','charm-level-7','charm-level-8','charm-level-9','charm-level-10'];
    for (let i = 0; i <= 10; i++) {
      card.classList.remove(classes[i]);
    }
    const idx = Math.min(level, 10);
    card.classList.add(classes[idx]);
  }

      else countryName = user.country;
    }
    const flagEmoji = getFlagFromCountryName(countryName);
    document.getElementById("countryFlag").innerText = flagEmoji;

    // Gender & Age chip
    const gender = user.gender;
    const age = user.age || "?";
    const genderIcon = gender === "male" ? "male" : (gender === "female" ? "female" : "transgender");
    // Update the gender/age display – we need a separate chip in the profile. Actually the profile page doesn't have a gender/age chip originally, but the user asked to show age next to ID? Let's add a small chip next to the username or below? To keep consistent with view.html, we'll add a chip after the user ID or in the info section. However, the current profile doesn't have that space. I'll add it below the user ID line.

    if (userIdLine && !document.getElementById("ageChip")) {
      const ageChip = document.createElement("span");
      ageChip.id = "ageChip";
      ageChip.className = `ml-2 px-2 py-0.5 rounded-full text-[10px] font-bold ${gender === 'male' ? 'gender-chip-male' : (gender === 'female' ? 'gender-chip-female' : 'gender-chip-other')}`;
      ageChip.innerHTML = `${genderIcon} ${age}`;
      userIdLine.parentNode.appendChild(ageChip);
    } else {
      const ageChip = document.getElementById("ageChip");
      if (ageChip) {
