<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);

  // ==================== USER LOGIN SYSTEM (USING userId) ====================
  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) {
    window.location.replace("login.html");
  }
  const myUserId = currentUser.userId.toString();
  const myUsername = currentUser.username || "User";
  const myPhoto = currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(myUsername)}&background=006571&color=fff`;

  // ==================== GENDER-BASED CURRENCY DISPLAY ====================
  const gender = currentUser.gender;
  const balanceValueSpan = document.getElementById("balanceValue");
  const balanceIconSpan = document.getElementById("balanceIcon");

  if (gender === 'male') {
    balanceValueSpan.innerText = (currentUser.coins || 0).toLocaleString();
    balanceIconSpan.innerText = "monetization_on";
  } else if (gender === 'female') {
    balanceValueSpan.innerText = (currentUser.gems || 0).toLocaleString();
    balanceIconSpan.innerText = "diamond";
    balanceIconSpan.classList.add("text-red-400");
  } else {
    balanceValueSpan.innerText = (currentUser.coins || 0).toLocaleString();
    balanceIconSpan.innerText = "monetization_on";
  }

  // Real-time balance update (optional)
  import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  const userRef = doc(db, "users", myUserId);
  onSnapshot(userRef, (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      if (gender === 'male') {
        balanceValueSpan.innerText = (data.coins || 0).toLocaleString();
      } else if (gender === 'female') {
        balanceValueSpan.innerText = (data.gems || 0).toLocaleString();
      } else {
        balanceValueSpan.innerText = (data.coins || 0).toLocaleString();
      }
    }
  });

  // ==================== LOAD ROOMS (REALTIME) ====================
  const roomsRef = collection(db, "rooms");
  const roomsGrid = document.getElementById("roomsGrid");

  onSnapshot(roomsRef, (snapshot) => {
    roomsGrid.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const room = docSnap.data();
      const roomId = docSnap.id;
      const roomName = room.name || "Unnamed Room";
      const userCount = room.users || 1;
      // Random image for demo – you can replace with room.coverPhoto if available
      const imgUrl = `https://picsum.photos/400/400?random=${roomId}`;
      
      const card = document.createElement("div");
      card.className = "bg-surface-container-lowest straight-corners overflow-hidden shadow-sm flex flex-col group cursor-pointer";
      card.onclick = () => location.href = `room.html?id=${roomId}`;
      
      card.innerHTML = `
        <div class="relative aspect-square">
          <img class="w-full h-full object-cover straight-corners" src="${imgUrl}" alt="${roomName}">
          <div class="absolute top-1.5 left-1.5 flex items-center gap-1 px-1.5 py-0.5 bg-black/50 backdrop-blur-md rounded-full">
            <div class="w-1 h-1 bg-primary-fixed rounded-full animate-pulse"></div>
            <span class="text-[9px] text-white font-bold">${userCount}</span>
          </div>
          <div class="absolute bottom-1.5 left-1.5 right-1.5 flex justify-between items-center">
            <div class="flex items-center gap-1 bg-black/30 backdrop-blur-md px-1.5 py-0.5 rounded-full">
              <span class="text-[11px]">🌍</span>
            </div>
            <div class="flex items-center gap-1 bg-primary/90 backdrop-blur-md px-1.5 py-0.5 rounded-full">
              <span class="material-symbols-outlined text-[10px] text-white">equalizer</span>
            </div>
          </div>
        </div>
        <div class="p-2">
          <h4 class="font-headline text-[12px] font-bold truncate text-on-surface">${escapeHtml(roomName)}</h4>
          <div class="flex items-center justify-between mt-1">
            <span class="text-[9px] text-on-surface-variant font-medium">@${escapeHtml(room.hostName || "host")}</span>
            <div class="flex items-center gap-0.5">
              <span class="material-symbols-outlined text-[10px] text-tertiary" style="font-variation-settings: 'FILL' 1;">diamond</span>
              <span class="text-[9px] font-bold text-tertiary">${room.rewards || 0}</span>
            </div>
          </div>
        </div>
      `;
      roomsGrid.appendChild(card);
    });
    if (snapshot.empty) {
      roomsGrid.innerHTML = `<div class="col-span-2 text-center py-10 text-outline">No parties yet. Create the first one!</div>`;
    }
  });

  // ==================== CREATE ROOM ====================
  async function createRoom() {
    try {
      const roomRef = await addDoc(collection(db, "rooms"), {
        name: `${myUsername}'s Room`,
        hostId: myUserId,
        hostName: myUsername,
        hostPhoto: myPhoto,
        users: 1,
        createdAt: serverTimestamp(),
        rewards: 0
      });
      // Add host as member
      await setDoc(doc(db, "rooms", roomRef.id, "members", myUserId), {
        uid: myUserId,
        role: "host",
        joinedAt: serverTimestamp()
      });
      location.href = `room.html?id=${roomRef.id}`;
    } catch (err) {
      console.error("Create room error:", err);
      alert("Failed to create room. Please try again.");
    }
  }

  // Attach create room to both buttons
  document.getElementById("createRoomBtn").onclick = createRoom;
  document.getElementById("createRoomFAB").onclick = createRoom;

  // Helper
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }
</script>
