<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family:sans-serif; background:#f3f7fb; }
.grid-box { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:10px; }
.card { position:relative; height:160px; border-radius:12px; overflow:hidden; cursor:pointer; }
.card img { width:100%; height:100%; object-fit:cover; }
.overlay {
  position:absolute; bottom:10px; left:10px;
  color:white; font-size:12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div style="padding:15px;font-weight:bold;font-size:20px;">
  🎉 Party Rooms
</div>

<!-- ROOMS -->
<div class="grid-box" id="rooms"></div>

<!-- CREATE BUTTON -->
<div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);">
  <button onclick="createRoom()" style="padding:12px 25px;background:#00d0e0;color:white;border:none;border-radius:30px;font-size:16px;">
    + Create Party
  </button>
</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection, addDoc, onSnapshot,
  doc, setDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const user = JSON.parse(localStorage.getItem("user"));
const box = document.getElementById("rooms");

// 🔥 LOAD ROOMS
onSnapshot(collection(db,"rooms"), (snap)=>{
  box.innerHTML = "";

  snap.forEach(docSnap=>{
    const r = docSnap.data();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://picsum.photos/300?${docSnap.id}">
      <div class="overlay">
        <b>${r.name}</b><br>
        👥 ${r.users || 1}
      </div>
    `;

    div.onclick = ()=> {
      location.href = "room.html?id="+docSnap.id;
    };

    box.appendChild(div);
  });
});

// ✅ CREATE ROOM
window.createRoom = async () => {

  if(!user) return alert("Login first");

  const ref = await addDoc(collection(db,"rooms"),{
    name: user.username + " Room",
    hostId: user.uid,
    users: 1,
    createdAt: serverTimestamp()
  });

  await setDoc(doc(db,"rooms",ref.id,"members",user.uid),{
    uid:user.uid,
    role:"host"
  });

  location.href = "room.html?id="+ref.id;
};

</script>

</body>
</html>
