<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f5f6fa; }

.top {
    display:flex;
    padding:10px;
    gap:10px;
}

input {
    flex:1;
    padding:12px;
    border-radius:20px;
    border:1px solid #ccc;
}

button {
    padding:12px 18px;
    border:none;
    border-radius:20px;
    background:#4cd964;
    color:white;
}

.user {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    border-bottom:1px solid #eee;
}

.user img {
    width:50px;
    height:50px;
    border-radius:50%;
}

.info { flex:1; }

.name { font-weight:bold; }
.id { font-size:12px; color:gray; }

</style>
</head>

<body>

<div class="top">
<input id="searchInput" placeholder="Search ID or username">
<button onclick="search()">Search</button>
</div>

<div id="results"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app"
});

const db = getFirestore(app);

// ✅ NOW THIS IS UID
const uid = new URLSearchParams(location.search).get("id");

// 🔥 DIRECT GET BY UID
const snap = await getDoc(doc(db, "users", uid));

if (!snap.exists()) {
    document.body.innerHTML = "User not found";
} else {

    const u = snap.data();

    document.body.innerHTML = `
    <div style="text-align:center;padding:20px">
        <img src="${u.photoURL}" style="width:200px;border-radius:20px">
        <h2>${u.username}</h2>
        <p>ID: ${u.userId}</p>
        <p>${u.bio || ""}</p>
        <button onclick="startChat()">Chat</button>
    </div>
    `;
}

// ✅ CHAT BUTTON (PASS UID)
window.startChat = () => {
    location = "chat.html?id=" + uid;
};

</script>

</body>
</html>
