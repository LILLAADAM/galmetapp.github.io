<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f5f6fa; }

.top {
    display:flex;
    padding:10px;
    gap:10px;
}

input {
    flex:1;
    padding:12px;
    border-radius:20px;
    border:1px solid #ccc;
}

button {
    padding:12px 18px;
    border:none;
    border-radius:20px;
    background:#4cd964;
    color:white;
}

.user {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    border-bottom:1px solid #eee;
}

.user img {
    width:50px;
    height:50px;
    border-radius:50%;
}

.info { flex:1; }

.name { font-weight:bold; }
.id { font-size:12px; color:gray; }

</style>
</head>

<body>

<div class="top">
<input id="searchInput" placeholder="Search ID or username">
<button onclick="search()">Search</button>
</div>

<div id="results"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, limit } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app",
  storageBucket: "galmet-app.firebasestorage.app"
});

const db = getFirestore(app);

window.search = async () => {

    const val = document.getElementById("searchInput").value.trim();

    if (!val) return;

    let users = [];

    // 🔥 USERNAME SEARCH
    const q1 = query(
        collection(db,"users"),
        where("username","==",val.toUpperCase()),
        limit(1)
    );

    const snap1 = await getDocs(q1);
    snap1.forEach(d => users.push(d.data()));

    // 🔥 USERID SEARCH (NUMBER FIX)
    if (!isNaN(val)) {
        const q2 = query(
            collection(db,"users"),
            where("userId","==",Number(val)),
            limit(1)
        );

        const snap2 = await getDocs(q2);
        snap2.forEach(d => users.push(d.data()));
    }

    let html = "";

    if (users.length === 0) {
        html = "<p style='padding:15px'>No user found</p>";
    } else {

        users.forEach(u => {
    html += `
    <div class="user">
        <img src="${u.photoURL || 'https://ui-avatars.com/api/?name='+u.username}" 
             onclick="view('${u.uid}')">

        <div class="info" onclick="view('${u.uid}')">
            <div class="name">${u.username}</div>
            <div class="id">ID: ${u.userId}</div>
        </div>

        <button onclick="chat('${u.uid}')">Chat</button>
    </div>`;
});
    }

    document.getElementById("results").innerHTML = html;
};

window.view = (id) => location.href = "view.html?id="+id;
window.chat = (id) => location = "chat.html?id=" + user.uid;

</script>

</body>
</html>
