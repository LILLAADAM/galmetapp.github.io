<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:#fff;
}

/* TOP BAR */
.top {
    display:flex;
    padding:10px;
    gap:8px;
    position:sticky;
    top:0;
    background:white;
    border-bottom:1px solid #eee;
}

input {
    flex:1;
    padding:12px;
    border-radius:25px;
    border:1px solid #ccc;
}

/* USER CARD */
.user {
    display:flex;
    align-items:center;
    padding:12px;
    border-bottom:1px solid #eee;
}

.user img {
    width:50px;
    height:50px;
    border-radius:50%;
    margin-right:12px;
    object-fit:cover;
}

.info {
    flex:1;
}

.name {
    font-weight:bold;
}

.id {
    font-size:12px;
    color:#777;
}

button {
    padding:6px 12px;
    border-radius:15px;
    border:none;
    background:#4cd964;
    color:white;
}
</style>
</head>

<body>

<div class="top">
    <input id="searchInput" placeholder="Search ID or username">
    <button onclick="search()">Search</button>
</div>

<div id="results"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, limit } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
});

const db = getFirestore(app);

// 🔥 FAST SEARCH
window.search = async () => {

    const val = document.getElementById("searchInput").value.trim().toLowerCase();

    if (!val) {
        document.getElementById("results").innerHTML = "";
        return;
    }

    let html = "";

    try {

        // 🔥 SEARCH BY USERNAME (FAST)
        const q1 = query(
            collection(db,"users"),
            where("username", ">=", val),
            where("username", "<=", val + "\uf8ff"),
            limit(10)
        );

        const snap1 = await getDocs(q1);

        // 🔥 SEARCH BY USER ID
        const q2 = query(
            collection(db,"users"),
            where("userId", "==", val),
            limit(1)
        );

        const snap2 = await getDocs(q2);

        const users = [];

        snap1.forEach(d => users.push(d.data()));
        snap2.forEach(d => users.push(d.data()));

        if (users.length === 0) {
            document.getElementById("results").innerHTML = "<p style='padding:10px'>No user found</p>";
            return;
        }

        users.forEach(u => {

            if (!u.username) return; // skip broken data

            html += `
            <div class="user">
                <img src="${u.photoURL || 'https://ui-avatars.com/api/?name=' + u.username}" onclick="view('${u.userId}')">
                
                <div class="info" onclick="view('${u.userId}')">
                    <div class="name">${u.username}</div>
                    <div class="id">ID: ${u.userId}</div>
                </div>

                <button onclick="chat('${u.userId}')">Chat</button>
            </div>`;
        });

        document.getElementById("results").innerHTML = html;

    } catch (err) {
        console.error(err);
        alert("Search error");
    }
};

// NAVIGATION
window.view = (id)=> location="view.html?id="+id;
window.chat = (id)=> location="chat.html?user="+id;

</script>

</body>
</html>
