<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet – Complete Profile</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f3f7fb", "surface-container-low": "#ecf1f6",
            "surface-container-lowest": "#ffffff", "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60", "primary": "#006571",
            "primary-container": "#00e3fd", "primary-dim": "#005863",
            "secondary": "#755700", "tertiary": "#b60051",
            "outline": "#73777b", "outline-variant": "#a9aeb1"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .wheel {
      height: 100%; overflow-y: auto; scroll-snap-type: y mandatory;
      display: flex; flex-direction: column; align-items: center;
    }
    .wheel::-webkit-scrollbar { display: none; }
    .item {
      height: 40px; display: flex; align-items: center; justify-content: center;
      scroll-snap-align: center; font-weight: 600; flex-shrink: 0;
    }
    .spacer { height: 70px; width: 100%; flex-shrink: 0; }
    .gender-card {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .gender-card.selected {
      background: #00e3fd20;
      border-color: #006571;
      transform: scale(0.98);
    }
    body { overflow: hidden; }
    main { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body class="bg-surface font-body text-on-surface h-screen flex flex-col">

<!-- Top Bar -->
<header class="w-full max-w-md mx-auto flex justify-between items-center px-6 h-14 shrink-0">
  <button onclick="window.location.href='login.html'" class="text-primary">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>
  <h1 class="text-lg font-bold bg-gradient-to-r from-primary to-primary-dim bg-clip-text text-transparent">Galmet</h1>
  <div class="w-6"></div>
</header>

<!-- Sub-header: Tell us about yourself -->
<div class="text-center mt-1 mb-2">
  <h2 class="text-base font-headline font-semibold text-on-surface">Tell us about yourself</h2>
  <p class="text-xs text-on-surface-variant">Let's get to know you</p>
</div>

<main class="flex-1 w-full max-w-md mx-auto px-6 py-2 flex flex-col gap-3 overflow-y-auto">
  <!-- Progress steps -->
  <div class="flex justify-center gap-2 mb-1">
    <div class="h-1.5 w-8 rounded-full bg-primary-container"></div>
    <div class="h-1.5 w-8 rounded-full bg-surface-container-high"></div>
    <div class="h-1.5 w-8 rounded-full bg-surface-container-high"></div>
  </div>

  <!-- Gender Selection (correct images: male = boy, female = girl) -->
  <div class="flex gap-3">
    <!-- Male card with male photo -->
    <div id="genderMaleCard" onclick="selectGender('male')" class="gender-card flex-1 flex flex-col items-center gap-2 p-3 rounded-xl border-2 border-outline-variant/30 bg-surface-container-lowest">
      <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="w-12 h-12 rounded-full object-cover" alt="male">
      <span class="text-sm font-medium">Male</span>
    </div>
    <!-- Female card with female photo -->
    <div id="genderFemaleCard" onclick="selectGender('female')" class="gender-card flex-1 flex flex-col items-center gap-2 p-3 rounded-xl border-2 border-outline-variant/30 bg-surface-container-lowest">
      <img src="https://cdn-icons-png.flaticon.com/512/4140/4140047.png" class="w-12 h-12 rounded-full object-cover" alt="female">
      <span class="text-sm font-medium">Female</span>
    </div>
  </div>

  <!-- Nickname -->
  <div>
    <label class="block text-[11px] font-label font-bold uppercase tracking-wider text-on-surface-variant mb-2">Nickname</label>
    <input id="nickname" type="text" class="w-full bg-surface-container-lowest rounded-xl px-4 py-2.5 text-sm ring-1 ring-outline-variant/15 focus:ring-2 focus:ring-primary" placeholder="e.g. SkyWalker">
  </div>

  <!-- Country -->
  <div>
    <label class="block text-[11px] font-label font-bold uppercase tracking-wider text-on-surface-variant mb-2">Country</label>
    <button onclick="openCountryPage()" class="w-full flex items-center justify-between bg-surface-container-lowest rounded-xl px-4 py-2.5 text-sm ring-1 ring-outline-variant/15">
      <div class="flex items-center gap-2">
        <span id="countryFlag" class="text-lg">🌍</span>
        <span id="countryName" class="text-outline text-sm">Select region</span>
      </div>
      <span class="material-symbols-outlined text-base">expand_more</span>
    </button>
  </div>

  <!-- Date of Birth -->
  <div>
    <label class="block text-[11px] font-label font-bold uppercase tracking-wider text-on-surface-variant mb-2">Birth Date</label>
    <div class="relative bg-surface-container-low rounded-xl h-32 overflow-hidden ring-1 ring-outline-variant/20">
      <div class="absolute left-3 right-3 top-1/2 -translate-y-1/2 h-8 bg-primary-container/20 rounded-lg z-10"></div>
      <div class="flex h-full">
        <div id="dayWheel" class="wheel w-1/4 text-sm"></div>
        <div id="monthWheel" class="wheel w-2/5 text-sm"></div>
        <div id="yearWheel" class="wheel w-1/4 text-sm"></div>
      </div>
      <div class="absolute inset-0 pointer-events-none" style="background: linear-gradient(to bottom, #f3f7fb 0%, rgba(243,247,251,0) 25%, rgba(243,247,251,0) 75%, #f3f7fb 100%);"></div>
    </div>
  </div>

  <!-- Continue Button -->
  <button id="continueBtn" class="mt-2 w-full h-11 bg-gradient-to-r from-primary to-primary-dim text-on-primary rounded-full font-bold shadow-md active:scale-95 transition text-sm">Continue</button>
  <p class="text-center text-[10px] text-outline uppercase tracking-[0.1em] pb-2">Step 1 of 2</p>
</main>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="fixed inset-0 bg-surface/80 backdrop-blur-md flex flex-col items-center justify-center hidden z-[100]">
  <div class="relative">
    <div class="w-24 h-24 rounded-full border-4 border-primary-container border-t-primary animate-spin"></div>
    <div class="absolute inset-0 flex items-center justify-center">
      <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings:'FILL'1">explore</span>
    </div>
  </div>
  <p class="mt-8 font-headline font-bold text-2xl text-primary animate-bounce">Galmet</p>
  <p class="text-on-surface-variant font-medium">Saving your profile...</p>
</div>

<script>
  const BASE_URL = "https://us-central1-galmet-app.cloudfunctions.net";
  let selectedGender = "";
  let selectedCountry = null;

  const user = JSON.parse(localStorage.getItem("user"));
  if (!user || !user.email) window.location = "login.html";

  // ---------- Gender UI with correct images ----------
  function selectGender(gender) {
    selectedGender = gender;
    document.getElementById("genderMaleCard").classList.remove("selected", "border-primary", "bg-primary-container/20");
    document.getElementById("genderFemaleCard").classList.remove("selected", "border-primary", "bg-primary-container/20");
    const activeCard = document.getElementById(`gender${gender === 'male' ? 'Male' : 'Female'}Card`);
    activeCard.classList.add("selected", "border-primary", "bg-primary-container/20");
  }
  if (user.gender) selectGender(user.gender);

  // Pre-fill nickname
  if (user.username) document.getElementById("nickname").value = user.username;

  // Pre-fill country
  const savedCountry = JSON.parse(localStorage.getItem("selectedCountry"));
  if (savedCountry) {
    selectedCountry = savedCountry;
    document.getElementById("countryFlag").innerText = savedCountry.flag;
    document.getElementById("countryName").innerText = savedCountry.name;
  } else if (user.country) {
    selectedCountry = user.country;
    document.getElementById("countryFlag").innerText = user.country.flag || "🌍";
    document.getElementById("countryName").innerText = user.country.name || user.country;
  }

  function openCountryPage() { window.location = "country.html"; }
  function loadCountry() {
    const country = JSON.parse(localStorage.getItem("selectedCountry"));
    if (country) {
      selectedCountry = country;
      document.getElementById("countryFlag").innerText = country.flag;
      document.getElementById("countryName").innerText = country.name;
    }
  }
  window.addEventListener("pageshow", loadCountry);

  // ---------- Date wheel ----------
  function initWheels() {
    const spacer = '<div class="spacer"></div>';
    let days = spacer;
    for (let i=1;i<=31;i++) days += `<div class="item day">${i}</div>`;
    document.getElementById("dayWheel").innerHTML = days + spacer;
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    let monthHTML = spacer;
    months.forEach(m => monthHTML += `<div class="item month">${m}</div>`);
    document.getElementById("monthWheel").innerHTML = monthHTML + spacer;
    let years = spacer;
    for (let y=1980;y<=2025;y++) years += `<div class="item year">${y}</div>`;
    document.getElementById("yearWheel").innerHTML = years + spacer;
    setTimeout(() => {
      ["dayWheel","monthWheel","yearWheel"].forEach(id => {
        const el = document.getElementById(id);
        el.scrollTop = el.scrollHeight / 2;
      });
    }, 50);
  }

  function getCenterValue(container, className) {
    const items = container.querySelectorAll("." + className);
    let closest = null, closestOffset = Infinity;
    const center = container.getBoundingClientRect().top + container.offsetHeight/2;
    items.forEach(el => {
      const rect = el.getBoundingClientRect();
      const offset = Math.abs(center - (rect.top + rect.height/2));
      if (offset < closestOffset) { closestOffset = offset; closest = el; }
    });
    return closest?.innerText;
  }

  function getDOB() {
    let day = parseInt(getCenterValue(document.getElementById("dayWheel"), "day"));
    let monthText = getCenterValue(document.getElementById("monthWheel"), "month");
    let year = parseInt(getCenterValue(document.getElementById("yearWheel"), "year"));
    const monthMap = { Jan:1, Feb:2, Mar:3, Apr:4, May:5, Jun:6, Jul:7, Aug:8, Sep:9, Oct:10, Nov:11, Dec:12 };
    let month = monthMap[monthText];
    if (isNaN(day)) day = 1;
    if (!month) month = 1;
    if (isNaN(year)) year = 2000;
    return { day, month, year };
  }

  function calculateAge(day, month, year) {
    const today = new Date();
    let age = today.getFullYear() - year;
    if (today.getMonth()+1 < month || (today.getMonth()+1 === month && today.getDate() < day)) age--;
    return age;
  }

  async function saveAll() {
    if (!selectedGender) { alert("Please select gender"); return; }
    const nickname = document.getElementById("nickname").value.trim();
    if (!nickname || nickname.length < 3) { alert("Nickname must be at least 3 characters"); return; }
    if (!selectedCountry) { alert("Please select your country"); return; }
    const dob = getDOB();
    if (!dob.day || !dob.month || !dob.year) { alert("Select full date"); return; }
    const age = calculateAge(dob.day, dob.month, dob.year);
    if (age < 18) { alert("You must be 18 or older"); return; }

    const loading = document.getElementById("loadingOverlay");
    loading.classList.remove("hidden");

    try {
      const genderRes = await fetch(BASE_URL + "/updateUser", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: user.email, gender: selectedGender })
      });
      const genderData = await genderRes.json();
      if (!genderData.success) throw new Error("Gender update failed");

      const step2Res = await fetch(BASE_URL + "/updateUserStep2", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: user.email,
          username: nickname,
          country: selectedCountry,
          dob: { day: dob.day, month: dob.month, year: dob.year },
          age: age
        })
      });
      const step2Data = await step2Res.json();
      if (!step2Data.success) {
        alert(step2Data.message || "Username taken");
        loading.classList.add("hidden");
        return;
      }

      user.gender = selectedGender;
      user.username = nickname;
      user.country = selectedCountry;
      user.dob = { day: dob.day, month: dob.month, year: dob.year };
      user.age = age;
      localStorage.setItem("user", JSON.stringify(user));
      localStorage.removeItem("selectedCountry");

      if (!user.photoURL || !user.profileCompleted) {
        window.location.href = "setup.html";
      } else {
        window.location.href = "dashboard.html";
      }
    } catch (err) {
      console.error(err);
      alert("Error saving. Please try again.");
      loading.classList.add("hidden");
    }
  }

  document.getElementById("continueBtn").onclick = saveAll;
  initWheels();
</script>
</body>
</html>
