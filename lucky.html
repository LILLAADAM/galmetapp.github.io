<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galmet Lucky</title>

<style>

body{
font-family:Arial;
background:#0b0f2a;
color:white;
text-align:center;
margin:0;
}

.topbar{
background:#1324a0;
padding:12px;
display:flex;
justify-content:space-between;
font-size:18px;
}

.multiplier{
font-size:70px;
margin-top:30px;
color:#ffc400;
}

input{
padding:10px;
font-size:16px;
margin-top:10px;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
margin:10px;
font-size:16px;
cursor:pointer;
}

.start{background:#00c853;color:white;}
.cash{background:#ff9800;color:white;}

.box{
background:white;
color:black;
margin:20px;
padding:10px;
border-radius:10px;
height:120px;
overflow:auto;
font-size:14px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.popupContent{
background:white;
color:black;
padding:20px;
border-radius:10px;
width:80%;
max-width:350px;
}

.depositBtn{
background:#1324a0;
color:white;
width:100%;
margin:5px 0;
}

.closeBtn{
background:red;
color:white;
}

</style>
</head>

<body>

<div class="topbar">
<div>Galmet Lucky</div>
<div onclick="openDeposit()">Coins: <span id="coins"></span></div>
</div>

<div class="multiplier" id="multi">1.00x</div>

<div>Bet</div>

<input id="bet" value="50">

<br>

<button id="startBtn" class="start">Start</button>
<button id="cashBtn" class="cash">Cash Out</button>

<div class="box" id="players"></div>
<div class="box" id="history"></div>

<!-- Deposit Popup -->

<div class="popup" id="depositPopup">

<div class="popupContent">

<h3>Buy Coins</h3>

<button class="depositBtn" onclick="buyCoins(499)">499 Coins</button>
<button class="depositBtn" onclick="buyCoins(899)">899 Coins</button>
<button class="depositBtn" onclick="buyCoins(1059)">1059 Coins</button>
<button class="depositBtn" onclick="buyCoins(1999)">1999 Coins</button>
<button class="depositBtn" onclick="buyCoins(2999)">2999 Coins</button>
<button class="depositBtn" onclick="buyCoins(3999)">3999 Coins</button>
<button class="depositBtn" onclick="buyCoins(5599)">5599 Coins</button>

<br>

<button class="closeBtn" onclick="closeDeposit()">Close</button>

</div>

</div>

<script>

let coins = localStorage.getItem("galmetCoins")

if(!coins){
coins = 500
localStorage.setItem("galmetCoins",coins)
}

coins = parseInt(coins)

let multiplier = 1
let playing = false
let crashPoint = 0
let bet = 0
let gameLoop = null

const coinsEl = document.getElementById("coins")
const multiEl = document.getElementById("multi")
const betEl = document.getElementById("bet")
const playersEl = document.getElementById("players")
const historyEl = document.getElementById("history")

coinsEl.textContent = coins

document.getElementById("startBtn").addEventListener("click",startGame)
document.getElementById("cashBtn").addEventListener("click",cashOut)

function saveCoins(){
localStorage.setItem("galmetCoins",coins)
}

function startGame(){

if(playing) return

bet = parseInt(betEl.value)

if(!bet || bet<=0){
alert("Enter bet amount")
return
}

if(bet>coins){
alert("Not enough coins")
return
}

coins -= bet
saveCoins()

coinsEl.textContent = coins

multiplier = 1

crashPoint = 1/(Math.random()0.9+0.1)

playing = true

gameLoop = setInterval(updateGame,100)

}

function updateGame(){

multiplier += 0.05

multiEl.textContent = multiplier.toFixed(2)+"x"

if(multiplier>=crashPoint){

clearInterval(gameLoop)

multiEl.textContent="CRASH "+crashPoint.toFixed(2)+"x"

addHistory(crashPoint)

playing=false

}

}

function cashOut(){

if(!playing) return

clearInterval(gameLoop)

let win = Math.floor(betmultiplier)

coins += win

saveCoins()

coinsEl.textContent = coins

multiEl.textContent="CASHED "+multiplier.toFixed(2)+"x"

addHistory(multiplier)

playing=false

}

function addHistory(value){

historyEl.innerHTML=value.toFixed(2)+"x<br>"+historyEl.innerHTML

}

setInterval(function(){

let names=["Alex","Sam","Kai","Lee","Mia","John","Sara"]

let name = names[Math.floor(Math.random()*names.length)]

let m = (Math.random()*4+1).toFixed(2)

playersEl.innerHTML=name+" cashed out "+m+"x<br>"+playersEl.innerHTML

},2000)

function openDeposit(){
document.getElementById("depositPopup").style.display="flex"
}

function closeDeposit(){
document.getElementById("depositPopup").style.display="none"
}

function buyCoins(amount){

coins += amount

saveCoins()

coinsEl.textContent=coins

alert("Deposit successful: "+amount+" coins added")

closeDeposit()

}

</script>

</body>
</html>
