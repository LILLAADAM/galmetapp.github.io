<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galmet - Registration Step 2</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#f3f7fb;
  font-family:sans-serif;
}

/* WHEEL */
.wheel{
  height:100%;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.wheel::-webkit-scrollbar{
  display:none;
}

.item{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  scroll-snap-align:center;
  font-weight:600;
  color:#2a2f32;
}

.spacer{
  height:100px;
}
</style>
</head>

<body class="flex flex-col items-center">

<main class="w-full max-w-md px-5 py-4 flex flex-col gap-4">

<!-- Nickname -->
<input id="nickname" placeholder="Nickname"
class="p-3 rounded-lg border w-full"/>

<!-- Country -->
<button onclick="openCountryPage()"
class="flex justify-between p-3 rounded-lg border">

<div class="flex gap-2">
<div id="countryFlag">🌍</div>
<span id="countryName">Select country</span>
</div>

<span>▼</span>
</button>

<!-- DATE PICKER -->
<section>

<div class="relative bg-white rounded-xl flex h-48 overflow-hidden border">

<!-- CENTER BAR -->
<div class="absolute left-3 right-3 top-1/2 -translate-y-1/2 h-10 bg-blue-200 rounded-lg z-10"></div>

<!-- DAY -->
<div id="dayWheel" class="wheel w-1/4"></div>

<!-- MONTH -->
<div id="monthWheel" class="wheel w-2/5"></div>

<!-- YEAR -->
<div id="yearWheel" class="wheel w-1/4"></div>

<!-- GRADIENT -->
<div class="absolute inset-0 pointer-events-none"
style="background: linear-gradient(to bottom,
#f3f7fb 0%,
rgba(243,247,251,0.95) 15%,
rgba(243,247,251,0) 35%,
rgba(243,247,251,0) 65%,
rgba(243,247,251,0.95) 85%,
#f3f7fb 100%);
">
</div>

</div>

</section>

<!-- BUTTON -->
<button onclick="saveStep2()"
class="mt-2 p-3 rounded-full bg-blue-600 text-white font-bold">
Continue
</button>

</main>

<script>

let selectedCountry = null;

/* INIT PICKER */
function initPicker(){

  const dayWheel = document.getElementById("dayWheel");
  const monthWheel = document.getElementById("monthWheel");
  const yearWheel = document.getElementById("yearWheel");

  // DAY
  dayWheel.innerHTML = '<div class="spacer"></div>';
  for(let i=1;i<=31;i++){
    dayWheel.innerHTML += `<div class="item day">${i}</div>`;
  }
  dayWheel.innerHTML += '<div class="spacer"></div>';

  // MONTH
  const months = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  monthWheel.innerHTML = '<div class="spacer"></div>';
  months.forEach(m=>{
    monthWheel.innerHTML += `<div class="item month">${m}</div>`;
  });
  monthWheel.innerHTML += '<div class="spacer"></div>';

  // YEAR
  yearWheel.innerHTML = '<div class="spacer"></div>';
  for(let y=1980;y<=2025;y++){
    yearWheel.innerHTML += `<div class="item year">${y}</div>`;
  }
  yearWheel.innerHTML += '<div class="spacer"></div>';
}

initPicker();

/* AUTO CENTER */
function scrollToDefault(){
  ["dayWheel","monthWheel","yearWheel"].forEach(id=>{
    const el = document.getElementById(id);
    el.scrollTop = el.scrollHeight/2;
  });
}
scrollToDefault();

/* GET CENTER VALUE */
function getCenterValue(container, className){

  const items = container.querySelectorAll("." + className);

  let closest = null;
  let closestOffset = Infinity;

  const center = container.getBoundingClientRect().top + container.offsetHeight/2;

  items.forEach(el=>{
    const rect = el.getBoundingClientRect();
    const offset = Math.abs(center - (rect.top + rect.height/2));

    if(offset < closestOffset){
      closestOffset = offset;
      closest = el;
    }
  });

  return closest?.innerText;
}

/* GET DOB */
function getDOB(){

  const day = parseInt(getCenterValue(dayWheel,"day"));
  const monthText = getCenterValue(monthWheel,"month");
  const year = parseInt(getCenterValue(yearWheel,"year"));

  const map = {
    January:1, February:2, March:3, April:4, May:5, June:6,
    July:7, August:8, September:9, October:10, November:11, December:12
  };

  return { day, month: map[monthText], year };
}

/* AGE */
function calculateAge(d,m,y){
  const t = new Date();
  let age = t.getFullYear() - y;

  if(t.getMonth()+1 < m || (t.getMonth()+1 === m && t.getDate() < d)){
    age--;
  }

  return age;
}

/* SAVE */
function saveStep2(){

  const nickname = document.getElementById("nickname").value;

  if(!nickname || nickname.length < 3){
    alert("Enter nickname");
    return;
  }

  if(!selectedCountry){
    alert("Select country");
    return;
  }

  const dob = getDOB();
  const age = calculateAge(dob.day,dob.month,dob.year);

  if(age < 18){
    alert("Must be 18+");
    return;
  }

  alert("✅ All good!");
}

/* COUNTRY */
function openCountryPage(){
  window.location = "country.html";
}

/* LOAD COUNTRY */
function loadCountry(){
  const c = JSON.parse(localStorage.getItem("selectedCountry"));
  if(c){
    selectedCountry = c;
    countryName.innerText = c.name;
    countryFlag.innerText = c.flag;
  }
}

document.addEventListener("DOMContentLoaded", loadCountry);
window.onpageshow = loadCountry;

</script>

</body>
</html>
