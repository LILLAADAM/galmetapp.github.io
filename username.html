<script>
const BASE_URL = "https://us-central1-galmet-app.cloudfunctions.net";

function saveStep2() {

  const nickname = document.getElementById("nickname").value;

  if (!nickname || nickname.length < 3) {
    alert("Enter valid nickname");
    return;
  }

  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    alert("User not found");
    return;
  }

  fetch(BASE_URL + "/updateUserStep2", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: user.email,
      username: nickname,
      age: 18   // simple for now (later we upgrade DOB)
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.success) {

      user.username = nickname;
      localStorage.setItem("user", JSON.stringify(user));

      window.location.href = "setup.html";

    } else {
      alert("Failed");
    }

  })
  .catch(() => alert("Error"));
}
</script>
