<script>

const BASE_URL = "https://us-central1-galmet-app.cloudfunctions.net";

let selectedCountry = null;

/* ---------------- WHEEL INIT ---------------- */

function initWheels(){

  const dayWheel = document.getElementById("dayWheel");
  const monthWheel = document.getElementById("monthWheel");
  const yearWheel = document.getElementById("yearWheel");

  const spacer = '<div class="spacer"></div>';

  // DAY
  let days = spacer;
  for(let i=1;i<=31;i++){
    days += `<div class="item day w-full">${i}</div>`;
  }
  dayWheel.innerHTML = days + spacer;

  // MONTH
  const months = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  let monthHTML = spacer;
  months.forEach(m=>{
    monthHTML += `<div class="item month w-full">${m}</div>`;
  });
  monthWheel.innerHTML = monthHTML + spacer;

  // YEAR
  let years = spacer;
  for(let y=1980;y<=2025;y++){
    years += `<div class="item year w-full">${y}</div>`;
  }
  yearWheel.innerHTML = years + spacer;

  // ✅ scroll to center AFTER render
  setTimeout(scrollToCenter, 50);
}

/* ---------------- CENTER SCROLL ---------------- */

function scrollToCenter(){
  ["dayWheel","monthWheel","yearWheel"].forEach(id=>{
    const el = document.getElementById(id);
    el.scrollTop = el.scrollHeight / 2;
  });
}

/* ---------------- GET CENTER VALUE ---------------- */

function getCenterValue(container, className){

  const items = container.querySelectorAll("." + className);

  let closest = null;
  let closestOffset = Infinity;

  const center = container.getBoundingClientRect().top + container.offsetHeight/2;

  items.forEach(el=>{
    const rect = el.getBoundingClientRect();
    const offset = Math.abs(center - (rect.top + rect.height/2));

    if(offset < closestOffset){
      closestOffset = offset;
      closest = el;
    }
  });

  return closest?.innerText;
}

/* ---------------- GET DOB ---------------- */

function getDOB(){

  const day = parseInt(getCenterValue(document.getElementById("dayWheel"), "day"));
  const monthText = getCenterValue(document.getElementById("monthWheel"), "month");
  const year = parseInt(getCenterValue(document.getElementById("yearWheel"), "year"));

  const map = {
    January:1, February:2, March:3, April:4, May:5, June:6,
    July:7, August:8, September:9, October:10, November:11, December:12
  };

  return {
    day,
    month: map[monthText],
    year
  };
}

/* ---------------- AGE ---------------- */

function calculateAge(day, month, year){
  const today = new Date();
  let age = today.getFullYear() - year;

  if(
    today.getMonth()+1 < month ||
    (today.getMonth()+1 === month && today.getDate() < day)
  ){
    age--;
  }

  return age;
}

/* ---------------- SAVE STEP ---------------- */

async function saveStep2(){

  const nickname = document.getElementById("nickname").value;

  if(!nickname || nickname.length < 3){
    alert("Enter valid nickname");
    return;
  }

  if(!selectedCountry){
    alert("Select country");
    return;
  }

  const dob = getDOB();

  if(!dob.day || !dob.month || !dob.year){
    alert("Select full date");
    return;
  }

  const age = calculateAge(dob.day, dob.month, dob.year);

  if(age < 18){
    alert("You must be 18+");
    return;
  }

  const user = JSON.parse(localStorage.getItem("user"));

  document.getElementById("loadingOverlay").classList.remove("hidden");

  try{

    const res = await fetch(BASE_URL + "/updateUserStep2",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        email: user.email,
        username: nickname,
        country: selectedCountry,
        dob,
        age
      })
    });

    const data = await res.json();

    if(data.success){

      user.username = nickname;
      user.country = selectedCountry;

      localStorage.setItem("user", JSON.stringify(user));

      window.location = "setup.html";

    }else{
      alert(data.message || "Username taken");
      document.getElementById("loadingOverlay").classList.add("hidden");
    }

  }catch(e){
    alert("Error saving");
    document.getElementById("loadingOverlay").classList.add("hidden");
  }
}

/* ---------------- COUNTRY ---------------- */

function openCountryPage(){
  window.location = "country.html";
}

/* ---------------- LOAD COUNTRY ---------------- */

function loadCountry(){

  const country = JSON.parse(localStorage.getItem("selectedCountry"));

  if(country){
    selectedCountry = country;
    document.getElementById("countryName").innerText = country.name;
    document.getElementById("countryFlag").innerText = country.flag;
  }
}

/* ---------------- INIT ---------------- */

document.addEventListener("DOMContentLoaded", ()=>{
  initWheels();
  loadCountry();
});

window.onpageshow = loadCountry;

</script>
