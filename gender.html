<script>

const BASE_URL = "https://us-central1-galmet-app.cloudfunctions.net";

let selectedGender = "";

// SELECT GENDER
function selectGender(gender){

  selectedGender = gender;

  // RESET ALL
  document.querySelectorAll(".gender-card").forEach(card=>{
    card.classList.remove("border-cyan-500");
  });

  document.querySelectorAll("[id^='check-']").forEach(c=>{
    c.classList.add("hidden");
  });

  // APPLY SELECTED
  document.getElementById("card-" + gender)
    .classList.add("border-cyan-500");

  document.getElementById("check-" + gender)
    .classList.remove("hidden");

}

// SAVE GENDER
async function saveGender(){

  if(!selectedGender){
    alert("Please select gender");
    return;
  }

  const user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    alert("User not found. Login again.");
    window.location = "index.html";
    return;
  }

  try{
    const res = await fetch(BASE_URL + "/updateUser",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        email: user.email,
        gender: selectedGender
      })
    });

    const data = await res.json();

    if(data.success){
      user.gender = selectedGender;
      localStorage.setItem("user", JSON.stringify(user));

      window.location.href = "username.html";
    } else {
      alert("Failed to save gender");
    }

  } catch(e){
    console.error(e);
    alert("Error saving gender");
  }
}

</script>
