<!DOCTYPE html>
<html>
<head>
<title>Withdraw</title>

<style>
body{
    background:#0b1f4b;
    color:#fff;
    font-family:Arial;
    padding:20px;
}

.box{
    background:#111;
    padding:20px;
    border-radius:10px;
}

input{
    padding:12px;
    margin:10px 0;
    width:100%;
    border-radius:6px;
    border:none;
}

button{
    background:#4cd964;
    padding:12px;
    border:none;
    width:100%;
    border-radius:8px;
    color:white;
    font-weight:bold;
}

.note{
    font-size:13px;
    opacity:0.7;
}
</style>
</head>

<body>

<h2>💸 Withdraw Coins</h2>

<div class="box">

<p>Minimum Withdraw: <b>65,000 Coins = 10 USDT</b></p>
<p class="note">Enter your TRC20 wallet address correctly</p>

<input id="amount" placeholder="Enter coins (e.g. 65000)">
<input id="wallet" placeholder="Enter TRC20 Wallet Address">

<button onclick="withdraw()">Submit Withdraw</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
  authDomain: "galmet-app.firebaseapp.com",
  projectId: "galmet-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ===============================
// 🔥 FETCH USER DATA
// ===============================
async function fetchUserData(){

    const user = auth.currentUser;

    if(!user){
        alert("Login required");
        return null;
    }

    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);

    return snap.data();
}

// ===============================
// 🚀 WITHDRAW FUNCTION (FIXED)
// ===============================
window.withdraw = async function(){

    const amount = Number(document.getElementById("amount").value);
    const wallet = document.getElementById("wallet").value;

    if(!amount || !wallet){
        alert("Enter all fields");
        return;
    }

    // ✅ MINIMUM CHECK
    if(amount < 65000){
        alert("Minimum withdraw is 65,000 coins (10 USDT)");
        return;
    }

    try{

        const userData = await fetchUserData();

        if(!userData){
            alert("User not found");
            return;
        }

        // ✅ BALANCE CHECK
        if(userData.coins < amount){
            alert("Not enough balance");
            return;
        }

        const res = await fetch("https://createwithdraw-k3vzdssfra-uc.a.run.app",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                userId: userData.userId,
                amount: amount,
                wallet: wallet
            })
        });

        const data = await res.json();

        if(data.success){
            alert("Withdraw request submitted ✅");

            // 🔥 CLEAR INPUT
            document.getElementById("amount").value="";
            document.getElementById("wallet").value="";
        }else{
            alert(data.error || "Error");
        }

    }catch(e){
        console.log(e);
        alert("Request failed");
    }

};

</script>

</body>
</html>
