<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet – Lucky Spin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f3f7fb", "surface-container-low": "#ecf1f6",
            "surface-container-lowest": "#ffffff", "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60", "primary": "#006571",
            "primary-container": "#00e3fd", "primary-dim": "#005863",
            "secondary": "#755700", "tertiary": "#b60051",
            "outline": "#73777b", "outline-variant": "#a9aeb1"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spin-animation {
      animation: spin 0.5s cubic-bezier(0.4, 2.0, 0.6, 1) 3;
    }
    .multiplier-card {
      transition: all 0.2s ease;
    }
    .multiplier-card.highlight {
      transform: scale(1.05);
      background: #00e3fd30;
      border-color: #006571;
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center">

<!-- Top Bar -->
<header class="w-full max-w-md mx-auto flex justify-between items-center px-6 h-16">
  <button onclick="window.location.href='dashboard.html'" class="text-primary">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>
  <h1 class="text-xl font-bold bg-gradient-to-r from-primary to-primary-dim bg-clip-text text-transparent">Lucky Spin</h1>
  <div class="w-6"></div>
</header>

<!-- Main Game Area -->
<main class="flex-1 w-full max-w-md mx-auto px-4 py-4 flex flex-col items-center gap-5">
  <!-- User Coins Display -->
  <div class="w-full bg-surface-container-lowest rounded-2xl p-3 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-primary">account_balance_wallet</span>
      <span class="text-sm font-medium">Your Coins</span>
    </div>
    <span id="userCoins" class="text-2xl font-bold text-primary">0</span>
  </div>

  <!-- Multipliers Showcase (The Wheel / Prizes) -->
  <div class="w-full bg-surface-container-low rounded-2xl p-4">
    <h2 class="text-center font-headline font-bold text-lg mb-3">⚡ Prize Multipliers ⚡</h2>
    <div class="grid grid-cols-3 gap-3">
      <div class="multiplier-card bg-white rounded-xl p-3 text-center border border-outline-variant/20 shadow-sm">
        <span class="text-2xl font-black text-tertiary">0x</span>
        <p class="text-[10px] text-outline">Try again</p>
      </div>
      <div class="multiplier-card bg-white rounded-xl p-3 text-center border border-outline-variant/20 shadow-sm">
        <span class="text-2xl font-black text-secondary">1x</span>
        <p class="text-[10px] text-outline">Get your bet back</p>
      </div>
      <div class="multiplier-card bg-white rounded-xl p-3 text-center border border-outline-variant/20 shadow-sm">
        <span class="text-2xl font-black text-secondary">2x</span>
        <p class="text-[10px] text-outline">Double up</p>
      </div>
      <div class="multiplier-card bg-white rounded-xl p-3 text-center border border-outline-variant/20 shadow-sm">
        <span class="text-2xl font-black text-secondary">3x</span>
        <p class="text-[10px] text-outline">Triple win</p>
      </div>
      <div class="multiplier-card bg-white rounded-xl p-3 text-center border border-outline-variant/20 shadow-sm">
        <span class="text-2xl font-black text-primary">5x</span>
        <p class="text-[10px] text-outline">Hot streak!</p>
      </div>
      <div class="multiplier-card bg-white rounded-xl p-3 text-center border border-outline-variant/20 shadow-sm">
        <span class="text-2xl font-black text-tertiary">10x</span>
        <p class="text-[10px] text-outline">JACKPOT!</p>
      </div>
    </div>
  </div>

  <!-- Bet Amount Selector -->
  <div class="w-full bg-surface-container-lowest rounded-2xl p-4">
    <label class="block text-[11px] font-label font-bold uppercase tracking-wider text-on-surface-variant mb-2">Your Bet</label>
    <div class="flex gap-2">
      <button id="betSmall" data-bet="10" class="flex-1 py-2 rounded-full bg-surface-container-low text-sm font-bold transition-all">🟢 Small (10)</button>
      <button id="betMedium" data-bet="50" class="flex-1 py-2 rounded-full bg-surface-container-low text-sm font-bold transition-all">🟡 Medium (50)</button>
      <button id="betHigh" data-bet="200" class="flex-1 py-2 rounded-full bg-surface-container-low text-sm font-bold transition-all">🔴 High (200)</button>
    </div>
    <p id="riskNote" class="text-[10px] text-outline text-center mt-2">Higher risk = bigger rewards, but also higher chance of loss</p>
  </div>

  <!-- Spin Button -->
  <button id="spinBtn" class="w-full py-4 bg-gradient-to-r from-primary to-primary-dim text-white rounded-full font-headline font-bold text-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
    <span class="material-symbols-outlined">casino</span>
    SPIN THE WHEEL
  </button>

  <!-- Result Display -->
  <div id="resultCard" class="w-full bg-surface-container-lowest rounded-2xl p-4 text-center hidden">
    <p id="resultMessage" class="text-lg font-bold"></p>
    <p id="resultDetail" class="text-sm text-outline mt-1"></p>
  </div>
</main>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="fixed inset-0 bg-surface/80 backdrop-blur-md flex flex-col items-center justify-center hidden z-[100]">
  <div class="relative">
    <div class="w-24 h-24 rounded-full border-4 border-primary-container border-t-primary animate-spin"></div>
    <div class="absolute inset-0 flex items-center justify-center">
      <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings:'FILL'1">casino</span>
    </div>
  </div>
  <p class="mt-8 font-headline font-bold text-2xl text-primary animate-bounce">Spinning...</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // Firebase config
  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);

  // Check login
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user || !user.userId) {
    window.location.replace("login.html");
  }
  const userId = user.userId.toString();
  const userRef = doc(db, "users", userId);

  // DOM elements
  const coinsSpan = document.getElementById("userCoins");
  const spinBtn = document.getElementById("spinBtn");
  const betSmall = document.getElementById("betSmall");
  const betMedium = document.getElementById("betMedium");
  const betHigh = document.getElementById("betHigh");
  const resultCard = document.getElementById("resultCard");
  const resultMessage = document.getElementById("resultMessage");
  const resultDetail = document.getElementById("resultDetail");
  const loadingOverlay = document.getElementById("loadingOverlay");

  let currentBet = 10; // default small
  let userCoins = 0;

  // Update UI with user coins
  async function loadUserCoins() {
    const snap = await getDoc(userRef);
    if (snap.exists()) {
      userCoins = snap.data().coins || 0;
      coinsSpan.innerText = userCoins;
    }
  }

  // Highlight selected bet
  function highlightBet(selected) {
    [betSmall, betMedium, betHigh].forEach(btn => {
      btn.classList.remove("bg-primary-container", "text-on-primary-container");
      btn.classList.add("bg-surface-container-low");
    });
    selected.classList.remove("bg-surface-container-low");
    selected.classList.add("bg-primary-container", "text-on-primary-container");
  }

  betSmall.onclick = () => { currentBet = 10; highlightBet(betSmall); updateRiskNote(); };
  betMedium.onclick = () => { currentBet = 50; highlightBet(betMedium); updateRiskNote(); };
  betHigh.onclick = () => { currentBet = 200; highlightBet(betHigh); updateRiskNote(); };

  function updateRiskNote() {
    const note = document.getElementById("riskNote");
    if (currentBet === 10) note.innerText = "🟢 Low risk – mostly 0x, 1x, 2x 5x 10x.";
    else if (currentBet === 50) note.innerText = "🟡 Medium risk – balanced chances for 1x to 10x.";
    else note.innerText = "🔴 High risk – higher chance of BigWin!";
  }
  updateRiskNote();

  // Probability tables based on bet amount
  function getMultiplier(bet) {
    let r = Math.random() * 100;
    if (bet === 10) { // small bet: mostly 0x, some 1x,2x, rare higher
      if (r < 45) return 0;      // 45% loss
      else if (r < 70) return 1; // 25% 1x
      else if (r < 85) return 2; // 15% 2x
      else if (r < 95) return 3; // 10% 3x
      else if (r < 98) return 5; // 3% 5x
      else return 10;            // 2% 10x
    } else if (bet === 50) { // medium: more balanced
      if (r < 35) return 0;
      else if (r < 55) return 1;
      else if (r < 70) return 2;
      else if (r < 82) return 3;
      else if (r < 92) return 5;
      else return 10;
    } else { // high bet: higher risk but higher reward potential
      if (r < 50) return 0;      // 50% loss
      else if (r < 65) return 1; // 15% 1x
      else if (r < 75) return 2; // 10% 2x
      else if (r < 85) return 3; // 10% 3x
      else if (r < 95) return 5; // 10% 5x
      else return 10;            // 5% 10x
    }
  }

  // Add animation to multiplier cards
  function animateMultiplier(multiplier) {
    const cards = document.querySelectorAll('.multiplier-card');
    cards.forEach(card => {
      const value = parseInt(card.querySelector('span')?.innerText);
      if (value === multiplier) {
        card.classList.add('highlight');
        setTimeout(() => card.classList.remove('highlight'), 800);
      }
    });
  }

  // Main spin logic
  async function spin() {
    if (userCoins < currentBet) {
      alert(`Not enough coins! You need ${currentBet} coins.`);
      return;
    }
    // Deduct bet immediately in UI and firestore
    const newCoinsAfterDeduct = userCoins - currentBet;
    coinsSpan.innerText = newCoinsAfterDeduct;
    userCoins = newCoinsAfterDeduct;
    await updateDoc(userRef, { coins: increment(-currentBet) });
    // Update local storage
    user.coins = newCoinsAfterDeduct;
    localStorage.setItem("user", JSON.stringify(user));

    // Show loading + spin animation
    loadingOverlay.classList.remove("hidden");
    spinBtn.disabled = true;

    // Simulate spin delay (realistic)
    setTimeout(async () => {
      const multiplier = getMultiplier(currentBet);
      const winAmount = multiplier * currentBet;
      let finalCoins = userCoins;
      let message = "";
      let detail = "";

      if (multiplier === 0) {
        message = "😢 Oh no! You lost this round.";
        detail = `You bet ${currentBet} coins and got 0x. Better luck next time!`;
      } else {
        // Add winnings
        finalCoins = userCoins + winAmount;
        await updateDoc(userRef, { coins: increment(winAmount) });
        user.coins = finalCoins;
        localStorage.setItem("user", JSON.stringify(user));
        userCoins = finalCoins;
        coinsSpan.innerText = finalCoins;
        message = `🎉 You won ${winAmount} coins! (${multiplier}x) 🎉`;
        detail = `You bet ${currentBet} coins and hit a ${multiplier}x multiplier!`;
      }
      // Update final coins display
      coinsSpan.innerText = finalCoins;
      resultMessage.innerText = message;
      resultDetail.innerText = detail;
      resultCard.classList.remove("hidden");
      animateMultiplier(multiplier);

      loadingOverlay.classList.add("hidden");
      spinBtn.disabled = false;
    }, 800);
  }

  spinBtn.onclick = spin;
  loadUserCoins();
</script>
</body>
</html>
