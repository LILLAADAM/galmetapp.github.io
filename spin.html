<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galmet Wheel PRO | Real Economy</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        :root {
            --bg-primary: #f5f7fe;
            --bg-secondary: #ffffff;
            --card-bg: #ffffffdd;
            --text-primary: #1e2a3e;
            --text-secondary: #2c3e50;
            --accent: #ffc107;
            --accent-dark: #e6a800;
            --border-light: #e2e8f0;
            --shadow: 0 8px 20px rgba(0,0,0,0.1);
            --topbar-bg: #2c3e8f;
            --topbar-text: white;
            --button-spin: linear-gradient(135deg, #2ecc71, #27ae60);
            --button-topup: linear-gradient(135deg, #f39c12, #e67e22);
        }

        body.dark {
            --bg-primary: #0a0f1f;
            --bg-secondary: #111827;
            --card-bg: #1f2937cc;
            --text-primary: #f0f3fa;
            --text-secondary: #cbd5e1;
            --accent: #ffcd4a;
            --accent-dark: #ffb347;
            --border-light: #2d3748;
            --shadow: 0 8px 20px rgba(0,0,0,0.5);
            --topbar-bg: #0f172a;
            --topbar-text: #facc15;
            --button-spin: linear-gradient(135deg, #3b82f6, #2563eb);
            --button-topup: linear-gradient(135deg, #f97316, #ea580c);
        }

        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        .topbar {
            background: var(--topbar-bg);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 2px solid var(--accent);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            border-radius: 0 0 24px 24px;
            color: var(--topbar-text);
        }

        .theme-toggle {
            background: var(--accent);
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            border-radius: 40px;
            padding: 5px 12px;
            font-weight: bold;
            color: #1e293b;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        .wheel-container {
            width: 300px;
            height: 300px;
            margin: 30px auto 15px;
            position: relative;
            filter: drop-shadow(var(--shadow));
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 8px var(--bg-secondary), 0 0 0 14px var(--accent), 0 18px 32px black;
            transition: transform 4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        #pointer {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            filter: drop-shadow(0 4px 6px black);
            z-index: 12;
            color: #ffdd77;
            text-shadow: 0 0 4px black;
        }

        .bet-panel {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-flex;
            gap: 16px;
            align-items: baseline;
            margin: 15px auto;
            border: 1px solid var(--accent);
        }

        .bet-panel label {
            font-weight: bold;
            font-size: 1.2rem;
        }

        input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            padding: 10px 16px;
            font-size: 1.2rem;
            width: 110px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            font-family: monospace;
        }

        button {
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            margin: 8px 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            color: white;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        .spinBtn {
            background: var(--button-spin);
        }

        .topupBtn {
            background: var(--button-topup);
        }

        .result-area {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            font-size: 1.3rem;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 60px;
            display: inline-block;
            margin: 12px auto;
            border-left: 6px solid var(--accent);
            border-right: 6px solid var(--accent);
        }

        .info-box {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 10px 16px;
            margin: 15px auto;
            width: 90%;
            max-width: 480px;
            text-align: left;
            border: 1px solid var(--accent);
        }

        .info-box h4 {
            margin: 0 0 8px 0;
            color: var(--accent);
            text-align: center;
        }

        .history-scroll, .players-scroll {
            max-height: 85px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
            padding: 5px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .history-scroll span, .players-scroll span {
            background: var(--bg-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--text-primary);
            border-left: 3px solid var(--accent);
        }

        footer {
            font-size: 11px;
            opacity: 0.7;
            margin: 20px 0 10px;
            color: var(--text-secondary);
        }

        .low-coins {
            color: #e67e22;
            font-weight: bold;
            margin-top: 5px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div>🎡 GALMET WHEEL</div>
    <div>💰 COINS: <span id="coins">0</span></div>
    <button class="theme-toggle" id="themeToggle" aria-label="Switch theme">🌓</button>
</div>

<div class="wheel-container">
    <div id="pointer">▼</div>
    <canvas id="wheelCanvas" width="300" height="300"></canvas>
</div>

<div class="bet-panel">
    <label>⚡ BET</label>
    <input id="bet" value="50" type="number" min="10" step="10">
</div>

<div>
    <button class="spinBtn" id="spinBtn">🎲 SPIN</button>
    <button class="topupBtn" id="topupBtn">💎 TOP UP</button>
</div>

<div id="result" class="result-area">✨ SPIN TO WIN ✨</div>

<div class="info-box">
    <h4>📜 RECENT WINS</h4>
    <div id="history" class="history-scroll">—</div>
</div>

<div class="info-box">
    <h4>🎲 LIVE FEED (players)</h4>
    <div id="players" class="players-scroll">⚡ waiting for action...</div>
</div>
<footer>⚡ fair spin · pointer decides reward ⚡</footer>

<script type="module">
    // ================= FIREBASE =================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
        authDomain: "galmet-app.firebaseapp.com",
        projectId: "galmet-app",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let coins = 0;
    let userRef = null;
    let spinning = false;

    // ================= WHEEL SEGMENTS =================
    const segments = [
        { value: 0, color: "#e34d4d" },
        { value: 1, color: "#f4b942" },
        { value: 2, color: "#48b54a" },
        { value: 3, color: "#ff8833" },
        { value: 5, color: "#3b8bc0" },
        { value: 10, color: "#aa6dc9" }
    ];
    const SEGMENT_COUNT = segments.length;
    const ANGLE_PER_SEGMENT = 360 / SEGMENT_COUNT; // 60°
    const POINTER_ANGLE = 270; // pointer at top

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const size = 300;
    canvas.width = size;
    canvas.height = size;

    // ================= DRAW WHEEL =================
    function drawWheel() {
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size / 2;

        for (let i = 0; i < SEGMENT_COUNT; i++) {
            const start = i * (Math.PI * 2 / SEGMENT_COUNT);
            const end = start + (Math.PI * 2 / SEGMENT_COUNT);

            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, start, end);
            ctx.closePath();
            ctx.fillStyle = segments[i].color;
            ctx.fill();
            ctx.strokeStyle = "#ffdd99";
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.save();
            ctx.translate(centerX, centerY);
            const midAngle = start + (Math.PI / SEGMENT_COUNT);
            const textRadius = radius * 0.7;
            const x = Math.cos(midAngle) * textRadius;
            const y = Math.sin(midAngle) * textRadius;
            ctx.translate(x, y);
            ctx.rotate(midAngle + Math.PI / 2);
            ctx.font = "bold 18px 'Segoe UI', system-ui";
            ctx.fillStyle = "white";
            ctx.shadowBlur = 0;
            ctx.fillText(segments[i].value + "x", -12, 6);
            ctx.restore();
        }

        ctx.beginPath();
        ctx.arc(centerX, centerY, 28, 0, 2 * Math.PI);
        ctx.fillStyle = "#ffcf40";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX, centerY, 18, 0, 2 * Math.PI);
        ctx.fillStyle = "#2c2e4e";
        ctx.fill();
        ctx.fillStyle = "gold";
        ctx.font = "bold 20px monospace";
        ctx.fillText("★", centerX - 8, centerY + 8);
    }
    drawWheel();

    // ================= CONTROLLED MULTIPLIER (exactly as provided) =================
    function getControlledMultiplier(bet) {
        if (bet >= 1000) {
            const r = Math.random();
            if (r < 0.60) return 0;
            if (r < 0.80) return 1;
            if (r < 0.92) return 2;
            if (r < 0.98) return 3;
            if (r < 0.995) return 5;
            return 10;
        }

        const r = Math.random();
        if (r < 0.40) return 0;
        if (r < 0.65) return 1;
        if (r < 0.85) return 2;
        if (r < 0.95) return 3;
        if (r < 0.99) return 5;
        return 10;
    }

    // ================= COINS (Firebase only, update only once per spin) =================
    async function updateCoinsInFirestore() {
        if (userRef) {
            await updateDoc(userRef, { coins: coins });
        }
    }

    function updateCoinsUI() {
        document.getElementById("coins").innerText = coins;
    }

    // ================= SPIN LOGIC (controlled multiplier + rotation) =================
    async function spin() {
        if (spinning) return;

        const betInput = document.getElementById("bet");
        let bet = parseInt(betInput.value);
        if (isNaN(bet) || bet < 10) {
            alert("Minimum bet is 10");
            return;
        }
        if (bet > coins) {
            alert("❌ Insufficient coins! Please top up to continue playing.");
            window.location.href = "topup.html";
            return;
        }

        spinning = true;

        // --- Deduct bet locally (Firestore will be updated later) ---
        coins -= bet;
        updateCoinsUI();

        // --- Determine multiplier (controlled) ---
        const multiplier = getControlledMultiplier(bet);
        const winningIdx = segments.findIndex(s => s.value === multiplier);
        if (winningIdx === -1) {
            // fallback (should never happen)
            console.error("Segment not found");
            spinning = false;
            return;
        }

        // Calculate center angle of winning segment (in degrees)
        const segmentCenter = winningIdx * ANGLE_PER_SEGMENT + ANGLE_PER_SEGMENT / 2;
        // Desired rotation to bring that center under pointer (270°)
        let targetRotation = (POINTER_ANGLE - segmentCenter) % 360;
        if (targetRotation < 0) targetRotation += 360;

        // Add extra full spins for visual effect
        const fullSpins = 360 * 5;
        const totalRotation = fullSpins + targetRotation;

        // Reset wheel animation
        canvas.style.transition = "none";
        canvas.style.transform = "rotate(0deg)";
        void canvas.offsetHeight;

        // Animate
        canvas.style.transition = "transform 4s cubic-bezier(0.22, 0.98, 0.35, 1.05)";
        canvas.style.transform = `rotate(${totalRotation}deg)`;

        // After spin ends
        setTimeout(async () => {
            const winAmount = bet * multiplier;

            if (multiplier > 0) {
                coins += winAmount;
            }
            // Update Firestore only once, after final coin change
            await updateCoinsInFirestore();
            updateCoinsUI();

            // Update result display
            const resultDiv = document.getElementById("result");
            if (multiplier === 0) {
                resultDiv.innerHTML = `💀 LOST ${bet} coins · 0x 💀`;
            } else {
                resultDiv.innerHTML = `🎉 YOU WON ${winAmount} COINS (${multiplier}x) 🎉`;
            }

            // Update history
            const historyBox = document.getElementById("history");
            const newEntry = document.createElement("span");
            newEntry.textContent = multiplier === 0 ? `💀 0x (lost ${bet})` : `🏆 ${multiplier}x +${winAmount}`;
            if (historyBox.innerHTML === "—") historyBox.innerHTML = "";
            historyBox.prepend(newEntry);
            if (historyBox.children.length > 12) historyBox.removeChild(historyBox.lastChild);

            spinning = false;
        }, 4100);
    }

    // ================= FAKE PLAYER FEED =================
    function updateFakePlayers() {
        const fakeNames = ["Kai 🔥", "Alex ⚡", "Lee 🎯", "Sam 💎", "Sara 🌟", "John 🃏", "Mia 🎲", "Zane 🧧"];
        const randomName = fakeNames[Math.floor(Math.random() * fakeNames.length)];
        const possibleValues = [0, 1, 2, 3, 5, 10];
        const randomMult = possibleValues[Math.floor(Math.random() * possibleValues.length)];
        const winText = randomMult === 0 ? `lost 😵` : `won ${randomMult}x 🎉`;
        const playersBox = document.getElementById("players");
        const newFeed = document.createElement("span");
        newFeed.textContent = `${randomName} ${winText}`;
        if (playersBox.innerHTML === "⚡ waiting for action...") playersBox.innerHTML = "";
        playersBox.prepend(newFeed);
        if (playersBox.children.length > 8) playersBox.removeChild(playersBox.lastChild);
    }
    setInterval(updateFakePlayers, 2500);

    // ================= AUTH & INIT (SINGLE LISTENER) =================
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }

        userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);
        let data = snap.data();

        if (!data || data.coins === undefined || data.coins === null) {
            // New user: start with 0 coins, no freebies
            await setDoc(userRef, { coins: 0 }, { merge: true });
            coins = 0;
        } else {
            coins = data.coins;
        }
        updateCoinsUI();
    });

    // ================= EVENT LISTENERS =================
    document.getElementById("spinBtn").addEventListener("click", spin);
    document.getElementById("topupBtn").addEventListener("click", () => {
        window.location.href = "topup.html";
    });

    // ================= THEME SWITCH =================
    const themeToggle = document.getElementById("themeToggle");
    themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        localStorage.setItem("galmetTheme", isDark ? "dark" : "light");
    });
    const savedTheme = localStorage.getItem("galmetTheme");
    if (savedTheme === "dark") document.body.classList.add("dark");

    // Reset wheel visual on load
    window.addEventListener("load", () => {
        canvas.style.transform = "rotate(0deg)";
        drawWheel();
    });
</script>
</body>
</html>
