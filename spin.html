<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galmet Wheel PRO | Theme Switch</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        /* Light theme (default) */
        :root {
            --bg-primary: #f5f7fe;
            --bg-secondary: #ffffff;
            --card-bg: #ffffffdd;
            --text-primary: #1e2a3e;
            --text-secondary: #2c3e50;
            --accent: #ffc107;
            --accent-dark: #e6a800;
            --border-light: #e2e8f0;
            --shadow: 0 8px 20px rgba(0,0,0,0.1);
            --topbar-bg: #2c3e8f;
            --topbar-text: white;
            --button-spin: linear-gradient(135deg, #2ecc71, #27ae60);
            --button-reset: linear-gradient(135deg, #e67e22, #d35400);
        }

        body.dark {
            --bg-primary: #0a0f1f;
            --bg-secondary: #111827;
            --card-bg: #1f2937cc;
            --text-primary: #f0f3fa;
            --text-secondary: #cbd5e1;
            --accent: #ffcd4a;
            --accent-dark: #ffb347;
            --border-light: #2d3748;
            --shadow: 0 8px 20px rgba(0,0,0,0.5);
            --topbar-bg: #0f172a;
            --topbar-text: #facc15;
            --button-spin: linear-gradient(135deg, #3b82f6, #2563eb);
            --button-reset: linear-gradient(135deg, #ef4444, #dc2626);
        }

        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        .topbar {
            background: var(--topbar-bg);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 2px solid var(--accent);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            border-radius: 0 0 24px 24px;
            color: var(--topbar-text);
        }

        .theme-toggle {
            background: var(--accent);
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            border-radius: 40px;
            padding: 5px 12px;
            font-weight: bold;
            color: #1e293b;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        .wheel-container {
            width: 300px;
            height: 300px;
            margin: 30px auto 15px;
            position: relative;
            filter: drop-shadow(var(--shadow));
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 8px var(--bg-secondary), 0 0 0 14px var(--accent), 0 18px 32px black;
            transition: transform 4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        #pointer {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            filter: drop-shadow(0 4px 6px black);
            z-index: 12;
            color: #ffdd77;
            text-shadow: 0 0 4px black;
        }

        .bet-panel {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-flex;
            gap: 16px;
            align-items: baseline;
            margin: 15px auto;
            border: 1px solid var(--accent);
        }

        .bet-panel label {
            font-weight: bold;
            font-size: 1.2rem;
        }

        input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            padding: 10px 16px;
            font-size: 1.2rem;
            width: 110px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            font-family: monospace;
        }

        button {
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            margin: 8px 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            color: white;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        .spinBtn {
            background: var(--button-spin);
        }

        .resetBtn {
            background: var(--button-reset);
        }

        .result-area {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            font-size: 1.3rem;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 60px;
            display: inline-block;
            margin: 12px auto;
            border-left: 6px solid var(--accent);
            border-right: 6px solid var(--accent);
        }

        .info-box {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 10px 16px;
            margin: 15px auto;
            width: 90%;
            max-width: 480px;
            text-align: left;
            border: 1px solid var(--accent);
        }

        .info-box h4 {
            margin: 0 0 8px 0;
            color: var(--accent);
            text-align: center;
        }

        .history-scroll, .players-scroll {
            max-height: 85px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
            padding: 5px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .history-scroll span, .players-scroll span {
            background: var(--bg-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--text-primary);
            border-left: 3px solid var(--accent);
        }

        footer {
            font-size: 11px;
            opacity: 0.7;
            margin: 20px 0 10px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<div class="topbar">
    <div>🎡 GALMET WHEEL</div>
    <div>💰 COINS: <span id="coins">0</span></div>
    <button class="theme-toggle" id="themeToggle" aria-label="Switch theme">🌓</button>
</div>

<div class="wheel-container">
    <div id="pointer">▼</div>
    <canvas id="wheelCanvas" width="300" height="300"></canvas>
</div>

<div class="bet-panel">
    <label>⚡ BET</label>
    <input id="bet" value="50" type="number" min="10" step="10">
</div>

<div>
    <button class="spinBtn" onclick="spin()">🎲 SPIN</button>
    <button class="resetBtn" onclick="resetCoins()">🔄 RESET COINS</button>
</div>

<div id="result" class="result-area">✨ SPIN TO WIN ✨</div>

<div class="info-box">
    <h4>📜 RECENT WINS</h4>
    <div id="history" class="history-scroll">—</div>
</div>

<div class="info-box">
    <h4>🎲 LIVE FEED (players)</h4>
    <div id="players" class="players-scroll">⚡ waiting for action...</div>
</div>
<footer>⚡ fair spin · pointer decides reward ⚡</footer>

<script>
    // ---------- WHEEL SEGMENTS (multipliers) ----------
    const segments = [
        { value: 0, color: "#e34d4d" },   // 0x  (red)
        { value: 1, color: "#f4b942" },   // 1x  (orange)
        { value: 2, color: "#48b54a" },   // 2x  (green)
        { value: 3, color: "#ff8833" },   // 3x  (deep orange)
        { value: 5, color: "#3b8bc0" },   // 5x  (blue)
        { value: 10, color: "#aa6dc9" }   // 10x (purple)
    ];

    const SEGMENT_COUNT = segments.length;
    const ANGLE_PER_SEGMENT_DEG = 360 / SEGMENT_COUNT;   // 60°

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const size = 300;
    canvas.width = size;
    canvas.height = size;

    let coins = parseInt(localStorage.getItem("galmetCoins")) || 500;
    let spinning = false;

    document.getElementById("coins").innerText = coins;

    // Draw wheel with given segment colors
    function drawWheel() {
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size / 2;
        const startRadOffset = 0;
        
        for (let i = 0; i < SEGMENT_COUNT; i++) {
            const startRad = startRadOffset + i * (Math.PI * 2 / SEGMENT_COUNT);
            const endRad = startRad + (Math.PI * 2 / SEGMENT_COUNT);
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startRad, endRad);
            ctx.closePath();
            ctx.fillStyle = segments[i].color;
            ctx.fill();
            ctx.strokeStyle = "#ffdd99";
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            ctx.save();
            ctx.translate(centerX, centerY);
            const midRad = startRad + (Math.PI / SEGMENT_COUNT);
            const textRadius = radius * 0.68;
            const xPos = Math.cos(midRad) * textRadius;
            const yPos = Math.sin(midRad) * textRadius;
            ctx.translate(xPos, yPos);
            ctx.rotate(midRad + Math.PI / 2);
            ctx.font = "bold 18px 'Segoe UI', system-ui";
            ctx.fillStyle = "white";
            ctx.shadowBlur = 0;
            let multiplierText = segments[i].value + "x";
            if (segments[i].value === 0) multiplierText = "💀0x";
            ctx.fillText(multiplierText, -12, 6);
            ctx.restore();
        }
        
        // center decoration
        ctx.beginPath();
        ctx.arc(centerX, centerY, 28, 0, 2 * Math.PI);
        ctx.fillStyle = "#ffcf40";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX, centerY, 18, 0, 2 * Math.PI);
        ctx.fillStyle = "#2c2e4e";
        ctx.fill();
        ctx.fillStyle = "gold";
        ctx.font = "bold 20px monospace";
        ctx.fillText("★", centerX-8, centerY+8);
    }
    
    drawWheel();

    // Determine winning segment based on final rotation (pointer at 270°)
    function getSegmentIndexFromRotation(rotationDeg) {
        const pointerAngle = 270;
        let rawAngle = (pointerAngle - rotationDeg) % 360;
        if (rawAngle < 0) rawAngle += 360;
        for (let i = 0; i < SEGMENT_COUNT; i++) {
            const start = i * ANGLE_PER_SEGMENT_DEG;
            const end = (i + 1) * ANGLE_PER_SEGMENT_DEG;
            if (rawAngle >= start && rawAngle < end) return i;
        }
        return 0;
    }

    function updateCoinsUI() {
        document.getElementById("coins").innerText = coins;
        localStorage.setItem("galmetCoins", coins);
    }

    function saveCoins() {
        localStorage.setItem("galmetCoins", coins);
    }

    function resetCoins() {
        if (spinning) {
            alert("Wheel is spinning! Please wait.");
            return;
        }
        coins = 500;
        updateCoinsUI();
        document.getElementById("result").innerHTML = "✨ COINS RESET TO 500 ✨";
        document.getElementById("history").innerHTML = "—";
        canvas.style.transition = "none";
        canvas.style.transform = "rotate(0deg)";
        void canvas.offsetHeight;
        drawWheel();
    }

    // Main spin logic (fair & matches pointer)
    function spin() {
        if (spinning) return;
        
        let bet = parseInt(document.getElementById("bet").value);
        if (isNaN(bet) || bet <= 0) {
            alert("Enter a valid bet (minimum 10)");
            return;
        }
        if (bet > coins) {
            alert("Not enough coins!");
            return;
        }
        
        coins -= bet;
        updateCoinsUI();
        spinning = true;
        
        const fullSpins = 360 * 5;
        const randomLanding = Math.random() * 360;   // final resting angle (mod 360)
        const totalRotation = fullSpins + randomLanding;
        
        canvas.style.transition = "none";
        canvas.style.transform = "rotate(0deg)";
        void canvas.offsetHeight;
        canvas.style.transition = "transform 4s cubic-bezier(0.22, 0.98, 0.35, 1.05)";
        canvas.style.transform = `rotate(${totalRotation}deg)`;
        
        setTimeout(() => {
            const winningIdx = getSegmentIndexFromRotation(randomLanding);
            const multiplier = segments[winningIdx].value;
            const winAmount = bet * multiplier;
            
            if (multiplier > 0) {
                coins += winAmount;
            }
            updateCoinsUI();
            
            const resultDiv = document.getElementById("result");
            if (multiplier === 0) {
                resultDiv.innerHTML = `💀 LOST ${bet} coins · 0x 💀`;
            } else {
                resultDiv.innerHTML = `🎉 YOU WON ${winAmount} COINS (${multiplier}x) 🎉`;
            }
            
            // Add to history
            const historyBox = document.getElementById("history");
            const newEntry = document.createElement("span");
            newEntry.textContent = multiplier === 0 ? `💀 0x (lost ${bet})` : `🏆 ${multiplier}x +${winAmount}`;
            if (historyBox.innerHTML === "—") historyBox.innerHTML = "";
            historyBox.prepend(newEntry);
            if (historyBox.children.length > 12) historyBox.removeChild(historyBox.lastChild);
            
            spinning = false;
        }, 4100);
    }

    // Fake live feed (cosmetic)
    function updateFakePlayers() {
        const fakeNames = ["Kai 🔥", "Alex ⚡", "Lee 🎯", "Sam 💎", "Sara 🌟", "John 🃏", "Mia 🎲", "Zane 🧧"];
        const randomName = fakeNames[Math.floor(Math.random() * fakeNames.length)];
        const possibleValues = [0, 1, 2, 3, 5, 10];
        const randomMult = possibleValues[Math.floor(Math.random() * possibleValues.length)];
        const winText = randomMult === 0 ? `lost 😵` : `won ${randomMult}x 🎉`;
        
        const playersBox = document.getElementById("players");
        const newFeed = document.createElement("span");
        newFeed.textContent = `${randomName} ${winText}`;
        if (playersBox.innerHTML === "⚡ waiting for action...") playersBox.innerHTML = "";
        playersBox.prepend(newFeed);
        if (playersBox.children.length > 8) playersBox.removeChild(playersBox.lastChild);
    }
    setInterval(updateFakePlayers, 2500);

    // Theme switcher
    const themeToggle = document.getElementById("themeToggle");
    themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        // Optional: save preference
        const isDark = document.body.classList.contains("dark");
        localStorage.setItem("galmetTheme", isDark ? "dark" : "light");
    });
    
    // Load saved theme
    const savedTheme = localStorage.getItem("galmetTheme");
    if (savedTheme === "dark") {
        document.body.classList.add("dark");
    }
    
    // Initial UI setup
    window.addEventListener("load", () => {
        updateCoinsUI();
        canvas.style.transform = "rotate(0deg)";
        drawWheel();
        if (document.getElementById("history").innerHTML === "") document.getElementById("history").innerHTML = "—";
    });
    
    // Expose functions globally
    window.spin = spin;
    window.resetCoins = resetCoins;
</script>
</body>
</html>
