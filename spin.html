<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galmet Wheel</title>

<style>
body{
background:#060b2d;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.topbar{
background:#1c2fa3;
padding:12px;
display:flex;
justify-content:space-between;
font-size:18px;
}

#wheelBox{
width:260px;
height:260px;
margin:40px auto;
position:relative;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:8px solid #ffc933;

background:conic-gradient(
#ff5252 0deg 60deg,
#4caf50 60deg 120deg,
#ff9800 120deg 180deg,
#03a9f4 180deg 240deg,
#9c27b0 240deg 300deg,
#ffc107 300deg 360deg
);

transition:transform 4s ease-out;
}

#pointer{
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
font-size:28px;
}

input{
padding:10px;
font-size:16px;
width:120px;
}

button{
padding:12px 30px;
font-size:16px;
border:none;
border-radius:8px;
background:#4caf50;
color:white;
margin-top:10px;
cursor:pointer;
}

.reset{
background:#ff5252;
margin-left:10px;
}

.box{
background:white;
color:black;
margin:20px;
padding:10px;
border-radius:10px;
height:100px;
overflow:auto;
font-size:14px;
}
</style>
</head>

<body>

<div class="topbar">
<div>Galmet Wheel</div>
<div>Coins: <span id="coins">500</span></div>
</div>

<div id="wheelBox">
<div id="pointer">▼</div>
<div id="wheel"></div>
</div>

<div>Bet</div>

<input id="bet" value="50">

<br>

<button onclick="spin()">SPIN</button>
<button class="reset" onclick="resetCoins()">Reset Coins</button>

<h2 id="result"></h2>

<div class="box" id="history"></div>
<div class="box" id="players"></div>

<script>

/* ----------- COINS ----------- /

let coins = localStorage.getItem("galmetCoins")

if(!coins){
coins = 500
localStorage.setItem("galmetCoins", coins)
}

coins = parseInt(coins)

function updateCoins(){
document.getElementById("coins").innerText = coins
}

updateCoins()

function saveCoins(){
localStorage.setItem("galmetCoins", coins)
updateCoins()
}

/ ----------- RESET ----------- /

function resetCoins(){

coins = 500

saveCoins()

document.getElementById("result").innerText="Demo coins added (500)"

}

/ ----------- GAME ----------- /

let wheel=document.getElementById("wheel")
let history=document.getElementById("history")
let players=document.getElementById("players")

let spinning=false

function spin(){

if(spinning) return

let bet = parseInt(document.getElementById("bet").value)

if(isNaN(bet) || bet<=0){
alert("Enter bet amount")
return
}

if(bet>coins){
alert("Not enough coins")
return
}

/ deduct bet /

coins = coins - bet
saveCoins()

spinning=true

let multipliers=[0,2,3,5,10,0]

let index = Math.floor(Math.random()multipliers.length)

let multiplier = multipliers[index]

let rotation = (3605) + (index60)

wheel.style.transform = "rotate("+rotation+"deg)"

setTimeout(function(){

let win = bet * multiplier

coins = coins + win

saveCoins()

if(multiplier==0){
document.getElementById("result").innerText="You lost!"
}else{
document.getElementById("result").innerText="You won "+win+" coins ("+multiplier+"x)"
}

history.innerHTML = multiplier+"x<br>"+history.innerHTML

spinning=false

},4000)

}

/* ----------- FAKE PLAYERS ----------- */

setInterval(function(){

let names=["Kai","Alex","Lee","Sam","Sara","John","Mia"]

let name=names[Math.floor(Math.random()*names.length)]

let wins=[0,2,3,5,10]

let result=wins[Math.floor(Math.random()*wins.length)]

players.innerHTML=name+" won "+result+"x<br>"+players.innerHTML

},2000)

</script>

</body>
</html>
