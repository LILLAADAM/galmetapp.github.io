<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galmet Wheel PRO | Fair Spin</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #070e2a 0%, #030617 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, Arial, sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .topbar {
            background: rgba(28, 47, 163, 0.9);
            backdrop-filter: blur(4px);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 2px solid #ffc933;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            border-radius: 0 0 24px 24px;
        }

        .topbar div:first-child {
            text-shadow: 0 2px 5px #00000050;
            background: #ffc93320;
            padding: 4px 12px;
            border-radius: 40px;
        }

        #coins {
            background: #00000066;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: bold;
            color: #ffd966;
        }

        .wheel-container {
            width: 300px;
            height: 300px;
            margin: 30px auto 15px;
            position: relative;
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.5));
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #1e2b5c, 0 0 0 14px #ffc933, 0 18px 32px black;
            transition: transform 4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            background: #2a2e45;
        }

        #pointer {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            filter: drop-shadow(0 4px 6px black);
            z-index: 12;
            text-shadow: 0 0 3px gold;
            color: #ffdd77;
        }

        .bet-panel {
            background: #0f1642cc;
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-flex;
            gap: 16px;
            align-items: baseline;
            margin: 15px auto;
            border: 1px solid #ffc93366;
        }

        .bet-panel label {
            font-weight: bold;
            font-size: 1.2rem;
        }

        input {
            background: #f5f9ff;
            border: none;
            padding: 10px 16px;
            font-size: 1.2rem;
            width: 110px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            font-family: monospace;
            box-shadow: inset 0 1px 4px #00000030, 0 2px 4px #ffffff20;
        }

        button {
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            margin: 8px 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        .spinBtn {
            background: linear-gradient(135deg, #3ccf4e, #1f8a2e);
            color: white;
        }

        .resetBtn {
            background: linear-gradient(135deg, #e65c3c, #b33b1a);
            color: white;
        }

        .result-area {
            background: #000000aa;
            backdrop-filter: blur(8px);
            font-size: 1.5rem;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
            margin: 12px auto;
            border-left: 6px solid #ffc933;
            border-right: 6px solid #ffc933;
        }

        .info-box {
            background: #11172ecc;
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 10px 16px;
            margin: 15px auto;
            width: 90%;
            max-width: 480px;
            text-align: left;
            font-size: 0.85rem;
            border: 1px solid #ffc93344;
            color: #f0f3ff;
        }

        .info-box h4 {
            margin: 0 0 8px 0;
            color: #ffdd99;
            text-align: center;
        }

        .history-scroll, .players-scroll {
            max-height: 80px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
            padding: 5px;
        }

        .history-scroll span, .players-scroll span {
            display: inline-block;
            background: #00000060;
            margin: 3px 6px;
            padding: 4px 10px;
            border-radius: 20px;
        }

        hr {
            border-color: #ffc93330;
        }

        footer {
            font-size: 11px;
            opacity: 0.6;
            margin: 20px 0 10px;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div>🎡 GALMET WHEEL</div>
    <div>💰 COINS: <span id="coins">0</span></div>
</div>

<div class="wheel-container">
    <div id="pointer">▼</div>
    <canvas id="wheelCanvas" width="300" height="300"></canvas>
</div>

<div class="bet-panel">
    <label>⚡ BET</label>
    <input id="bet" value="50" type="number" min="10" step="10">
</div>

<div>
    <button class="spinBtn" onclick="spin()">🎲 SPIN</button>
    <button class="resetBtn" onclick="resetCoins()">🔄 RESET COINS</button>
</div>

<div id="result" class="result-area">✨ SPIN TO WIN ✨</div>

<div class="info-box">
    <h4>📜 RECENT WINS</h4>
    <div id="history" class="history-scroll">—</div>
</div>

<div class="info-box">
    <h4>🎲 LIVE FEED (players)</h4>
    <div id="players" class="players-scroll">⚡ waiting for action...</div>
</div>
<footer>⚡ fair spin · pointer decides reward ⚡</footer>

<script>
    // ---------- WHEEL SEGMENTS (multipliers) ----------
    const segments = [
        { value: 0, color: "#e34d4d" },   // 0x  (red)
        { value: 1, color: "#f4b942" },   // 1x  (orange)
        { value: 2, color: "#48b54a" },   // 2x  (green)
        { value: 3, color: "#ff8833" },   // 3x  (deep orange)
        { value: 5, color: "#3b8bc0" },   // 5x  (blue)
        { value: 10, color: "#aa6dc9" }   // 10x (purple)
    ];

    const SEGMENT_COUNT = segments.length;
    const ANGLE_PER_SEGMENT_DEG = 360 / SEGMENT_COUNT;   // = 60°

    // canvas setup
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const size = 300;
    canvas.width = size;
    canvas.height = size;

    // coins management
    let coins = parseInt(localStorage.getItem("galmetCoins")) || 500;
    let spinning = false;
    let currentRotationDeg = 0;   // store last rotation (for reference, not critical for detection)

    document.getElementById("coins").innerText = coins;

    // ---------- DRAW WHEEL (fixed geometry, no offset trick - precise segments) ----------
    function drawWheel() {
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size / 2;
        const startRadOffset = 0;   // segment 0 starts at angle 0 (3 o'clock)
        
        for (let i = 0; i < SEGMENT_COUNT; i++) {
            const startRad = startRadOffset + i * (Math.PI * 2 / SEGMENT_COUNT);
            const endRad = startRad + (Math.PI * 2 / SEGMENT_COUNT);
            
            // draw segment slice
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startRad, endRad);
            ctx.closePath();
            ctx.fillStyle = segments[i].color;
            ctx.fill();
            ctx.strokeStyle = "#ffdd99";
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            // draw multiplier text (rotated for readability)
            ctx.save();
            ctx.translate(centerX, centerY);
            const midRad = startRad + (Math.PI / SEGMENT_COUNT);
            const textRadius = radius * 0.68;
            const xPos = Math.cos(midRad) * textRadius;
            const yPos = Math.sin(midRad) * textRadius;
            ctx.translate(xPos, yPos);
            ctx.rotate(midRad + Math.PI / 2);
            ctx.font = "bold 18px 'Segoe UI', system-ui";
            ctx.fillStyle = "white";
            ctx.shadowBlur = 0;
            let multiplierText = segments[i].value + "x";
            if (segments[i].value === 0) multiplierText = "💀0x";
            ctx.fillText(multiplierText, -12, 6);
            ctx.restore();
        }
        
        // draw center circle for premium look
        ctx.beginPath();
        ctx.arc(centerX, centerY, 28, 0, 2 * Math.PI);
        ctx.fillStyle = "#ffcf40";
        ctx.shadowBlur = 0;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX, centerY, 18, 0, 2 * Math.PI);
        ctx.fillStyle = "#2c2e4e";
        ctx.fill();
        ctx.fillStyle = "gold";
        ctx.font = "bold 20px monospace";
        ctx.fillText("★", centerX-8, centerY+8);
    }
    
    drawWheel();
    
    // ---------- HELPER: get winning segment based on FINAL rotation (CSS rotation) ----------
    // pointer is fixed at TOP = angle 270° ( -90° or 270° in canvas coordinate system)
    // segments borders: segment i occupies [ i*60° , (i+1)*60° ) where 0° points to RIGHT (3 o'clock)
    // After clockwise rotation of 'rotationDeg', the effective angle of pointer relative to wheel = (pointerAngle - rotationDeg) mod 360
    // pointerAngle = 270°
    function getSegmentIndexFromRotation(rotationDeg) {
        const pointerAngle = 270;          // fixed top pointer in degrees (canvas coordinate)
        // effective angle: where the pointer lands on the static wheel (0° = right side)
        let rawAngle = (pointerAngle - rotationDeg) % 360;
        if (rawAngle < 0) rawAngle += 360;
        
        // find which segment contains this angle
        for (let i = 0; i < SEGMENT_COUNT; i++) {
            const start = i * ANGLE_PER_SEGMENT_DEG;
            const end = (i + 1) * ANGLE_PER_SEGMENT_DEG;
            if (rawAngle >= start && rawAngle < end) {
                return i;
            }
        }
        // fallback (just in case floating point edge)
        return 0;
    }
    
    // ---------- SPIN LOGIC (NO PREDETERMINED WIN, MATCHES VISUAL OUTCOME) ----------
    function spin() {
        if (spinning) {
            // prevent double spin
            return;
        }
        
        const betInput = document.getElementById("bet");
        let bet = parseInt(betInput.value);
        if (isNaN(bet) || bet <= 0) {
            alert("Enter a valid bet amount (minimum 10)");
            return;
        }
        if (bet > coins) {
            alert("Not enough coins! Reset or lower bet.");
            return;
        }
        
        // deduct bet immediately
        coins -= bet;
        updateCoinsUI();
        
        spinning = true;
        
        // --- RANDOM FAIR SPIN (total rotation: 5 full spins + random extra angle) ---
        const fullSpins = 360 * 5;    // 1800 deg
        const randomLanding = Math.random() * 360;   // 0..359.999 where wheel stops
        const totalRotation = fullSpins + randomLanding;
        
        // reset transition & current transform to 0deg without animation
        canvas.style.transition = "none";
        canvas.style.transform = `rotate(0deg)`;
        // force reflow to ensure reset is applied
        void canvas.offsetHeight;
        
        // apply new rotation with smooth animation
        canvas.style.transition = "transform 4s cubic-bezier(0.22, 0.98, 0.35, 1.05)";
        canvas.style.transform = `rotate(${totalRotation}deg)`;
        
        // store final landing modulo 360 (for calculation)
        const finalMod = randomLanding;   // because totalRotation % 360 = randomLanding
        
        // after animation, evaluate ACTUAL segment using pointer & final rotation
        setTimeout(() => {
            // get winning segment index based on actual final rotation (mod 360)
            const winningIdx = getSegmentIndexFromRotation(finalMod);
            const multiplier = segments[winningIdx].value;
            const winAmount = bet * multiplier;
            
            // update coins AFTER spin
            if (multiplier > 0) {
                coins += winAmount;
            }
            updateCoinsUI();
            
            // display result message
            const resultDiv = document.getElementById("result");
            if (multiplier === 0) {
                resultDiv.innerHTML = `💀 LOST ${bet} coins · multiplier 0x 💀`;
            } else {
                resultDiv.innerHTML = `🎉 YOU WON ${winAmount} COINS (${multiplier}x) 🎉`;
            }
            
            // update history box (latest on top)
            const historyBox = document.getElementById("history");
            const newEntry = document.createElement("span");
            newEntry.textContent = multiplier === 0 ? `💀 0x (lost ${bet})` : `🏆 ${multiplier}x +${winAmount}`;
            const currentHistory = historyBox.innerHTML;
            if (currentHistory === "—" || currentHistory.trim() === "") {
                historyBox.innerHTML = "";
            }
            historyBox.prepend(newEntry);
            if (historyBox.children.length > 12) {
                historyBox.removeChild(historyBox.lastChild);
            }
            
            // save coins to localStorage
            saveCoinsToLocal();
            
            // mark spinning finished
            spinning = false;
            
            // small extra visual: flash effect on pointer
            const pointer = document.getElementById("pointer");
            pointer.style.textShadow = "0 0 12px gold";
            setTimeout(() => {
                pointer.style.textShadow = "0 4px 6px black";
            }, 300);
            
        }, 4100); // slightly longer than transition to ensure complete
    }
    
    // helper: update coin display and save
    function updateCoinsUI() {
        document.getElementById("coins").innerText = coins;
        saveCoinsToLocal();
    }
    
    function saveCoinsToLocal() {
        localStorage.setItem("galmetCoins", coins);
    }
    
    function resetCoins() {
        if (spinning) {
            alert("Wait, wheel is spinning!");
            return;
        }
        coins = 500;
        updateCoinsUI();
        document.getElementById("result").innerHTML = "✨ COINS RESET TO 500 ✨";
        // optional clear history but keep UI fresh
        const historyDiv = document.getElementById("history");
        historyDiv.innerHTML = "—";
        // reset canvas rotation to 0 visually (no animation)
        canvas.style.transition = "none";
        canvas.style.transform = "rotate(0deg)";
        void canvas.offsetHeight;
        drawWheel();  // redraw for perfect orientation
        // reset any stored rotation flag
        currentRotationDeg = 0;
    }
    
    // ---------- FAKE PLAYER FEED (COSMETIC, no gameplay effect) ----------
    function updateFakePlayers() {
        const fakeNames = ["Kai 🔥", "Alex ⚡", "Lee 🎯", "Sam 💎", "Sara 🌟", "John 🃏", "Mia 🎲", "Zane 🧧"];
        const randomName = fakeNames[Math.floor(Math.random() * fakeNames.length)];
        // possible multipliers: 0,1,2,3,5,10
        const possibleValues = [0, 1, 2, 3, 5, 10];
        const randomMult = possibleValues[Math.floor(Math.random() * possibleValues.length)];
        const winText = randomMult === 0 ? `lost 😵` : `won ${randomMult}x 🎉`;
        
        const playersBox = document.getElementById("players");
        const newFeed = document.createElement("span");
        newFeed.textContent = `${randomName} ${winText}`;
        if (playersBox.innerHTML === "⚡ waiting for action..." || playersBox.innerHTML === "") {
            playersBox.innerHTML = "";
        }
        playersBox.prepend(newFeed);
        if (playersBox.children.length > 8) {
            playersBox.removeChild(playersBox.lastChild);
        }
    }
    
    // live feed every 2.3 sec
    setInterval(updateFakePlayers, 2300);
    
    // sync localStorage when page loads (extra)
    window.addEventListener("load", () => {
        if (isNaN(coins)) coins = 500;
        updateCoinsUI();
        // ensure wheel is at 0 rotation with fresh draw
        canvas.style.transition = "none";
        canvas.style.transform = "rotate(0deg)";
        drawWheel();
        // small fix: history init
        const histDiv = document.getElementById("history");
        if (histDiv.innerHTML === "") histDiv.innerHTML = "—";
    });
    
    // optional: manual reset button safe handling
    document.querySelector(".resetBtn").addEventListener("click", resetCoins);
    
    // Prevent spin when input invalid
    function validateBet() {
        let betVal = parseInt(document.getElementById("bet").value);
        if (isNaN(betVal) || betVal < 10) {
            document.getElementById("bet").value = 50;
        }
        if (betVal > coins && coins > 0) {
            document.getElementById("bet").value = Math.min(coins, 500);
        }
    }
    
    setInterval(validateBet, 500);
    
    // extra animation consistency: if spin ends exactly on boundary? getSegmentIndexFromRotation handles inclusive/exclusive logic
    // test edge-case: If pointer lands exactly on boundary (rare) it will take the next segment due to < end. Fair enough.
    
    // For absolute correctness, handle transition cancellation and re-spin protection
    window.addEventListener("load", () => {
        // ensure no leftover transition after manual reset
        canvas.style.transition = "";
    });
    
    // optional: Visual improvement - if someone clicks reset while spinning, block
    const originalReset = resetCoins;
    window.resetCoins = function() {
        if (spinning) {
            alert("Wheel is spinning! Please wait.");
            return;
        }
        originalReset();
    };
    
    // final fix: prevent pointer misalignment due to fractional rounding 
    // re-draw if needed
    function redrawAfterResize() {
        drawWheel();
    }
    window.addEventListener("resize", redrawAfterResize);
    
    // Disable spin button style during spin (UX)
    const spinBtn = document.querySelector(".spinBtn");
    const originalSpin = spin;
    window.spin = function() {
        if (spinning) return;
        spinBtn.style.opacity = "0.6";
        spinBtn.style.transform = "scale(0.98)";
        originalSpin();
        setTimeout(() => {
            if (!spinning) {
                spinBtn.style.opacity = "1";
                spinBtn.style.transform = "";
            } else {
                const checkInterval = setInterval(() => {
                    if (!spinning) {
                        spinBtn.style.opacity = "1";
                        spinBtn.style.transform = "";
                        clearInterval(checkInterval);
                    }
                }, 200);
            }
        }, 200);
    };
    
    // additional check: after spin finishes, re-enable button style
    const originalSetTimeout = window.setTimeout;
    // we don't override, but just keep style consistent.
    
    // ensure that local storage always has coins limit
    if (coins < 0) coins = 500;
    updateCoinsUI();
    
    // FINAL GUARANTEE: The wheel outcome is 100% synchronized with visual pointer.
    // The getSegmentIndexFromRotation uses exact geometry: segments 0°(right) to 60° for 0x, 60-120° for 1x, 120-180° for 2x,
    // 180-240° for 3x, 240-300° for 5x, 300-360° for 10x. Pointer fixed at 270°, after rotation landing angle is calculated.
    // No pre-selected win — visual and reward match perfectly.
    console.log("Galmet Wheel PRO - fixed alignment & fair spin active");
</script>
</body>
</html>
