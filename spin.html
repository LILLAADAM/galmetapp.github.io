<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galmet Wheel PRO </title>

<style>
body{
background:#060b2d;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.topbar{
background:#1c2fa3;
padding:12px;
display:flex;
justify-content:space-between;
font-size:18px;
}

#wheelBox{
width:280px;
height:280px;
margin:40px auto;
position:relative;
}

#wheelCanvas{
width:100%;
height:100%;
border-radius:50%;
border:10px solid #ffc933;
transition:transform 4s cubic-bezier(0.17,0.67,0.2,1);
}

#pointer{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
font-size:30px;
}

input{
padding:10px;
font-size:16px;
width:120px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
margin:10px;
color:white;
}

.spinBtn{background:#4caf50;}
.resetBtn{background:#e74c3c;}

.box{
background:white;
color:black;
margin:20px;
padding:10px;
border-radius:10px;
height:100px;
overflow:auto;
font-size:14px;
}
</style>
</head>

<body>

<div class="topbar">
<div>Galmet Wheel</div>
<div>Coins: <span id="coins">0</span></div>
</div>

<div id="wheelBox">
<div id="pointer">▼</div>
<canvas id="wheelCanvas" width="280" height="280"></canvas>
</div>

<div>Bet</div>
<input id="bet" value="50"><br>

<button class="spinBtn" onclick="spin()">SPIN</button>
<button class="resetBtn" onclick="resetCoins()">Reset Coins</button>

<h2 id="result"></h2>

<div class="box" id="history"></div>
<div class="box" id="players"></div>

<script>

let segments = [
{value:0,color:"#ff5252"},
{value:1,color:"#ffc107"},
{value:2,color:"#4caf50"},
{value:3,color:"#ff9800"},
{value:5,color:"#03a9f4"},
{value:10,color:"#9c27b0"}
];

let canvas = document.getElementById("wheelCanvas");
let ctx = canvas.getContext("2d");

let coins = parseInt(localStorage.getItem("galmetCoins")) || 500;
document.getElementById("coins").innerText = coins;

let spinning = false;

// 🎨 DRAW
function drawWheel(){
let arc = (2*Math.PI)/segments.length;

for(let i=0;i<segments.length;i++){
ctx.beginPath();
ctx.fillStyle=segments[i].color;
ctx.moveTo(140,140);
ctx.arc(140,140,140,i*arc,(i+1)*arc);
ctx.fill();

ctx.save();
ctx.translate(140,140);
ctx.rotate(i*arc + arc/2);
ctx.fillStyle="white";
ctx.font="bold 14px Arial";
ctx.fillText(segments[i].value+"x",70,5);
ctx.restore();
}
}
drawWheel();

// STORAGE
function saveCoins(){
localStorage.setItem("galmetCoins",coins);
}

function resetCoins(){
coins=500;
saveCoins();
document.getElementById("coins").innerText=coins;
}

// 🎯 SPIN (FINAL FIXED)
function spin(){

if(spinning) return;

let bet=parseInt(document.getElementById("bet").value);

if(bet<=0){ alert("Enter valid bet"); return; }
if(bet>coins){ alert("Not enough coins"); return; }

// deduct
coins-=bet;
saveCoins();
document.getElementById("coins").innerText=coins;

spinning=true;

// 🎯 weighted result
let pool = [0,0,0,1,1,2,2,3,5,10];
let chosen = pool[Math.floor(Math.random()*pool.length)];

let index = segments.findIndex(s=>s.value===chosen);

// 🎯 CORE FIX (NO ANGLE CONFUSION)
let segmentAngle = 360 / segments.length;

// move selected segment to TOP (pointer)
let rotateTo = (segments.length - index) * segmentAngle;

// center adjustment
rotateTo -= segmentAngle / 2;

// smooth spins
let spins = 360 * 5;

// total rotation
let final = spins + rotateTo;

// reset FIRST (important)
canvas.style.transition = "none";
canvas.style.transform = "rotate(0deg)";
canvas.offsetHeight;

// animate
canvas.style.transition = "transform 4s cubic-bezier(0.17,0.67,0.2,1)";
canvas.style.transform = `rotate(${final}deg)`;

// RESULT
setTimeout(()=>{

let win = bet * chosen;
coins += win;

saveCoins();
document.getElementById("coins").innerText=coins;

if(chosen===0){
document.getElementById("result").innerText="You lost!";
}else{
document.getElementById("result").innerText=
`You won ${win} coins (${chosen}x)`;
}

document.getElementById("history").innerHTML =
chosen+"x<br>"+document.getElementById("history").innerHTML;

spinning=false;

},4000);

}

// fake players
setInterval(()=>{
let names=["Kai","Alex","Lee","Sam","Sara","John","Mia"];
let name=names[Math.floor(Math.random()*names.length)];
let values=[0,1,2,3,5,10];
let v=values[Math.floor(Math.random()*values.length)];

document.getElementById("players").innerHTML =
name+" won "+v+"x<br>"+document.getElementById("players").innerHTML;

},2000);

</script>
