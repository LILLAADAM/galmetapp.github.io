
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmet Wheel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #060b2d;
  color: white;
  text-align: center;
}

header {
  background: #2e36a3;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

canvas {
  margin-top: 20px;
}

input {
  padding: 10px;
  font-size: 18px;
  width: 120px;
  text-align: center;
  border-radius: 5px;
  border: none;
}

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  color: white;
}

.spin { background: #5cb85c; }
.reset { background: #d9534f; }

.box {
  background: #eee;
  color: black;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<header>
  <div>Galmet Wheel</div>
  <div>Coins: <span id="coins">500</span></div>
</header>

<canvas id="wheel" width="300" height="300"></canvas>

<div>
  <p>Bet</p>
  <input id="bet" value="50">
</div>

<button class="spin" onclick="spin()">SPIN</button>
<button class="reset" onclick="resetCoins()">Reset Coins</button>

<h2 id="result"></h2>

<div class="box" id="history"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const segments = [
  {label:"0x", color:"#e74c3c", weight:30},
  {label:"1x", color:"#f1c40f", weight:20},
  {label:"2x", color:"#2ecc71", weight:18},
  {label:"3x", color:"#e67e22", weight:12},
  {label:"5x", color:"#3498db", weight:10},
  {label:"10x", color:"#8e44ad", weight:10}
];

let coins = parseInt(localStorage.getItem("coins"));
if (!coins || isNaN(coins)) coins = 500;

let rotation = 0;
let spinning = false;

updateCoins();

function drawWheel() {
  ctx.clearRect(0,0,300,300);

  const arc = 2 * Math.PI / segments.length;

  for (let i = 0; i < segments.length; i++) {
    ctx.beginPath();
    ctx.moveTo(150,150);
    ctx.arc(150,150,140, arci + rotation, arc(i+1) + rotation);
    ctx.fillStyle = segments[i].color;
    ctx.fill();

    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(arc*i + arc/2 + rotation);
    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText(segments[i].label,60,5);
    ctx.restore();
  }

  // pointer
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.moveTo(150,10);
  ctx.lineTo(140,30);
  ctx.lineTo(160,30);
  ctx.fill();
}

function getWeightedIndex(){
  let total = segments.reduce((sum,s)=>sum+s.weight,0);
  let rand = Math.random()*total;
  let sum=0;

  for(let i=0;i<segments.length;i++){
    sum += segments[i].weight;
    if(rand < sum) return i;
  }
}

function spin() {
  if (spinning) return;

  let bet = parseInt(document.getElementById("bet").value);
  if (!bet || bet <= 0) return alert("Enter valid bet");
  if (bet > coins) return alert("Not enough coins");

  coins -= bet;
  updateCoins();

  spinning = true;

  let index = getWeightedIndex();
  let segmentAngle = 360 / segments.length;

  // 🎯 PERFECT MATCH FIX
  let target = (index * segmentAngle) + (segmentAngle / 2);
  let finalDeg = 360 - target + 90;

  let spinTotal = 360 * 5 + finalDeg;

  let start = null;
  let duration = 3000;

  function animate(t) {
    if (!start) start = t;

    let progress = t - start;
    let ease = 1 - Math.pow(1 - progress/duration, 3);

    let current = spinTotal * ease;
    rotation = current * Math.PI / 180;

    drawWheel();

    if (progress < duration) {
      requestAnimationFrame(animate);
    } else {
      rotation = (spinTotal % 360) * Math.PI / 180;
      drawWheel();

      let multiplier = parseInt(segments[index].label);
      let win = bet * multiplier;

      coins += win;
      updateCoins();

      document.getElementById("result").innerText =
        multiplier === 0 ? "You lost!" : "You won " + win + " coins (" + segments[index].label + ")";

      addHistory(segments[index].label);

      spinning = false;
    }
  }

  requestAnimationFrame(animate);
}

function updateCoins() {
  document.getElementById("coins").innerText = coins;
  localStorage.setItem("coins", coins);
}

function resetCoins() {
  coins = 500;
  updateCoins();
}

function addHistory(text) {
  let div = document.getElementById("history");
  div.innerHTML = text + "<br>" + div.innerHTML;
}

// ✅ ALWAYS DRAW ON LOAD
window.onload = () => {
  drawWheel();
};
</script>

</body>
