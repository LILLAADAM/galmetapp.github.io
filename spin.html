<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galmet Wheel PRO</title>

<style>
body{
background:#060b2d;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.topbar{
background:#1c2fa3;
padding:12px;
display:flex;
justify-content:space-between;
font-size:18px;
}

#wheelBox{
width:280px;
height:280px;
margin:40px auto;
position:relative;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:10px solid #ffc933;
transition:transform 4s cubic-bezier(0.17,0.67,0.83,0.67);

background:conic-gradient(
#ff5252 0deg 60deg,
#4caf50 60deg 120deg,
#ff9800 120deg 180deg,
#03a9f4 180deg 240deg,
#9c27b0 240deg 300deg,
#ffc107 300deg 360deg
);
}

.label{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:flex-start;
font-weight:bold;
color:white;
font-size:14px;
pointer-events:none;
}

#pointer{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
font-size:30px;
}

input{
padding:10px;
font-size:16px;
width:120px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
margin:10px;
color:white;
}

.spinBtn{background:#4caf50;}
.resetBtn{background:#e74c3c;}

.box{
background:white;
color:black;
margin:20px;
padding:10px;
border-radius:10px;
height:100px;
overflow:auto;
font-size:14px;
}

h2{
min-height:30px;
}
</style>
</head>

<body>

<div class="topbar">
<div>Galmet Wheel</div>
<div>Coins: <span id="coins">0</span></div>
</div>

<div id="wheelBox">
<div id="pointer">▼</div>

<div id="wheel">

<div class="label" style="transform:rotate(30deg)">0x</div>
<div class="label" style="transform:rotate(90deg)">2x</div>
<div class="label" style="transform:rotate(150deg)">3x</div>
<div class="label" style="transform:rotate(210deg)">5x</div>
<div class="label" style="transform:rotate(270deg)">10x</div>
<div class="label" style="transform:rotate(330deg)">0x</div>

</div>
</div>

<div>Bet</div>
<input id="bet" value="50">

<br>

<button class="spinBtn" onclick="spin()">SPIN</button>
<button class="resetBtn" onclick="resetCoins()">Reset Coins</button>

<h2 id="result"></h2>

<div class="box" id="history"></div>
<div class="box" id="players"></div>

<!-- SOUND -->
<audio id="spinSound" src="https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-spin-1930.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>

let coins = parseInt(localStorage.getItem("galmetCoins")) || 500;
document.getElementById("coins").innerText = coins;

let wheel = document.getElementById("wheel");
let history = document.getElementById("history");
let players = document.getElementById("players");

let spinSound = document.getElementById("spinSound");
let winSound = document.getElementById("winSound");

let spinning = false;
let currentRotation = 0;

function saveCoins(){
localStorage.setItem("galmetCoins", coins);
}

function resetCoins(){
coins = 500;
saveCoins();
document.getElementById("coins").innerText = coins;
alert("Coins reset to 500");
}

function spin(){

if(spinning) return;

let bet = parseInt(document.getElementById("bet").value);

if(bet <= 0){
alert("Enter valid bet");
return;
}

if(bet > coins){
alert("Not enough coins");
return;
}

// deduct coins
coins -= bet;
saveCoins();
document.getElementById("coins").innerText = coins;

spinning = true;

// 🔥 BALANCED SYSTEM (more losses than wins)
let multipliers = [0,0,2,2,3,5,10];

// random
let index = Math.floor(Math.random() * multipliers.length);
let multiplier = multipliers[index];

// spin sound
spinSound.play();

// spin logic
let extra = 360 * 5;
let target = (index % 6) * 60;

currentRotation += extra + target;

wheel.style.transform = "rotate(" + currentRotation + "deg)";

setTimeout(()=>{

let win = bet * multiplier;
coins += win;
saveCoins();

document.getElementById("coins").innerText = coins;

if(multiplier === 0){
document.getElementById("result").innerText = "You lost!";
}else{
document.getElementById("result").innerText = "You won " + win + " coins (" + multiplier + "x)";
winSound.play();
}

// history
history.innerHTML = multiplier + "x<br>" + history.innerHTML;

spinning = false;

},4000);
}

// fake players
setInterval(()=>{

let names=["Kai","Alex","Lee","Sam","Sara","John","Mia"];
let name = names[Math.floor(Math.random()*names.length)];

let wins=[0,2,3,5,10];
let result = wins[Math.floor(Math.random()*wins.length)];

players.innerHTML = name + " won " + result + "x<br>" + players.innerHTML;

},2000);

</script>

</body>
</html>
