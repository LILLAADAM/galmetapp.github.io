<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galmet Wheel FINAL PERFECT</title>

<style>
body{
background:#060b2d;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.topbar{
background:#1c2fa3;
padding:12px;
display:flex;
justify-content:space-between;
font-size:18px;
}

#wheelBox{
width:280px;
height:280px;
margin:40px auto;
position:relative;
}

#wheelCanvas{
width:100%;
height:100%;
border-radius:50%;
border:10px solid #ffc933;
transition:transform 4s cubic-bezier(0.17,0.67,0.2,1);
}

#pointer{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
font-size:30px;
}

input{
padding:10px;
font-size:16px;
width:120px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
margin:10px;
color:white;
}

.spinBtn{background:#4caf50;}
.resetBtn{background:#e74c3c;}

.box{
background:white;
color:black;
margin:20px;
padding:10px;
border-radius:10px;
height:100px;
overflow:auto;
font-size:14px;
}
</style>
</head>

<body>

<div class="topbar">
<div>Galmet Wheel</div>
<div>Coins: <span id="coins">0</span></div>
</div>

<div id="wheelBox">
<div id="pointer">▼</div>
<canvas id="wheelCanvas" width="280" height="280"></canvas>
</div>

<div>Bet</div>
<input id="bet" value="50"><br>

<button class="spinBtn" onclick="spin()">SPIN</button>
<button class="resetBtn" onclick="resetCoins()">Reset Coins</button>

<h2 id="result"></h2>

<div class="box" id="history"></div>
<div class="box" id="players"></div>

<script>

// 🎯 EXACT ORDER (DO NOT CHANGE ORDER)
let segments = [0,1,2,3,5,10];

let colors = [
"#ff5252",
"#ffc107",
"#4caf50",
"#ff9800",
"#03a9f4",
"#9c27b0"
];

let canvas = document.getElementById("wheelCanvas");
let ctx = canvas.getContext("2d");

let coins = parseInt(localStorage.getItem("galmetCoins")) || 500;
document.getElementById("coins").innerText = coins;

let spinning=false;
let rotation=0;

// 🎨 DRAW
function drawWheel(){
let arc = (2*Math.PI)/segments.length;

for(let i=0;i<segments.length;i++){
ctx.beginPath();
ctx.fillStyle=colors[i];
ctx.moveTo(140,140);
ctx.arc(140,140,140,i*arc,(i+1)*arc);
ctx.fill();

// text
ctx.save();
ctx.translate(140,140);
ctx.rotate(i*arc + arc/2);
ctx.fillStyle="white";
ctx.font="bold 14px Arial";
ctx.fillText(segments[i]+"x",70,5);
ctx.restore();
}
}
drawWheel();

// 💾
function saveCoins(){
localStorage.setItem("galmetCoins",coins);
}

function resetCoins(){
coins=500;
saveCoins();
document.getElementById("coins").innerText=coins;
}

// 🎯 SPIN (PERFECT MATCH LOGIC)
function spin(){

if(spinning) return;

let bet=parseInt(document.getElementById("bet").value);

if(bet<=0){ alert("Enter bet"); return; }
if(bet>coins){ alert("Not enough coins"); return; }

// deduct
coins-=bet;
saveCoins();
document.getElementById("coins").innerText=coins;

spinning=true;

// 🎯 weighted system
let pool = [0,0,0,1,1,2,2,3,5,10];
let resultValue = pool[Math.floor(Math.random()*pool.length)];

let index = segments.indexOf(resultValue);

// 🎯 PERFECT ANGLE FIX
let segmentAngle = 360 / segments.length;

// 🎯 FIX: adjust for canvas starting at right (0°) + pointer at top
let angle = (index * segmentAngle) + (segmentAngle / 2);

// shift by 90° because pointer is at top
let finalRotation = 360 - angle + 90;

// add smooth spins
let totalSpin = (360 * 6) + finalRotation;

// apply rotation
rotation = rotation + totalSpin;
rotation = rotation % 360; // keep stable

canvas.style.transform = `rotate(${rotation}deg)`;

// 🎯 AFTER SPIN
setTimeout(()=>{

let win = bet * resultValue;
coins += win;

saveCoins();
document.getElementById("coins").innerText=coins;

if(resultValue===0){
document.getElementById("result").innerText="You lost!";
}else{
document.getElementById("result").innerText=
"You won "+win+" coins ("+resultValue+"x)";
}

// history
document.getElementById("history").innerHTML =
resultValue+"x<br>"+document.getElementById("history").innerHTML;

spinning=false;

},4000);

}

// 🤖 fake players
setInterval(()=>{
let names=["Kai","Alex","Lee","Sam","Sara","John","Mia"];
let name=names[Math.floor(Math.random()*names.length)];
let values=[0,1,2,3,5,10];
let v=values[Math.floor(Math.random()*values.length)];

document.getElementById("players").innerHTML =
name+" won "+v+"x<br>"+document.getElementById("players").innerHTML;

},2000);

</script>

</body>
</html>
