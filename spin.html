<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- FORCE NO CACHE -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Galmet Wheel</title>

<style>
body{
background:#060b2d;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.topbar{
background:#1c2fa3;
padding:12px;
display:flex;
justify-content:space-between;
font-size:18px;
}

#wheelBox{
width:260px;
height:260px;
margin:40px auto;
position:relative;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:8px solid #ffc933;
background:conic-gradient(
#ff5252 0deg 60deg,
#4caf50 60deg 120deg,
#ff9800 120deg 180deg,
#03a9f4 180deg 240deg,
#9c27b0 240deg 300deg,
#ffc107 300deg 360deg
);
transition:transform 4s ease-out;
}

#pointer{
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
font-size:28px;
}

input{
padding:10px;
font-size:16px;
width:120px;
}

button{
padding:12px 30px;
font-size:16px;
border:none;
border-radius:8px;
background:#4caf50;
color:white;
margin-top:10px;
cursor:pointer;
}

.reset{
background:#ff5252;
margin-left:10px;
}

.box{
background:white;
color:black;
margin:20px;
padding:10px;
border-radius:10px;
height:100px;
overflow:auto;
font-size:14px;
}
</style>
</head>

<body>

<div class="topbar">
<div>Galmet Wheel</div>
<div>Coins: <span id="coins">500</span></div>
</div>

<div id="wheelBox">
<div id="pointer">▼</div>
<div id="wheel"></div>
</div>

<div>Bet</div>

<input id="bet" value="50">

<br>

<button onclick="spin()">SPIN</button>
<button class="reset" onclick="resetCoins()">Reset Coins</button>

<h2 id="result"></h2>

<div class="box" id="history"></div>
<div class="box" id="players"></div>

<script>

/* DEBUG /
window.onerror=function(e){
alert("ERROR: "+e)
}

/ INIT /
let coins = localStorage.getItem("coins")

if(!coins){
coins = 500
localStorage.setItem("coins", coins)
}

coins = parseInt(coins)
updateCoins()

function updateCoins(){
document.getElementById("coins").innerText = coins
}

/ RESET /
function resetCoins(){
coins = 500
localStorage.setItem("coins", coins)
updateCoins()
alert("Coins reset to 500")
}

/ SPIN /
function spin(){

alert("SPIN CLICKED") // 👈 MUST SHOW

let bet = parseInt(document.getElementById("bet").value)

if(bet > coins){
alert("Not enough coins")
return
}

coins -= bet
updateCoins()
localStorage.setItem("coins", coins)

/ RANDOM RESULT /
let multipliers = [0,2,3,5,10,0]
let index = Math.floor(Math.random() * multipliers.length)
let multiplier = multipliers[index]

let rotation = 3605 + index60

document.getElementById("wheel").style.transform =
"rotate("+rotation+"deg)"

setTimeout(function(){

let win = bet * multiplier
coins += win
localStorage.setItem("coins", coins)
updateCoins()

if(multiplier==0){
document.getElementById("result").innerText="You lost!"
}else{
document.getElementById("result").innerText=
"You won "+win+" coins"
}

},4000)

}

/ FAKE PLAYERS */
setInterval(function(){

let names=["Kai","Alex","Lee","Sam","Sara"]
let name=names[Math.floor(Math.random()*names.length)]

let wins=[0,2,3,5,10]
let r=wins[Math.floor(Math.random()*wins.length)]

document.getElementById("players").innerHTML =
name+" won "+r+"x<br>" +
document.getElementById("players").innerHTML

},2000)

</script>

</body>
</html>
