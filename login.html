<script>
const BASE_URL = "https://us-central1-galmet-app.cloudfunctions.net";

let sendCooldown = 0;
let timerInterval = null;

// 🔙 BACK BUTTON
document.querySelector("header button").onclick = () => {
  window.location.href = "index.html";
};

// 🔢 GENERATE USER ID
function generateUserId() {
  return Math.floor(10000000 + Math.random() * 90000000);
}

// 📧 SEND OTP WITH TIMER
async function sendOtp() {
  const email = document.getElementById("email").value;
  const btn = event.target;

  if (!email) {
    alert("Enter email");
    return;
  }

  if (sendCooldown > 0) {
    alert("Wait " + sendCooldown + " sec");
    return;
  }

  console.log("📧 Sending OTP...");

  try {
    const res = await fetch(BASE_URL + "/sendOtpEmail", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.success) {
      alert("✅ OTP sent");

      // ⏱ START TIMER
      sendCooldown = 60;
      btn.disabled = true;

      timerInterval = setInterval(() => {
        sendCooldown--;
        btn.innerText = sendCooldown + "s";

        if (sendCooldown <= 0) {
          clearInterval(timerInterval);
          btn.disabled = false;
          btn.innerText = "Send";
        }
      }, 1000);

    } else {
      alert("❌ " + (data.error || "Failed"));
    }

  } catch (err) {
    console.error("❌ OTP ERROR:", err);
    alert("Network error");
  }
}

// 🔐 VERIFY OTP + LOGIN SYSTEM
async function verifyOtp() {
  const email = document.getElementById("email").value;
  const otp = document.getElementById("otp").value;

  if (!email || !otp) {
    alert("Enter email & OTP");
    return;
  }

  console.log("🔐 Verifying OTP...");

  try {
    // ✅ VERIFY OTP
    const res = await fetch(BASE_URL + "/verifyOtp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, otp })
    });

    const data = await res.json();

    console.log("OTP Response:", data);

    if (!data.success) {
      alert("❌ " + data.message);
      return;
    }

    // ✅ CHECK USER
    const checkRes = await fetch(BASE_URL + "/getUserByEmail?email=" + encodeURIComponent(email));
    const checkData = await checkRes.json();

    console.log("User Check:", checkData);

    if (checkData.exists) {

  const user = checkData.user;

  localStorage.setItem("user", JSON.stringify(user));

  console.log("✅ Old user login:", user);

  // 🔥 STEP CHECK SYSTEM

  if (!user.gender) {
    window.location.href = "gender.html";
    return;
  }

  if (!user.username || !user.country || !user.dob || !user.age) {
    window.location.href = "step2.html"; // your nickname + dob page
    return;
  }

  if (!user.photoURL || !user.profileCompleted) {
    window.location.href = "setup.html";
    return;
  }

  // ✅ ALL COMPLETE
  window.location.href = "dashboard.html";
  
    } else {

      // 🔥 FIXED USER CREATION
      const userId = generateUserId();

      const newUser = {
       email: email,
       userId: userId,
       coins: 500,

       username: "",
       gender: "",
       country: null,
       dob: null,
       age: null,

       photoURL: "",
       profileCompleted: false,

       inviteCode: "INV" + userId,
       referredBy: null,
       totalInvites: 0,
       totalEarned: 0
     };
      console.log("🆕 Creating user:", newUser);

      const createRes = await fetch(BASE_URL + "/createUser", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(newUser)
      });

      const createData = await createRes.json();

      console.log("Create Response:", createData);

      if (createData.success) {

        localStorage.setItem("user", JSON.stringify(newUser));

        console.log("🎉 User created");
        window.location.href = "gender.html";

      } else {
        alert("❌ Failed to create user");
      }
    }

  } catch (err) {
    console.error("❌ VERIFY ERROR:", err);
    alert("Something went wrong");
  }
}
</script>
