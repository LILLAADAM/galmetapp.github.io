<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Galmet - Log In</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-dim": "#ced5db",
            "on-tertiary-container": "#66002b",
            "surface-bright": "#f3f7fb",
            "on-tertiary-fixed-variant": "#770033",
            "tertiary": "#b60051",
            "inverse-on-surface": "#999da1",
            "tertiary-fixed": "#ff8fa9",
            "on-primary": "#d8f8ff",
            "on-secondary": "#fff1db",
            "secondary-fixed": "#ffca4d",
            "tertiary-container": "#ff8fa9",
            "surface-container-highest": "#d7dee3",
            "secondary-container": "#ffca4d",
            "background": "#f3f7fb",
            "on-tertiary-fixed": "#380014",
            "primary-container": "#00e3fd",
            "outline": "#73777b",
            "error-dim": "#9f0519",
            "surface-container-lowest": "#ffffff",
            "surface-container-high": "#dde3e8",
            "primary-fixed-dim": "#00d4ec",
            "on-secondary-container": "#5c4400",
            "secondary-dim": "#664b00",
            "tertiary-fixed-dim": "#ff769b",
            "on-primary-fixed-variant": "#005762",
            "surface": "#f3f7fb",
            "on-background": "#2a2f32",
            "surface-tint": "#006571",
            "primary": "#006571",
            "on-primary-container": "#004d57",
            "on-surface": "#2a2f32",
            "outline-variant": "#a9aeb1",
            "on-tertiary": "#ffeff0",
            "error-container": "#fb5151",
            "on-primary-fixed": "#003840",
            "error": "#b31b25",
            "inverse-surface": "#0a0f12",
            "primary-fixed": "#00e3fd",
            "surface-variant": "#d7dee3",
            "surface-container": "#e3e9ee",
            "secondary-fixed-dim": "#f7ba00",
            "primary-dim": "#005863",
            "on-surface-variant": "#575c60",
            "inverse-primary": "#00e3fd",
            "secondary": "#755700",
            "on-error": "#ffefee",
            "surface-container-low": "#ecf1f6",
            "on-error-container": "#570008",
            "on-secondary-fixed-variant": "#674c00",
            "tertiary-dim": "#a00047",
            "on-secondary-fixed": "#443100"
          },
          borderRadius: {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    input:focus {
      outline: none;
      box-shadow: none;
    }
    .message-fade {
      transition: opacity 0.2s ease;
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center">

<!-- Top Navigation -->
<header class="w-full top-0 z-50">
  <div class="flex items-center justify-between px-6 h-16 w-full max-w-md mx-auto">
    <button onclick="window.location.href='index.html'" class="text-cyan-600 hover:opacity-80 transition-opacity active:scale-95 duration-150">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-600 to-cyan-400 bg-clip-text text-transparent font-['Plus_Jakarta_Sans'] tracking-tight">
      Galmet
    </h1>
    <div class="w-6"></div>
  </div>
</header>

<!-- Main Content -->
<main class="flex-1 w-full max-w-md px-8 pt-8 pb-32 flex flex-col">
  <div class="mb-12">
    <h2 class="text-[1.75rem] font-headline font-semibold text-on-surface tracking-tight mb-2">
      Log in with Email
    </h2>
    <p class="text-on-surface-variant font-body text-sm">
      Enter your details to access your Galmet Digital World account.
    </p>
  </div>

  <!-- Form -->
  <div class="space-y-6">
    <!-- Email Group -->
    <div class="group">
      <label class="block text-[11px] font-label font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">
        Email
      </label>
      <div class="relative flex items-center bg-surface-container-low rounded-lg p-1 transition-all duration-300 focus-within:bg-surface-container-lowest focus-within:shadow-[0_4px_20px_rgba(0,101,113,0.08)]">
        <div class="pl-4 pr-2 text-primary">
          <span class="material-symbols-outlined text-[20px]">mail</span>
        </div>
        <input id="email" class="w-full bg-transparent border-none py-3 text-on-surface placeholder:text-outline-variant font-body focus:ring-0" placeholder="your@email.com" type="email">
      </div>
    </div>

    <!-- OTP Group -->
    <div class="group">
      <label class="block text-[11px] font-label font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">
        Verification code
      </label>
      <div class="flex gap-3">
        <div class="relative flex-1 flex items-center bg-surface-container-low rounded-lg p-1 transition-all duration-300 focus-within:bg-surface-container-lowest focus-within:shadow-[0_4px_20px_rgba(0,101,113,0.08)]">
          <div class="pl-4 pr-2 text-primary">
            <span class="material-symbols-outlined text-[20px]">verified_user</span>
          </div>
          <input id="otp" class="w-full bg-transparent border-none py-3 text-on-surface placeholder:text-outline-variant font-body focus:ring-0 tracking-widest" maxlength="6" placeholder="6-digit code" type="text">
        </div>
        <button id="sendOtpBtn" onclick="sendOtp()" class="px-6 rounded-lg bg-surface-container-highest text-primary font-label font-bold text-xs uppercase tracking-widest hover:bg-primary-container hover:text-on-primary-container transition-all active:scale-95 duration-150 whitespace-nowrap">
          Send
        </button>
      </div>
      <!-- Inline message area for OTP feedback -->
      <div id="otpMessage" class="text-xs mt-2 ml-1 min-h-[20px] message-fade"></div>
    </div>
  </div>

  <!-- Decorative elements -->
  <div class="mt-16 relative">
    <div class="absolute -z-10 -right-20 top-0 w-64 h-64 bg-primary-container/20 rounded-full blur-[80px]"></div>
    <div class="absolute -z-10 -left-10 top-20 w-48 h-48 bg-secondary-container/10 rounded-full blur-[60px]"></div>
  </div>

  <!-- Login Button -->
  <div class="mt-auto pt-10">
    <button onclick="verifyOtp()" class="w-full py-4 bg-gradient-to-r from-primary to-primary-fixed-dim text-on-primary font-label font-bold rounded-full shadow-[0_12px_24px_rgba(0,101,113,0.15)] hover:shadow-[0_16px_32px_rgba(0,101,113,0.25)] transition-all active:scale-[0.98] flex items-center justify-center gap-2">
      <span class="material-symbols-outlined">login</span>
      Log in
    </button>
  </div>
</main>

<!-- Bottom Navigation (optional, kept for consistency) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-slate-50/80 backdrop-blur-xl rounded-t-[2rem] shadow-[0_-4px_24px_rgba(0,0,0,0.04)] md:max-w-md md:left-1/2 md:-translate-x-1/2">
  <a class="flex flex-col items-center justify-center text-slate-400 px-6 py-2 hover:text-cyan-500 transition-all" href="#">
    <span class="material-symbols-outlined">help_outline</span>
    <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-wider mt-1">Help</span>
  </a>
  <a class="flex flex-col items-center justify-center text-slate-400 px-6 py-2 hover:text-cyan-500 transition-all" href="#">
    <span class="material-symbols-outlined">description</span>
    <span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-wider mt-1">Terms</span>
  </a>
</nav>

<!-- Background effects -->
<div class="fixed inset-0 pointer-events-none -z-20 overflow-hidden">
  <div class="absolute top-0 right-0 w-full h-[353px] bg-gradient-to-b from-primary-container/10 to-transparent"></div>
</div>

<script>
  const BASE_URL = "https://us-central1-galmet-app.cloudfunctions.net";
  let sendCooldown = 0;
  let timerInterval = null;
  const otpMessageDiv = document.getElementById("otpMessage");

  function showMessage(text, isError = false) {
    otpMessageDiv.innerText = text;
    otpMessageDiv.className = `text-xs mt-2 ml-1 message-fade ${isError ? 'text-error' : 'text-primary'}`;
    // Auto-clear after 5 seconds
    setTimeout(() => {
      if (otpMessageDiv.innerText === text) {
        otpMessageDiv.innerText = "";
      }
    }, 5000);
  }

  function generateUserId() {
    return Math.floor(10000000 + Math.random() * 90000000);
  }

  async function sendOtp() {
    const email = document.getElementById("email").value;
    const btn = document.getElementById("sendOtpBtn");

    if (!email) {
      showMessage("Please enter your email address", true);
      return;
    }

    if (sendCooldown > 0) {
      showMessage(`Please wait ${sendCooldown} seconds before requesting another code`, true);
      return;
    }

    try {
      const res = await fetch(BASE_URL + "/sendOtpEmail", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await res.json();

      if (data.success) {
        showMessage(`✅ OTP sent to ${email}`, false);
        sendCooldown = 60;
        btn.disabled = true;

        timerInterval = setInterval(() => {
          sendCooldown--;
          btn.innerText = sendCooldown + "s";
          if (sendCooldown <= 0) {
            clearInterval(timerInterval);
            btn.disabled = false;
            btn.innerText = "Send";
          }
        }, 1000);
      } else {
        showMessage(data.error || "Failed to send OTP. Try again.", true);
      }
    } catch (err) {
      console.error(err);
      showMessage("Network error. Please check your connection.", true);
    }
  }

  async function verifyOtp() {
    const email = document.getElementById("email").value;
    const otp = document.getElementById("otp").value;

    if (!email || !otp) {
      showMessage("Please enter both email and verification code", true);
      return;
    }

    try {
      const res = await fetch(BASE_URL + "/verifyOtp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, otp })
      });
      const data = await res.json();

      if (!data.success) {
        showMessage(data.message || "Invalid verification code. Please try again.", true);
        return;
      }

      // OTP is valid – now check user existence
      const checkRes = await fetch(BASE_URL + "/getUserByEmail?email=" + encodeURIComponent(email));
      const checkData = await checkRes.json();

      if (checkData.exists) {
        const user = checkData.user;
        localStorage.setItem("user", JSON.stringify(user));

        // Redirect based on profile completion
        if (!user.gender) {
          window.location.href = "gender.html";
          return;
        }
        if (!user.username || !user.country || !user.dob || !user.age) {
          window.location.href = "username.html";
          return;
        }
        if (!user.photoURL || !user.profileCompleted) {
          window.location.href = "setup.html";
          return;
        }
        // Fully complete profile
        window.location.href = "dashboard.html";
      } else {
        // New user – create account
        const userId = generateUserId();
        const urlParams = new URLSearchParams(window.location.search);
        let referralCode = urlParams.get("ref");
        if (!referralCode) referralCode = localStorage.getItem("referral");

        const newUser = {
          email: email,
          userId: userId,
          coins: 500,
          username: "",
          gender: "",
          country: null,
          dob: null,
          age: null,
          photoURL: "",
          profileCompleted: false,
          inviteCode: userId.toString(),
          referredBy: (referralCode && referralCode !== userId.toString()) ? referralCode : null,
          totalInvites: 0,
          totalEarned: 0,
          firstTopup: false
        };

        const createRes = await fetch(BASE_URL + "/createUser", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(newUser)
        });
        const createData = await createRes.json();

        if (createData.success) {
          localStorage.setItem("user", JSON.stringify(newUser));
          window.location.href = "gender.html";
        } else {
          showMessage("Failed to create account. Please try again.", true);
        }
      }
    } catch (err) {
      console.error(err);
      showMessage("Something went wrong. Please check your connection.", true);
    }
  }
</script>
</body>
</html>
