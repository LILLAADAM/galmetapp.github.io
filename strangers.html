<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Strangers - Galmet</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f3f7fb",
            "surface-container-low": "#ecf1f6",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#2a2f32",
            "on-surface-variant": "#575c60",
            "primary": "#006571",
            "primary-container": "#00e3fd",
            "secondary": "#755700",
            "tertiary": "#b60051",
            "outline": "#73777b"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" }
        }
      }
    }
  </script>
</head>
<body class="bg-surface font-body text-on-surface">

<!-- Top App Bar -->
<header class="fixed top-0 w-full z-40 bg-surface/80 backdrop-blur-xl flex items-center px-4 py-4 border-b border-outline-variant/20">
  <button onclick="window.history.back()" class="p-2 rounded-full hover:bg-primary-container/30 transition text-primary mr-2">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>
  <h1 class="font-headline text-xl font-bold text-primary">Strangers</h1>
</header>

<main class="pt-20 pb-28 px-4 max-w-2xl mx-auto">
  <div id="strangersList" class="space-y-2"></div>
</main>

<!-- Bottom Navigation (same as chats) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/80 backdrop-blur-xl rounded-t-2xl shadow-[0_-4px_24px_rgba(0,101,113,0.06)]">
  <button onclick="location.href='dashboard.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-label">Home</span>
  </button>
  <button onclick="location.href='party.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">sports_esports</span>
    <span class="text-[10px] font-label">Party</span>
  </button>
  <button onclick="location.href='chats.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">chat_bubble</span>
    <span class="text-[10px] font-label">Chats</span>
  </button>
  <button onclick="location.href='profile.html'" class="flex flex-col items-center text-slate-400 hover:text-primary transition">
    <span class="material-symbols-outlined">person</span>
    <span class="text-[10px] font-label">Profile</span>
  </button>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAxN1Q9g2kcDcaiTwPsSZEgsTvtyLyN3oY",
    authDomain: "galmet-app.firebaseapp.com",
    projectId: "galmet-app",
    storageBucket: "galmet-app.firebasestorage.app"
  });
  const db = getFirestore(app);

  const currentUser = JSON.parse(localStorage.getItem("user"));
  if (!currentUser || !currentUser.userId) {
    window.location.replace("login.html");
  }
  const myUserId = currentUser.userId.toString();

  // Helper: check if two users are friends (mutual follow)
  async function isFriend(uid1, uid2) {
    const f1 = await getDoc(doc(db, "friends", uid1, "list", uid2));
    const f2 = await getDoc(doc(db, "friends", uid2, "list", uid1));
    return f1.exists() && f2.exists();
  }

  // Helper: check if blocked
  async function isBlocked(uid1, uid2) {
    const block = await getDoc(doc(db, "blocked", uid1, "list", uid2));
    return block.exists();
  }

  async function loadStrangers() {
    const allUsersSnap = await getDocs(collection(db, "users"));
    const strangers = [];
    for (const userDoc of allUsersSnap.docs) {
      const uid = userDoc.id;
      if (uid === myUserId) continue;
      // Exclude friends
      const friend = await isFriend(myUserId, uid);
      if (friend) continue;
      // Exclude blocked (by me or by them)
      const blockedByMe = await isBlocked(myUserId, uid);
      const blockedByThem = await isBlocked(uid, myUserId);
      if (blockedByMe || blockedByThem) continue;
      // Also exclude if already in userChats? No, we want to show all non-friend non-blocked.
      const userData = userDoc.data();
      strangers.push({
        id: uid,
        name: userData.username || userData.email || "User",
        photo: userData.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.username || "User")}&background=006571&color=fff`,
        age: userData.age || "?",
        gender: userData.gender === 'male' ? '♂' : (userData.gender === 'female' ? '♀' : ''),
        country: userData.country ? (typeof userData.country === "object" ? userData.country.name : userData.country) : "Unknown"
      });
    }
    // Shuffle for variety
    for (let i = strangers.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [strangers[i], strangers[j]] = [strangers[j], strangers[i]];
    }
    renderStrangers(strangers);
  }

  function renderStrangers(list) {
    const container = document.getElementById("strangersList");
    container.innerHTML = "";
    if (list.length === 0) {
      container.innerHTML = `<div class="text-center py-8 text-outline">No strangers found. Come back later!</div>`;
      return;
    }
    for (const s of list) {
      const div = document.createElement("div");
      div.className = "bg-surface-container-lowest hover:bg-surface-container-high transition p-4 flex items-center gap-4 rounded-xl border border-outline-variant/20";
      div.innerHTML = `
        <div class="shrink-0 cursor-pointer" onclick="location.href='view.html?id=${s.id}'">
          <img class="w-14 h-14 rounded-full object-cover" src="${s.photo}">
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <h3 class="font-headline font-bold text-on-surface">${escapeHtml(s.name)}</h3>
            <span class="text-xs text-outline">${s.gender} ${s.age}</span>
          </div>
          <p class="text-sm text-on-surface-variant truncate">📍 ${escapeHtml(s.country)}</p>
        </div>
        <button onclick="startChat('${s.id}')" class="bg-primary text-white px-4 py-2 rounded-full text-sm font-bold shadow-md active:scale-95 transition">
          Chat
        </button>
      `;
      container.appendChild(div);
    }
  }

  window.startChat = async (otherId) => {
    // Create chat document reference (optional, but ensure userChats entry exists)
    const myChatRef = doc(db, "userChats", myUserId, "list", otherId);
    const existing = await getDoc(myChatRef);
    if (!existing.exists()) {
      await setDoc(myChatRef, {
        uid: otherId,
        lastMessage: "Start a conversation",
        updatedAt: serverTimestamp(),
        unread: 0
      });
    }
    // Also create entry for other user if not exists
    const otherChatRef = doc(db, "userChats", otherId, "list", myUserId);
    const otherExists = await getDoc(otherChatRef);
    if (!otherExists.exists()) {
      await setDoc(otherChatRef, {
        uid: myUserId,
        lastMessage: "Start a conversation",
        updatedAt: serverTimestamp(),
        unread: 0
      });
    }
    // Redirect to chat
    window.location.href = `chat.html?id=${otherId}`;
  };

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  loadStrangers();
</script>
</body>
</html>
